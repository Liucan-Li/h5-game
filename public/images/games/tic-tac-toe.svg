<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="xGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="oGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <filter id="xGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#d63031" flood-opacity="0.4"/>
    </filter>
    <filter id="oGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#0984e3" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Board background -->
  <rect x="80" y="40" width="240" height="240" rx="12" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="2"/>

  <!-- Grid lines -->
  <g stroke="#ffffff" stroke-opacity="0.15" stroke-width="3" stroke-linecap="round">
    <!-- Vertical lines -->
    <line x1="160" y1="55" x2="160" y2="265"/>
    <line x1="240" y1="55" x2="240" y2="265"/>
    <!-- Horizontal lines -->
    <line x1="95" y1="125" x2="305" y2="125"/>
    <line x1="95" y1="195" x2="305" y2="195"/>
  </g>

  <!-- X at top-left -->
  <g transform="translate(120, 80)" filter="url(#xGlow)">
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- O at top-center -->
  <circle cx="200" cy="90" r="22" fill="none" stroke="url(#oGrad)" stroke-width="6" filter="url(#oGlow)"/>

  <!-- X at top-right -->
  <g transform="translate(280, 80)" filter="url(#xGlow)">
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- O at middle-left -->
  <circle cx="120" cy="160" r="22" fill="none" stroke="url(#oGrad)" stroke-width="6" filter="url(#oGlow)"/>

  <!-- X at middle-center -->
  <g transform="translate(200, 160)" filter="url(#xGlow)">
    <line x1="-20" y1="-20" x2="20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
    <line x1="20" y1="-20" x2="-20" y2="20" stroke="url(#xGrad)" stroke-width="6" stroke-linecap="round"/>
  </g>

  <!-- Winning line -->
  <line x1="95" y1="195" x2="305" y2="195" stroke="url(#lineGrad)" stroke-width="5" stroke-linecap="round" opacity="0.8"/>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">Tic Tac Toe</text>
</svg>