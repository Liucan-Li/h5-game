<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cardGlow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c5ce7"/>
      <stop offset="100%" stop-color="#a29bfe"/>
    </linearGradient>
    <linearGradient id="starGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fdcb6e"/>
      <stop offset="100%" stop-color="#ffeaa7"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#6c5ce7" flood-opacity="0.5"/>
    </filter>
    <filter id="starGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#fdcb6e" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Card back -->
  <rect x="130" y="60" width="140" height="180" rx="16" fill="url(#cardGlow)" filter="url(#glow)"/>
  <rect x="140" y="70" width="120" height="160" rx="12" fill="#2d2d5e"/>

  <!-- Card border decoration -->
  <rect x="148" y="78" width="104" height="144" rx="10" fill="none" stroke="#a29bfe" stroke-width="1.5" opacity="0.4"/>

  <!-- Star on card -->
  <g transform="translate(200, 150)" filter="url(#starGlow)">
    <polygon points="0,-30 8,-10 30,-10 12,4 18,26 0,14 -18,26 -12,4 -30,-10 -8,-10" fill="url(#starGrad)"/>
  </g>

  <!-- Question marks -->
  <text x="155" y="100" font-family="Arial, sans-serif" font-size="10" fill="#a29bfe" opacity="0.3">? ?</text>
  <text x="225" y="200" font-family="Arial, sans-serif" font-size="10" fill="#a29bfe" opacity="0.3">? ?</text>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">Memory</text>
</svg>