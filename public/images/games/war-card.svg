<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/><stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Left deck -->
  <rect x="54" y="90" width="120" height="100" rx="8" fill="#2c3e50" stroke="#34495e" stroke-width="2"/>
  <rect x="50" y="86" width="120" height="100" rx="8" fill="#34495e" stroke="#4a6278" stroke-width="2"/>
  <rect x="46" y="82" width="120" height="100" rx="8" fill="#3d5a7a" stroke="#5d8aa8" stroke-width="2"/>
  <!-- Left flipped card -->
  <rect x="55" y="95" width="100" height="72" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="65" y="116" font-family="serif" font-size="22" fill="#333" font-weight="bold">K</text>
  <text x="65" y="138" font-family="serif" font-size="18" fill="#333">♠</text>
  <text x="145" y="162" font-family="serif" font-size="22" fill="#333" font-weight="bold" transform="rotate(180,145,162)">K</text>
  <!-- Right deck -->
  <rect x="226" y="90" width="120" height="100" rx="8" fill="#5a1a1a" stroke="#7a2a2a" stroke-width="2"/>
  <rect x="222" y="86" width="120" height="100" rx="8" fill="#7a2a2a" stroke="#9a3a3a" stroke-width="2"/>
  <rect x="218" y="82" width="120" height="100" rx="8" fill="#8B1a1a" stroke="#aa2a2a" stroke-width="2"/>
  <!-- Right flipped card -->
  <rect x="227" y="95" width="100" height="72" rx="6" fill="#fff" stroke="#ddd" stroke-width="1.5"/>
  <text x="237" y="116" font-family="serif" font-size="22" fill="#e74c3c" font-weight="bold">A</text>
  <text x="237" y="138" font-family="serif" font-size="18" fill="#e74c3c">♥</text>
  <text x="317" y="162" font-family="serif" font-size="22" fill="#e74c3c" font-weight="bold" transform="rotate(180,317,162)">A</text>
  <!-- VS battle area -->
  <text x="200" y="148" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="26" fill="#f1c40f" text-anchor="middle" font-weight="bold">⚔</text>
  <!-- Win indicator -->
  <g transform="translate(260,80)">
    <rect x="-25" y="-14" width="50" height="22" rx="8" fill="#e74c3c"/>
    <text x="0" y="3" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="11" fill="#fff" text-anchor="middle" font-weight="bold">WIN!</text>
  </g>
  <!-- Card count -->
  <text x="105" y="218" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">26张</text>
  <text x="295" y="218" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="12" fill="#aaa" text-anchor="middle">26张</text>
  <text x="200" y="286" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#f1c40f" text-anchor="middle" font-weight="bold">战争纸牌</text>
</svg>
