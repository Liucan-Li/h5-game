<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/><stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Watermelon -->
  <g transform="translate(130, 80)">
    <path d="M0,30 Q0,0 30,0 Q60,0 60,30 Q60,60 30,60 Q0,60 0,30Z" fill="#27ae60"/>
    <path d="M2,30 Q2,4 30,4 Q58,4 58,30" fill="#e74c3c"/>
    <path d="M8,30 Q8,8 30,8 Q52,8 52,30" fill="#e74c3c"/>
    <circle cx="20" cy="22" r="3" fill="#333"/>
    <circle cx="40" cy="22" r="3" fill="#333"/>
    <circle cx="30" cy="38" r="3" fill="#333"/>
  </g>
  <!-- Orange -->
  <g transform="translate(260, 60)">
    <circle cx="25" cy="25" r="25" fill="#f39c12"/>
    <circle cx="25" cy="25" r="20" fill="#e67e22"/>
    <circle cx="25" cy="15" r="3" fill="#27ae60"/>
  </g>
  <!-- Kiwi -->
  <g transform="translate(200, 160)">
    <ellipse cx="20" cy="20" rx="20" ry="25" fill="#8e44ad"/>
    <ellipse cx="20" cy="20" rx="18" ry="22" fill="#5b2c6f"/>
  </g>
  <!-- Apple -->
  <g transform="translate(300, 170)">
    <circle cx="20" cy="25" r="20" fill="#e74c3c"/>
    <rect x="18" y="0" width="4" height="10" rx="2" fill="#795548"/>
    <ellipse cx="14" cy="6" rx="6" ry="3" fill="#27ae60" transform="rotate(-20,14,6)"/>
  </g>
  <!-- Slice trail -->
  <path d="M80,240 Q140,180 200,200 Q260,160 320,200" stroke="#ffffff88" stroke-width="4" fill="none" stroke-linecap="round"/>
  <path d="M80,240 Q140,180 200,200 Q260,160 320,200" stroke="#ffffff44" stroke-width="8" fill="none" stroke-linecap="round"/>
  <!-- Slice juice splash -->
  <circle cx="130" cy="80" r="4" fill="#ff6b6b" opacity="0.6"/>
  <circle cx="110" cy="90" r="3" fill="#27ae60" opacity="0.6"/>
  <circle cx="260" cy="60" r="3" fill="#f39c12" opacity="0.6"/>
  <!-- Bomb -->
  <g transform="translate(80, 170)">
    <circle cx="18" cy="22" r="16" fill="#333"/>
    <rect x="16" y="2" width="4" height="8" rx="2" fill="#555"/>
    <circle cx="18" cy="18" r="4" fill="#e74c3c"/>
    <rect x="16" y="4" width="2" height="6" fill="#ffcc00"/>
  </g>
  <!-- Title -->
  <text x="200" y="288" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#e74c3c" text-anchor="middle" font-weight="bold" letter-spacing="3">水果忍者</text>
</svg>