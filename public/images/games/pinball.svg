<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/><stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
    <linearGradient id="table" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a3e"/><stop offset="100%" stop-color="#0d0d2b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Table -->
  <rect x="60" y="10" width="280" height="270" rx="8" fill="url(#table)" stroke="#333" stroke-width="2"/>
  <!-- Bumpers -->
  <circle cx="140" cy="60" r="18" fill="#ff6b6b" stroke="#ff4444" stroke-width="2"/>
  <circle cx="260" cy="60" r="18" fill="#4fc3f7" stroke="#29b6f6" stroke-width="2"/>
  <circle cx="200" cy="100" r="22" fill="#ffd93d" stroke="#ffb300" stroke-width="2"/>
  <!-- Bumper shine -->
  <circle cx="136" cy="56" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="256" cy="56" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="196" cy="96" r="6" fill="rgba(255,255,255,0.2)"/>
  <!-- Slingshots -->
  <line x1="70" y1="210" x2="130" y2="160" stroke="#e91e63" stroke-width="4" stroke-linecap="round"/>
  <line x1="330" y1="210" x2="270" y2="160" stroke="#e91e63" stroke-width="4" stroke-linecap="round"/>
  <!-- Guides -->
  <line x1="80" y1="20" x2="80" y2="240" stroke="#444" stroke-width="3"/>
  <line x1="320" y1="20" x2="320" y2="240" stroke="#444" stroke-width="3"/>
  <!-- Flippers -->
  <rect x="100" y="248" width="60" height="10" rx="5" fill="#e91e63" transform="rotate(-15,130,253)"/>
  <rect x="240" y="248" width="60" height="10" rx="5" fill="#e91e63" transform="rotate(15,270,253)"/>
  <!-- Ball -->
  <circle cx="200" cy="230" r="6" fill="#fff"/>
  <circle cx="198" cy="228" r="2" fill="#ccc"/>
  <!-- Score target labels -->
  <text x="140" y="58" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">100</text>
  <text x="260" y="58" font-family="monospace" font-size="8" fill="#fff" text-anchor="middle">100</text>
  <text x="200" y="98" font-family="monospace" font-size="9" fill="#333" text-anchor="middle">500</text>
  <!-- Title -->
  <text x="200" y="288" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#4fc3f7" text-anchor="middle" font-weight="bold" letter-spacing="3">弹球</text>
</svg>