<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="crosshairGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Crosshair -->
  <g transform="translate(170, 130)">
    <circle cx="0" cy="0" r="20" fill="none" stroke="url(#crosshairGrad)" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="2" fill="#6c63ff"/>
    <line x1="-35" y1="0" x2="-10" y2="0" stroke="#6c63ff" stroke-width="2"/>
    <line x1="10" y1="0" x2="35" y2="0" stroke="#6c63ff" stroke-width="2"/>
    <line x1="0" y1="-35" x2="0" y2="-10" stroke="#6c63ff" stroke-width="2"/>
    <line x1="0" y1="10" x2="0" y2="35" stroke="#6c63ff" stroke-width="2"/>
  </g>
  <!-- Targets -->
  <g transform="translate(100, 80)">
    <circle cx="0" cy="0" r="24" fill="#2d2d5e" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="0" cy="0" r="16" fill="#2d2d5e" stroke="#fff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="8" fill="#e74c3c"/>
    <circle cx="0" cy="0" r="3" fill="#fff"/>
  </g>
  <g transform="translate(270, 170)">
    <circle cx="0" cy="0" r="18" fill="#2d2d5e" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="0" cy="0" r="12" fill="#2d2d5e" stroke="#fff" stroke-width="1.5"/>
    <circle cx="0" cy="0" r="6" fill="#e74c3c"/>
    <circle cx="0" cy="0" r="2" fill="#fff"/>
  </g>
  <g transform="translate(290, 80)">
    <circle cx="0" cy="0" r="14" fill="#2d2d5e" stroke="#e74c3c" stroke-width="2"/>
    <circle cx="0" cy="0" r="9" fill="#2d2d5e" stroke="#fff" stroke-width="1"/>
    <circle cx="0" cy="0" r="4" fill="#e74c3c"/>
  </g>
  <!-- Score display -->
  <g transform="translate(200, 240)">
    <rect x="-40" y="-12" width="80" height="24" rx="12" fill="#2d2d5e" opacity="0.8"/>
    <text x="0" y="4" font-family="Arial,sans-serif" font-size="13" fill="#fff" text-anchor="middle">1250 分</text>
  </g>
  <text x="200" y="282" font-family="Arial,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">瞄准射击</text>
</svg>