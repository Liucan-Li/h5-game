<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="paddleGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#dfe6e9"/>
    </linearGradient>
    <filter id="ballGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fff" flood-opacity="0.6"/>
    </filter>
    <filter id="paddleGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#74b9ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Bricks -->
  <g>
    <!-- Row 1 -->
    <rect x="55" y="40" width="55" height="18" rx="5" fill="#ff6b6b"/>
    <rect x="118" y="40" width="55" height="18" rx="5" fill="#ee5a24"/>
    <rect x="181" y="40" width="55" height="18" rx="5" fill="#f0932b"/>
    <rect x="244" y="40" width="55" height="18" rx="5" fill="#f9ca24"/>
    <rect x="307" y="40" width="38" height="18" rx="5" fill="#fed330"/>

    <!-- Row 2 -->
    <rect x="55" y="65" width="55" height="18" rx="5" fill="#a29bfe"/>
    <rect x="118" y="65" width="55" height="18" rx="5" fill="#6c5ce7"/>
    <rect x="181" y="65" width="55" height="18" rx="5" fill="#74b9ff"/>
    <rect x="244" y="65" width="55" height="18" rx="5" fill="#0984e3"/>
    <rect x="307" y="65" width="38" height="18" rx="5" fill="#0652DD"/>

    <!-- Row 3 -->
    <rect x="55" y="90" width="55" height="18" rx="5" fill="#55efc4"/>
    <rect x="118" y="90" width="55" height="18" rx="5" fill="#00b894"/>
    <rect x="181" y="90" width="55" height="18" rx="5" fill="#00cec9"/>
    <rect x="244" y="90" width="55" height="18" rx="5" fill="#81ecec"/>
    <rect x="307" y="90" width="38" height="18" rx="5" fill="#00cec9"/>
  </g>

  <!-- Ball -->
  <circle cx="230" cy="180" r="8" fill="url(#ballGrad)" filter="url(#ballGlow)"/>

  <!-- Paddle -->
  <rect x="160" y="230" width="70" height="14" rx="7" fill="url(#paddleGrad)" filter="url(#paddleGlow)"/>

  <!-- Motion lines for ball -->
  <g stroke="#74b9ff" stroke-width="1.5" stroke-linecap="round" opacity="0.2">
    <line x1="215" y1="170" x2="200" y2="162"/>
    <line x1="210" y1="178" x2="194" y2="174"/>
    <line x1="214" y1="186" x2="198" y2="188"/>
  </g>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#74b9ff" text-anchor="middle" opacity="0.6">Breakout</text>
</svg>