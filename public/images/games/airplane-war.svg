<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#0f0f23"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Stars -->
  <g fill="#fff">
    <circle cx="30" cy="20" r="1" opacity="0.8"/><circle cx="120" cy="50" r="1.5" opacity="0.6"/><circle cx="350" cy="30" r="1" opacity="0.9"/>
    <circle cx="280" cy="70" r="1.5" opacity="0.5"/><circle cx="50" cy="100" r="1" opacity="0.7"/><circle cx="370" cy="120" r="1" opacity="0.6"/>
    <circle cx="150" cy="30" r="1" opacity="0.8"/><circle cx="310" cy="140" r="1" opacity="0.5"/>
  </g>
  <!-- Player plane -->
  <g transform="translate(200, 230)">
    <polygon points="0,-30 -12,10 -6,-5 6,-5 12,10" fill="#4fc3f7"/>
    <polygon points="0,-30 0,10 -12,10" fill="#29b6f6"/>
    <polygon points="-20,0 -8,0 -12,10 -24,10" fill="#f44336"/>
    <polygon points="20,0 8,0 12,10 24,10" fill="#f44336"/>
    <rect x="-2" y="-20" width="4" height="6" rx="1" fill="#ffeb3b"/>
  </g>
  <!-- Enemy planes -->
  <g transform="translate(100, 50)">
    <polygon points="-12,15 0,-15 12,15" fill="#e91e63"/>
    <polygon points="-8,10 0,-10 8,10" fill="#f06292"/>
  </g>
  <g transform="translate(250, 80)">
    <polygon points="-12,15 0,-15 12,15" fill="#e91e63"/>
    <polygon points="-8,10 0,-10 8,10" fill="#f06292"/>
  </g>
  <g transform="translate(170, 110)">
    <polygon points="-12,15 0,-15 12,15" fill="#ff9800"/>
    <polygon points="-8,10 0,-10 8,10" fill="#ffb74d"/>
  </g>
  <!-- Bullets -->
  <g fill="#ffeb3b">
    <rect x="198" y="190" width="4" height="10" rx="2"/>
    <rect x="198" y="160" width="4" height="10" rx="2"/>
    <rect x="198" y="130" width="4" height="10" rx="2"/>
  </g>
  <!-- Enemy bullet -->
  <circle cx="100" cy="150" r="3" fill="#ff5252"/>
  <circle cx="250" cy="140" r="3" fill="#ff5252"/>
  <!-- Explosion -->
  <g transform="translate(300, 70)">
    <circle cx="0" cy="0" r="12" fill="#ff6d00" opacity="0.6"/>
    <circle cx="0" cy="0" r="7" fill="#ffab00" opacity="0.8"/>
    <circle cx="0" cy="0" r="3" fill="#fff"/>
  </g>
  <!-- Title -->
  <text x="200" y="288" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#4fc3f7" text-anchor="middle" font-weight="bold" letter-spacing="3">飞机大战</text>
</svg>