<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="boltGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="boltGrad2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fed330"/>
      <stop offset="100%" stop-color="#fc5c65"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#f9ca24" flood-opacity="0.6"/>
    </filter>
    <filter id="glow2">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#f9ca24" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Background glow -->
  <ellipse cx="200" cy="140" rx="100" ry="80" fill="#f9ca24" opacity="0.05"/>

  <!-- Target circle -->
  <circle cx="200" cy="140" r="55" fill="none" stroke="#f9ca24" stroke-width="3" opacity="0.3" filter="url(#glow2)"/>

  <!-- Lightning bolt -->
  <g transform="translate(200, 130)" filter="url(#glow)">
    <polygon points="-8,-60 8,-60 4,-25 20,-25 -20,40 -12,0 4,0 -12,-40" fill="url(#boltGrad)"/>
    <!-- Smaller bolt overlay for depth -->
    <polygon points="-4,-48 6,-48 3,-22 15,-22 -14,28 -8,0 3,0 -8,-32" fill="url(#boltGrad2)" opacity="0.6"/>
  </g>

  <!-- Reaction speed lines -->
  <g stroke="#f9ca24" stroke-width="1.5" stroke-linecap="round" opacity="0.2">
    <line x1="60" y1="90" x2="100" y2="110"/>
    <line x1="50" y1="140" x2="90" y2="140"/>
    <line x1="60" y1="190" x2="100" y2="170"/>
    <line x1="340" y1="90" x2="300" y2="110"/>
    <line x1="350" y1="140" x2="310" y2="140"/>
    <line x1="340" y1="190" x2="300" y2="170"/>
  </g>

  <text x="200" y="270" font-family="Arial, sans-serif" font-size="14" fill="#f9ca24" text-anchor="middle" opacity="0.6">Reaction Test</text>
</svg>