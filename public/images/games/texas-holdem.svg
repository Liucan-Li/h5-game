<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0d1f0d"/><stop offset="100%" stop-color="#1a3a1a"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Poker table -->
  <ellipse cx="200" cy="150" rx="180" ry="110" fill="#1a5c2a"/>
  <ellipse cx="200" cy="150" rx="160" ry="92" fill="none" stroke="#2e8b57" stroke-width="2.5"/>
  <!-- Community cards (flop+turn+river) -->
  <g>
    <rect x="68" y="108" width="44" height="62" rx="5" fill="#fff" stroke="#ddd"/>
    <text x="74" y="124" font-family="serif" font-size="16" fill="#e74c3c" font-weight="bold">A</text>
    <text x="74" y="140" font-family="serif" font-size="12" fill="#e74c3c">♥</text>
    <rect x="120" y="108" width="44" height="62" rx="5" fill="#fff" stroke="#ddd"/>
    <text x="126" y="124" font-family="serif" font-size="16" fill="#333" font-weight="bold">K</text>
    <text x="126" y="140" font-family="serif" font-size="12" fill="#333">♠</text>
    <rect x="172" y="108" width="44" height="62" rx="5" fill="#fff" stroke="#ddd"/>
    <text x="178" y="124" font-family="serif" font-size="16" fill="#e74c3c" font-weight="bold">Q</text>
    <text x="178" y="140" font-family="serif" font-size="12" fill="#e74c3c">♦</text>
    <rect x="224" y="108" width="44" height="62" rx="5" fill="#fff" stroke="#ddd"/>
    <text x="230" y="124" font-family="serif" font-size="16" fill="#333" font-weight="bold">J</text>
    <text x="230" y="140" font-family="serif" font-size="12" fill="#333">♣</text>
    <rect x="276" y="108" width="44" height="62" rx="5" fill="#fff" stroke="#ddd"/>
    <text x="282" y="124" font-family="serif" font-size="16" fill="#e74c3c" font-weight="bold">10</text>
    <text x="284" y="140" font-family="serif" font-size="12" fill="#e74c3c">♥</text>
  </g>
  <!-- Player hole cards -->
  <rect x="148" y="200" width="40" height="56" rx="5" fill="#fff" stroke="#ddd"/>
  <text x="154" y="216" font-family="serif" font-size="14" fill="#e74c3c" font-weight="bold">A</text>
  <text x="154" y="230" font-family="serif" font-size="11" fill="#e74c3c">♦</text>
  <rect x="194" y="200" width="40" height="56" rx="5" fill="#fff" stroke="#ddd"/>
  <text x="200" y="216" font-family="serif" font-size="14" fill="#333" font-weight="bold">K</text>
  <text x="200" y="230" font-family="serif" font-size="11" fill="#333">♣</text>
  <!-- Dealer button -->
  <circle cx="260" cy="220" r="12" fill="#f1c40f" stroke="#e67e22" stroke-width="2"/>
  <text x="260" y="225" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">D</text>
  <!-- Pot chips -->
  <circle cx="200" cy="88" r="12" fill="#f1c40f" stroke="#e67e22" stroke-width="2"/>
  <text x="200" y="93" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="9" fill="#333" text-anchor="middle" font-weight="bold">POT</text>
  <text x="200" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#f1c40f" text-anchor="middle" font-weight="bold">德州扑克</text>
</svg>
