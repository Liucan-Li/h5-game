<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="dinoGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#b2bec3"/>
    </linearGradient>
    <filter id="dinoGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#55efc4" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Ground -->
  <line x1="50" y1="230" x2="350" y2="230" stroke="url(#groundGrad)" stroke-width="3" stroke-linecap="round" opacity="0.3"/>

  <!-- Ground decoration lines -->
  <g stroke="#636e72" stroke-width="2" stroke-linecap="round" opacity="0.15">
    <line x1="80" y1="238" x2="140" y2="238"/>
    <line x1="200" y1="240" x2="250" y2="240"/>
    <line x1="300" y1="236" x2="330" y2="236"/>
  </g>

  <!-- Dinosaur silhouette -->
  <g transform="translate(160, 80)" filter="url(#dinoGlow)">
    <!-- Body -->
    <path d="M10,150 L10,120 L-10,120 L-10,100 L-20,100 L-20,80 L-30,80 L-30,50 L-20,50 L-20,30 L20,30 L20,20 L40,20 L40,40 L50,40 L50,60 L70,60 L70,70 L60,70 L60,80 L50,80 L50,90 L30,90 L30,120 L40,120 L40,140 L30,140 L30,150 Z" fill="url(#dinoGrad)"/>

    <!-- Eye -->
    <circle cx="5" cy="45" r="5" fill="#1a1a2e"/>

    <!-- Mouth line -->
    <line x1="-5" y1="55" x2="15" y2="55" stroke="#1a1a2e" stroke-width="2" stroke-linecap="round"/>

    <!-- Legs -->
    <rect x="-5" y="140" width="12" height="20" rx="4" fill="url(#dinoGrad)"/>
    <rect x="20" y="140" width="12" height="20" rx="4" fill="url(#dinoGrad)"/>
  </g>

  <!-- Cactus obstacle -->
  <g transform="translate(290, 170)">
    <rect x="-5" y="-40" width="10" height="60" rx="4" fill="#6c5ce7" opacity="0.6"/>
    <rect x="-15" y="-25" width="8" height="20" rx="3" fill="#6c5ce7" opacity="0.5"/>
    <rect x="7" y="-20" width="8" height="16" rx="3" fill="#6c5ce7" opacity="0.5"/>
  </g>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#55efc4" text-anchor="middle" opacity="0.6">Dino Runner</text>
</svg>