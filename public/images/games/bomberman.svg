<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a0a"/><stop offset="100%" stop-color="#2a1f00"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Grid -->
  <g fill="#2d4a1e">
    <rect x="20" y="20" width="360" height="240" rx="4"/>
  </g>
  <!-- Destructible blocks -->
  <g fill="#8B6914" stroke="#6b5010" stroke-width="1">
    <rect x="56" y="56" width="36" height="36" rx="2"/>
    <rect x="128" y="56" width="36" height="36" rx="2"/>
    <rect x="200" y="56" width="36" height="36" rx="2"/>
    <rect x="272" y="56" width="36" height="36" rx="2"/>
    <rect x="56" y="128" width="36" height="36" rx="2"/>
    <rect x="200" y="128" width="36" height="36" rx="2"/>
    <rect x="272" y="200" width="36" height="36" rx="2"/>
    <rect x="128" y="200" width="36" height="36" rx="2"/>
  </g>
  <!-- Indestructible blocks -->
  <g fill="#555" stroke="#444" stroke-width="1">
    <rect x="92" y="92" width="36" height="36" rx="1"/>
    <rect x="164" y="92" width="36" height="36" rx="1"/>
    <rect x="236" y="92" width="36" height="36" rx="1"/>
    <rect x="92" y="164" width="36" height="36" rx="1"/>
    <rect x="236" y="164" width="36" height="36" rx="1"/>
  </g>
  <!-- Bomberman character -->
  <g transform="translate(38,38)">
    <circle cx="8" cy="6" r="8" fill="#fff"/>
    <rect x="2" y="12" width="12" height="14" rx="2" fill="#3498db"/>
    <rect x="1" y="14" width="5" height="10" rx="2" fill="#2980b9"/>
    <rect x="10" y="14" width="5" height="10" rx="2" fill="#2980b9"/>
  </g>
  <!-- Bomb -->
  <g transform="translate(110,110)">
    <circle cx="10" cy="12" r="10" fill="#222" stroke="#333" stroke-width="1"/>
    <path d="M10 2 Q14 -4 18 -6" stroke="#ff8800" stroke-width="2" fill="none" stroke-linecap="round"/>
    <circle cx="18" cy="-6" r="3" fill="#ff8800" opacity="0.9"/>
  </g>
  <!-- Explosion -->
  <g transform="translate(254,182)" opacity="0.9">
    <rect x="-6" y="-30" width="12" height="60" rx="4" fill="#ff8800"/>
    <rect x="-30" y="-6" width="60" height="12" rx="4" fill="#ff8800"/>
    <circle cx="0" cy="0" r="14" fill="#ffcc00"/>
    <circle cx="0" cy="0" r="7" fill="#fff"/>
  </g>
  <text x="200" y="286" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#f1c40f" text-anchor="middle" font-weight="bold">炸弹人</text>
</svg>
