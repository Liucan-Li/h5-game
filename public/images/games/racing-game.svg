<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="carBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e17055"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="carWindshield" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="roadGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#636e72"/>
      <stop offset="100%" stop-color="#2d3436"/>
    </linearGradient>
    <linearGradient id="stripeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <filter id="carGlow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#d63031" flood-opacity="0.5"/>
    </filter>
    <filter id="headlightGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#f9ca24" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Road -->
  <rect x="80" y="40" width="240" height="220" rx="10" fill="url(#roadGrad)" opacity="0.4"/>

  <!-- Road stripes -->
  <g fill="url(#stripeGrad)" opacity="0.15">
    <rect x="194" y="40" width="12" height="30" rx="3"/>
    <rect x="194" y="85" width="12" height="30" rx="3"/>
    <rect x="194" y="130" width="12" height="30" rx="3"/>
    <rect x="194" y="175" width="12" height="30" rx="3"/>
    <rect x="194" y="220" width="12" height="30" rx="3"/>
  </g>

  <!-- Road edges -->
  <line x1="80" y1="40" x2="80" y2="260" stroke="#fff" stroke-width="2" opacity="0.1"/>
  <line x1="320" y1="40" x2="320" y2="260" stroke="#fff" stroke-width="2" opacity="0.1"/>

  <!-- Competition car (small, ahead) -->
  <g transform="translate(160, 100)">
    <rect x="-18" y="-8" width="36" height="16" rx="5" fill="#0984e3" opacity="0.5"/>
    <rect x="-10" y="-5" width="12" height="10" rx="3" fill="#74b9ff" opacity="0.6"/>
  </g>

  <!-- Player car -->
  <g transform="translate(200, 175)" filter="url(#carGlow)">
    <!-- Car body -->
    <rect x="-30" y="-14" width="60" height="28" rx="10" fill="url(#carBody)"/>
    <!-- Roof/cabin -->
    <rect x="-15" y="-20" width="30" height="14" rx="6" fill="#c0392b"/>
    <!-- Windshield -->
    <rect x="-12" y="-18" width="24" height="10" rx="4" fill="url(#carWindshield)" opacity="0.8"/>
    <!-- Headlights -->
    <circle cx="28" cy="-6" r="4" fill="#f9ca24" filter="url(#headlightGlow)"/>
    <circle cx="28" cy="6" r="4" fill="#f9ca24" filter="url(#headlightGlow)"/>
    <!-- Tail lights -->
    <circle cx="-28" cy="-6" r="3" fill="#ff7675"/>
    <circle cx="-28" cy="6" r="3" fill="#ff7675"/>
    <!-- Wheels -->
    <rect x="-20" y="14" width="10" height="6" rx="3" fill="#2d3436"/>
    <rect x="10" y="14" width="10" height="6" rx="3" fill="#2d3436"/>
    <rect x="-20" y="-20" width="10" height="6" rx="3" fill="#2d3436"/>
    <rect x="10" y="-20" width="10" height="6" rx="3" fill="#2d3436"/>
  </g>

  <!-- Speed lines -->
  <g stroke="#e17055" stroke-width="1.5" stroke-linecap="round" opacity="0.2">
    <line x1="140" y1="170" x2="100" y2="170"/>
    <line x1="140" y1="180" x2="90" y2="180"/>
    <line x1="140" y1="190" x2="110" y2="190"/>
    <line x1="135" y1="200" x2="105" y2="200"/>
  </g>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#e17055" text-anchor="middle" opacity="0.6">Racing Game</text>
</svg>