<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a0f00"/><stop offset="100%" stop-color="#2a1800"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Board -->
  <rect x="30" y="15" width="340" height="250" rx="4" fill="#e8c87a" stroke="#c8a84a" stroke-width="2"/>
  <!-- Grid lines -->
  <g stroke="#8B6914" stroke-width="1">
    <line x1="68" y1="15" x2="68" y2="265"/><line x1="106" y1="15" x2="106" y2="265"/>
    <line x1="144" y1="15" x2="144" y2="265"/><line x1="182" y1="15" x2="182" y2="265"/>
    <line x1="220" y1="15" x2="220" y2="265"/><line x1="258" y1="15" x2="258" y2="265"/>
    <line x1="296" y1="15" x2="296" y2="265"/><line x1="334" y1="15" x2="334" y2="265"/>
    <line x1="30" y1="43" x2="370" y2="43"/><line x1="30" y1="71" x2="370" y2="71"/>
    <line x1="30" y1="99" x2="370" y2="99"/><line x1="30" y1="127" x2="370" y2="127"/>
    <line x1="30" y1="155" x2="370" y2="155"/><line x1="30" y1="183" x2="370" y2="183"/>
    <line x1="30" y1="211" x2="370" y2="211"/><line x1="30" y1="239" x2="370" y2="239"/>
    <!-- Palace diagonals top -->
    <line x1="182" y1="15" x2="258" y2="99"/><line x1="258" y1="15" x2="182" y2="99"/>
    <!-- Palace diagonals bottom -->
    <line x1="182" y1="183" x2="258" y2="265"/><line x1="258" y1="183" x2="182" y2="265"/>
  </g>
  <!-- River -->
  <text x="200" y="145" font-family="serif" font-size="13" fill="#8B6914" text-anchor="middle">楚河　　　汉界</text>
  <!-- Red pieces -->
  <g>
    <circle cx="30" cy="265" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="30" y="270" font-family="serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">車</text>
    <circle cx="220" cy="239" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="220" y="244" font-family="serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">將</text>
    <circle cx="106" cy="211" r="16" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
    <text x="106" y="216" font-family="serif" font-size="13" fill="#fff" text-anchor="middle" font-weight="bold">炮</text>
  </g>
  <!-- Black pieces -->
  <g>
    <circle cx="370" cy="15" r="16" fill="#222" stroke="#444" stroke-width="2"/>
    <text x="370" y="20" font-family="serif" font-size="13" fill="#ddd" text-anchor="middle" font-weight="bold">車</text>
    <circle cx="220" cy="43" r="16" fill="#222" stroke="#444" stroke-width="2"/>
    <text x="220" y="48" font-family="serif" font-size="13" fill="#ddd" text-anchor="middle" font-weight="bold">将</text>
    <circle cx="296" cy="71" r="16" fill="#222" stroke="#444" stroke-width="2"/>
    <text x="296" y="76" font-family="serif" font-size="13" fill="#ddd" text-anchor="middle" font-weight="bold">炮</text>
  </g>
  <text x="200" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#c8a84a" text-anchor="middle" font-weight="bold">中国象棋</text>
</svg>
