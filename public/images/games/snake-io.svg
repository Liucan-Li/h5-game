<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00b894"/>
      <stop offset="100%" stop-color="#55efc4"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#00b894" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <g transform="translate(100, 40)">
    <rect x="0" y="40" width="40" height="40" rx="8" fill="#2a2a4e"/>
    <rect x="40" y="40" width="40" height="40" rx="8" fill="#2a2a4e"/>
    <rect x="80" y="40" width="40" height="40" rx="8" fill="#2a2a4e"/>
    <rect x="120" y="40" width="40" height="40" rx="8" fill="#2a2a4e"/>
    <rect x="160" y="40" width="40" height="40" rx="8" fill="url(#glow)" filter="url(#shadow)"/>
    <rect x="160" y="80" width="40" height="40" rx="8" fill="url(#glow)" filter="url(#shadow)"/>
    <rect x="160" y="120" width="40" height="40" rx="8" fill="url(#glow)" filter="url(#shadow)"/>
    <rect x="120" y="120" width="40" height="40" rx="8" fill="url(#glow)" filter="url(#shadow)"/>
    <circle cx="170" cy="50" r="5" fill="#fff" opacity="0.9"/>
  </g>
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="14" fill="#55efc4" text-anchor="middle" opacity="0.6">Snake.io</text>
</svg>
