<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="paddleGrad1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="paddleGrad2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff7675"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="ballGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fff"/>
      <stop offset="100%" stop-color="#dfe6e9"/>
    </linearGradient>
    <filter id="ballGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#fff" flood-opacity="0.7"/>
    </filter>
    <filter id="paddleGlow1">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#74b9ff" flood-opacity="0.4"/>
    </filter>
    <filter id="paddleGlow2">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#ff7675" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Center line -->
  <line x1="200" y1="50" x2="200" y2="250" stroke="#ffffff" stroke-width="2" stroke-dasharray="8,8" opacity="0.15"/>

  <!-- Left paddle -->
  <rect x="40" y="110" width="12" height="60" rx="6" fill="url(#paddleGrad1)" filter="url(#paddleGlow1)"/>

  <!-- Right paddle -->
  <rect x="348" y="130" width="12" height="60" rx="6" fill="url(#paddleGrad2)" filter="url(#paddleGlow2)"/>

  <!-- Ball -->
  <circle cx="200" cy="150" r="10" fill="url(#ballGrad)" filter="url(#ballGlow)"/>

  <!-- Ball motion trail -->
  <g fill="#fff" opacity="0.08">
    <circle cx="170" cy="150" r="8"/>
    <circle cx="145" cy="150" r="6"/>
    <circle cx="125" cy="150" r="4"/>
  </g>

  <!-- Score -->
  <text x="160" y="45" font-family="Arial, sans-serif" font-size="28" fill="#74b9ff" text-anchor="middle" opacity="0.3">2</text>
  <text x="240" y="45" font-family="Arial, sans-serif" font-size="28" fill="#ff7675" text-anchor="middle" opacity="0.3">3</text>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">Pong</text>
</svg>