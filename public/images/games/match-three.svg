<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff6b6b"/><stop offset="100%" stop-color="#ee5a24"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#0652DD"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2ed573"/><stop offset="100%" stop-color="#05c46b"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffa502"/><stop offset="100%" stop-color="#e67e22"/>
    </linearGradient>
    <linearGradient id="g5" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eccc68"/><stop offset="100%" stop-color="#ffdd59"/>
    </linearGradient>
    <linearGradient id="g6" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ec4899"/><stop offset="100%" stop-color="#e056fd"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#6c63ff" flood-opacity="0.4"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Match-3 grid highlighting 3 matched gems -->
  <g transform="translate(80, 30)">
    <circle cx="30" cy="30" r="13" fill="url(#g1)"/>
    <circle cx="90" cy="30" r="13" fill="url(#g2)"/>
    <circle cx="150" cy="30" r="13" fill="url(#g3)"/>
    <circle cx="210" cy="30" r="13" fill="url(#g4)"/>
    <circle cx="30" cy="90" r="13" fill="url(#g5)"/>
    <circle cx="90" cy="90" r="13" fill="url(#g1)"/>
    <circle cx="150" cy="90" r="13" fill="url(#g6)"/>
    <circle cx="210" cy="90" r="13" fill="url(#g3)"/>
    <circle cx="30" cy="150" r="13" fill="url(#g1)"/>
    <circle cx="90" cy="150" r="13" fill="url(#g1)" filter="url(#glow)"/>
    <circle cx="150" cy="150" r="13" fill="url(#g1)" filter="url(#glow)"/>
    <circle cx="210" cy="150" r="13" fill="url(#g1)" filter="url(#glow)"/>
    <circle cx="30" cy="210" r="13" fill="url(#g6)"/>
    <circle cx="90" cy="210" r="13" fill="url(#g5)"/>
    <circle cx="150" cy="210" r="13" fill="url(#g4)"/>
    <circle cx="210" cy="210" r="13" fill="url(#g2)"/>
    <!-- Highlight line -->
    <line x1="60" y1="150" x2="240" y2="150" stroke="#fff" stroke-width="2" opacity="0.5" stroke-dasharray="4"/>
    <rect x="62" y="135" width="8" height="30" rx="4" fill="#fff" opacity="0.6"/>
  </g>
  <text x="200" y="270" font-family="Arial,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">消消乐</text>
</svg>