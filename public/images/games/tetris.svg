<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="blockI" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00cec9"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="blockO" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="blockT" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a29bfe"/>
      <stop offset="100%" stop-color="#6c5ce7"/>
    </linearGradient>
    <linearGradient id="blockS" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="blockL" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f8a5c2"/>
      <stop offset="100%" stop-color="#e84393"/>
    </linearGradient>
    <filter id="blockGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#fff" flood-opacity="0.15"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Grid background -->
  <rect x="100" y="20" width="200" height="260" rx="8" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

  <!-- Stacked blocks (bottom of board) -->
  <g filter="url(#blockGlow)">
    <!-- Bottom row -->
    <rect x="100" y="244" width="24" height="24" rx="4" fill="url(#blockI)"/>
    <rect x="128" y="244" width="24" height="24" rx="4" fill="url(#blockO)"/>
    <rect x="156" y="244" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="184" y="244" width="24" height="24" rx="4" fill="url(#blockS)"/>
    <rect x="212" y="244" width="24" height="24" rx="4" fill="url(#blockL)"/>
    <rect x="240" y="244" width="24" height="24" rx="4" fill="url(#blockI)"/>
    <rect x="268" y="244" width="24" height="24" rx="4" fill="url(#blockO)"/>

    <!-- Second row -->
    <rect x="100" y="216" width="24" height="24" rx="4" fill="url(#blockO)"/>
    <rect x="128" y="216" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="156" y="216" width="24" height="24" rx="4" fill="url(#blockI)"/>
    <rect x="184" y="216" width="24" height="24" rx="4" fill="url(#blockL)"/>
    <rect x="212" y="216" width="24" height="24" rx="4" fill="url(#blockS)"/>
    <rect x="240" y="216" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="268" y="216" width="24" height="24" rx="4" fill="url(#blockI)"/>

    <!-- Third row -->
    <rect x="100" y="188" width="24" height="24" rx="4" fill="url(#blockL)"/>
    <rect x="128" y="188" width="24" height="24" rx="4" fill="url(#blockI)"/>
    <rect x="156" y="188" width="24" height="24" rx="4" fill="url(#blockS)"/>
    <rect x="184" y="188" width="24" height="24" rx="4" fill="url(#blockO)"/>
    <rect x="212" y="188" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="240" y="188" width="24" height="24" rx="4" fill="url(#blockI)"/>
    <rect x="268" y="188" width="24" height="24" rx="4" fill="url(#blockL)"/>

    <!-- Fourth row - partial -->
    <rect x="100" y="160" width="24" height="24" rx="4" fill="url(#blockS)"/>
    <rect x="128" y="160" width="24" height="24" rx="4" fill="url(#blockL)"/>
    <rect x="156" y="160" width="24" height="24" rx="4" fill="url(#blockO)"/>
    <rect x="184" y="160" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="212" y="160" width="24" height="24" rx="4" fill="url(#blockI)"/>
  </g>

  <!-- Falling T-piece -->
  <g transform="translate(184, 80)" filter="url(#blockGlow)">
    <rect x="0" y="0" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="0" y="28" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="-28" y="28" width="24" height="24" rx="4" fill="url(#blockT)"/>
    <rect x="28" y="28" width="24" height="24" rx="4" fill="url(#blockT)"/>
  </g>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">Tetris</text>
</svg>