<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/><stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Mahjong tiles grid -->
  <g transform="translate(40, 20)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="20" y="30" font-family="serif" font-size="20" fill="#e74c3c" text-anchor="middle">万</text>
    <rect x="46" y="0" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="66" y="30" font-family="serif" font-size="20" fill="#27ae60" text-anchor="middle">条</text>
    <rect x="92" y="0" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="112" y="30" font-family="serif" font-size="20" fill="#2980b9" text-anchor="middle">筒</text>
    <rect x="138" y="0" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="158" y="30" font-family="serif" font-size="20" fill="#8e44ad" text-anchor="middle">發</text>
    <rect x="184" y="0" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="204" y="30" font-family="serif" font-size="20" fill="#e74c3c" text-anchor="middle">中</text>
    <!-- Row 2 -->
    <rect x="23" y="54" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="43" y="84" font-family="serif" font-size="20" fill="#2980b9" text-anchor="middle">筒</text>
    <rect x="69" y="54" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="89" y="84" font-family="serif" font-size="20" fill="#e67e22" text-anchor="middle">南</text>
    <rect x="115" y="54" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="135" y="84" font-family="serif" font-size="20" fill="#e74c3c" text-anchor="middle">万</text>
    <rect x="161" y="54" width="40" height="48" rx="4" fill="#f5f5f5" stroke="#ddd" stroke-width="1"/>
    <text x="181" y="84" font-family="serif" font-size="20" fill="#27ae60" text-anchor="middle">条</text>
  </g>
  <!-- Con nection line -->
  <line x1="60" y1="44" x2="89" y2="78" stroke="#ffdd0066" stroke-width="2" stroke-dasharray="4,3"/>
  <!-- Highlighted tile -->
  <rect x="0" y="0" width="40" height="48" rx="4" fill="none" stroke="#ffdd00" stroke-width="2" transform="translate(40,20)"/>
  <!-- Title -->
  <text x="200" y="288" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#ffdd00" text-anchor="middle" font-weight="bold" letter-spacing="3">连连看</text>
</svg>