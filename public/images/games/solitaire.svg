<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="cardBack" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#6c63ff"/><stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="cardFace" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#f0f0f0"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Felt background -->
  <rect x="60" y="20" width="280" height="260" rx="8" fill="#0a5c2e" opacity="0.4"/>
  <!-- Foundation piles -->
  <g transform="translate(225, 28)">
    <rect x="0" y="0" width="32" height="44" rx="4" fill="url(#cardFace)" stroke="#ddd" stroke-width="1"/>
    <text x="16" y="28" font-family="Arial,sans-serif" font-size="16" fill="#e74c3c" text-anchor="middle">A</text>
    <rect x="38" y="0" width="32" height="44" rx="4" fill="url(#cardFace)" stroke="#ddd" stroke-width="1"/>
    <text x="54" y="28" font-family="Arial,sans-serif" font-size="16" fill="#e74c3c" text-anchor="middle">A</text>
    <rect x="76" y="0" width="32" height="44" rx="4" fill="url(#cardFace)" stroke="#ddd" stroke-width="1"/>
    <text x="92" y="28" font-family="Arial,sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">A</text>
    <rect x="114" y="0" width="32" height="44" rx="4" fill="url(#cardFace)" stroke="#ddd" stroke-width="1"/>
    <text x="130" y="28" font-family="Arial,sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">A</text>
  </g>
  <!-- Stock -->
  <rect x="72" y="28" width="32" height="44" rx="4" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="1"/>
  <!-- Tableau columns -->
  <g transform="translate(60, 85)">
    <rect x="0" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="36" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="72" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="108" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="144" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="180" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <rect x="216" y="0" width="32" height="44" rx="3" fill="url(#cardBack)" stroke="#5a52d5" stroke-width="0.5"/>
    <!-- Face up cards -->
    <rect x="0" y="16" width="32" height="44" rx="3" fill="url(#cardFace)" stroke="#ddd" stroke-width="0.5"/>
    <text x="16" y="44" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">K</text>
    <rect x="36" y="20" width="32" height="44" rx="3" fill="url(#cardFace)" stroke="#ddd" stroke-width="0.5"/>
    <text x="52" y="48" font-family="Arial,sans-serif" font-size="12" fill="#2c3e50" text-anchor="middle">Q</text>
    <rect x="72" y="24" width="32" height="44" rx="3" fill="url(#cardFace)" stroke="#ddd" stroke-width="0.5"/>
    <text x="88" y="52" font-family="Arial,sans-serif" font-size="12" fill="#e74c3c" text-anchor="middle">J</text>
  </g>
  <text x="200" y="282" font-family="Arial,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">纸牌接龙</text>
</svg>