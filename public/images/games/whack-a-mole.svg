<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="moleBody" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#8B4513"/>
      <stop offset="100%" stop-color="#5c4033"/>
    </linearGradient>
    <linearGradient id="moleNose" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ff7675"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <linearGradient id="holeGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <linearGradient id="hammerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#b2bec3"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#d63031" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Hammer (top-right rotated) -->
  <g transform="translate(310, 55) rotate(30)">
    <!-- Handle -->
    <rect x="-4" y="10" width="8" height="80" rx="4" fill="url(#hammerGrad)"/>
    <!-- Head -->
    <rect x="-20" y="0" width="40" height="16" rx="4" fill="#b2bec3"/>
    <rect x="-18" y="2" width="36" height="4" rx="2" fill="#dfe6e9" opacity="0.5"/>
  </g>

  <!-- Hole 1 (mole popping out) -->
  <g transform="translate(120, 120)">
    <ellipse cx="0" cy="55" rx="55" ry="20" fill="#2d3436"/>
    <ellipse cx="0" cy="53" rx="50" ry="16" fill="#1a1a2e"/>

    <!-- Mole -->
    <g transform="translate(0, 15)">
      <!-- Body -->
      <ellipse cx="0" cy="20" rx="30" ry="18" fill="url(#moleBody)"/>
      <!-- Head -->
      <ellipse cx="0" cy="-5" rx="24" ry="18" fill="url(#moleBody)"/>
      <!-- Ears -->
      <circle cx="-18" cy="-18" r="8" fill="#5c4033"/>
      <circle cx="18" cy="-18" r="8" fill="#5c4033"/>
      <!-- Eyes -->
      <circle cx="-8" cy="-8" r="4" fill="#fff"/>
      <circle cx="8" cy="-8" r="4" fill="#fff"/>
      <circle cx="-8" cy="-8" r="2" fill="#2d3436"/>
      <circle cx="8" cy="-8" r="2" fill="#2d3436"/>
      <!-- Nose -->
      <ellipse cx="0" cy="-1" rx="6" ry="4" fill="url(#moleNose)" filter="url(#glow)"/>
    </g>
  </g>

  <!-- Hole 2 (empty) -->
  <g transform="translate(280, 120)">
    <ellipse cx="0" cy="55" rx="55" ry="20" fill="#2d3436"/>
    <ellipse cx="0" cy="53" rx="50" ry="16" fill="#1a1a2e"/>
  </g>

  <!-- Hole 3 (mole slightly peeking) -->
  <g transform="translate(200, 210)">
    <ellipse cx="0" cy="35" rx="45" ry="16" fill="#2d3436"/>
    <ellipse cx="0" cy="33" rx="40" ry="12" fill="#1a1a2e"/>
    <!-- Mole peeking -->
    <ellipse cx="0" cy="12" rx="18" ry="12" fill="url(#moleBody)"/>
    <circle cx="-6" cy="8" r="2.5" fill="#fff"/>
    <circle cx="6" cy="8" r="2.5" fill="#fff"/>
    <ellipse cx="0" cy="13" rx="4" ry="3" fill="url(#moleNose)"/>
  </g>

  <!-- Hit stars -->
  <g fill="#f9ca24" opacity="0.6">
    <polygon points="90,95 93,103 102,103 95,108 98,117 90,111 82,117 85,108 78,103 87,103"/>
    <polygon points="145,110 147,115 153,115 148,118 150,124 145,120 140,124 142,118 137,115 143,115" fill="#ff7675" opacity="0.4"/>
  </g>

  <text x="200" y="280" font-family="Arial, sans-serif" font-size="14" fill="#8B4513" text-anchor="middle" opacity="0.6">Whack-a-Mole</text>
</svg>