<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <radialGradient id="blackStone" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#555"/><stop offset="100%" stop-color="#111"/>
    </radialGradient>
    <radialGradient id="whiteStone" cx="40%" cy="35%">
      <stop offset="0%" stop-color="#fff"/><stop offset="100%" stop-color="#ccc"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Board -->
  <g transform="translate(60, 30)">
    <rect x="0" y="0" width="280" height="240" rx="4" fill="#1b5e20"/>
    <!-- Grid -->
    <g stroke="#2e7d32" stroke-width="1">
      <line x1="35" y1="0" x2="35" y2="240"/>
      <line x1="70" y1="0" x2="70" y2="240"/>
      <line x1="105" y1="0" x2="105" y2="240"/>
      <line x1="140" y1="0" x2="140" y2="240"/>
      <line x1="175" y1="0" x2="175" y2="240"/>
      <line x1="210" y1="0" x2="210" y2="240"/>
      <line x1="245" y1="0" x2="245" y2="240"/>
      <line x1="0" y1="30" x2="280" y2="30"/>
      <line x1="0" y1="60" x2="280" y2="60"/>
      <line x1="0" y1="90" x2="280" y2="90"/>
      <line x1="0" y1="120" x2="280" y2="120"/>
      <line x1="0" y1="150" x2="280" y2="150"/>
      <line x1="0" y1="180" x2="280" y2="180"/>
      <line x1="0" y1="210" x2="280" y2="210"/>
    </g>
    <!-- Stones -->
    <circle cx="105" cy="90" r="11" fill="url(#blackStone)"/>
    <circle cx="140" cy="120" r="11" fill="url(#blackStone)"/>
    <circle cx="105" cy="120" r="11" fill="url(#whiteStone)"/>
    <circle cx="140" cy="90" r="11" fill="url(#whiteStone)"/>
    <!-- Extra stones for a mid-game look -->
    <circle cx="70" cy="90" r="11" fill="url(#blackStone)"/>
    <circle cx="175" cy="90" r="11" fill="url(#whiteStone)"/>
    <circle cx="105" cy="60" r="11" fill="url(#whiteStone)"/>
    <circle cx="140" cy="60" r="11" fill="url(#blackStone)"/>
    <circle cx="70" cy="60" r="11" fill="url(#blackStone)"/>
    <!-- Score -->
    <g transform="translate(140, 260)">
      <circle cx="-10" cy="0" r="6" fill="url(#blackStone)"/>
      <text x="5" y="4" font-family="Arial,sans-serif" font-size="12" fill="#fff" text-anchor="start">28</text>
      <circle cx="40" cy="0" r="6" fill="url(#whiteStone)"/>
      <text x="55" y="4" font-family="Arial,sans-serif" font-size="12" fill="#fff" text-anchor="start">36</text>
    </g>
  </g>
  <text x="200" y="285" font-family="Arial,sans-serif" font-size="14" fill="#a29bfe" text-anchor="middle" opacity="0.6">黑白棋</text>
</svg>