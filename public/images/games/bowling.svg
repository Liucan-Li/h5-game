<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f0f23"/><stop offset="100%" stop-color="#1a0520"/>
    </linearGradient>
    <linearGradient id="lane" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B7355"/><stop offset="100%" stop-color="#6B5B45"/>
    </linearGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Lane -->
  <rect x="100" y="20" width="200" height="210" fill="url(#lane)" rx="4"/>
  <rect x="140" y="20" width="120" height="210" fill="#9B8365" rx="2"/>
  <!-- Gutters -->
  <rect x="100" y="20" width="10" height="210" fill="#444"/>
  <rect x="290" y="20" width="10" height="210" fill="#444"/>
  <!-- Pins -->
  <g transform="translate(160, 50)">
    <rect x="0" y="0" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="5" cy="5" r="2" fill="#e74c3c"/>
    <rect x="15" y="0" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="20" cy="5" r="2" fill="#e74c3c"/>
    <rect x="30" y="0" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="35" cy="5" r="2" fill="#e74c3c"/>
    <rect x="8" y="16" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="13" cy="21" r="2" fill="#e74c3c"/>
    <rect x="22" y="16" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="27" cy="21" r="2" fill="#e74c3c"/>
    <rect x="15" y="32" width="10" height="20" rx="3" fill="#fff" stroke="#ddd" stroke-width="1"/>
    <circle cx="20" cy="37" r="2" fill="#e74c3c"/>
  </g>
  <!-- Ball -->
  <circle cx="200" cy="220" r="14" fill="#333"/>
  <circle cx="195" cy="215" r="3" fill="#555"/>
  <circle cx="204" cy="218" r="2" fill="#555"/>
  <!-- Arrow aim -->
  <polygon points="200,190 196,200 204,200" fill="#ffdd0066"/>
  <!-- Title -->
  <text x="200" y="288" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="15" fill="#ffdd00" text-anchor="middle" font-weight="bold" letter-spacing="3">保龄球</text>
</svg>