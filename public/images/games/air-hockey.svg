<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a1a"/><stop offset="100%" stop-color="#0d1b2a"/>
    </linearGradient>
    <radialGradient id="puck" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#aaa"/><stop offset="100%" stop-color="#333"/>
    </radialGradient>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>
  <!-- Table -->
  <rect x="30" y="30" width="340" height="220" rx="12" fill="#0e4d6e" stroke="#1a8fc0" stroke-width="3"/>
  <!-- Center line -->
  <line x1="200" y1="30" x2="200" y2="250" stroke="#1a8fc0" stroke-width="2" stroke-dasharray="8,6"/>
  <!-- Center circle -->
  <circle cx="200" cy="140" r="40" fill="none" stroke="#1a8fc0" stroke-width="2"/>
  <!-- Goals -->
  <rect x="30" y="105" width="12" height="70" rx="4" fill="#e74c3c"/>
  <rect x="358" y="105" width="12" height="70" rx="4" fill="#3498db"/>
  <!-- Paddles -->
  <circle cx="100" cy="140" r="22" fill="#e74c3c" stroke="#c0392b" stroke-width="2"/>
  <circle cx="100" cy="140" r="10" fill="#fff" opacity="0.3"/>
  <circle cx="300" cy="155" r="22" fill="#3498db" stroke="#2980b9" stroke-width="2"/>
  <circle cx="300" cy="155" r="10" fill="#fff" opacity="0.3"/>
  <!-- Puck -->
  <circle cx="200" cy="140" r="14" fill="url(#puck)" stroke="#555" stroke-width="1"/>
  <!-- Motion lines -->
  <line x1="160" y1="140" x2="186" y2="140" stroke="#fff" stroke-width="2" stroke-linecap="round" opacity="0.4"/>
  <line x1="163" y1="133" x2="183" y2="137" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <line x1="163" y1="147" x2="183" y2="143" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.25"/>
  <!-- Score -->
  <text x="120" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" fill="#e74c3c" text-anchor="middle" font-weight="bold">3</text>
  <text x="200" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="14" fill="#aaa" text-anchor="middle">:</text>
  <text x="280" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="22" fill="#3498db" text-anchor="middle" font-weight="bold">2</text>
  <text x="200" y="290" font-family="-apple-system,BlinkMacSystemFont,sans-serif" font-size="13" fill="#7faacc" text-anchor="middle" font-weight="bold" dy="0">空气曲棍球</text>
</svg>
