<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7971e"/>
      <stop offset="100%" stop-color="#ffd200"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#ffd200" flood-opacity="0.3"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Grid background glow -->
  <rect x="80" y="40" width="240" height="240" rx="12" fill="none" stroke="#ffd200" stroke-opacity="0.08" stroke-width="2"/>

  <!-- 4x4 Grid -->
  <g transform="translate(100, 60)">
    <!-- Row 1 -->
    <rect x="0" y="0" width="42" height="42" rx="6" fill="#2a2a4e"/>
    <rect x="48" y="0" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="96" y="0" width="42" height="42" rx="6" fill="#2a2a4e"/>
    <rect x="144" y="0" width="42" height="42" rx="6" fill="#3a3a5e"/>

    <!-- Row 2 -->
    <rect x="0" y="48" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="48" y="48" width="42" height="42" rx="6" fill="url(#glow)" filter="url(#shadow)"/>
    <rect x="96" y="48" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="144" y="48" width="42" height="42" rx="6" fill="#2a2a4e"/>

    <!-- Row 3 -->
    <rect x="0" y="96" width="42" height="42" rx="6" fill="#2a2a4e"/>
    <rect x="48" y="96" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="96" y="96" width="42" height="42" rx="6" fill="#4a4a6e"/>
    <rect x="144" y="96" width="42" height="42" rx="6" fill="#3a3a5e"/>

    <!-- Row 4 -->
    <rect x="0" y="144" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="48" y="144" width="42" height="42" rx="6" fill="#2a2a4e"/>
    <rect x="96" y="144" width="42" height="42" rx="6" fill="#3a3a5e"/>
    <rect x="144" y="144" width="42" height="42" rx="6" fill="#2a2a4e"/>

    <!-- "2048" text on glowing tile -->
    <text x="69" y="75" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#1a1a2e" text-anchor="middle" dominant-baseline="middle">2</text>
  </g>

  <!-- "2048" label -->
  <text x="200" y="290" font-family="Arial, sans-serif" font-size="14" fill="#ffd200" text-anchor="middle" opacity="0.6">2048</text>
</svg>