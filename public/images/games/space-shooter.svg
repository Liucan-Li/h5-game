<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0c0c1d"/>
      <stop offset="100%" stop-color="#1a1a3e"/>
    </linearGradient>
    <linearGradient id="shipGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#74b9ff"/>
      <stop offset="100%" stop-color="#0984e3"/>
    </linearGradient>
    <linearGradient id="shipWindow" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <linearGradient id="engineGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#d63031"/>
    </linearGradient>
    <filter id="shipGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="8" flood-color="#74b9ff" flood-opacity="0.5"/>
    </filter>
    <filter id="starGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#fff" flood-opacity="0.8"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Stars -->
  <g fill="#fff" opacity="0.6">
    <circle cx="50" cy="30" r="1.5"/>
    <circle cx="120" cy="80" r="1"/>
    <circle cx="300" cy="45" r="1.5"/>
    <circle cx="350" cy="120" r="1"/>
    <circle cx="80" cy="200" r="1.5"/>
    <circle cx="45" cy="140" r="1"/>
    <circle cx="360" cy="220" r="1.5"/>
    <circle cx="320" cy="260" r="1"/>
    <circle cx="370" cy="50" r="1.2"/>
    <circle cx="25" cy="90" r="1"/>
    <circle cx="130" cy="250" r="1.5"/>
  </g>
  <!-- Bright stars with glow -->
  <g filter="url(#starGlow)">
    <circle cx="200" cy="60" r="2" fill="#fff" opacity="0.9"/>
    <circle cx="320" cy="180" r="2" fill="#fff" opacity="0.8"/>
    <circle cx="70" cy="160" r="2.5" fill="#f9ca24" opacity="0.8"/>
    <circle cx="350" cy="30" r="2" fill="#74b9ff" opacity="0.8"/>
  </g>

  <!-- Spaceship -->
  <g transform="translate(200, 150)" filter="url(#shipGlow)">
    <!-- Engine flame -->
    <ellipse cx="0" cy="45" rx="10" ry="18" fill="url(#engineGrad)" opacity="0.8"/>
    <ellipse cx="0" cy="50" rx="6" ry="12" fill="#f9ca24" opacity="0.6"/>

    <!-- Ship body -->
    <polygon points="0,-50 -35,20 -25,35 0,25 25,35 35,20" fill="url(#shipGrad)"/>

    <!-- Wings -->
    <polygon points="-35,20 -55,5 -30,10" fill="#0984e3" opacity="0.7"/>
    <polygon points="35,20 55,5 30,10" fill="#0984e3" opacity="0.7"/>

    <!-- Cockpit window -->
    <ellipse cx="0" cy="-15" rx="10" ry="14" fill="url(#shipWindow)" opacity="0.9"/>
    <ellipse cx="0" cy="-15" rx="6" ry="10" fill="#00b894" opacity="0.3"/>
  </g>

  <!-- Laser shots -->
  <g stroke="#55efc4" stroke-width="2.5" stroke-linecap="round" opacity="0.8">
    <line x1="200" y1="90" x2="200" y2="50"/>
    <line x1="200" y1="88" x2="230" y2="45"/>
    <line x1="200" y1="86" x2="170" y2="42"/>
  </g>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#74b9ff" text-anchor="middle" opacity="0.6">Space Shooter</text>
</svg>