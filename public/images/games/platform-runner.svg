<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="playerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f9ca24"/>
      <stop offset="100%" stop-color="#f0932b"/>
    </linearGradient>
    <linearGradient id="groundGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#2d3436"/>
      <stop offset="100%" stop-color="#636e72"/>
    </linearGradient>
    <linearGradient id="platGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#55efc4"/>
      <stop offset="100%" stop-color="#00b894"/>
    </linearGradient>
    <filter id="playerGlow">
      <feDropShadow dx="0" dy="2" stdDeviation="6" flood-color="#f9ca24" flood-opacity="0.5"/>
    </filter>
    <filter id="coinGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="4" flood-color="#f9ca24" flood-opacity="0.5"/>
    </filter>
  </defs>
  <rect width="400" height="300" fill="url(#bg)" rx="16"/>

  <!-- Sky background elements -->
  <g fill="#fff" opacity="0.05">
    <circle cx="80" cy="60" r="30"/>
    <circle cx="320" cy="90" r="20"/>
    <circle cx="50" cy="180" r="15"/>
    <circle cx="350" cy="140" r="12"/>
  </g>

  <!-- Clouds -->
  <g fill="#fff" opacity="0.06">
    <ellipse cx="100" cy="50" rx="40" ry="12"/>
    <ellipse cx="120" cy="45" rx="25" ry="10"/>
    <ellipse cx="300" cy="70" rx="35" ry="10"/>
    <ellipse cx="320" cy="65" rx="20" ry="8"/>
  </g>

  <!-- Player character -->
  <g transform="translate(120, 155)" filter="url(#playerGlow)">
    <!-- Body -->
    <rect x="-10" y="0" width="20" height="22" rx="6" fill="url(#playerGrad)"/>
    <!-- Head -->
    <circle cx="0" cy="-12" r="12" fill="url(#playerGrad)"/>
    <!-- Eyes -->
    <circle cx="-4" cy="-14" r="2.5" fill="#2d3436"/>
    <circle cx="4" cy="-14" r="2.5" fill="#2d3436"/>
    <!-- Smile -->
    <path d="M-3,-9 Q0,-7 3,-9" stroke="#2d3436" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    <!-- Legs -->
    <rect x="-8" y="22" width="6" height="10" rx="3" fill="#e17055"/>
    <rect x="2" y="22" width="6" height="10" rx="3" fill="#e17055"/>
    <!-- Arms -->
    <rect x="-18" y="4" width="8" height="5" rx="3" fill="#f9ca24"/>
    <rect x="10" y="4" width="8" height="5" rx="3" fill="#f9ca24"/>
  </g>

  <!-- Platform -->
  <rect x="80" y="190" width="100" height="12" rx="6" fill="url(#platGrad)"/>

  <!-- Ground -->
  <rect x="0" y="250" width="400" height="50" fill="url(#groundGrad)" opacity="0.6"/>
  <line x1="0" y1="250" x2="400" y2="250" stroke="#636e72" stroke-width="2" opacity="0.3"/>

  <!-- Obstacles -->
  <!-- Spike pit -->
  <g transform="translate(250, 225)">
    <polygon points="0,25 6,0 12,25" fill="#d63031"/>
    <polygon points="12,25 18,0 24,25" fill="#d63031"/>
    <polygon points="24,25 30,0 36,25" fill="#d63031"/>
  </g>

  <!-- Block obstacle -->
  <rect x="310" y="215" width="25" height="35" rx="4" fill="#6c5ce7"/>

  <!-- Coins -->
  <g filter="url(#coinGlow)">
    <circle cx="90" cy="175" r="6" fill="#f9ca24"/>
    <circle cx="120" cy="170" r="6" fill="#f9ca24"/>
    <circle cx="150" cy="175" r="6" fill="#f9ca24"/>
  </g>

  <!-- Score -->
  <text x="320" y="40" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="#f9ca24" text-anchor="middle" opacity="0.3">0</text>

  <text x="200" y="285" font-family="Arial, sans-serif" font-size="14" fill="#55efc4" text-anchor="middle" opacity="0.6">Platform Runner</text>
</svg>