<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>弹球</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f5f6fa; color: #2d3436; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px;
    -webkit-user-select: none; user-select: none; touch-action: none;
  }
  .container { text-align: center; width: 100%; max-width: 420px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
  h1 { font-size: 1.9em; font-weight: 800; color: #6c5ce7; }
  .score-row { display: flex; gap: 10px; }
  .score-box { background: #dfe6e9; padding: 4px 12px; border-radius: 8px; min-width: 60px; }
  .score-label { font-size: 0.55em; text-transform: uppercase; color: #636e72; letter-spacing: 1px; }
  .score-value { font-size: 1.2em; font-weight: 700; color: #2d3436; }
  #gameCanvas {
    display: block; width: 100%; aspect-ratio: 380/560; max-height: 80vh;
    margin: 0 auto; border-radius: 12px; background: #1a1a2e; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  }
  .controls { margin-top: 10px; display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
  button {
    background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff;
    border: none; padding: 8px 20px; border-radius: 8px; font-size: 0.9em;
    font-weight: 700; cursor: pointer; transition: transform 0.1s;
  }
  button:active { transform: scale(0.95); }
  button.secondary { background: #b2bec3; color: #2d3436; }
  button.danger { background: linear-gradient(135deg, #d63031, #e17055); }
  .touch-controls { display: flex; gap: 60px; justify-content: center; margin-top: 8px; }
  .touch-btn {
    width: 70px; height: 70px; border-radius: 50%; border: none;
    background: linear-gradient(135deg, #6c5ce7, #a29bfe); color: #fff;
    font-size: 1.5em; font-weight: 700; cursor: pointer; opacity: 0.7;
    box-shadow: 0 3px 8px rgba(108,92,231,0.3);
  }
  .touch-btn:active { opacity: 1; transform: scale(0.9); }
  .info-bar { display: flex; justify-content: space-around; margin-top: 8px; font-size: 0.8em; color: #636e72; }
  .multiplier-badge { color: #fdcb6e; font-weight: 700; }
  .status-text { color: #636e72; font-size: 0.75em; margin-top: 4px; }
  @media (max-width: 420px) {
    h1 { font-size: 1.5em; }
    .touch-btn { width: 60px; height: 60px; font-size: 1.2em; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>弹球</h1>
    <div class="score-row">
      <div class="score-box"><div class="score-label">分数</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">最高</div><div class="score-value" id="hiScore">0</div></div>
      <div class="score-box"><div class="score-label">球数</div><div class="score-value" id="balls">0</div></div>
    </div>
  </div>
  <canvas id="gameCanvas" width="380" height="560"></canvas>
  <div class="touch-controls" id="touchControls">
    <button class="touch-btn" id="leftFlipBtn">A</button>
    <button class="touch-btn" id="rightFlipBtn">S</button>
  </div>
  <div class="controls">
    <button id="startBtn">开始游戏</button>
    <button class="secondary" id="resetBtn">重置</button>
  </div>
  <div class="info-bar">
    <span>乘数: <span id="multiplierDisplay" class="multiplier-badge">1x</span></span>
    <span>球: <span id="ballsDisplay" class="multiplier-badge">3</span></span>
  </div>
  <div class="status-text">A/S 或 触屏按钮控制挡板 | 按住"发射"蓄力</div>
</div>
<script>
(function() {
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hiScore');
  const ballsEl = document.getElementById('balls');
  const multEl = document.getElementById('multiplierDisplay');
  const ballsDispEl = document.getElementById('ballsDisplay');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const leftFlipBtn = document.getElementById('leftFlipBtn');
  const rightFlipBtn = document.getElementById('rightFlipBtn');

  // Canvas dimensions
  const W = 380, H = 560;
  const WALL = 14;
  const BALL_R = 7;
  const DRAIN_Y = 480;
  const GRAVITY = 0.18;
  const WALL_REST = 0.6;
  const FRICTION = 0.997;
  const LAUNCH_IMMUNITY = 15;

  // Game state
  let ball, leftFlipper, rightFlipper;
  let score, hiScore, ballsLeft;
  let gameState = 'idle'; // idle, launching, playing, gameover, launching_power
  let animationId;
  let keys = {};
  let launchPower = 0;
  let launchCharging = false;
  let particles = [];
  let multiplier = 1;
  let multiplierTimer = 0;
  let lanesHit = 0;
  let lastBumperHit = 0; // for flash timing
  let frameCount = 0;
  let launchImmunity = 0;

  // Table elements
  let bumpers, slingshots, laneSensors;

  // High score
  hiScore = parseInt(localStorage.getItem('pinball_hi')) || 0;
  hiEl.textContent = hiScore;

  // ====== TABLE LAYOUT ======

  // Flippers
  const FLIP_LEN = 55;
  const FLIP_W = 14;
  const LEFT_PIVOT = { x: 140, y: 445 };
  const RIGHT_PIVOT = { x: 240, y: 445 };
  const LEFT_REST = 2.62;    // ~150°
  const LEFT_ACTIVE = 3.84;  // ~220°
  const RIGHT_REST = 0.52;   // ~30°
  const RIGHT_ACTIVE = -0.70; // ~-40° (320°)
  const FLIP_SPEED = 0.18;

  function createFlipper(pivot, restAngle, activeAngle) {
    return {
      pivot: pivot,
      restAngle: restAngle,
      activeAngle: activeAngle,
      angle: restAngle,
      targetAngle: restAngle,
      prevAngle: restAngle,
      active: false
    };
  }

  // Bumpers (circular)
  function initBumpers() {
    return [
      { x: 190, y: 160, r: 22, points: 100, lit: 0, baseColor: '#e74c3c' },
      { x: 100, y: 200, r: 18, points: 100, lit: 0, baseColor: '#3498db' },
      { x: 280, y: 200, r: 18, points: 100, lit: 0, baseColor: '#2ecc71' },
      { x: 140, y: 260, r: 16, points: 100, lit: 0, baseColor: '#f39c12' },
      { x: 240, y: 260, r: 16, points: 100, lit: 0, baseColor: '#9b59b6' },
      { x: 190, y: 300, r: 20, points: 100, lit: 0, baseColor: '#e67e22' },
    ];
  }

  // Slingshots (triangular, near walls)
  function initSlingshots() {
    return [
      {
        vertices: [
          { x: WALL + 2, y: 340 },
          { x: WALL + 2, y: 380 },
          { x: WALL + 30, y: 360 }
        ],
        points: 50,
        lit: 0,
        baseColor: '#00cec9'
      },
      {
        vertices: [
          { x: W - WALL - 2, y: 340 },
          { x: W - WALL - 2, y: 380 },
          { x: W - WALL - 30, y: 360 }
        ],
        points: 50,
        lit: 0,
        baseColor: '#00cec9'
      }
    ];
  }

  // Target lanes at top
  function initLanes() {
    return [
      { x1: 90, x2: 138, y1: WALL, y2: 68, triggered: false, points: 200 },
      { x1: 148, x2: 232, y1: WALL, y2: 68, triggered: false, points: 200 },
      { x1: 242, x2: 290, y1: WALL, y2: 68, triggered: false, points: 200 },
    ];
  }

  // ====== BALL ======

  function createBall(x, y) {
    return {
      x: x, y: y,
      vx: 0, vy: 0,
      r: BALL_R,
      active: false
    };
  }

  function resetBall() {
    ball = createBall(190, 472);
    ball.active = true;
  }

  // ====== PARTICLES ======

  function spawnParticles(x, y, color, count) {
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 30 + Math.random() * 30,
        maxLife: 30 + Math.random() * 30,
        r: 1.5 + Math.random() * 2.5,
        color: color
      });
    }
  }

  // ====== INIT ======

  function init() {
    leftFlipper = createFlipper(LEFT_PIVOT, LEFT_REST, LEFT_ACTIVE);
    rightFlipper = createFlipper(RIGHT_PIVOT, RIGHT_REST, RIGHT_ACTIVE);
    bumpers = initBumpers();
    slingshots = initSlingshots();
    laneSensors = initLanes();
    resetBall();
    score = 0;
    ballsLeft = 3;
    multiplier = 1;
    multiplierTimer = 0;
    lanesHit = 0;
    particles = [];
    gameState = 'launching';
    launchPower = 0;
    launchCharging = false;
    updateUI();
    startBtn.textContent = '发射';
    ball.active = false;
  }

  // ====== PHYSICS ======

  function updateFlipper(flipper) {
    flipper.prevAngle = flipper.angle;
    const diff = flipper.targetAngle - flipper.angle;
    flipper.angle += diff * FLIP_SPEED;
    // Clamp
    const min = Math.min(flipper.restAngle, flipper.activeAngle);
    const max = Math.max(flipper.restAngle, flipper.activeAngle);
    flipper.angle = Math.max(min, Math.min(max, flipper.angle));
  }

  function getFlipperTip(flipper) {
    return {
      x: flipper.pivot.x + Math.cos(flipper.angle) * FLIP_LEN,
      y: flipper.pivot.y + Math.sin(flipper.angle) * FLIP_LEN
    };
  }

  function closestPointOnSegment(px, py, ax, ay, bx, by) {
    const abx = bx - ax, aby = by - ay;
    const len2 = abx * abx + aby * aby;
    if (len2 < 0.0001) return { x: ax, y: ay };
    let t = ((px - ax) * abx + (py - ay) * aby) / len2;
    t = Math.max(0, Math.min(1, t));
    return { x: ax + t * abx, y: ay + t * aby };
  }

  function dist(x1, y1, x2, y2) {
    const dx = x2 - x1, dy = y2 - y1;
    return Math.sqrt(dx * dx + dy * dy);
  }

  function updatePhysics() {
    if (!ball.active || gameState !== 'playing' && gameState !== 'launching') return;

    // Gravity
    ball.vy += GRAVITY;

    // Friction (air resistance)
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;

    // Clamp speed
    const spd = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);
    if (spd > 14) {
      ball.vx = (ball.vx / spd) * 14;
      ball.vy = (ball.vy / spd) * 14;
    }
    if (spd < 0.3 && spd > 0.01) {
      // Keep a minimum speed to prevent sticking
      ball.vx = (ball.vx / spd) * 0.3;
      ball.vy = (ball.vy / spd) * 0.3;
    }

    // Move ball
    ball.x += ball.vx;
    ball.y += ball.vy;

    // ====== WALL COLLISIONS ======
    // Top wall
    if (ball.y - ball.r < WALL) {
      ball.y = WALL + ball.r;
      ball.vy = -ball.vy * WALL_REST;
    }
    // Left wall
    if (ball.x - ball.r < WALL) {
      ball.x = WALL + ball.r;
      ball.vx = -ball.vx * WALL_REST;
    }
    // Right wall
    if (ball.x + ball.r > W - WALL) {
      ball.x = W - WALL - ball.r;
      ball.vx = -ball.vx * WALL_REST;
    }
    // Bottom drain check
    if (launchImmunity > 0) {
      launchImmunity--;
    } else if (ball.y + ball.r > DRAIN_Y) {
      // Check if in center drain (between flipper pivots)
      if (ball.x > LEFT_PIVOT.x + 15 && ball.x < RIGHT_PIVOT.x - 15) {
        // Drain - ball lost
        drainBall();
        return;
      } else {
        // Bounce off bottom side walls (below flippers)
        if (ball.x <= LEFT_PIVOT.x + 15) {
          ball.vx = -ball.vx * WALL_REST;
          ball.x = Math.max(WALL, ball.x - 5);
        } else if (ball.x >= RIGHT_PIVOT.x - 15) {
          ball.vx = -ball.vx * WALL_REST;
          ball.x = Math.min(W - WALL, ball.x + 5);
        }
        ball.vy = -ball.vy * WALL_REST;
        ball.y = DRAIN_Y - ball.r;
      }
    }

    // ====== LANE SENSORS ======
    // Only check if ball is moving upward through lanes
    if (ball.y < 80 && ball.vy < 0) {
      for (const lane of laneSensors) {
        if (!lane.triggered &&
            ball.x > lane.x1 && ball.x < lane.x2 &&
            ball.y > lane.y1 && ball.y < lane.y2) {
          lane.triggered = true;
          lanesHit++;
          addScore(lane.points);
          spawnParticles((lane.x1 + lane.x2) / 2, (lane.y1 + lane.y2) / 2, '#fdcb6e', 12);

          // Check if all 3 lanes hit
          if (lanesHit >= 3) {
            multiplier = 2;
            multiplierTimer = 1800; // 30 seconds at 60fps
            // Reset lanes after multiplier triggers
            // Actually keep them lit, but reset after timer ends
          }
        }
      }
    }

    // ====== BUMPER COLLISIONS ======
    for (const bumper of bumpers) {
      const d = dist(ball.x, ball.y, bumper.x, bumper.y);
      const minDist = ball.r + bumper.r;
      if (d < minDist) {
        if (d > 0.001) {
          const nx = (ball.x - bumper.x) / d;
          const ny = (ball.y - bumper.y) / d;
          // Push ball out
          const overlap = minDist - d;
          ball.x += nx * overlap;
          ball.y += ny * overlap;
          // Reflect velocity
          const dot = ball.vx * nx + ball.vy * ny;
          if (dot < 0) {
            ball.vx -= 2 * dot * nx;
            ball.vy -= 2 * dot * ny;
            // Bumper push (add outward velocity)
            ball.vx += nx * 4;
            ball.vy += ny * 4;
          }
          // Score
          bumper.lit = 30;
          addScore(bumper.points);
          spawnParticles(bumper.x, bumper.y, bumper.baseColor, 8);
        }
      }
      if (bumper.lit > 0) bumper.lit--;
    }

    // ====== SLINGSHOT COLLISIONS ======
    for (const sling of slingshots) {
      // Check ball vs triangle (use point-in-triangle approximation)
      const v = sling.vertices;
      // Simple approximation: check distance to each edge
      for (let i = 0; i < 3; i++) {
        const a = v[i];
        const b = v[(i + 1) % 3];
        const cp = closestPointOnSegment(ball.x, ball.y, a.x, a.y, b.x, b.y);
        const d = dist(ball.x, ball.y, cp.x, cp.y);
        if (d < ball.r) {
          if (d > 0.001) {
            const nx = (ball.x - cp.x) / d;
            const ny = (ball.y - cp.y) / d;
            const overlap = ball.r - d;
            ball.x += nx * overlap;
            ball.y += ny * overlap;
            const dot = ball.vx * nx + ball.vy * ny;
            if (dot < 0) {
              ball.vx -= 2 * dot * nx * 0.8;
              ball.vy -= 2 * dot * ny * 0.8;
            }
            sling.lit = 20;
            addScore(sling.points);
            spawnParticles(cp.x, cp.y, '#00cec9', 6);
          }
          break;
        }
      }
      if (sling.lit > 0) sling.lit--;
    }

    // ====== FLIPPER COLLISIONS ======
    checkFlipperCollision(leftFlipper);
    checkFlipperCollision(rightFlipper);
  }

  function checkFlipperCollision(flipper) {
    const tip = getFlipperTip(flipper);
    const cp = closestPointOnSegment(ball.x, ball.y, flipper.pivot.x, flipper.pivot.y, tip.x, tip.y);
    const flipperCollideR = ball.r + FLIP_W * 0.4;
    const d = dist(ball.x, ball.y, cp.x, cp.y);
    if (d < flipperCollideR) {
      if (d > 0.001) {
        const nx = (ball.x - cp.x) / d;
        const ny = (ball.y - cp.y) / d;
        const overlap = flipperCollideR - d;
        ball.x += nx * overlap;
        ball.y += ny * overlap;
        const dot = ball.vx * nx + ball.vy * ny;
        if (dot < 0) {
          // Reflection
          ball.vx -= 2 * dot * nx;
          ball.vy -= 2 * dot * ny;
          // Flipper upward kick
          const angVel = (flipper.angle - flipper.prevAngle);
          // When flipper is active and swinging, add strong upward kick
          if (flipper.active) {
            const kick = 4 + Math.abs(angVel) * 25;
            ball.vy -= kick;
            // Push ball toward center
            const cx = ball.x - flipper.pivot.x;
            ball.vx += cx > 0 ? -kick * 0.3 : kick * 0.3;
          }
        }
      }
    }
  }

  function drainBall() {
    ball.active = false;
    ballsLeft--;
    updateUI();
    if (ballsLeft <= 0) {
      gameState = 'gameover';
      if (score > hiScore) {
        hiScore = score;
        localStorage.setItem('pinball_hi', hiScore);
        hiEl.textContent = hiScore;
      }
      startBtn.textContent = '开始游戏';
    } else {
      // Reset for next ball
      resetBall();
      ball.active = false;
      gameState = 'launching';
      launchPower = 0;
      startBtn.textContent = '发射';
      // Reset lanes for this ball
      // Actually, let's not reset lanes - let them persist
      // But multiplier should persist too
    }
  }

  // ====== SCORING ======

  function addScore(pts) {
    const actual = Math.floor(pts * multiplier);
    score += actual;
    updateUI();
  }

  function updateUI() {
    scoreEl.textContent = score;
    ballsEl.textContent = ballsLeft;
    ballsDispEl.textContent = ballsLeft;
    multEl.textContent = multiplier + 'x';
  }

  // ====== LAUNCH ======

  function startLaunch() {
    if (gameState === 'launching') {
      launchCharging = true;
      launchPower = 0;
    }
  }

  function releaseLaunch() {
    if (gameState === 'launching' && launchCharging) {
      launchCharging = false;
      if (launchPower > 5) {
        // Launch the ball
        ball.active = true;
        ball.x = 190;
        ball.y = 474;
        ball.vx = (Math.random() - 0.5) * launchPower * 0.12;
        ball.vy = -(2 + launchPower * 0.35);
        gameState = 'playing';
        launchImmunity = LAUNCH_IMMUNITY;
        startBtn.textContent = '游戏中';
      } else {
        launchPower = 0;
      }
    }
  }

  // ====== DRAW ======

  function drawTable() {
    // Playfield background
    ctx.fillStyle = '#0d1b2a';
    ctx.fillRect(0, 0, W, H);

    // Outer wall glow
    ctx.strokeStyle = '#2d3436';
    ctx.lineWidth = 4;
    ctx.strokeRect(2, 2, W - 4, H - 4);

    // Walls
    ctx.fillStyle = '#2d3436';
    ctx.fillRect(0, 0, W, WALL); // top
    ctx.fillRect(0, 0, WALL, H); // left
    ctx.fillRect(W - WALL, 0, WALL, H); // right

    // Bottom walls (sides of drain)
    ctx.fillRect(0, DRAIN_Y, LEFT_PIVOT.x + 12, H - DRAIN_Y);
    ctx.fillRect(RIGHT_PIVOT.x - 12, DRAIN_Y, W - RIGHT_PIVOT.x + 12, H - DRAIN_Y);

    // Drain opening
    ctx.fillStyle = '#0a0a0a';
    ctx.fillRect(LEFT_PIVOT.x + 12, DRAIN_Y, RIGHT_PIVOT.x - LEFT_PIVOT.x - 24, 8);
    ctx.fillStyle = '#e74c3c44';
    ctx.fillRect(LEFT_PIVOT.x + 14, DRAIN_Y + 1, RIGHT_PIVOT.x - LEFT_PIVOT.x - 28, 6);

    // ====== LANE DIVIDERS ======
    ctx.fillStyle = '#4a4a6a';
    ctx.fillRect(90, WALL, 4, 60);    // left
    ctx.fillRect(138, WALL, 10, 60);  // divider 1-2
    ctx.fillRect(232, WALL, 10, 60);  // divider 2-3
    ctx.fillRect(290, WALL, 4, 60);   // right

    // Lane labels / LED indicators
    for (let i = 0; i < laneSensors.length; i++) {
      const lane = laneSensors[i];
      const cx = (lane.x1 + lane.x2) / 2;
      const cy = lane.y1 + 10;
      // LED indicator
      ctx.beginPath();
      ctx.arc(cx, cy, 5, 0, Math.PI * 2);
      ctx.fillStyle = lane.triggered ? '#fdcb6e' : '#636e72';
      ctx.fill();
      // Glow if triggered
      if (lane.triggered) {
        ctx.beginPath();
        ctx.arc(cx, cy, 10, 0, Math.PI * 2);
        ctx.fillStyle = 'rgba(253, 203, 110, 0.2)';
        ctx.fill();
      }
      // Lane number
      ctx.fillStyle = '#636e72';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('★', cx, cy + 18);
    }

    // ====== LANE DECORATIVE ARCHES ======
    ctx.strokeStyle = '#4a4a6a';
    ctx.lineWidth = 3;
    for (const lane of laneSensors) {
      const cx = (lane.x1 + lane.x2) / 2;
      const cy = lane.y2 + 5;
      ctx.beginPath();
      ctx.arc(cx, cy, 12, Math.PI, 0);
      ctx.stroke();
    }

    // ====== BUMPERS ======
    for (const bumper of bumpers) {
      const isLit = bumper.lit > 0;
      // Outer ring
      ctx.beginPath();
      ctx.arc(bumper.x, bumper.y, bumper.r + 3, 0, Math.PI * 2);
      ctx.fillStyle = isLit ? '#ffffff' : '#4a4a6a';
      ctx.fill();
      // Inner circle
      ctx.beginPath();
      ctx.arc(bumper.x, bumper.y, bumper.r, 0, Math.PI * 2);
      const c = isLit ? lightenColor(bumper.baseColor, 60) : bumper.baseColor;
      ctx.fillStyle = c;
      ctx.fill();
      // Inner highlight
      ctx.beginPath();
      ctx.arc(bumper.x - 4, bumper.y - 4, bumper.r * 0.4, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.fill();
      // Score text
      ctx.fillStyle = isLit ? '#fff' : 'rgba(255,255,255,0.5)';
      ctx.font = 'bold 10px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('100', bumper.x, bumper.y);
    }

    // ====== SLINGSHOTS ======
    for (const sling of slingshots) {
      const v = sling.vertices;
      ctx.beginPath();
      ctx.moveTo(v[0].x, v[0].y);
      ctx.lineTo(v[1].x, v[1].y);
      ctx.lineTo(v[2].x, v[2].y);
      ctx.closePath();
      const isLit = sling.lit > 0;
      ctx.fillStyle = isLit ? lightenColor(sling.baseColor, 50) : sling.baseColor;
      ctx.fill();
      ctx.strokeStyle = isLit ? '#fff' : '#00b894';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Inner triangle decoration
      ctx.beginPath();
      const cx = (v[0].x + v[1].x + v[2].x) / 3;
      const cy = (v[0].y + v[1].y + v[2].y) / 3;
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fillStyle = isLit ? '#fff' : 'rgba(255,255,255,0.3)';
      ctx.fill();
      ctx.fillStyle = isLit ? '#fff' : 'rgba(255,255,255,0.6)';
      ctx.font = '8px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('50', cx, cy);
    }

    // ====== FLIPPERS ======
    drawFlipper(leftFlipper);
    drawFlipper(rightFlipper);

    // ====== BALL ======
    if (ball.active) {
      // Ball shadow
      ctx.beginPath();
      ctx.arc(ball.x + 2, ball.y + 2, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fill();
      // Ball
      const grad = ctx.createRadialGradient(ball.x - 3, ball.y - 3, 1, ball.x, ball.y, ball.r);
      grad.addColorStop(0, '#ffffff');
      grad.addColorStop(0.5, '#dfe6e9');
      grad.addColorStop(1, '#b2bec3');
      ctx.beginPath();
      ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = grad;
      ctx.fill();
      // Ball highlight
      ctx.beginPath();
      ctx.arc(ball.x - 2.5, ball.y - 2.5, ball.r * 0.35, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.6)';
      ctx.fill();
    }

    // ====== PARTICLES ======
    for (const p of particles) {
      const alpha = p.life / p.maxLife;
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r * alpha, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // ====== MULTIPLIER INDICATOR ======
    if (multiplier > 1) {
      const pulse = Math.sin(frameCount * 0.1) * 0.15 + 0.85;
      ctx.fillStyle = `rgba(253, 203, 110, ${0.3 * pulse})`;
      ctx.font = 'bold 16px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('2x 乘数!', W / 2, 90);

      // Time remaining bar
      const pct = multiplierTimer / 1800;
      ctx.fillStyle = 'rgba(253, 203, 110, 0.15)';
      ctx.fillRect(W / 2 - 40, 108, 80, 6);
      ctx.fillStyle = `rgba(253, 203, 110, ${0.5 * pulse})`;
      ctx.fillRect(W / 2 - 40, 108, 80 * pct, 6);
    }

    // ====== LAUNCH POWER METER ======
    if (gameState === 'launching' && launchCharging) {
      const pct = Math.min(launchPower / 100, 1);
      // Power bar background
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(20, H - 60, 30, 40);
      // Power bar fill
      const barColor = pct < 0.5 ? '#2ecc71' : pct < 0.8 ? '#f39c12' : '#e74c3c';
      ctx.fillStyle = barColor;
      ctx.fillRect(22, H - 58 + (1 - pct) * 36, 26, 36 * pct);
      // Label
      ctx.fillStyle = '#fff';
      ctx.font = '9px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText('力度', 35, H - 62);
      // Power text
      ctx.fillStyle = '#fff';
      ctx.font = 'bold 12px sans-serif';
      ctx.fillText(Math.floor(pct * 100) + '%', 35, H - 18);
    }

    // ====== PLUNGER ======
    // Visual plunger at bottom
    const plungerX = W - 35;
    ctx.fillStyle = '#4a4a6a';
    ctx.fillRect(plungerX - 8, DRAIN_Y + 5, 16, H - DRAIN_Y - 12);
    ctx.fillStyle = '#636e72';
    ctx.fillRect(plungerX - 12, DRAIN_Y + 5, 24, 8);

    // Ball at bottom in plunger position (when launching)
    if (gameState === 'launching' && !ball.active) {
      const by = 502 - launchPower * 0.3;
      const bx = 190;
      ctx.beginPath();
      ctx.arc(bx, by, ball.r, 0, Math.PI * 2);
      ctx.fillStyle = '#dfe6e9';
      ctx.fill();
      // Ball channel (plunger lane)
      ctx.fillStyle = '#3d3d5c';
      ctx.fillRect(184, by + ball.r + 2, 12, 508 - by);
    }
  }

  function drawFlipper(flipper) {
    const tip = getFlipperTip(flipper);
    const p = flipper.pivot;

    // Flipper shadow/bat body
    ctx.save();
    ctx.translate(p.x, p.y);
    ctx.rotate(flipper.angle);

    // Flipper shape (rounded rectangle angled)
    const isActive = flipper.active;
    ctx.fillStyle = isActive ? '#6c5ce7' : '#a29bfe';
    ctx.shadowColor = isActive ? '#6c5ce7' : 'transparent';
    ctx.shadowBlur = isActive ? 8 : 0;

    // Draw flipper as elongated rounded shape
    ctx.beginPath();
    const hw = FLIP_LEN;
    const hh = FLIP_W / 2;
    ctx.roundRect(0, -hh, hw, FLIP_W, hh);
    ctx.fill();

    // Highlight line
    ctx.shadowBlur = 0;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.moveTo(4, -hh + 2);
    ctx.lineTo(hw - 4, -hh + 2);
    ctx.stroke();

    // Pivot circle
    ctx.beginPath();
    ctx.arc(0, 0, 5, 0, Math.PI * 2);
    ctx.fillStyle = '#2d3436';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(0, 0, 3, 0, Math.PI * 2);
    ctx.fillStyle = '#636e72';
    ctx.fill();

    ctx.restore();
  }

  function lightenColor(hex, percent) {
    const num = parseInt(hex.replace('#', ''), 16);
    const r = Math.min(255, (num >> 16) + percent);
    const g = Math.min(255, ((num >> 8) & 0x00FF) + percent);
    const b = Math.min(255, (num & 0x0000FF) + percent);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // ====== GAME LOOP ======

  function update() {
    frameCount++;

    // Update flippers
    leftFlipper.active = keys['a'] || keys['A'] || leftFlipper.touchActive;
    rightFlipper.active = keys['s'] || keys['S'] || rightFlipper.touchActive;
    leftFlipper.targetAngle = leftFlipper.active ? LEFT_ACTIVE : LEFT_REST;
    rightFlipper.targetAngle = rightFlipper.active ? RIGHT_ACTIVE : RIGHT_REST;
    updateFlipper(leftFlipper);
    updateFlipper(rightFlipper);

    // Charge launch
    if (gameState === 'launching' && launchCharging) {
      launchPower = Math.min(100, launchPower + 1.5);
    }

    // Physics
    if (gameState === 'playing') {
      updatePhysics();
    }

    // Update particles
    for (let i = particles.length - 1; i >= 0; i--) {
      const p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.95;
      p.vy *= 0.95;
      p.vy += 0.02; // particle gravity
      p.life--;
      if (p.life <= 0) {
        particles.splice(i, 1);
      }
    }

    // Update multiplier timer
    if (multiplierTimer > 0) {
      multiplierTimer--;
      if (multiplierTimer <= 0) {
        multiplier = 1;
        lanesHit = 0;
        // Reset lane triggers
        for (const lane of laneSensors) {
          lane.triggered = false;
        }
      }
    }

    // Check if ball falls too far (safety)
    if (ball.active && ball.y > H + 20) {
      drainBall();
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    drawTable();

    // Game over overlay
    if (gameState === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e74c3c';
      ctx.font = 'bold 38px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('游戏结束', W / 2, H / 2 - 30);
      ctx.fillStyle = '#dfe6e9';
      ctx.font = '20px sans-serif';
      ctx.fillText('分数: ' + score, W / 2, H / 2 + 20);
      if (score >= hiScore && score > 0) {
        ctx.fillStyle = '#fdcb6e';
        ctx.font = '18px sans-serif';
        ctx.fillText('新纪录!', W / 2, H / 2 + 55);
      }
      ctx.fillStyle = '#636e72';
      ctx.font = '14px sans-serif';
      ctx.fillText('最高: ' + hiScore, W / 2, H / 2 + 85);
    }
  }

  function loop() {
    update();
    draw();
    animationId = requestAnimationFrame(loop);
  }

  // ====== INPUT HANDLING ======

  // Keyboard
  document.addEventListener('keydown', (e) => {
    keys[e.key] = true;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (gameState === 'launching') startLaunch();
    }
  });
  document.addEventListener('keyup', (e) => {
    keys[e.key] = false;
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (gameState === 'launching') releaseLaunch();
    }
  });

  // Touch flipper buttons
  leftFlipBtn.addEventListener('touchstart', (e) => { e.preventDefault(); leftFlipper.touchActive = true; });
  leftFlipBtn.addEventListener('touchend', (e) => { e.preventDefault(); leftFlipper.touchActive = false; });
  leftFlipBtn.addEventListener('mousedown', () => { leftFlipper.touchActive = true; });
  leftFlipBtn.addEventListener('mouseup', () => { leftFlipper.touchActive = false; });
  leftFlipBtn.addEventListener('mouseleave', () => { leftFlipper.touchActive = false; });

  rightFlipBtn.addEventListener('touchstart', (e) => { e.preventDefault(); rightFlipper.touchActive = true; });
  rightFlipBtn.addEventListener('touchend', (e) => { e.preventDefault(); rightFlipper.touchActive = false; });
  rightFlipBtn.addEventListener('mousedown', () => { rightFlipper.touchActive = true; });
  rightFlipBtn.addEventListener('mouseup', () => { rightFlipper.touchActive = false; });
  rightFlipBtn.addEventListener('mouseleave', () => { rightFlipper.touchActive = false; });

  // Prevent scrolling on touch
  canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
  canvas.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  // ====== UI CONTROLS ======

  startBtn.addEventListener('mousedown', () => {
    if (gameState === 'launching') startLaunch();
    else if (gameState === 'idle' || gameState === 'gameover') {
      init();
    }
  });
  startBtn.addEventListener('mouseup', () => {
    if (gameState === 'launching' && launchCharging) releaseLaunch();
  });
  startBtn.addEventListener('mouseleave', () => {
    if (launchCharging) releaseLaunch();
  });

  // Touch for launch button
  startBtn.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (gameState === 'launching') startLaunch();
    else if (gameState === 'idle' || gameState === 'gameover') {
      init();
    }
  });
  startBtn.addEventListener('touchend', (e) => {
    e.preventDefault();
    if (gameState === 'launching' && launchCharging) releaseLaunch();
  });

  resetBtn.addEventListener('click', () => {
    if (animationId) cancelAnimationFrame(animationId);
    gameState = 'idle';
    startBtn.textContent = '开始游戏';
    particles = [];
    init();
    gameState = 'idle';
    ball.active = false;
    draw();
  });

  // ====== ROUNDRECT POLYFILL ======
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w / 2) r = w / 2;
      if (r > h / 2) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };
  }

  // ====== START ======
  function start() {
    init();
    gameState = 'idle';
    ball.active = false;
    startBtn.textContent = '开始游戏';
    draw();
    loop();
  }

  start();

  // ====== RESPONSIVE ======
  function resizeCanvas() {
    const container = canvas.parentElement;
    const w = container.clientWidth;
    canvas.style.width = w + 'px';
    canvas.style.height = (w * 560 / 380) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
})();
</script>
