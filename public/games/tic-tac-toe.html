<!DOCTYPE html>
<html lang="zh-CN" data-game-id="tic-tac-toe">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>井字棋</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--fw-bg, #1a1a2e); color: var(--fw-text, #e0e0e0); font-family: var(--fw-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
    display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px;
    -webkit-user-select: none; user-select: none;
  }
  .container { text-align: center; width: 100%; max-width: 360px; }
  h1 { font-size: 2em; font-weight: 800; margin-bottom: 8px; }
  h1 .x { color: var(--fw-primary, #60a5fa); } h1 .o { color: var(--fw-danger, #f87171); }
  .turn-indicator {
    font-size: 1em; margin-bottom: 16px; padding: 8px 16px;
    background: var(--fw-bg-card, #16213e); border-radius: var(--fw-radius, 10px); display: inline-block;
  }
  .turn-indicator .highlight { font-weight: 800; }
  .grid {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--fw-gap, 8px);
    width: 100%; aspect-ratio: 1; max-width: 360px; margin: 0 auto;
  }
  .cell {
    aspect-ratio: 1; background: #0f3460; border-radius: var(--fw-radius, 12px);
    display: flex; align-items: center; justify-content: center;
    font-size: 3em; font-weight: 800; cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    border: 2px solid rgba(255,255,255,0.05);
  }
  .cell:hover { background: var(--fw-bg-card, #16213e); }
  .cell:active { transform: scale(0.95); }
  .cell.x { color: var(--fw-primary, #60a5fa); cursor: default; }
  .cell.o { color: var(--fw-danger, #f87171); cursor: default; }
  .cell.win { background: #0a2a1e; border-color: var(--fw-success, #4ecca3); animation: winPulse 0.5s ease; }
  @keyframes winPulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
  .status { margin-top: 16px; font-size: 1.1em; min-height: 1.5em; color: var(--fw-text-muted, #ccc); }
  button {
    background: linear-gradient(135deg, var(--fw-primary, #60a5fa), #3b82f6); color: #fff;
    border: none; padding: 10px 28px; border-radius: var(--fw-radius, 8px); font-size: 1em;
    font-weight: 700; cursor: pointer; margin-top: 12px; transition: transform 0.1s;
  }
  button:active { transform: scale(0.95); }
  .score-row { display: flex; justify-content: center; gap: 24px; margin-bottom: 12px; }
  .score-item { font-size: 0.9em; }
  .score-item span { font-weight: 700; }
  .score-item .x { color: var(--fw-primary, #60a5fa); }
  .score-item .o { color: var(--fw-danger, #f87171); }
  .fw-overlay { display: none; }
  .fw-overlay.active { display: flex; }
  @media (max-width: 360px) {
    .cell { font-size: 2.2em; }
  }
</style>
</head>
<body>
<div class="fw-container">
  <div class="container">
    <div class="fw-header">
      <h1 class="fw-title"><span class="x">X</span> — <span class="o">O</span></h1>
    </div>
    <div class="fw-score-box score-row">
      <div class="score-item">玩家 (<span class="x">X</span>): <span id="xScore">0</span></div>
      <div class="score-item">电脑 (<span class="o">O</span>): <span id="oScore">0</span></div>
      <div class="score-item">平局：<span id="drawScore">0</span></div>
    </div>
    <div class="turn-indicator"><span id="turnText">轮到你了</span></div>
    <div class="grid" id="grid"></div>
    <div class="status" id="statusText"></div>
    <button id="resetBtn">新游戏</button>
  </div>
  <div class="fw-overlay" id="overlay"></div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  var board, currentPlayer, gameOver, xWins, oWins, draws;
  var aiThinking = false;

  var grid = document.getElementById('grid');
  var turnText = document.getElementById('turnText');
  var statusText = document.getElementById('statusText');
  var xScoreEl = document.getElementById('xScore');
  var oScoreEl = document.getElementById('oScore');
  var drawScoreEl = document.getElementById('drawScore');
  var overlay = document.getElementById('overlay');

  function init() {
    board = Array(9).fill(null);
    currentPlayer = 'X';
    gameOver = false;
    aiThinking = false;
    xWins = xWins || 0;
    oWins = oWins || 0;
    draws = draws || 0;
    overlay.classList.remove('active');
    render();
    updateUI();
  }

  var WIN_COMBOS = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function checkWinner(b) {
    for (var i = 0; i < WIN_COMBOS.length; i++) {
      var combo = WIN_COMBOS[i];
      var a = combo[0], c = combo[1], d = combo[2];
      if (b[a] && b[a] === b[c] && b[a] === b[d]) {
        return { winner: b[a], combo: combo };
      }
    }
    return null;
  }

  function isFull(b) {
    return b.every(function(c) { return c !== null; });
  }

  function aiMove() {
    if (gameOver || aiThinking) return;
    aiThinking = true;

    var b = board;

    // AI win
    for (var i = 0; i < 9; i++) {
      if (b[i] === null) {
        b[i] = 'O';
        if (checkWinner(b)) { b[i] = null; makeMove(i); return; }
        b[i] = null;
      }
    }

    // Block player
    for (var i = 0; i < 9; i++) {
      if (b[i] === null) {
        b[i] = 'X';
        if (checkWinner(b)) { b[i] = null; makeMove(i); return; }
        b[i] = null;
      }
    }

    // Random
    var empty = [];
    for (var i = 0; i < 9; i++) {
      if (b[i] === null) empty.push(i);
    }
    if (empty.length > 0) {
      var idx = empty[Math.floor(Math.random() * empty.length)];
      makeMove(idx);
    }
  }

  function makeMove(index) {
    if (board[index] !== null) return;
    board[index] = currentPlayer;
    render();

    var result = checkWinner(board);
    if (result) {
      gameOver = true;
      var combo = result.combo;
      document.querySelectorAll('.cell').forEach(function(cell, i) {
        if (combo.indexOf(i) !== -1) cell.classList.add('win');
      });
      if (result.winner === 'X') {
        xWins++;
        xScoreEl.textContent = xWins;
        statusText.textContent = '你赢了！';
        turnText.textContent = '游戏结束';
        FW.storage.save('tttXWins', xWins);
        FW.audio.sfx('win');
        FW.events.reportScore(xWins);
        FW.events.reportComplete(xWins, {won: true});
      } else {
        oWins++;
        oScoreEl.textContent = oWins;
        statusText.textContent = '电脑赢了！';
        turnText.textContent = '游戏结束';
        FW.storage.save('tttOWins', oWins);
        FW.audio.sfx('gameover');
        FW.events.reportScore(oWins);
        FW.events.reportComplete(oWins, {won: false});
      }
      overlay.classList.add('active');
      aiThinking = false;
      return;
    }

    if (isFull(board)) {
      gameOver = true;
      draws++;
      drawScoreEl.textContent = draws;
      statusText.textContent = '平局！';
      turnText.textContent = '游戏结束';
      FW.storage.save('tttDraws', draws);
      FW.audio.sfx('gameover');
      FW.events.reportScore(xWins);
      FW.events.reportComplete(xWins, {won: false});
      overlay.classList.add('active');
      aiThinking = false;
      return;
    }

    currentPlayer = currentPlayer === 'X' ? 'O' : 'X';
    updateUI();
    aiThinking = false;

    if (currentPlayer === 'O') {
      setTimeout(aiMove, 300);
    }
  }

  function handleCellClick(index) {
    if (gameOver || currentPlayer !== 'X' || aiThinking) return;
    if (board[index] !== null) return;
    FW.audio.sfx('click');
    makeMove(index);
  }

  function render() {
    grid.innerHTML = '';
    for (var i = 0; i < 9; i++) {
      var cell = document.createElement('div');
      cell.className = 'cell' + (board[i] ? ' ' + board[i].toLowerCase() : '');
      if (board[i]) cell.textContent = board[i];
      cell.addEventListener('click', (function(idx) {
        return function() { handleCellClick(idx); };
      })(i));
      cell.addEventListener('touchstart', (function(idx) {
        return function(e) {
          e.preventDefault();
          handleCellClick(idx);
        };
      })(i), { passive: false });
      grid.appendChild(cell);
    }
  }

  function updateUI() {
    if (gameOver) return;
    if (currentPlayer === 'X') {
      turnText.textContent = '轮到你了（X）';
      statusText.textContent = '点击格子放置 X';
    } else {
      turnText.textContent = '电脑思考中...';
      statusText.textContent = '';
    }
  }

  document.getElementById('resetBtn').addEventListener('click', function() {
    if (aiThinking) { aiThinking = false; }
    init();
  });

  // Init scores from FW.storage
  try {
    xWins = parseInt(FW.storage.load('tttXWins', '0'), 10) || 0;
    oWins = parseInt(FW.storage.load('tttOWins', '0'), 10) || 0;
    draws = parseInt(FW.storage.load('tttDraws', '0'), 10) || 0;
    xScoreEl.textContent = xWins;
    oScoreEl.textContent = oWins;
    drawScoreEl.textContent = draws;
  } catch(e) { xWins = 0; oWins = 0; draws = 0; }

  init();
})();
</script>
</body>
</html>
