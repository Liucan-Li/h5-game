<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>剪刀石头布</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .wrapper {
    background: #0d0d1a;
    border-radius: 16px;
    padding: 24px 20px;
    box-shadow: 0 0 60px rgba(100,200,255,0.08);
    max-width: 420px;
    width: 100%;
    margin: 8px;
    text-align: center;
  }
  h1 { font-size: 20px; color: #7df; letter-spacing: 3px; margin-bottom: 6px; }
  .subtitle { font-size: 12px; color: #446; margin-bottom: 20px; }
  .score-board {
    display: flex;
    justify-content: center;
    gap: 30px;
    margin-bottom: 20px;
  }
  .score-side { text-align: center; }
  .score-label { font-size: 11px; color: #556; letter-spacing: 2px; text-transform: uppercase; }
  .score-num { font-size: 40px; font-weight: bold; }
  .player-score { color: #7df; }
  .ai-score { color: #f74; }
  .vs { font-size: 18px; color: #445; align-self: center; }
  .arena {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 20px;
    min-height: 100px;
  }
  .choice-display {
    font-size: 64px;
    width: 90px;
    height: 90px;
    border-radius: 16px;
    background: #111;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid #223;
    transition: transform 0.15s, border-color 0.3s;
  }
  .choice-display.win { border-color: #7df; box-shadow: 0 0 20px rgba(100,220,255,0.3); }
  .choice-display.lose { border-color: #f74; }
  .choice-display.draw { border-color: #fa4; }
  .arena-label { font-size: 10px; color: #445; text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; text-align: center; }
  .result-msg {
    font-size: 22px;
    font-weight: bold;
    min-height: 32px;
    margin-bottom: 20px;
    transition: opacity 0.2s;
  }
  .result-win { color: #7df; }
  .result-lose { color: #f74; }
  .result-draw { color: #fa4; }
  .choices {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 20px;
  }
  .choice-btn {
    font-size: 40px;
    width: 80px;
    height: 80px;
    border-radius: 16px;
    border: 2px solid #334;
    background: #111;
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    -webkit-user-select: none;
    user-select: none;
  }
  .choice-btn:hover { transform: scale(1.1); border-color: #7df; box-shadow: 0 0 16px rgba(100,220,255,0.2); }
  .choice-btn:active { transform: scale(0.95); }
  .progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: #223;
    transition: background 0.3s;
  }
  .pip.player { background: #7df; }
  .pip.ai { background: #f74; }
  .status { font-size: 12px; color: #446; }
  .reset-btn {
    display: none;
    margin: 0 auto;
    padding: 10px 30px;
    background: #7df3;
    color: #7df;
    border: 1px solid #7df;
    border-radius: 8px;
    font-family: inherit;
    font-size: 14px;
    cursor: pointer;
    letter-spacing: 1px;
  }
  .reset-btn:hover { background: #7df5; }
  .reset-btn.show { display: block; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>✊ 剪刀石头布</h1>
  <div class="subtitle">先赢 5 局者胜</div>

  <div class="score-board">
    <div class="score-side">
      <div class="score-label">你</div>
      <div class="score-num player-score" id="playerScore">0</div>
    </div>
    <div class="vs">VS</div>
    <div class="score-side">
      <div class="score-label">AI</div>
      <div class="score-num ai-score" id="aiScore">0</div>
    </div>
  </div>

  <div class="arena">
    <div>
      <div class="choice-display" id="playerChoice">❓</div>
      <div class="arena-label">你的出招</div>
    </div>
    <div style="font-size:24px;color:#445;">⚡</div>
    <div>
      <div class="choice-display" id="aiChoice">❓</div>
      <div class="arena-label">AI 出招</div>
    </div>
  </div>

  <div class="result-msg" id="resultMsg">&nbsp;</div>

  <div class="progress" id="progress"></div>

  <div class="choices" id="choicesArea">
    <button class="choice-btn" data-choice="rock" title="石头">✊</button>
    <button class="choice-btn" data-choice="scissors" title="剪刀">✌️</button>
    <button class="choice-btn" data-choice="paper" title="布">🖐️</button>
  </div>

  <div class="status" id="statusMsg">选择你的出招！</div>
  <button class="reset-btn" id="resetBtn" onclick="resetGame()">再来一局</button>
</div>

<script>
const CHOICES = ['rock', 'scissors', 'paper'];
const EMOJI = { rock: '✊', scissors: '✌️', paper: '🖐️' };
const NAME = { rock: '石头', scissors: '剪刀', paper: '布' };
const WIN_SCORE = 5;

const state = { playerScore: 0, aiScore: 0, history: [], locked: false };

function buildProgress() {
  const el = document.getElementById('progress');
  el.innerHTML = '';
  for (let i = 0; i < WIN_SCORE; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < state.playerScore ? ' player' : '');
    el.appendChild(pip);
  }
  const sep = document.createElement('div');
  sep.style.cssText = 'width:12px;';
  el.appendChild(sep);
  for (let i = 0; i < WIN_SCORE; i++) {
    const pip = document.createElement('div');
    pip.className = 'pip' + (i < state.aiScore ? ' ai' : '');
    el.appendChild(pip);
  }
}

function getOutcome(player, ai) {
  if (player === ai) return 'draw';
  if ((player === 'rock' && ai === 'scissors') ||
      (player === 'scissors' && ai === 'paper') ||
      (player === 'paper' && ai === 'rock')) return 'win';
  return 'lose';
}

function play(playerChoice) {
  if (state.locked) return;
  state.locked = true;

  const aiChoice = CHOICES[Math.floor(Math.random() * 3)];
  const outcome = getOutcome(playerChoice, aiChoice);

  const pc = document.getElementById('playerChoice');
  const ac = document.getElementById('aiChoice');
  const rm = document.getElementById('resultMsg');

  pc.textContent = '⚡';
  ac.textContent = '⚡';
  pc.className = 'choice-display';
  ac.className = 'choice-display';

  setTimeout(() => {
    pc.textContent = EMOJI[playerChoice];
    ac.textContent = EMOJI[aiChoice];

    if (outcome === 'win') {
      state.playerScore++;
      pc.className = 'choice-display win';
      ac.className = 'choice-display lose';
      rm.className = 'result-msg result-win';
      rm.textContent = '🎉 你赢了！' + NAME[playerChoice] + ' 胜 ' + NAME[aiChoice];
    } else if (outcome === 'lose') {
      state.aiScore++;
      pc.className = 'choice-display lose';
      ac.className = 'choice-display win';
      rm.className = 'result-msg result-lose';
      rm.textContent = '😤 AI 赢了！' + NAME[ai] + ' 胜 ' + NAME[playerChoice];
    } else {
      pc.className = 'choice-display draw';
      ac.className = 'choice-display draw';
      rm.className = 'result-msg result-draw';
      rm.textContent = '🤝 平局！都出了' + NAME[playerChoice];
    }

    document.getElementById('playerScore').textContent = state.playerScore;
    document.getElementById('aiScore').textContent = state.aiScore;
    buildProgress();

    if (state.playerScore >= WIN_SCORE || state.aiScore >= WIN_SCORE) {
      const finalMsg = state.playerScore >= WIN_SCORE ? '🏆 恭喜你赢得比赛！' : '💀 AI 赢得了比赛！';
      document.getElementById('statusMsg').textContent = finalMsg;
      document.getElementById('choicesArea').style.opacity = '0.3';
      document.getElementById('choicesArea').style.pointerEvents = 'none';
      document.getElementById('resetBtn').classList.add('show');
    } else {
      setTimeout(() => { state.locked = false; }, 400);
    }
  }, 300);
}

function resetGame() {
  state.playerScore = 0;
  state.aiScore = 0;
  state.locked = false;
  document.getElementById('playerScore').textContent = '0';
  document.getElementById('aiScore').textContent = '0';
  document.getElementById('playerChoice').textContent = '❓';
  document.getElementById('playerChoice').className = 'choice-display';
  document.getElementById('aiChoice').textContent = '❓';
  document.getElementById('aiChoice').className = 'choice-display';
  document.getElementById('resultMsg').textContent = ' ';
  document.getElementById('statusMsg').textContent = '选择你的出招！';
  document.getElementById('choicesArea').style.opacity = '1';
  document.getElementById('choicesArea').style.pointerEvents = '';
  document.getElementById('resetBtn').classList.remove('show');
  buildProgress();
}

document.querySelectorAll('.choice-btn').forEach(btn => {
  btn.addEventListener('click', () => play(btn.dataset.choice));
});

buildProgress();
</script>
</body>
</html>
