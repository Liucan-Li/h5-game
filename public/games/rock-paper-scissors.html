<!DOCTYPE html>
<html lang="zh-CN" data-game-id="rock-paper-scissors">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>剪刀石头布</title>
<link rel="stylesheet" href="framework.css">
<style>
  .subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 16px; }
  .arena {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 20px;
    margin-bottom: 16px;
    min-height: 100px;
  }
  .choice-display {
    font-size: 64px;
    width: 90px;
    height: 90px;
    border-radius: var(--radius-lg);
    background: var(--bg-card);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid var(--border-default);
    transition: transform 0.15s, border-color 0.3s;
  }
  .choice-display.win { border-color: var(--accent-1); box-shadow: 0 0 20px rgba(78,204,163,0.3); }
  .choice-display.lose { border-color: var(--accent-4); }
  .choice-display.draw { border-color: var(--accent-3); }
  .arena-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 6px; text-align: center; }
  .result-msg {
    font-size: 22px;
    font-weight: bold;
    min-height: 32px;
    margin-bottom: 16px;
    transition: opacity 0.2s;
  }
  .result-win { color: var(--accent-1); }
  .result-lose { color: var(--accent-4); }
  .result-draw { color: var(--accent-3); }
  .choices {
    display: flex;
    justify-content: center;
    gap: 12px;
    margin-bottom: 16px;
  }
  .choice-btn {
    font-size: 40px;
    width: 80px;
    height: 80px;
    border-radius: var(--radius-lg);
    border: 2px solid var(--border-default);
    background: var(--bg-card);
    cursor: pointer;
    transition: transform 0.12s, border-color 0.12s, box-shadow 0.12s;
    -webkit-user-select: none;
    user-select: none;
    color: var(--text-primary);
  }
  .choice-btn:hover { transform: scale(1.1); border-color: var(--accent-1); box-shadow: 0 0 16px rgba(78,204,163,0.2); }
  .choice-btn:active { transform: scale(0.95); }
  .progress {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 16px;
  }
  .pip {
    width: 10px; height: 10px;
    border-radius: 50%;
    background: var(--border-default);
    transition: background 0.3s;
  }
  .pip.player { background: var(--accent-1); }
  .pip.ai { background: var(--accent-4); }
  .vs-icon { font-size: 24px; color: var(--text-muted); align-self: center; }
  .fw-score-box.player-score { min-width: 70px; }
  .fw-score-box.player-score .fw-score-value { color: var(--accent-1); }
  .fw-score-box.ai-score .fw-score-value { color: var(--accent-4); }
</style>
</head>
<body>
<div class="fw-container fw-cat-casual">
  <div class="fw-header">
    <h1 class="fw-title">剪刀石头布</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">最高</div><div class="fw-score-value" id="hiScore">0</div></div>
    </div>
  </div>

  <div class="subtitle">先赢 5 局者胜</div>

  <div style="display:flex;justify-content:center;align-items:center;gap:12px;margin-bottom:16px;">
    <div class="fw-score-box player-score">
      <div class="fw-score-label">你</div>
      <div class="fw-score-value" id="playerScore">0</div>
    </div>
    <div class="vs-icon">VS</div>
    <div class="fw-score-box ai-score">
      <div class="fw-score-label">AI</div>
      <div class="fw-score-value" id="aiScore">0</div>
    </div>
  </div>

  <div class="arena">
    <div>
      <div class="choice-display" id="playerChoice">❓</div>
      <div class="arena-label">你的出招</div>
    </div>
    <div class="vs-icon">⚡</div>
    <div>
      <div class="choice-display" id="aiChoice">❓</div>
      <div class="arena-label">AI 出招</div>
    </div>
  </div>

  <div class="result-msg" id="resultMsg">&nbsp;</div>

  <div class="progress" id="progress"></div>

  <div class="choices" id="choicesArea">
    <button class="choice-btn" data-choice="rock" title="石头">✊</button>
    <button class="choice-btn" data-choice="scissors" title="剪刀">✌️</button>
    <button class="choice-btn" data-choice="paper" title="布">🖐️</button>
  </div>

  <div class="fw-status" id="statusMsg">选择你的出招！</div>
</div>

<div class="fw-overlay" id="gameOverOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="overlayTitle"></div>
    <div class="fw-overlay-text" id="overlayText"></div>
    <button class="fw-btn fw-btn-primary" id="resetBtn">再来一局</button>
  </div>
</div>

<script src="framework.js"></script>
<script>
(function() {
  'use strict';
  const FW = window.GameFramework;

  const CHOICES = ['rock', 'scissors', 'paper'];
  const EMOJI = { rock: '✊', scissors: '✌️', paper: '🖐️' };
  const NAME = { rock: '石头', scissors: '剪刀', paper: '布' };
  const WIN_SCORE = 5;

  const state = { playerScore: 0, aiScore: 0, history: [], locked: false };

  const hiEl = document.getElementById('hiScore');
  const overlayEl = document.getElementById('gameOverOverlay');

  hiEl.textContent = FW.storage.getHighScore();

  function buildProgress() {
    const el = document.getElementById('progress');
    el.innerHTML = '';
    for (var i = 0; i < WIN_SCORE; i++) {
      var pip = document.createElement('div');
      pip.className = 'pip' + (i < state.playerScore ? ' player' : '');
      el.appendChild(pip);
    }
    var sep = document.createElement('div');
    sep.style.cssText = 'width:12px;';
    el.appendChild(sep);
    for (var i = 0; i < WIN_SCORE; i++) {
      var pip = document.createElement('div');
      pip.className = 'pip' + (i < state.aiScore ? ' ai' : '');
      el.appendChild(pip);
    }
  }

  function getOutcome(player, ai) {
    if (player === ai) return 'draw';
    if ((player === 'rock' && ai === 'scissors') ||
        (player === 'scissors' && ai === 'paper') ||
        (player === 'paper' && ai === 'rock')) return 'win';
    return 'lose';
  }

  function play(playerChoice) {
    if (state.locked) return;
    state.locked = true;

    FW.audio.sfx('click');

    var aiChoice = CHOICES[Math.floor(Math.random() * 3)];
    var outcome = getOutcome(playerChoice, aiChoice);

    var pc = document.getElementById('playerChoice');
    var ac = document.getElementById('aiChoice');
    var rm = document.getElementById('resultMsg');

    pc.textContent = '⚡';
    ac.textContent = '⚡';
    pc.className = 'choice-display';
    ac.className = 'choice-display';

    setTimeout(function() {
      pc.textContent = EMOJI[playerChoice];
      ac.textContent = EMOJI[aiChoice];

      if (outcome === 'win') {
        state.playerScore++;
        FW.audio.sfx('score');
        pc.className = 'choice-display win';
        ac.className = 'choice-display lose';
        rm.className = 'result-msg result-win';
        rm.textContent = '你赢了！' + NAME[playerChoice] + ' 胜 ' + NAME[aiChoice];
      } else if (outcome === 'lose') {
        state.aiScore++;
        pc.className = 'choice-display lose';
        ac.className = 'choice-display win';
        rm.className = 'result-msg result-lose';
        rm.textContent = 'AI 赢了！' + NAME[aiChoice] + ' 胜 ' + NAME[playerChoice];
      } else {
        pc.className = 'choice-display draw';
        ac.className = 'choice-display draw';
        rm.className = 'result-msg result-draw';
        rm.textContent = '平局！都出了' + NAME[playerChoice];
      }

      document.getElementById('playerScore').textContent = state.playerScore;
      document.getElementById('aiScore').textContent = state.aiScore;
      buildProgress();

      if (state.playerScore >= WIN_SCORE || state.aiScore >= WIN_SCORE) {
        var won = state.playerScore >= WIN_SCORE;
        var finalScore = state.playerScore;
        var finalMsg = won ? '恭喜你赢得比赛！' : 'AI 赢得了比赛！';
        document.getElementById('statusMsg').textContent = finalMsg;
        document.getElementById('choicesArea').style.opacity = '0.3';
        document.getElementById('choicesArea').style.pointerEvents = 'none';

        FW.storage.setHighScore(finalScore);
        hiEl.textContent = FW.storage.getHighScore();
        FW.events.reportScore(finalScore);
        FW.events.reportComplete(finalScore, { won: won });

        if (won) {
          FW.audio.sfx('win');
          document.getElementById('overlayTitle').textContent = '恭喜你！';
          document.getElementById('overlayText').textContent = '你以 ' + finalScore + ' : ' + state.aiScore + ' 赢得比赛！';
        } else {
          FW.audio.sfx('gameover');
          document.getElementById('overlayTitle').textContent = '游戏结束';
          document.getElementById('overlayText').textContent = '你以 ' + finalScore + ' : ' + state.aiScore + ' 惜败';
        }
        FW.ui.showOverlay(overlayEl);
      } else {
        setTimeout(function() { state.locked = false; }, 400);
      }
    }, 300);
  }

  function resetGame() {
    state.playerScore = 0;
    state.aiScore = 0;
    state.locked = false;
    document.getElementById('playerScore').textContent = '0';
    document.getElementById('aiScore').textContent = '0';
    document.getElementById('playerChoice').textContent = '❓';
    document.getElementById('playerChoice').className = 'choice-display';
    document.getElementById('aiChoice').textContent = '❓';
    document.getElementById('aiChoice').className = 'choice-display';
    document.getElementById('resultMsg').textContent = ' ';
    document.getElementById('statusMsg').textContent = '选择你的出招！';
    document.getElementById('choicesArea').style.opacity = '1';
    document.getElementById('choicesArea').style.pointerEvents = '';
    FW.ui.hideOverlay(overlayEl);
    buildProgress();
  }

  document.querySelectorAll('.choice-btn').forEach(function(btn) {
    btn.addEventListener('click', function() { play(btn.dataset.choice); });
  });

  document.getElementById('resetBtn').addEventListener('click', function() { resetGame(); });

  buildProgress();
})();
</script>
</body>
</html>
