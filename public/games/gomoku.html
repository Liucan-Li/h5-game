<!DOCTYPE html>
<html lang="zh-CN" data-game-id="gomoku">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>五子棋</title>
<link rel="stylesheet" href="framework.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg-primary);font-family:var(--font-family);display:flex;justify-content:center;align-items:center;min-height:100dvh;overflow:hidden;}
.fw-container{display:flex;flex-direction:column;align-items:center;gap:12px;padding:12px;}
#gameCanvas{border-radius:var(--radius-lg);box-shadow:var(--glass-shadow);touch-action:none;cursor:pointer;max-width:96vw;}
.info-bar{display:flex;align-items:center;gap:16px;font-size:14px;color:var(--text-primary);}
.info-bar .score{display:flex;align-items:center;gap:6px;}
.info-bar .score .dot{display:inline-block;width:14px;height:14px;border-radius:50%;}
.dot.black{background:radial-gradient(circle at 35% 35%,#555,#111);box-shadow:1px 1px 2px rgba(0,0,0,0.4);}
.dot.white{background:radial-gradient(circle at 35% 35%,#fff,#ccc);box-shadow:1px 1px 2px rgba(0,0,0,0.25);}
#turnIndicator{font-weight:600;padding:4px 14px;border-radius:20px;background:var(--bg-secondary);font-size:14px;min-width:90px;text-align:center;border:1px solid var(--glass-border);}
#recordDisplay{font-size:12px;color:var(--text-muted);}
.btn-row{display:flex;gap:12px;}
</style>
</head>
<body>
<div class="fw-container fw-cat-board">
  <h1 class="fw-title" style="font-size:22px;letter-spacing:2px;">五子棋</h1>
  <canvas id="gameCanvas"></canvas>
  <div class="info-bar">
    <span class="score"><span class="dot black"></span> <span id="blackScore">0</span></span>
    <span id="turnIndicator">黑棋回合</span>
    <span class="score"><span class="dot white"></span> <span id="whiteScore">0</span></span>
    <span id="recordDisplay">胜0 负0 平0</span>
  </div>
  <div class="btn-row">
    <button class="fw-btn fw-btn-primary" id="rematchBtn" style="padding:8px 24px;">重新开始</button>
    <button class="fw-btn fw-btn-ghost" id="undoBtn" style="padding:8px 24px;">悔棋</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';
  const FW = window.GameFramework;
  const SIZE = 15;
  const EMPTY = 0, BLACK = 1, WHITE = 2;

  let board = Array(SIZE).fill().map(() => Array(SIZE).fill(EMPTY));
  let currentPlayer = BLACK;
  let gameOver = false;
  let winner = null;
  let history = [];
  let record = FW.storage.load('record', {wins:0,losses:0,draws:0});

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const size = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.78, 560);
  const PADDING = size * 0.05;
  const CELL = (size - 2 * PADDING) / (SIZE - 1);
  const STONE_RADIUS = CELL * 0.43;
  canvas.width = size;
  canvas.height = size;

  const turnEl = document.getElementById('turnIndicator');
  const blackScoreEl = document.getElementById('blackScore');
  const whiteScoreEl = document.getElementById('whiteScore');

  function toPixel(idx) { return PADDING + idx * CELL; }
  function toIndex(px) {
    const raw = (px - PADDING) / CELL;
    const idx = Math.round(raw);
    if (idx < 0 || idx >= SIZE || Math.abs(raw - idx) > 0.45) return -1;
    return idx;
  }

  function draw() {
    const w = canvas.width, h = canvas.height;
    ctx.fillStyle = '#f0d9b5';
    ctx.fillRect(0, 0, w, h);

    ctx.strokeStyle = '#8b7355';
    ctx.lineWidth = 1;
    for (let i = 0; i < SIZE; i++) {
      const p = toPixel(i);
      ctx.beginPath(); ctx.moveTo(toPixel(0), p); ctx.lineTo(toPixel(SIZE - 1), p); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p, toPixel(0)); ctx.lineTo(p, toPixel(SIZE - 1)); ctx.stroke();
    }

    const stars = [[3,3],[3,7],[3,11],[7,3],[7,7],[7,11],[11,3],[11,7],[11,11]];
    ctx.fillStyle = '#8b7355';
    stars.forEach(function(pt) { ctx.beginPath(); ctx.arc(toPixel(pt[1]), toPixel(pt[0]), 3, 0, Math.PI*2); ctx.fill(); });

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === EMPTY) continue;
        const x = toPixel(c), y = toPixel(r);
        const grad = ctx.createRadialGradient(x - STONE_RADIUS*0.3, y - STONE_RADIUS*0.3, STONE_RADIUS*0.1, x, y, STONE_RADIUS);
        if (board[r][c] === BLACK) {
          grad.addColorStop(0, '#555'); grad.addColorStop(0.6, '#222'); grad.addColorStop(1, '#000');
          ctx.shadowColor = 'rgba(0,0,0,0.3)';
        } else {
          grad.addColorStop(0, '#fff'); grad.addColorStop(0.6, '#eee'); grad.addColorStop(1, '#ccc');
          ctx.shadowColor = 'rgba(0,0,0,0.15)';
        }
        ctx.shadowBlur = 3;
        ctx.beginPath(); ctx.arc(x, y, STONE_RADIUS, 0, Math.PI*2); ctx.fillStyle = grad; ctx.fill();
        ctx.shadowBlur = 0;

        if (history.length > 0) {
          const last = history[history.length - 1];
          if (last[0] === r && last[1] === c) {
            ctx.fillStyle = board[r][c] === BLACK ? '#ff6666' : '#ff4444';
            ctx.beginPath(); ctx.arc(x, y, 4, 0, Math.PI*2); ctx.fill();
          }
        }
      }
    }
  }

  function checkWin(row, col, player) {
    const dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (const d of dirs) {
      const dr = d[0], dc = d[1];
      let count = 1;
      for (let sign = -1; sign <= 1; sign += 2) {
        for (let step = 1; step < 5; step++) {
          const nr = row + dr * sign * step;
          const nc = col + dc * sign * step;
          if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
          if (board[nr][nc] !== player) break;
          count++;
        }
      }
      if (count >= 5) return true;
    }
    return false;
  }

  function countStones() {
    let b = 0, w = 0;
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (board[r][c] === BLACK) b++; else if (board[r][c] === WHITE) w++;
      }
    }
    blackScoreEl.textContent = b; whiteScoreEl.textContent = w;
  }

  function updateUI() {
    countStones();
    document.getElementById('recordDisplay').textContent = '胜' + record.wins + ' 负' + record.losses + ' 平' + record.draws;
    if (gameOver) {
      if (winner === BLACK) { turnEl.textContent = '黑棋胜！'; FW.audio.sfx('win'); }
      else if (winner === WHITE) { turnEl.textContent = '白棋胜！'; FW.audio.sfx('gameover'); }
      else { turnEl.textContent = '平局'; FW.audio.sfx('click'); }
    } else {
      turnEl.textContent = currentPlayer === BLACK ? '黑棋回合' : '白棋回合';
    }
  }

  function placeStone(row, col) {
    if (gameOver) return false;
    if (board[row][col] !== EMPTY) return false;

    board[row][col] = currentPlayer;
    history.push([row, col, currentPlayer]);
    FW.audio.sfx('click');

    if (checkWin(row, col, currentPlayer)) {
      gameOver = true; winner = currentPlayer;
      if (winner === BLACK) record.wins++; else record.losses++;
      FW.storage.save('record', record);
      FW.events.reportComplete(1, { won: winner === BLACK });
      draw(); updateUI();
      return true;
    }

    let full = true;
    for (let r = 0; r < SIZE && full; r++)
      for (let c = 0; c < SIZE && full; c++)
        if (board[r][c] === EMPTY) full = false;
    if (full) {
      gameOver = true; winner = null; record.draws++;
      FW.storage.save('record', record);
      draw(); updateUI();
      return true;
    }

    currentPlayer = currentPlayer === BLACK ? WHITE : BLACK;
    draw(); updateUI();

    if (currentPlayer === WHITE && !gameOver) { setTimeout(aiMove, 80); }
    return true;
  }

  function aiMove() {
    if (gameOver || currentPlayer !== WHITE) return;
    var candidates = getCandidates();
    if (candidates.length === 0) return;
    var bestScore = -Infinity;
    var bestMove = candidates[0];
    for (var i = 0; i < candidates.length; i++) {
      var r = candidates[i][0], c = candidates[i][1];
      var score = evaluatePosition(r, c, WHITE);
      if (score > bestScore) { bestScore = score; bestMove = candidates[i]; }
    }
    if (bestScore < 200) {
      var blockScore = -Infinity;
      var blockMove = bestMove;
      for (var i = 0; i < candidates.length; i++) {
        var r = candidates[i][0], c = candidates[i][1];
        var s = evaluatePosition(r, c, BLACK);
        if (s > blockScore) { blockScore = s; blockMove = candidates[i]; }
      }
      if (blockScore > bestScore + 50) bestMove = blockMove;
    }
    placeStone(bestMove[0], bestMove[1]);
  }

  function getCandidates() {
    var set = {};
    for (var r = 0; r < SIZE; r++) {
      for (var c = 0; c < SIZE; c++) {
        if (board[r][c] !== EMPTY) continue;
        var near = false;
        for (var dr = -2; dr <= 2 && !near; dr++) {
          for (var dc = -2; dc <= 2 && !near; dc++) {
            if (dr === 0 && dc === 0) continue;
            var nr = r + dr, nc = c + dc;
            if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) continue;
            if (board[nr][nc] !== EMPTY) near = true;
          }
        }
        if (near) set[r * SIZE + c] = true;
      }
    }
    if (Object.keys(set).length === 0) set[Math.floor(SIZE/2) * SIZE + Math.floor(SIZE/2)] = true;
    return Object.keys(set).map(function(v) { return [Math.floor(v / SIZE), v % SIZE]; });
  }

  function evaluatePosition(row, col, player) {
    var opponent = player === BLACK ? WHITE : BLACK;
    var score = 0;
    var dirs = [[1,0],[0,1],[1,1],[1,-1]];
    for (var d = 0; d < dirs.length; d++) {
      var dr = dirs[d][0], dc = dirs[d][1];
      var line = [];
      for (var step = -4; step <= 4; step++) {
        var nr = row + dr * step, nc = col + dc * step;
        if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) line.push(-1);
        else if (step === 0) line.push(player);
        else line.push(board[nr][nc]);
      }
      score += scoreLine(line, player) * 1.1;
      score += scoreLine(line, opponent) * 0.9;
    }
    score += Math.max(0, 14 - (Math.abs(row - 7) + Math.abs(col - 7)));
    return score;
  }

  function scoreLine(line, player) {
    var left = 0, right = 0;
    for (var i = 3; i >= 0; i--) { if (line[i] === player) left++; else break; }
    var leftBlocked = (line[3 - left] === -1) || (line[3 - left] !== 0 && line[3 - left] !== player);
    for (var i = 5; i < line.length; i++) { if (line[i] === player) right++; else break; }
    var rightBlocked = (line[5 + right] === -1) || (line[5 + right] !== 0 && line[5 + right] !== player);
    var total = left + 1 + right;
    var blockedCount = (leftBlocked ? 1 : 0) + (rightBlocked ? 1 : 0);
    if (total >= 5) return 100000;
    if (total === 4) { if (blockedCount === 0) return 5000; if (blockedCount === 1) return 1000; return 0; }
    if (total === 3) { if (blockedCount === 0) return 500; if (blockedCount === 1) return 100; return 0; }
    if (total === 2) { if (blockedCount === 0) return 50; if (blockedCount === 1) return 10; return 0; }
    if (total === 1) return 2;
    return 0;
  }

  function undo() {
    if (gameOver) return;
    if (history.length < 2) return;
    for (var i = 0; i < 2; i++) {
      var move = history.pop();
      if (!move) break;
      board[move[0]][move[1]] = 0;
      currentPlayer = move[2];
    }
    draw(); updateUI();
  }

  function resetGame() {
    board = Array(SIZE).fill().map(function() { return Array(SIZE).fill(0); });
    currentPlayer = 1; gameOver = false; winner = null; history = [];
    draw(); updateUI();
    FW.events.emit('GAME_RESTART', {});
  }

  function handleClick(e) {
    if (gameOver || currentPlayer !== 1) return;
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var x, y;
    if (e.touches) { x = (e.touches[0].clientX - rect.left) * scaleX; y = (e.touches[0].clientY - rect.top) * scaleY; }
    else { x = (e.clientX - rect.left) * scaleX; y = (e.clientY - rect.top) * scaleY; }
    var col = toIndex(x), row = toIndex(y);
    if (row === -1 || col === -1) return;
    placeStone(row, col);
  }

  canvas.addEventListener('click', handleClick);
  canvas.addEventListener('touchstart', handleClick, { passive: true });
  document.getElementById('rematchBtn').addEventListener('click', resetGame);
  document.getElementById('undoBtn').addEventListener('click', undo);

  function resizeCanvas() {
    var newSize = Math.min(window.innerWidth * 0.96, window.innerHeight * 0.78, 560);
    if (Math.abs(newSize - canvas.width) > 2) { canvas.width = newSize; canvas.height = newSize; draw(); }
  }
  window.addEventListener('resize', resizeCanvas);

  resetGame();
})();
</script>
</body>
</html>
