<!DOCTYPE html>
<html lang="zh-CN" data-game-id="tower-defense">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Tower Defense</title>
<link rel="stylesheet" href="framework.css">
<style>
  canvas.fw-canvas { aspect-ratio: 1; }
  .fw-btn.fw-btn-tool {
    background: var(--glass-bg);
    color: var(--text-primary);
    border: 2px solid var(--bg-tertiary);
    padding: 8px 14px;
    border-radius: var(--radius-md);
    font-size: 0.8em;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
    white-space: nowrap;
  }
  .fw-btn.fw-btn-tool:active { transform: scale(0.95); }
  .fw-btn.fw-btn-tool.selected { border-color: var(--accent-3); background: var(--bg-tertiary); }
  .fw-btn.fw-btn-tool:disabled { opacity: 0.4; cursor: not-allowed; }
  .fw-controls-row { flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .fw-score-box { min-width: 50px; }
  .fw-status { min-height: 20px; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">Tower Defense</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">💰</div><div class="fw-score-value" id="gold">100</div></div>
      <div class="fw-score-box"><div class="fw-score-label">❤️</div><div class="fw-score-value" id="lives">10</div></div>
      <div class="fw-score-box"><div class="fw-score-label">🌊</div><div class="fw-score-value" id="wave">1</div></div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas id="gc" class="fw-canvas" width="400" height="400"></canvas>
    <div class="fw-overlay" id="overlay">
      <div class="fw-overlay-box">
        <h2 class="fw-overlay-title" id="ot">游戏结束</h2>
        <p class="fw-overlay-text" id="os">坚持到第 1 波</p>
        <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
      </div>
    </div>
  </div>
  <div class="fw-controls-row" id="actions">
    <button class="fw-btn fw-btn-tool" data-tool="tower">🏰 造塔 ($50)</button>
    <button class="fw-btn fw-btn-tool" data-tool="upgrade">⬆️ 升级 ($80)</button>
    <button class="fw-btn fw-btn-tool" id="startWave">▶️ 开始下一波</button>
  </div>
  <div class="fw-status" id="status">点击空地建造防御塔</div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var FW = window.GameFramework;
  var c=document.getElementById('gc'),ctx=c.getContext('2d');
  var gd=document.getElementById('gold'),ld=document.getElementById('lives');
  var wd=document.getElementById('wave'),st=document.getElementById('status');
  var ov=document.getElementById('overlay'),ot=document.getElementById('ot'),os=document.getElementById('os');

  var W=400,CELL=40,COLS=10,ROWS=10;
  var PATH=[{x:0,y:2},{x:4,y:2},{x:4,y:6},{x:8,y:6},{x:8,y:8},{x:9,y:8}];

  var gold,lives,wave,gameOver,waveActive,selectedTool,towers,enemies,projectiles,enemiesSpawned,enemiesThisWave,spawnTimer,waveCooldown;
  var grid=[];

  function init(){
    gold=100;lives=10;wave=0;gameOver=false;waveActive=false;
    selectedTool=null;towers=[];enemies=[];projectiles=[];
    grid=Array.from({length:ROWS},function(){return Array(COLS).fill(0);});
    // Mark path
    for(var i=0;i<PATH.length-1;i++){
      var p=Math.abs(PATH[i+1].x-PATH[i].x)>0;
      var steps=Math.max(Math.abs(PATH[i+1].x-PATH[i].x),Math.abs(PATH[i+1].y-PATH[i].y));
      for(var s=0;s<=steps;s++){
        var x=PATH[i].x+(PATH[i+1].x-PATH[i].x)*s/steps;
        var y=PATH[i].y+(PATH[i+1].y-PATH[i].y)*s/steps;
        grid[Math.round(y)][Math.round(x)]=1;
      }
    }
    ov.classList.remove('active');
    updateHUD();
    render();
    updateToolButtons();
  }

  function updateHUD(){
    gd.textContent=Math.floor(gold);ld.textContent=lives;wd.textContent=wave;
  }

  function updateToolButtons(){
    document.querySelectorAll('[data-tool]').forEach(function(b){
      b.classList.toggle('selected',b.dataset.tool===selectedTool);
    });
  }

  function getPathProgress(pos){
    var minDist=Infinity,minIdx=0;
    for(var i=0;i<PATH.length;i++){
      var d=Math.hypot(pos.x-PATH[i].x,pos.y-PATH[i].y);
      if(d<minDist){minDist=d;minIdx=i;}
    }
    return minIdx;
  }

  function spawnEnemy(){
    var hp=30+wave*5;
    var speed=0.008+wave*0.001;
    enemies.push({
      x:0,y:2,pathIdx:1,hp: hp, maxHp:hp, speed: speed, gold:10+wave*2
    });
  }

  function startWave(){
    if(waveActive)return;
    wave++;waveActive=true;enemiesSpawned=0;
    enemiesThisWave=5+wave*3;spawnTimer=0;
    st.textContent='🌊 第 '+wave+' 波来袭！';
    document.getElementById('startWave').disabled=true;
    FW.audio.sfx('click');
  }

  function tick(){
    if(gameOver)return;
    if(waveActive){
      spawnTimer++;
      if(spawnTimer>Math.max(15,40-wave*2)&&enemiesSpawned<enemiesThisWave){
        spawnEnemy();enemiesSpawned++;spawnTimer=0;
      }
    }

    // Move enemies
    enemies.forEach(function(e){
      var target=PATH[e.pathIdx];
      var dx=target.x+0.5-e.x,dy=target.y+0.5-e.y;
      var dist=Math.hypot(dx,dy);
      if(dist<e.speed*50){
        e.x=target.x+0.5;e.y=target.y+0.5;
        e.pathIdx++;
        if(e.pathIdx>=PATH.length){
          e.reachedEnd=true;
          lives--;
          updateHUD();
          if(lives<=0){
            gameOver=true;
            FW.audio.sfx('gameover');
            FW.storage.setHighScore(wave);
            FW.events.reportComplete(wave,{won:false});
            ot.textContent='😵 游戏结束';
            os.textContent='坚持到第 '+wave+' 波。最高纪录：第 '+FW.storage.getHighScore()+' 波';
            ov.classList.add('active');
          }
        }
      }else{
        e.x+=dx/dist*e.speed*50;e.y+=dy/dist*e.speed*50;
      }
    });
    enemies=enemies.filter(function(e){return !e.reachedEnd;});

    // Towers shoot
    towers.forEach(function(t){
      t.cooldown=(t.cooldown||0)-1;
      if(t.cooldown<=0){
        var target=enemies.find(function(e){return Math.hypot(e.x-t.x,e.y-t.y)<t.range;});
        if(target){
          t.cooldown=20-t.level*2;
          projectiles.push({x:t.x*CELL+CELL/2,y:t.y*CELL+CELL/2,target:target,damage:t.damage,speed:5});
        }
      }
    });

    // Move projectiles
    projectiles=projectiles.filter(function(p){
      if(!p.target||!enemies.includes(p.target))return false;
      var dx=p.target.x*CELL+CELL/2-p.x,dy=p.target.y*CELL+CELL/2-p.y;
      var dist=Math.hypot(dx,dy);
      if(dist<p.speed*2){
        p.target.hp-=p.damage;
        if(p.target.hp<=0){
          gold+=p.target.gold;
          enemies=enemies.filter(function(e){return e!==p.target;});
          updateHUD();
          FW.audio.sfx('score');
        }
        return false;
      }
      p.x+=dx/dist*p.speed;p.y+=dy/dist*p.speed;
      return true;
    });

    // Check wave complete
    if(waveActive&&enemiesSpawned>=enemiesThisWave&&enemies.length===0){
      waveActive=false;
      document.getElementById('startWave').disabled=false;
      gold+=wave*10;
      updateHUD();
      FW.audio.sfx('win');
      FW.events.reportScore(wave);
      st.textContent='✅ 第 '+wave+' 波完成！获得 '+wave*10+' 奖励金币';
    }

    render();
    requestAnimationFrame(tick);
  }

  function render(){
    ctx.fillStyle='#0f3460';ctx.fillRect(0,0,W,W);
    // Grid
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      if(grid[r][c]===1){
        ctx.fillStyle='#1a3f6a';ctx.fillRect(c*CELL,r*CELL,CELL,CELL);
      }else{
        ctx.strokeStyle='rgba(255,255,255,0.04)';ctx.strokeRect(c*CELL+0.5,r*CELL+0.5,CELL,CELL);
      }
    }
    // Towers
    towers.forEach(function(t){
      var cx=t.x*CELL+CELL/2,cy=t.y*CELL+CELL/2;
      ctx.fillStyle=t.color;
      ctx.beginPath();ctx.roundRect(cx-12,cy-12,24,24,4);ctx.fill();
      ctx.fillStyle='#fff';ctx.font='bold 12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('🏰',cx,cy);
      // Range circle
      if(selectedTool==='upgrade'||t===hoveredTower){
        ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.lineWidth=1;
        ctx.beginPath();ctx.arc(cx,cy,t.range*CELL,0,Math.PI*2);ctx.stroke();
      }
    });
    // Enemies
    enemies.forEach(function(e){
      var x=e.x*CELL,y=e.y*CELL;
      ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(x,y,12,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#c0392b';ctx.beginPath();ctx.arc(x-3,y-3,5,0,Math.PI*2);ctx.fill();
      // HP bar
      var bw=24,bh=3;
      ctx.fillStyle='#333';ctx.fillRect(x-bw/2,y-20,bw,bh);
      ctx.fillStyle='#2ecc71';ctx.fillRect(x-bw/2,y-20,bw*(e.hp/e.maxHp),bh);
    });
    // Projectiles
    projectiles.forEach(function(p){
      ctx.fillStyle='#f1c40f';ctx.beginPath();ctx.arc(p.x,p.y,3,0,Math.PI*2);ctx.fill();
    });
  }

  var hoveredTower=null;

  c.addEventListener('click',function(e){
    if(gameOver)return;
    var r=c.getBoundingClientRect();
    var ex=(e.clientX-r.left)/r.width*W,ey=(e.clientY-r.top)/r.height*W;
    var col=Math.floor(ex/CELL),row=Math.floor(ey/CELL);
    if(col<0||col>=COLS||row<0||row>=ROWS)return;

    if(selectedTool==='tower'){
      if(grid[row][col]===1){st.textContent='❌ 不能建在路上';return;}
      if(towers.some(function(t){return t.x===col&&t.y===row;})){st.textContent='❌ 这里已有塔';return;}
      if(gold<50){st.textContent='❌ 金币不够';return;}
      towers.push({x:col,y:row,level:1,damage:15,range:2.5,color:'#3498db',cooldown:0});
      gold-=50;updateHUD();st.textContent='✅ 防御塔已建造';
      FW.audio.sfx('click');
    }else if(selectedTool==='upgrade'){
      var tower=towers.find(function(t){return t.x===col&&t.y===row;});
      if(!tower){st.textContent='❌ 选择一座塔升级';return;}
      if(gold<80){st.textContent='❌ 金币不够';return;}
      tower.level++;tower.damage+=10;tower.range+=0.3;
      gold-=80;updateHUD();st.textContent='✅ 防御塔升级到 '+tower.level+' 级';
      FW.audio.sfx('click');
    }
    updateToolButtons();render();
  });

  document.querySelectorAll('[data-tool]').forEach(function(b){
    b.addEventListener('click',function(){
      if(selectedTool===b.dataset.tool)selectedTool=null;
      else selectedTool=b.dataset.tool;
      updateToolButtons();
      FW.audio.sfx('click');
    });
  });

  document.getElementById('startWave').addEventListener('click',startWave);
  document.getElementById('rb').addEventListener('click',function(){
    FW.audio.sfx('click');
    init();
  });

  init();
  setInterval(tick,50);
})();
</script>
</body>
</html>
