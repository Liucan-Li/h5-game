<!DOCTYPE html>
<html lang="zh-CN" data-game-id="chinese-chess">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>中国象棋</title>
<link rel="stylesheet" href="framework.css">
<style>
body{background:var(--bg-primary);display:flex;justify-content:center;align-items:center;min-height:100dvh;font-family:'Courier New',monospace;overflow:hidden;}
.game-wrap{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius-xl);padding:12px 10px;box-shadow:var(--glass-shadow);max-width:500px;width:100%;margin:8px;text-align:center;}
canvas{display:block;border-radius:var(--radius-md);border:2px solid #443;max-width:100%;cursor:pointer;touch-action:none;}
.status{font-size:13px;color:#fa4;margin-top:8px;min-height:20px;}
</style>
</head>
<body>
<div class="game-wrap fw-cat-board">
  <h1 class="fw-title" style="font-size:18px;letter-spacing:3px;color:#fa4;">中国象棋</h1>
  <canvas id="c"></canvas>
  <div class="status" id="status">红方先手 · 点击选择棋子</div>
  <div style="margin-top:8px;"><button class="fw-btn fw-btn-ghost" id="restartBtn">重新开始</button></div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW = window.GameFramework;
  const COLS = 9, ROWS = 10;
  let CELL, MARG;
  const canvas = document.getElementById('c');
  const ctx = canvas.getContext('2d');

  function resize() {
    const maxW = Math.min(window.innerWidth - 40, 480);
    CELL = Math.floor((maxW - 20) / COLS);
    canvas.width = CELL * (COLS - 1) + CELL * 2;
    canvas.height = CELL * (ROWS - 1) + CELL * 2;
    MARG = CELL;
  }
  resize();

  const INIT_BOARD = [
    ['bR','bH','bE','bA','bK','bA','bE','bH','bR'],
    [null,null,null,null,null,null,null,null,null],
    [null,'bC',null,null,null,null,null,'bC',null],
    ['bP',null,'bP',null,'bP',null,'bP',null,'bP'],
    [null,null,null,null,null,null,null,null,null],
    [null,null,null,null,null,null,null,null,null],
    ['rP',null,'rP',null,'rP',null,'rP',null,'rP'],
    [null,'rC',null,null,null,null,null,'rC',null],
    [null,null,null,null,null,null,null,null,null],
    ['rR','rH','rE','rA','rK','rA','rE','rH','rR'],
  ];

  let board, selected, turn, gameOver, thinking;

  function deepCopy(b) { return b.map(function(row) { return row.slice(); }); }

  function initGame() {
    board = deepCopy(INIT_BOARD);
    selected = null; turn = 'r'; gameOver = false; thinking = false;
    setStatus('红方先手 · 点击选择棋子');
    render();
  }

  function pos(r, c) { return { x: MARG + c * CELL, y: MARG + r * CELL }; }
  function getType(piece) { return piece ? piece[1] : null; }
  function getColor(piece) { return piece ? piece[0] : null; }

  function getMoves(b, r, c) {
    const piece = b[r][c]; if (!piece) return [];
    const color = piece[0], type = piece[1]; const moves = [];
    function add(nr, nc) { if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) return; if (b[nr][nc] && b[nr][nc][0] === color) return; moves.push([nr, nc]); }
    switch (type) {
      case 'R':
        for (const d of [[-1,0],[1,0],[0,-1],[0,1]]) for (let i=1;i<Math.max(ROWS,COLS);i++){const nr=r+d[0]*i,nc=c+d[1]*i;if(nr<0||nr>=ROWS||nc<0||nc>=COLS)break;if(b[nr][nc]){if(b[nr][nc][0]!==color)moves.push([nr,nc]);break;}moves.push([nr,nc]);}
        break;
      case 'H':
        for (const d of [[-2,-1,-1,0],[-2,1,-1,0],[2,-1,1,0],[2,1,1,0],[-1,-2,0,-1],[-1,2,0,1],[1,-2,0,-1],[1,2,0,1]]){if(b[r+d[2]]&&b[r+d[2]][c+d[3]])continue;add(r+d[0],c+d[1]);}
        break;
      case 'E':
        for (const d of [[-2,-2,-1,-1],[-2,2,-1,1],[2,-2,1,-1],[2,2,1,1]]){if(b[r+d[2]]&&b[r+d[2]][c+d[3]])continue;var nr=r+d[0],nc=c+d[1];if(color==='r'&&nr<5)continue;if(color==='b'&&nr>4)continue;add(nr,nc);}
        break;
      case 'A':
        for (const d of [[-1,-1],[-1,1],[1,-1],[1,1]]){var nr=r+d[0],nc=c+d[1];if(nc<3||nc>5)continue;if(color==='r'&&nr<7)continue;if(color==='b'&&nr>2)continue;add(nr,nc);}
        break;
      case 'K':
        for (const d of [[-1,0],[1,0],[0,-1],[0,1]]){var nr=r+d[0],nc=c+d[1];if(nc<3||nc>5)continue;if(color==='r'&&nr<7)continue;if(color==='b'&&nr>2)continue;add(nr,nc);}
        break;
      case 'C':
        for (const d of [[-1,0],[1,0],[0,-1],[0,1]]){var screen=false;for(var i=1;i<Math.max(ROWS,COLS);i++){var nr=r+d[0]*i,nc=c+d[1]*i;if(nr<0||nr>=ROWS||nc<0||nc>=COLS)break;if(!screen){if(!b[nr][nc])moves.push([nr,nc]);else screen=true;}else{if(b[nr][nc]){if(b[nr][nc][0]!==color)moves.push([nr,nc]);break;}}}}
        break;
      case 'P':
        if(color==='r'){add(r-1,c);if(r<=4){add(r,c-1);add(r,c+1);}}else{add(r+1,c);if(r>=5){add(r,c-1);add(r,c+1);}}
        break;
    }
    return moves;
  }

  function findKing(b, color) { for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(b[r][c]===color+'K')return[r,c];}return null; }

  function isInCheck(b, color) {
    var kp=findKing(b,color);if(!kp)return true;var opp=color==='r'?'b':'r';
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(b[r][c]&&b[r][c][0]===opp){var ms=getMoves(b,r,c);for(var i=0;i<ms.length;i++){if(ms[i][0]===kp[0]&&ms[i][1]===kp[1])return true;}}}
    return false;
  }

  function applyMove(b, fr, to){var nb=deepCopy(b);nb[to[0]][to[1]]=nb[fr[0]][fr[1]];nb[fr[0]][fr[1]]=null;return nb;}

  function getLegalMoves(b,r,c){var p=b[r][c];if(!p)return[];var co=p[0];return getMoves(b,r,c).filter(function(m){return!isInCheck(applyMove(b,[r,c],m),co);});}

  function evalBoard(b){var vals={K:10000,R:600,H:300,E:120,A:120,C:300,P:60};var s=0;for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var p=b[r][c];if(!p)continue;s+=p[0]==='b'?vals[p[1]]||0:-(vals[p[1]]||0);}return s;}

  function aiMinimax(b,depth,alpha,beta,maximizing){
    if(depth===0)return evalBoard(b);var color=maximizing?'b':'r';var allMoves=[];
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(b[r][c]&&b[r][c][0]===color){var ms=getLegalMoves(b,r,c);for(var i=0;i<ms.length;i++)allMoves.push({from:[r,c],to:ms[i]});}}
    if(!allMoves.length)return maximizing?-Infinity:Infinity;
    if(maximizing){var best=-Infinity;for(var i=0;i<allMoves.length;i++){var nb=applyMove(b,allMoves[i].from,allMoves[i].to);best=Math.max(best,aiMinimax(nb,depth-1,alpha,beta,false));alpha=Math.max(alpha,best);if(beta<=alpha)break;}return best;}
    else{var best=Infinity;for(var i=0;i<allMoves.length;i++){var nb=applyMove(b,allMoves[i].from,allMoves[i].to);best=Math.min(best,aiMinimax(nb,depth-1,alpha,beta,true));beta=Math.min(beta,best);if(beta<=alpha)break;}return best;}
  }

  function aiPlay(){
    thinking=true;setStatus('蓝方思考中...');
    setTimeout(function(){
      var allMoves=[];
      for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){if(board[r][c]&&board[r][c][0]==='b'){var ms=getLegalMoves(board,r,c);for(var i=0;i<ms.length;i++)allMoves.push({from:[r,c],to:ms[i]});}}
      if(!allMoves.length){endGame('r');return;}
      var best=-Infinity,bestMove=allMoves[0];
      for(var i=0;i<allMoves.length;i++){var nb=applyMove(board,allMoves[i].from,allMoves[i].to);var sc=aiMinimax(nb,2,-Infinity,Infinity,false);if(sc>best){best=sc;bestMove=allMoves[i];}}
      board=applyMove(board,bestMove.from,bestMove.to);thinking=false;turn='r';render();
      if(!findKing(board,'r')){endGame('b');return;}var rMoves=false;
      for(var r=0;r<ROWS&&!rMoves;r++)for(var c=0;c<COLS&&!rMoves;c++){if(board[r][c]&&board[r][c][0]==='r'&&getLegalMoves(board,r,c).length)rMoves=true;}
      if(!rMoves)endGame('b');else setStatus('红方行动 · 点击选择棋子');
    }, 50);
  }

  function onCellClick(r,c){
    if(gameOver||thinking||turn!=='r')return;
    if(selected){var sr=selected[0],sc=selected[1];var legal=getLegalMoves(board,sr,sc);for(var i=0;i<legal.length;i++){if(legal[i][0]===r&&legal[i][1]===c){FW.audio.sfx('click');board=applyMove(board,[sr,sc],[r,c]);selected=null;render();if(!findKing(board,'b')){endGame('r');return;}turn='b';aiPlay();return;}}}
    if(board[r][c]&&board[r][c][0]==='r')selected=[r,c];else selected=null;
    render();
  }

  var NAMES={K:'将',A:'士',E:'象',H:'马',R:'车',C:'炮',P:'兵'},R_NAMES={K:'帅',A:'仕',E:'相',H:'马',R:'车',C:'炮',P:'兵'};

  function render(){
    var W=canvas.width,H_c=canvas.height;
    ctx.clearRect(0,0,W,H_c);ctx.fillStyle='#3a1a00';ctx.fillRect(0,0,W,H_c);
    ctx.strokeStyle='#8a5a20';ctx.lineWidth=1;
    for(var r=0;r<ROWS;r++){ctx.beginPath();ctx.moveTo(MARG,MARG+r*CELL);ctx.lineTo(MARG+(COLS-1)*CELL,MARG+r*CELL);ctx.stroke();}
    for(var c=0;c<COLS;c++){if(c===0||c===COLS-1){ctx.beginPath();ctx.moveTo(MARG+c*CELL,MARG);ctx.lineTo(MARG+c*CELL,MARG+(ROWS-1)*CELL);ctx.stroke();}else{ctx.beginPath();ctx.moveTo(MARG+c*CELL,MARG);ctx.lineTo(MARG+c*CELL,MARG+4*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(MARG+c*CELL,MARG+5*CELL);ctx.lineTo(MARG+c*CELL,MARG+(ROWS-1)*CELL);ctx.stroke();}}
    ctx.fillStyle='#2a0e00';ctx.fillRect(MARG,MARG+4*CELL+1,(COLS-1)*CELL,CELL-2);ctx.fillStyle='#8a5a2080';ctx.font=Math.floor(CELL*0.4)+'px serif';ctx.textAlign='center';ctx.fillText('楚河',MARG+CELL*2,MARG+4.6*CELL);ctx.fillText('汉界',MARG+CELL*6,MARG+4.6*CELL);
    ctx.strokeStyle='#8a5a2060';ctx.beginPath();ctx.moveTo(MARG+3*CELL,MARG);ctx.lineTo(MARG+5*CELL,MARG+2*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(MARG+5*CELL,MARG);ctx.lineTo(MARG+3*CELL,MARG+2*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(MARG+3*CELL,MARG+7*CELL);ctx.lineTo(MARG+5*CELL,MARG+9*CELL);ctx.stroke();ctx.beginPath();ctx.moveTo(MARG+5*CELL,MARG+7*CELL);ctx.lineTo(MARG+3*CELL,MARG+9*CELL);ctx.stroke();
    if(selected){var sr=selected[0],sc=selected[1];ctx.fillStyle='rgba(255,220,50,0.2)';ctx.beginPath();ctx.arc(MARG+sc*CELL,MARG+sr*CELL,CELL*0.45,0,Math.PI*2);ctx.fill();var legal=getLegalMoves(board,sr,sc);for(var i=0;i<legal.length;i++){ctx.fillStyle=board[legal[i][0]][legal[i][1]]?'rgba(255,100,50,0.4)':'rgba(100,255,100,0.3)';ctx.beginPath();ctx.arc(MARG+legal[i][1]*CELL,MARG+legal[i][0]*CELL,CELL*0.2,0,Math.PI*2);ctx.fill();}}
    var r2=CELL*0.42;
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){var piece=board[r][c];if(!piece)continue;var color=piece[0],type=piece[1];var p=pos(r,c);var isRed=color==='r';ctx.save();ctx.shadowColor='rgba(0,0,0,0.5)';ctx.shadowBlur=4;ctx.shadowOffsetY=2;var g=ctx.createRadialGradient(p.x-r2*0.3,p.y-r2*0.3,0,p.x,p.y,r2);g.addColorStop(0,isRed?'#ffd0c0':'#d0d8ff');g.addColorStop(1,isRed?'#c03010':'#1020a0');ctx.fillStyle=g;ctx.beginPath();ctx.arc(p.x,p.y,r2,0,Math.PI*2);ctx.fill();ctx.shadowColor='transparent';ctx.strokeStyle=isRed?'#ff6040':'#4060ff';ctx.lineWidth=1.5;ctx.stroke();ctx.strokeStyle=isRed?'#ff9070':'#7090ff';ctx.lineWidth=0.8;ctx.beginPath();ctx.arc(p.x,p.y,r2*0.8,0,Math.PI*2);ctx.stroke();var names=isRed?R_NAMES:NAMES;ctx.fillStyle=isRed?'#700000':'#000080';ctx.font='bold '+Math.floor(r2*1.1)+'px serif';ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(names[type]||type,p.x,p.y);ctx.restore();}
  }

  canvas.addEventListener('click',function(e){
    var rect=canvas.getBoundingClientRect();var sx=(e.clientX-rect.left)*canvas.width/rect.width;var sy=(e.clientY-rect.top)*canvas.height/rect.height;
    var c=Math.round((sx-MARG)/CELL),r=Math.round((sy-MARG)/CELL);if(r>=0&&r<ROWS&&c>=0&&c<COLS)onCellClick(r,c);
  });
  canvas.addEventListener('touchstart',function(e){
    e.preventDefault();var rect=canvas.getBoundingClientRect();var t=e.touches[0];
    var sx=(t.clientX-rect.left)*canvas.width/rect.width;var sy=(t.clientY-rect.top)*canvas.height/rect.height;
    var c=Math.round((sx-MARG)/CELL),r=Math.round((sy-MARG)/CELL);if(r>=0&&r<ROWS&&c>=0&&c<COLS)onCellClick(r,c);
  },{passive:false});

  function setStatus(msg){document.getElementById('status').textContent=msg;}
  function endGame(winner){gameOver=true;setStatus(winner==='r'?'红方赢了！将！':'蓝方赢了！将！');FW.audio.sfx(winner==='r'?'win':'gameover');FW.events.reportComplete(1,{won:winner==='r'});}

  document.getElementById('restartBtn').addEventListener('click',initGame);

  window.addEventListener('resize',function(){resize();render();});
  initGame();
})();
</script>
</body>
</html>
