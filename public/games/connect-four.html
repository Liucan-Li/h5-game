<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四子棋</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f6fa;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
    touch-action: none;
    user-select: none;
    -webkit-user-select: none;
  }
  .game-container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 10px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 420px;
    max-width: 100%;
    padding: 0 4px;
  }
  .header h1 {
    font-size: 22px;
    font-weight: 700;
    color: #2d3436;
  }
  .turn-display {
    font-size: 15px;
    color: #636e72;
    padding: 4px 12px;
    border-radius: 8px;
    background: #dfe6e9;
    font-weight: 600;
  }
  .turn-display.active-red { background: #ff7675; color: #fff; }
  .turn-display.active-yellow { background: #fdcb6e; color: #2d3436; }

  canvas {
    display: block;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    width: 420px;
    height: 440px;
    max-width: 100%;
    cursor: pointer;
    background: #0984e3;
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 420px;
    max-width: 100%;
    padding: 0 4px;
  }
  .score-display {
    display: flex;
    gap: 16px;
    font-size: 14px;
    color: #636e72;
  }
  .score-display span { font-weight: 700; }
  .score-display .red-score { color: #d63031; }
  .score-display .yellow-score { color: #f39c12; }
  .score-display .draw-score { color: #636e72; }
  .status-msg {
    font-size: 14px;
    font-weight: 600;
    color: #2d3436;
  }
  .status-msg.win { color: #00b894; }
  .status-msg.draw { color: #636e72; }
  .status-msg.lose { color: #d63031; }

  .controls-row {
    display: flex;
    gap: 8px;
  }
  .ctrl-btn {
    padding: 8px 20px;
    border: none;
    border-radius: 10px;
    background: #6c5ce7;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: #5a4bd1; }
  .ctrl-btn.secondary { background: #b2bec3; color: #2d3436; }
  .ctrl-btn.secondary:active { background: #95a5a6; }

  @media (max-width: 440px) {
    canvas { width: 100%; height: auto; aspect-ratio: 420/440; }
    .header, .info-bar { width: 100%; }
  }
</style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <h1>四子棋</h1>
    <div class="turn-display" id="turnDisplay">红方回合</div>
  </div>
  <canvas id="gameCanvas" width="420" height="440"></canvas>
  <div class="info-bar">
    <div class="score-display">
      <span>🔴 胜: <span class="red-score" id="winsDisplay">0</span></span>
      <span>🟡 负: <span class="yellow-score" id="lossesDisplay">0</span></span>
      <span>平: <span class="draw-score" id="drawsDisplay">0</span></span>
    </div>
    <div class="status-msg" id="statusMsg">点击列下落棋子</div>
  </div>
  <div class="controls-row">
    <button class="ctrl-btn" id="restartBtn">重新开始</button>
    <button class="ctrl-btn secondary" id="resetScoresBtn">重置分数</button>
  </div>
</div>
<script>
(function() {
  'use strict';

  // ============================================================
  // CONSTANTS
  // ============================================================
  const COLS = 7;
  const ROWS = 6;
  const CANVAS_W = 420;
  const CANVAS_H = 440;
  const HEADER_H = 40; // top space for column indicators
  const CELL_SIZE = (CANVAS_H - HEADER_H) / ROWS; // ~66.67
  const GRID_LEFT = (CANVAS_W - COLS * CELL_SIZE) / 2;
  const GRID_TOP = HEADER_H;
  const EMPTY = 0;
  const RED = 1;     // player
  const YELLOW = 2;  // AI
  const ANIM_FRAMES = 20; // frames for piece drop animation

  // Win directions
  const DIRECTIONS = [
    { dx: 1, dy: 0 },  // horizontal
    { dx: 0, dy: 1 },  // vertical
    { dx: 1, dy: 1 },  // diagonal down-right
    { dx: 1, dy: -1 }, // diagonal up-right
  ];

  // ============================================================
  // DOM REFERENCES
  // ============================================================
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const turnDisplay = document.getElementById('turnDisplay');
  const statusMsg = document.getElementById('statusMsg');
  const winsSpan = document.getElementById('winsDisplay');
  const lossesSpan = document.getElementById('lossesDisplay');
  const drawsSpan = document.getElementById('drawsDisplay');
  const restartBtn = document.getElementById('restartBtn');
  const resetScoresBtn = document.getElementById('resetScoresBtn');

  // ============================================================
  // GAME STATE
  // ============================================================
  let grid = [];
  let currentPlayer = RED; // RED starts
  let gameOver = false;
  let winner = EMPTY; // EMPTY = ongoing, RED = player win, YELLOW = AI win, 3 = draw
  let scores = loadScores();
  let winCells = []; // array of {col, row} for winning line
  let winAnimFrame = 0;

  // Animation state
  let dropping = false;
  let dropCol = -1;
  let dropRow = -1;
  let dropFrame = 0;
  let dropPlayer = RED;

  // Hover
  let hoverCol = -1;

  // AI thinking delay
  let aiThinking = false;
  let aiTimer = 0;

  // ============================================================
  // SCORES
  // ============================================================
  function loadScores() {
    const data = localStorage.getItem('connect4_wins');
    if (data) {
      try { return JSON.parse(data); }
      catch(e) { /* ignore */ }
    }
    return { wins: 0, losses: 0, draws: 0 };
  }

  function saveScores() {
    localStorage.setItem('connect4_wins', JSON.stringify(scores));
  }

  function updateScoreUI() {
    winsSpan.textContent = scores.wins;
    lossesSpan.textContent = scores.losses;
    drawsSpan.textContent = scores.draws;
  }

  // ============================================================
  // GRID OPERATIONS
  // ============================================================
  function createGrid() {
    return Array.from({ length: ROWS }, () => Array(COLS).fill(EMPTY));
  }

  function isValidCol(col) {
    return col >= 0 && col < COLS && grid[0][col] === EMPTY;
  }

  function getDropRow(col) {
    for (let r = ROWS - 1; r >= 0; r--) {
      if (grid[r][col] === EMPTY) return r;
    }
    return -1;
  }

  function dropPiece(col, player) {
    const row = getDropRow(col);
    if (row === -1) return -1;
    grid[row][col] = player;
    return row;
  }

  // ============================================================
  // WIN DETECTION
  // ============================================================
  function checkWin(row, col, player) {
    for (const d of DIRECTIONS) {
      const cells = [{ col, row }];
      // Forward direction
      for (let i = 1; i < 4; i++) {
        const c = col + d.dx * i;
        const r = row + d.dy * i;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
        if (grid[r][c] !== player) break;
        cells.push({ col: c, row: r });
      }
      // Backward direction
      for (let i = 1; i < 4; i++) {
        const c = col - d.dx * i;
        const r = row - d.dy * i;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
        if (grid[r][c] !== player) break;
        cells.push({ col: c, row: r });
      }
      if (cells.length >= 4) return cells;
    }
    return null;
  }

  function isDraw() {
    return grid[0].every(cell => cell !== EMPTY);
  }

  // ============================================================
  // AI - SIMPLE HEURISTIC
  // ============================================================
  function evaluateWindow(window, player) {
    const opp = player === YELLOW ? RED : YELLOW;
    let score = 0;
    const count = window.filter(c => c === player).length;
    const empty = window.filter(c => c === EMPTY).length;
    const oppCount = window.filter(c => c === opp).length;

    // Win
    if (count === 4) score += 100000;
    // Block opponent win
    else if (oppCount === 4) score += 90000;
    // 3 in a row with empty cell
    else if (count === 3 && empty === 1) score += 5000;
    // Block opponent 3
    else if (oppCount === 3 && empty === 1) score += 4000;
    // 2 in a row
    else if (count === 2 && empty === 2) score += 500;
    else if (oppCount === 2 && empty === 2) score += 400;

    return score;
  }

  function getWindowScore(col, row, player) {
    let score = 0;
    for (const d of DIRECTIONS) {
      const window = [];
      // Center the window around (col, row) — take up to 4 cells
      // Start from the far end of the window
      for (let i = -3; i <= 3; i++) {
        const c = col + d.dx * i;
        const r = row + d.dy * i;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          window.push(grid[r][c]);
        }
      }
      // Evaluate all overlapping windows of size 4
      if (window.length >= 4) {
        for (let i = 0; i <= window.length - 4; i++) {
          const sub = window.slice(i, i + 4);
          score += evaluateWindow(sub, player);
        }
      }
    }
    return score;
  }

  function getAIScore(player) {
    let score = 0;
    // Center column preference
    const centerCol = Math.floor(COLS / 2);
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (grid[r][c] === player) {
          // Prefer center
          score += (COLS - Math.abs(c - centerCol)) * 3;
          score += getWindowScore(c, r, player);
        }
      }
    }
    return score;
  }

  function getAIMove() {
    let bestScore = -Infinity;
    let bestCol = Math.floor(COLS / 2); // default center

    for (let c = 0; c < COLS; c++) {
      if (!isValidCol(c)) continue;
      const r = getDropRow(c);
      if (r === -1) continue;

      // Temporarily place piece
      grid[r][c] = YELLOW;
      let score = getAIScore(YELLOW) * 2; // offense weight
      grid[r][c] = EMPTY;

      // Also check defense: what would opponent score here?
      grid[r][c] = RED;
      score += getAIScore(RED); // defense weight
      grid[r][c] = EMPTY;

      // Small random factor to add variety
      score += Math.random() * 0.1;

      if (score > bestScore) {
        bestScore = score;
        bestCol = c;
      }
    }

    return bestCol;
  }

  // ============================================================
  // GAME STATE MANAGEMENT
  // ============================================================
  function resetGame() {
    grid = createGrid();
    currentPlayer = RED;
    gameOver = false;
    winner = EMPTY;
    winCells = [];
    winAnimFrame = 0;
    dropping = false;
    aiThinking = false;
    aiTimer = 0;
    hoverCol = -1;
    updateTurnUI();
    statusMsg.textContent = '点击列下落棋子';
    statusMsg.className = 'status-msg';
  }

  function handleDrop(col) {
    if (gameOver || dropping || aiThinking) return;
    if (!isValidCol(col)) return;

    // Player drop
    const row = getDropRow(col);
    if (row === -1) return;

    // Start drop animation
    dropping = true;
    dropCol = col;
    dropRow = row;
    dropFrame = 0;
    dropPlayer = RED;
  }

  function finishDrop(col, row, player) {
    grid[row][col] = player;

    // Check win
    const winResult = checkWin(row, col, player);
    if (winResult) {
      winCells = winResult;
      gameOver = true;
      winner = player;
      winAnimFrame = 0;
      if (player === RED) {
        scores.wins++;
        statusMsg.textContent = '你赢了!';
        statusMsg.className = 'status-msg win';
      } else {
        scores.losses++;
        statusMsg.textContent = 'AI 赢了!';
        statusMsg.className = 'status-msg lose';
      }
      saveScores();
      updateScoreUI();
      return;
    }

    // Check draw
    if (isDraw()) {
      gameOver = true;
      winner = 3;
      scores.draws++;
      statusMsg.textContent = '平局!';
      statusMsg.className = 'status-msg draw';
      saveScores();
      updateScoreUI();
      return;
    }

    // Switch turns
    currentPlayer = (player === RED) ? YELLOW : RED;
    updateTurnUI();

    if (currentPlayer === YELLOW && !gameOver) {
      aiThinking = true;
      aiTimer = 30; // slight delay so player sees their move land
    }
  }

  function doAIMove() {
    if (gameOver) return;
    const col = getAIMove();
    if (col === -1 || !isValidCol(col)) return;

    const row = getDropRow(col);
    if (row === -1) return;

    dropping = true;
    dropCol = col;
    dropRow = row;
    dropFrame = 0;
    dropPlayer = YELLOW;
    aiThinking = false;
  }

  // ============================================================
  // UI UPDATES
  // ============================================================
  function updateTurnUI() {
    if (gameOver) return;
    if (currentPlayer === RED) {
      turnDisplay.textContent = '红方回合';
      turnDisplay.className = 'turn-display active-red';
    } else {
      turnDisplay.textContent = 'AI 思考中...';
      turnDisplay.className = 'turn-display active-yellow';
    }
  }

  // ============================================================
  // DRAWING
  // ============================================================
  function draw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Background
    ctx.fillStyle = '#0984e3';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Draw column indicators (arrows)
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (let c = 0; c < COLS; c++) {
      const cx = GRID_LEFT + c * CELL_SIZE + CELL_SIZE / 2;
      const cy = GRID_TOP / 2;

      // Hover highlight
      if (c === hoverCol && !gameOver && !dropping && isValidCol(c)) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(cx, cy, CELL_SIZE / 2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
      }

      ctx.fillText('▼', cx, cy + 2);
    }

    // Draw grid background
    const gridW = COLS * CELL_SIZE;
    const gridH = ROWS * CELL_SIZE;
    ctx.fillStyle = '#0652DD';
    ctx.beginPath();
    ctx.roundRect(GRID_LEFT, GRID_TOP, gridW, gridH, 8);
    ctx.fill();

    // Draw cells (holes)
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cx = GRID_LEFT + c * CELL_SIZE + CELL_SIZE / 2;
        const cy = GRID_TOP + r * CELL_SIZE + CELL_SIZE / 2;
        const radius = CELL_SIZE / 2 - 5;

        // Hole background
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();

        // Piece
        if (grid[r][c] === RED) {
          drawPiece(cx, cy, radius, '#d63031', '#ff7675', false);
        } else if (grid[r][c] === YELLOW) {
          drawPiece(cx, cy, radius, '#f39c12', '#ffeaa7', false);
        }

        // Dropping piece
        if (dropping && c === dropCol && r <= dropRow) {
          // Calculate position for the dropping piece
          const targetY = GRID_TOP + dropRow * CELL_SIZE + CELL_SIZE / 2;
          const startY = GRID_TOP - CELL_SIZE;
          const progress = dropFrame / ANIM_FRAMES;
          const easeProgress = progress * progress; // ease-in
          const py = startY + (targetY - startY) * easeProgress;

          // Only draw if the piece's current position overlaps this row
          const rowCenterY = GRID_TOP + r * CELL_SIZE + CELL_SIZE / 2;
          const pieceTop = py - radius - 2;
          const pieceBottom = py + radius + 2;

          if (rowCenterY >= pieceTop && rowCenterY <= pieceBottom && r <= dropRow) {
            // Clear the underlying piece for rows above current drop position
            // (it was placed early for animation)
            // Actually, we draw dropping piece separately, and only commit at end
            // Clear the cell hole first so the dropping piece shows
            if (r < dropRow) {
              // The piece is above the target, don't draw the actual committed piece yet
              ctx.fillStyle = '#1a1a2e';
              ctx.beginPath();
              ctx.arc(cx, cy, radius, 0, Math.PI * 2);
              ctx.fill();
            }

            const color = dropPlayer === RED ? '#d63031' : '#f39c12';
            const highlight = dropPlayer === RED ? '#ff7675' : '#ffeaa7';
            drawPiece(cx, py, radius, color, highlight, true);
          }
        }
      }
    }

    // Win line animation
    if (winCells.length > 0) {
      winAnimFrame++;
      for (const cell of winCells) {
        const cx = GRID_LEFT + cell.col * CELL_SIZE + CELL_SIZE / 2;
        const cy = GRID_TOP + cell.row * CELL_SIZE + CELL_SIZE / 2;
        const radius = CELL_SIZE / 2 - 5;
        const pulse = Math.sin(winAnimFrame * 0.15) * 0.3 + 0.7;
        ctx.strokeStyle = `rgba(255, 255, 255, ${pulse})`;
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }

    // Game over overlay
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)';
      ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      let msg = '';
      let color = '#fff';
      if (winner === RED) { msg = '你赢了!'; color = '#ff7675'; }
      else if (winner === YELLOW) { msg = 'AI 赢了!'; color = '#ffeaa7'; }
      else if (winner === 3) { msg = '平局!'; color = '#dfe6e9'; }

      ctx.fillStyle = color;
      ctx.font = 'bold 36px sans-serif';
      ctx.fillText(msg, CANVAS_W / 2, CANVAS_H / 2 - 10);

      ctx.fillStyle = '#dfe6e9';
      ctx.font = '16px sans-serif';
      ctx.fillText('点击"重新开始"再来一局', CANVAS_W / 2, CANVAS_H / 2 + 40);
    }
  }

  function drawPiece(cx, cy, radius, color, highlight, glowing) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 2, radius, 0, Math.PI * 2);
    ctx.fill();

    // Main body
    const grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius);
    grad.addColorStop(0, highlight);
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Glow for dropping piece
    if (glowing) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Border
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx - radius * 0.25, cy - radius * 0.25, radius * 0.35, radius * 0.2, -0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ============================================================
  // GAME LOOP
  // ============================================================
  function gameLoop() {
    // Handle drop animation
    if (dropping) {
      dropFrame++;
      if (dropFrame >= ANIM_FRAMES) {
        // Commit the drop
        dropping = false;
        finishDrop(dropCol, dropRow, dropPlayer);
      }
    }

    // Handle AI thinking delay
    if (aiThinking) {
      aiTimer--;
      if (aiTimer <= 0) {
        doAIMove();
      }
    }

    draw();
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // INPUT HANDLING
  // ============================================================
  function getColumnFromCanvas(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const x = (clientX - rect.left) * scaleX;
    const y = (clientY - rect.top) * scaleY;

    if (y < GRID_TOP || y > GRID_TOP + ROWS * CELL_SIZE) return -1;
    const col = Math.floor((x - GRID_LEFT) / CELL_SIZE);
    if (col < 0 || col >= COLS) return -1;
    return col;
  }

  canvas.addEventListener('mousemove', (e) => {
    const col = getColumnFromCanvas(e.clientX, e.clientY);
    hoverCol = col;
  });

  canvas.addEventListener('mouseleave', () => {
    hoverCol = -1;
  });

  canvas.addEventListener('click', (e) => {
    const col = getColumnFromCanvas(e.clientX, e.clientY);
    if (col >= 0) {
      handleDrop(col);
    }
  });

  // Touch support
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const col = getColumnFromCanvas(t.clientX, t.clientY);
    if (col >= 0) {
      handleDrop(col);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    const t = e.touches[0];
    const col = getColumnFromCanvas(t.clientX, t.clientY);
    hoverCol = col;
  }, { passive: false });

  canvas.addEventListener('touchend', (e) => {
    hoverCol = -1;
  });

  // Keyboard: number keys 1-7 for columns
  document.addEventListener('keydown', (e) => {
    if (e.key >= '1' && e.key <= '7') {
      const col = parseInt(e.key, 10) - 1;
      handleDrop(col);
    }
    if (e.key === 'r' || e.key === 'R') {
      resetGame();
    }
  });

  // ============================================================
  // BUTTONS
  // ============================================================
  restartBtn.addEventListener('click', resetGame);
  resetScoresBtn.addEventListener('click', () => {
    scores = { wins: 0, losses: 0, draws: 0 };
    saveScores();
    updateScoreUI();
    resetGame();
  });

  // ============================================================
  // RESPONSIVE
  // ============================================================
  function resizeCanvas() {
    const container = canvas.parentElement;
    const maxW = container.clientWidth;
    if (maxW < 420) {
      canvas.style.width = maxW + 'px';
      canvas.style.height = (maxW * 440 / 420) + 'px';
    } else {
      canvas.style.width = '420px';
      canvas.style.height = '440px';
    }
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============================================================
  // POLYFILL roundRect if needed
  // ============================================================
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w / 2) r = w / 2;
      if (r > h / 2) r = h / 2;
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      return this;
    };
  }

  // ============================================================
  // START
  // ============================================================
  resetGame();
  updateScoreUI();
  gameLoop();

})();
</script>
