<!DOCTYPE html>
<html lang="zh-CN" data-game-id="connect-four">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>四子棋</title>
<link rel="stylesheet" href="framework.css">
<style>
  .turn-display {
    font-size: 15px;
    color: var(--text-muted);
    padding: 4px 12px;
    border-radius: var(--radius-md);
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    font-weight: 600;
    white-space: nowrap;
  }
  .turn-display.active-red { background: #ff7675; color: #fff; }
  .turn-display.active-yellow { background: #fdcb6e; color: #2d3436; }

  canvas.fw-canvas {
    display: block;
    cursor: pointer;
    margin: 0 auto;
  }

  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    padding: 0 4px;
    margin-top: 8px;
  }
  .status-msg {
    font-size: 14px;
    font-weight: 600;
    color: var(--text-primary);
  }
  .status-msg.win { color: var(--accent-1); }
  .status-msg.draw { color: var(--text-muted); }
  .status-msg.lose { color: var(--accent-4); }

  @media (max-width: 440px) {
    canvas.fw-canvas { width: 100%; height: auto; aspect-ratio: 420/440; }
  }
</style>
</head>
<body>
<div class="fw-container fw-cat-board">
  <div class="fw-header">
    <h1 class="fw-title">四子棋</h1>
    <div class="turn-display" id="turnDisplay">红方回合</div>
  </div>
  <canvas id="gameCanvas" class="fw-canvas" width="420" height="440"></canvas>
  <div class="info-bar">
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">胜</div><div class="fw-score-value" id="winsDisplay">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">负</div><div class="fw-score-value" id="lossesDisplay">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">平</div><div class="fw-score-value" id="drawsDisplay">0</div></div>
    </div>
    <div class="status-msg" id="statusMsg">点击列下落棋子</div>
  </div>
  <div class="fw-controls-row" style="margin-top:8px;">
    <button class="fw-btn fw-btn-primary" id="restartBtn">重新开始</button>
    <button class="fw-btn fw-btn-ghost" id="resetScoresBtn">重置分数</button>
  </div>
</div>
<div class="fw-overlay" id="gameOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="overlayTitle">游戏结束</div>
    <div class="fw-overlay-text" id="overlayText"></div>
    <button class="fw-btn fw-btn-primary" id="overlayRestartBtn">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  'use strict';

  var FW = window.GameFramework;

  // ============================================================
  // CONSTANTS
  // ============================================================
  var COLS = 7;
  var ROWS = 6;
  var CANVAS_W = 420;
  var CANVAS_H = 440;
  var HEADER_H = 40; // top space for column indicators
  var CELL_SIZE = (CANVAS_H - HEADER_H) / ROWS; // ~66.67
  var GRID_LEFT = (CANVAS_W - COLS * CELL_SIZE) / 2;
  var GRID_TOP = HEADER_H;
  var EMPTY = 0;
  var RED = 1;     // player
  var YELLOW = 2;  // AI
  var ANIM_FRAMES = 20; // frames for piece drop animation

  // Win directions
  var DIRECTIONS = [
    { dx: 1, dy: 0 },  // horizontal
    { dx: 0, dy: 1 },  // vertical
    { dx: 1, dy: 1 },  // diagonal down-right
    { dx: 1, dy: -1 }, // diagonal up-right
  ];

  // ============================================================
  // DOM REFERENCES
  // ============================================================
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var turnDisplay = document.getElementById('turnDisplay');
  var statusMsg = document.getElementById('statusMsg');
  var winsSpan = document.getElementById('winsDisplay');
  var lossesSpan = document.getElementById('lossesDisplay');
  var drawsSpan = document.getElementById('drawsDisplay');
  var restartBtn = document.getElementById('restartBtn');
  var resetScoresBtn = document.getElementById('resetScoresBtn');
  var overlay = document.getElementById('gameOverlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlayText = document.getElementById('overlayText');
  var overlayRestartBtn = document.getElementById('overlayRestartBtn');

  // ============================================================
  // GAME STATE
  // ============================================================
  var grid = [];
  var currentPlayer = RED; // RED starts
  var gameOver = false;
  var winner = EMPTY; // EMPTY = ongoing, RED = player win, YELLOW = AI win, 3 = draw
  var scores = loadScores();
  var winCells = []; // array of {col, row} for winning line
  var winAnimFrame = 0;

  // Animation state
  var dropping = false;
  var dropCol = -1;
  var dropRow = -1;
  var dropFrame = 0;
  var dropPlayer = RED;

  // Hover
  var hoverCol = -1;

  // AI thinking delay
  var aiThinking = false;
  var aiTimer = 0;

  // ============================================================
  // SCORES
  // ============================================================
  function loadScores() {
    return FW.storage.load('scores', { wins: 0, losses: 0, draws: 0 });
  }

  function saveScores() {
    FW.storage.save('scores', scores);
  }

  function updateScoreUI() {
    winsSpan.textContent = scores.wins;
    lossesSpan.textContent = scores.losses;
    drawsSpan.textContent = scores.draws;
  }

  // ============================================================
  // GRID OPERATIONS
  // ============================================================
  function createGrid() {
    return Array.from({ length: ROWS }, function() {
      return Array(COLS).fill(EMPTY);
    });
  }

  function isValidCol(col) {
    return col >= 0 && col < COLS && grid[0][col] === EMPTY;
  }

  function getDropRow(col) {
    for (var r = ROWS - 1; r >= 0; r--) {
      if (grid[r][col] === EMPTY) return r;
    }
    return -1;
  }

  function dropPiece(col, player) {
    var row = getDropRow(col);
    if (row === -1) return -1;
    grid[row][col] = player;
    return row;
  }

  // ============================================================
  // WIN DETECTION
  // ============================================================
  function checkWin(row, col, player) {
    for (var di = 0; di < DIRECTIONS.length; di++) {
      var d = DIRECTIONS[di];
      var cells = [{ col: col, row: row }];
      // Forward direction
      for (var i = 1; i < 4; i++) {
        var c = col + d.dx * i;
        var r = row + d.dy * i;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
        if (grid[r][c] !== player) break;
        cells.push({ col: c, row: r });
      }
      // Backward direction
      for (var i = 1; i < 4; i++) {
        var c = col - d.dx * i;
        var r = row - d.dy * i;
        if (r < 0 || r >= ROWS || c < 0 || c >= COLS) break;
        if (grid[r][c] !== player) break;
        cells.push({ col: c, row: r });
      }
      if (cells.length >= 4) return cells;
    }
    return null;
  }

  function isDraw() {
    return grid[0].every(function(cell) {
      return cell !== EMPTY;
    });
  }

  // ============================================================
  // AI - SIMPLE HEURISTIC
  // ============================================================
  function evaluateWindow(window, player) {
    var opp = player === YELLOW ? RED : YELLOW;
    var score = 0;
    var count = window.filter(function(c) { return c === player; }).length;
    var empty = window.filter(function(c) { return c === EMPTY; }).length;
    var oppCount = window.filter(function(c) { return c === opp; }).length;

    // Win
    if (count === 4) score += 100000;
    // Block opponent win
    else if (oppCount === 4) score += 90000;
    // 3 in a row with empty cell
    else if (count === 3 && empty === 1) score += 5000;
    // Block opponent 3
    else if (oppCount === 3 && empty === 1) score += 4000;
    // 2 in a row
    else if (count === 2 && empty === 2) score += 500;
    else if (oppCount === 2 && empty === 2) score += 400;

    return score;
  }

  function getWindowScore(col, row, player) {
    var score = 0;
    for (var di = 0; di < DIRECTIONS.length; di++) {
      var d = DIRECTIONS[di];
      var window = [];
      // Center the window around (col, row) — take up to 4 cells
      // Start from the far end of the window
      for (var i = -3; i <= 3; i++) {
        var c = col + d.dx * i;
        var r = row + d.dy * i;
        if (r >= 0 && r < ROWS && c >= 0 && c < COLS) {
          window.push(grid[r][c]);
        }
      }
      // Evaluate all overlapping windows of size 4
      if (window.length >= 4) {
        for (var j = 0; j <= window.length - 4; j++) {
          var sub = window.slice(j, j + 4);
          score += evaluateWindow(sub, player);
        }
      }
    }
    return score;
  }

  function getAIScore(player) {
    var score = 0;
    // Center column preference
    var centerCol = Math.floor(COLS / 2);
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] === player) {
          // Prefer center
          score += (COLS - Math.abs(c - centerCol)) * 3;
          score += getWindowScore(c, r, player);
        }
      }
    }
    return score;
  }

  function getAIMove() {
    var bestScore = -Infinity;
    var bestCol = Math.floor(COLS / 2); // default center

    for (var c = 0; c < COLS; c++) {
      if (!isValidCol(c)) continue;
      var r = getDropRow(c);
      if (r === -1) continue;

      // Temporarily place piece
      grid[r][c] = YELLOW;
      var score = getAIScore(YELLOW) * 2; // offense weight
      grid[r][c] = EMPTY;

      // Also check defense: what would opponent score here?
      grid[r][c] = RED;
      score += getAIScore(RED); // defense weight
      grid[r][c] = EMPTY;

      // Small random factor to add variety
      score += Math.random() * 0.1;

      if (score > bestScore) {
        bestScore = score;
        bestCol = c;
      }
    }

    return bestCol;
  }

  // ============================================================
  // GAME STATE MANAGEMENT
  // ============================================================
  function resetGame() {
    grid = createGrid();
    currentPlayer = RED;
    gameOver = false;
    winner = EMPTY;
    winCells = [];
    winAnimFrame = 0;
    dropping = false;
    aiThinking = false;
    aiTimer = 0;
    hoverCol = -1;
    FW.ui.hideOverlay(overlay);
    updateTurnUI();
    statusMsg.textContent = '点击列下落棋子';
    statusMsg.className = 'status-msg';
  }

  function showGameOverOverlay() {
    var title = '';
    var text = '';
    if (winner === RED) {
      title = '你赢了!';
      text = '恭喜获胜！';
    } else if (winner === YELLOW) {
      title = 'AI 赢了!';
      text = '再接再厉！';
    } else if (winner === 3) {
      title = '平局!';
      text = '势均力敌！';
    }
    overlayTitle.textContent = title;
    overlayText.textContent = text;
    FW.ui.showOverlay(overlay);
  }

  function handleDrop(col) {
    if (gameOver || dropping || aiThinking) return;
    if (!isValidCol(col)) return;

    // Player drop
    var row = getDropRow(col);
    if (row === -1) return;

    FW.audio.sfx('click');

    // Start drop animation
    dropping = true;
    dropCol = col;
    dropRow = row;
    dropFrame = 0;
    dropPlayer = RED;
  }

  function finishDrop(col, row, player) {
    grid[row][col] = player;

    // Check win
    var winResult = checkWin(row, col, player);
    if (winResult) {
      winCells = winResult;
      gameOver = true;
      winner = player;
      winAnimFrame = 0;
      if (player === RED) {
        scores.wins++;
        statusMsg.textContent = '你赢了!';
        statusMsg.className = 'status-msg win';
        FW.audio.sfx('score');
        FW.audio.sfx('win');
        FW.events.reportScore(scores.wins);
        FW.events.reportComplete(scores.wins, { won: true });
      } else {
        scores.losses++;
        statusMsg.textContent = 'AI 赢了!';
        statusMsg.className = 'status-msg lose';
        FW.audio.sfx('gameover');
        FW.events.reportComplete(scores.wins, { won: false });
      }
      saveScores();
      updateScoreUI();
      showGameOverOverlay();
      return;
    }

    // Check draw
    if (isDraw()) {
      gameOver = true;
      winner = 3;
      scores.draws++;
      statusMsg.textContent = '平局!';
      statusMsg.className = 'status-msg draw';
      saveScores();
      updateScoreUI();
      FW.events.reportComplete(scores.wins, { won: false });
      showGameOverOverlay();
      return;
    }

    // Switch turns
    currentPlayer = (player === RED) ? YELLOW : RED;
    updateTurnUI();

    if (currentPlayer === YELLOW && !gameOver) {
      aiThinking = true;
      aiTimer = 30; // slight delay so player sees their move land
    }
  }

  function doAIMove() {
    if (gameOver) return;
    var col = getAIMove();
    if (col === -1 || !isValidCol(col)) return;

    var row = getDropRow(col);
    if (row === -1) return;

    dropping = true;
    dropCol = col;
    dropRow = row;
    dropFrame = 0;
    dropPlayer = YELLOW;
    aiThinking = false;
  }

  // ============================================================
  // UI UPDATES
  // ============================================================
  function updateTurnUI() {
    if (gameOver) return;
    if (currentPlayer === RED) {
      turnDisplay.textContent = '红方回合';
      turnDisplay.className = 'turn-display active-red';
    } else {
      turnDisplay.textContent = 'AI 思考中...';
      turnDisplay.className = 'turn-display active-yellow';
    }
  }

  // ============================================================
  // DRAWING
  // ============================================================
  function draw() {
    ctx.clearRect(0, 0, CANVAS_W, CANVAS_H);

    // Background
    ctx.fillStyle = '#0984e3';
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    // Draw column indicators (arrows)
    ctx.fillStyle = '#ffffff';
    ctx.font = 'bold 22px sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    for (var c = 0; c < COLS; c++) {
      var cx = GRID_LEFT + c * CELL_SIZE + CELL_SIZE / 2;
      var cy = GRID_TOP / 2;

      // Hover highlight
      if (c === hoverCol && !gameOver && !dropping && isValidCol(c)) {
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(cx, cy, CELL_SIZE / 2 - 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#ffffff';
      }

      ctx.fillText('▼', cx, cy + 2);
    }

    // Draw grid background
    var gridW = COLS * CELL_SIZE;
    var gridH = ROWS * CELL_SIZE;
    ctx.fillStyle = '#0652DD';
    ctx.beginPath();
    ctx.roundRect(GRID_LEFT, GRID_TOP, gridW, gridH, 8);
    ctx.fill();

    // Draw cells (holes)
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var cx = GRID_LEFT + c * CELL_SIZE + CELL_SIZE / 2;
        var cy = GRID_TOP + r * CELL_SIZE + CELL_SIZE / 2;
        var radius = CELL_SIZE / 2 - 5;

        // Hole background
        ctx.fillStyle = '#1a1a2e';
        ctx.beginPath();
        ctx.arc(cx, cy, radius, 0, Math.PI * 2);
        ctx.fill();

        // Piece
        if (grid[r][c] === RED) {
          drawPiece(cx, cy, radius, '#d63031', '#ff7675', false);
        } else if (grid[r][c] === YELLOW) {
          drawPiece(cx, cy, radius, '#f39c12', '#ffeaa7', false);
        }

        // Dropping piece
        if (dropping && c === dropCol && r <= dropRow) {
          // Calculate position for the dropping piece
          var targetY = GRID_TOP + dropRow * CELL_SIZE + CELL_SIZE / 2;
          var startY = GRID_TOP - CELL_SIZE;
          var progress = dropFrame / ANIM_FRAMES;
          var easeProgress = progress * progress; // ease-in
          var py = startY + (targetY - startY) * easeProgress;

          // Only draw if the piece's current position overlaps this row
          var rowCenterY = GRID_TOP + r * CELL_SIZE + CELL_SIZE / 2;
          var pieceTop = py - radius - 2;
          var pieceBottom = py + radius + 2;

          if (rowCenterY >= pieceTop && rowCenterY <= pieceBottom && r <= dropRow) {
            // Clear the underlying piece for rows above current drop position
            // (it was placed early for animation)
            // Actually, we draw dropping piece separately, and only commit at end
            // Clear the cell hole first so the dropping piece shows
            if (r < dropRow) {
              // The piece is above the target, don't draw the actual committed piece yet
              ctx.fillStyle = '#1a1a2e';
              ctx.beginPath();
              ctx.arc(cx, cy, radius, 0, Math.PI * 2);
              ctx.fill();
            }

            var color = dropPlayer === RED ? '#d63031' : '#f39c12';
            var highlight = dropPlayer === RED ? '#ff7675' : '#ffeaa7';
            drawPiece(cx, py, radius, color, highlight, true);
          }
        }
      }
    }

    // Win line animation
    if (winCells.length > 0) {
      winAnimFrame++;
      for (var wi = 0; wi < winCells.length; wi++) {
        var cell = winCells[wi];
        var cx = GRID_LEFT + cell.col * CELL_SIZE + CELL_SIZE / 2;
        var cy = GRID_TOP + cell.row * CELL_SIZE + CELL_SIZE / 2;
        var radius = CELL_SIZE / 2 - 5;
        var pulse = Math.sin(winAnimFrame * 0.15) * 0.3 + 0.7;
        ctx.strokeStyle = 'rgba(255, 255, 255, ' + pulse + ')';
        ctx.lineWidth = 4;
        ctx.beginPath();
        ctx.arc(cx, cy, radius + 3, 0, Math.PI * 2);
        ctx.stroke();
      }
    }
  }

  function drawPiece(cx, cy, radius, color, highlight, glowing) {
    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.arc(cx + 2, cy + 2, radius, 0, Math.PI * 2);
    ctx.fill();

    // Main body
    var grad = ctx.createRadialGradient(cx - radius * 0.3, cy - radius * 0.3, radius * 0.1, cx, cy, radius);
    grad.addColorStop(0, highlight);
    grad.addColorStop(1, color);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.fill();

    // Glow for dropping piece
    if (glowing) {
      ctx.shadowColor = color;
      ctx.shadowBlur = 15;
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(cx, cy, radius, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }

    // Border
    ctx.strokeStyle = 'rgba(0,0,0,0.15)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
    ctx.stroke();

    // Highlight
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(cx - radius * 0.25, cy - radius * 0.25, radius * 0.35, radius * 0.2, -0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  // ============================================================
  // GAME LOOP
  // ============================================================
  function gameLoop() {
    // Handle drop animation
    if (dropping) {
      dropFrame++;
      if (dropFrame >= ANIM_FRAMES) {
        // Commit the drop
        dropping = false;
        finishDrop(dropCol, dropRow, dropPlayer);
      }
    }

    // Handle AI thinking delay
    if (aiThinking) {
      aiTimer--;
      if (aiTimer <= 0) {
        doAIMove();
      }
    }

    draw();
    requestAnimationFrame(gameLoop);
  }

  // ============================================================
  // INPUT HANDLING
  // ============================================================
  function getColumnFromCanvas(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = canvas.width / rect.width;
    var scaleY = canvas.height / rect.height;
    var x = (clientX - rect.left) * scaleX;
    var y = (clientY - rect.top) * scaleY;

    if (y < GRID_TOP || y > GRID_TOP + ROWS * CELL_SIZE) return -1;
    var col = Math.floor((x - GRID_LEFT) / CELL_SIZE);
    if (col < 0 || col >= COLS) return -1;
    return col;
  }

  canvas.addEventListener('mousemove', function(e) {
    var col = getColumnFromCanvas(e.clientX, e.clientY);
    hoverCol = col;
  });

  canvas.addEventListener('mouseleave', function() {
    hoverCol = -1;
  });

  canvas.addEventListener('click', function(e) {
    var col = getColumnFromCanvas(e.clientX, e.clientY);
    if (col >= 0) {
      handleDrop(col);
    }
  });

  // Touch support
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    var col = getColumnFromCanvas(t.clientX, t.clientY);
    if (col >= 0) {
      handleDrop(col);
    }
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var t = e.touches[0];
    var col = getColumnFromCanvas(t.clientX, t.clientY);
    hoverCol = col;
  }, { passive: false });

  canvas.addEventListener('touchend', function(e) {
    hoverCol = -1;
  });

  // Keyboard: number keys 1-7 for columns
  document.addEventListener('keydown', function(e) {
    if (e.key >= '1' && e.key <= '7') {
      var col = parseInt(e.key, 10) - 1;
      handleDrop(col);
    }
    if (e.key === 'r' || e.key === 'R') {
      resetGame();
    }
  });

  // ============================================================
  // BUTTONS
  // ============================================================
  restartBtn.addEventListener('click', resetGame);
  overlayRestartBtn.addEventListener('click', resetGame);
  resetScoresBtn.addEventListener('click', function() {
    scores = { wins: 0, losses: 0, draws: 0 };
    saveScores();
    updateScoreUI();
    resetGame();
  });

  // ============================================================
  // RESPONSIVE
  // ============================================================
  function resizeCanvas() {
    var container = canvas.parentElement;
    var maxW = container.clientWidth;
    if (maxW < 420) {
      canvas.style.width = maxW + 'px';
      canvas.style.height = (maxW * 440 / 420) + 'px';
    } else {
      canvas.style.width = '420px';
      canvas.style.height = '440px';
    }
  }
  window.addEventListener('resize', resizeCanvas);
  resizeCanvas();

  // ============================================================
  // POLYFILL roundRect if needed
  // ============================================================
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w / 2) r = w / 2;
      if (r > h / 2) r = h / 2;
      this.moveTo(x + r, y);
      this.arcTo(x + w, y, x + w, y + h, r);
      this.arcTo(x + w, y + h, x, y + h, r);
      this.arcTo(x, y + h, x, y, r);
      this.arcTo(x, y, x + w, y, r);
      return this;
    };
  }

  // ============================================================
  // START
  // ============================================================
  resetGame();
  updateScoreUI();
  gameLoop();

})();
</script>
</body>
</html>
