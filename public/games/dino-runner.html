<!DOCTYPE html>
<html lang="zh-CN" data-game-id="dino-runner">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>恐龙快跑</title>
<link rel="stylesheet" href="framework.css">
<style>
  #gameCanvas {
    display: block; width: 100%; aspect-ratio: 5/3; max-height: 70vh;
    margin: 0 auto; border-radius: var(--radius-lg); background: var(--game-bg);
  }
</style>
</head>
<body>
<div class="fw-container fw-cat-action">
  <div class="fw-header">
    <h1 class="fw-title">恐龙快跑</h1>
    <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div></div>
  </div>
  <canvas id="gameCanvas" width="500" height="300"></canvas>
  <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
    <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
    <button class="fw-btn fw-btn-ghost" id="resetBtn">重置</button>
  </div>
  <div class="fw-status" style="margin-top:4px;">最高分：<span id="highScore">0</span></div>
  <div class="fw-status">按空格键 / 点击跳跃</div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const highScoreEl = document.getElementById('highScore');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');

  const W = 500, H = 300, GROUND_Y = 260;
  const GRAVITY = 0.6, JUMP_FORCE = -12;

  let dino, obstacles, particles, groundOffset;
  let gameRunning, gameStarted, gameOver;
  let score, speed, frameCount;
  let animationId, spawnTimer;

  highScoreEl.textContent = FW.storage.getHighScore();

  function init() {
    dino = { x: 60, y: GROUND_Y, w: 28, h: 36, vy: 0, jumping: false, legFrame: 0 };
    obstacles = []; particles = [];
    groundOffset = 0; score = 0; speed = 5; frameCount = 0; spawnTimer = 0;
    gameRunning = false; gameStarted = false; gameOver = false;
    scoreEl.textContent = '0'; highScoreEl.textContent = FW.storage.getHighScore();
    startBtn.textContent = '开始游戏'; draw();
  }

  function startGame() {
    if (gameOver || gameStarted) { init(); }
    gameStarted = true; gameRunning = true; gameOver = false;
    startBtn.textContent = '游戏中';
    if (animationId) cancelAnimationFrame(animationId); loop();
  }

  function jump() {
    if (!gameRunning) return;
    if (dino.y >= GROUND_Y - 1) { dino.vy = JUMP_FORCE; dino.jumping = true; FW.audio.sfx('click'); }
  }

  function spawnObstacle() {
    var types = ['cactus-small', 'cactus-tall', 'cactus-group'];
    var type = types[Math.floor(Math.random() * 3)];
    var w, h;
    if (type === 'cactus-small') { w = 16; h = 28; }
    else if (type === 'cactus-tall') { w = 14; h = 40; }
    else { w = 32; h = 28; }
    obstacles.push({ x: W + 20, y: GROUND_Y - h, w: w, h: h, type: type });
  }

  function spawnParticles() {
    if (frameCount % 3 === 0) {
      particles.push({ x: dino.x + 5, y: GROUND_Y + 2, vx: -Math.random() * 2 - 1, vy: -Math.random() * 2, life: 20 + Math.random() * 15, maxLife: 35 });
    }
  }

  function loop() {
    if (!gameRunning) return;
    frameCount++;
    if (frameCount % 100 === 0 && speed < 15) speed += 0.3;
    if (frameCount % 5 === 0) { score++; scoreEl.textContent = score; }
    groundOffset = (groundOffset + speed) % 20;
    dino.vy += GRAVITY; dino.y += dino.vy;
    if (dino.y >= GROUND_Y) { dino.y = GROUND_Y; dino.vy = 0; dino.jumping = false; }
    if (!dino.jumping) dino.legFrame = (dino.legFrame + 0.15) % 1;
    spawnTimer += speed;
    var spawnThreshold = Math.max(80, 160 - speed * 3);
    if (spawnTimer > spawnThreshold) {
      var canSpawn = true;
      for (var i = 0; i < obstacles.length; i++) { if (obstacles[i].x > W * 0.5) { canSpawn = false; break; } }
      if (canSpawn && Math.random() < 0.7) spawnObstacle();
      spawnTimer = 0;
    }
    for (var i = obstacles.length - 1; i >= 0; i--) {
      obstacles[i].x -= speed;
      if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
    }
    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i];
      var margin = 4;
      if (dino.x + margin < obs.x + obs.w - margin && dino.x + dino.w - margin > obs.x + margin && dino.y + margin < obs.y + obs.h - margin && dino.y + dino.h - margin > obs.y + margin) {
        gameRunning = false; gameOver = true;
        var isNew = FW.storage.setHighScore(score);
        highScoreEl.textContent = FW.storage.getHighScore();
        if (isNew) FW.audio.sfx('win'); else FW.audio.sfx('gameover');
        startBtn.textContent = '游戏结束';
        FW.events.reportComplete(score, { won: false });
        draw(); return;
      }
    }
    if (!dino.jumping) spawnParticles();
    for (var i = particles.length - 1; i >= 0; i--) {
      var p = particles[i]; p.x += p.vx; p.y += p.vy; p.life--;
      if (p.life <= 0) particles.splice(i, 1);
    }
    draw();
    animationId = requestAnimationFrame(loop);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    var skyGrad = ctx.createLinearGradient(0, 0, 0, H);
    skyGrad.addColorStop(0, '#0f3460'); skyGrad.addColorStop(1, '#1a1a2e');
    ctx.fillStyle = skyGrad; ctx.fillRect(0, 0, W, H);
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    var stars = [[30,20],[90,40],[150,15],[210,50],[280,25],[340,45],[400,18],[460,35],[130,60],[370,55]];
    for (var i = 0; i < stars.length; i++) { ctx.beginPath(); ctx.arc(stars[i][0], stars[i][1], 1.5, 0, Math.PI * 2); ctx.fill(); }
    ctx.fillStyle = '#16213e'; ctx.fillRect(0, GROUND_Y + 4, W, H - GROUND_Y);
    ctx.strokeStyle = '#7c3aed'; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, GROUND_Y);
    for (var i = 0; i < W; i += 20) {
      var x = i - groundOffset; ctx.lineTo(x, GROUND_Y);
      if (x > 0) { ctx.lineTo(x + 10, GROUND_Y - 2); ctx.lineTo(x + 10, GROUND_Y); }
    }
    ctx.stroke();
    ctx.fillStyle = 'rgba(124,58,237,0.3)';
    for (var i = 0; i < W; i += 40) { var x = (i - groundOffset) % (W + 20); ctx.beginPath(); ctx.arc(x, GROUND_Y + 12, 2, 0, Math.PI * 2); ctx.fill(); }
    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i]; ctx.fillStyle = '#4ecca3';
      var x = obs.x, y = obs.y, w = obs.w, h = obs.h;
      if (obs.type === 'cactus-small') { ctx.fillRect(x + 3, y + 6, w - 6, h - 6); ctx.fillRect(x, y + 10, w, 4); ctx.fillRect(x, y + 18, w, 4); }
      else if (obs.type === 'cactus-tall') { ctx.fillRect(x + 3, y, w - 6, h); ctx.fillRect(x, y + 10, w, 4); }
      else { for (var j = 0; j < 3; j++) { var ox = x + j * 11, oy = y + (j % 2) * 4; ctx.fillRect(ox + 2, oy + 6, 7, h - 6); ctx.fillRect(ox - 1, oy + 10, 12, 3); } }
    }
    var dx = dino.x, dy = dino.y;
    ctx.fillStyle = '#e0e0e0';
    ctx.beginPath(); ctx.roundRect(dx + 4, dy + 8, 20, 22, 4); ctx.fill();
    ctx.beginPath(); ctx.ellipse(dx + 22, dy + 8, 12, 10, 0, 0, Math.PI * 2); ctx.fill();
    ctx.fillRect(dx + 18, dy + 12, 16, 6);
    ctx.fillStyle = '#1a1a2e'; ctx.beginPath(); ctx.arc(dx + 26, dy + 6, 2.5, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#fff'; ctx.beginPath(); ctx.arc(dx + 27, dy + 5, 1, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = '#e0e0e0';
    if (dino.jumping) { ctx.fillRect(dx + 6, dy + 28, 6, 6); ctx.fillRect(dx + 16, dy + 28, 6, 6); }
    else { var legSwing = Math.sin(dino.legFrame * Math.PI * 2) * 4; ctx.fillRect(dx + 6, dy + 28 + legSwing * 0.5, 6, 8 - legSwing * 0.3); ctx.fillRect(dx + 16, dy + 28 - legSwing * 0.5, 6, 8 + legSwing * 0.3); }
    ctx.fillStyle = '#ccc'; ctx.fillRect(dx, dy + 12, 6, 4); ctx.fillRect(dx - 3, dy + 10, 5, 3);
    for (var i = 0; i < particles.length; i++) { var p = particles[i]; var a = p.life / p.maxLife; ctx.fillStyle = 'rgba(124,58,237,' + (a * 0.5) + ')'; ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill(); }
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.5)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e86a6a'; ctx.font = 'bold 32px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('游戏结束', W / 2, H / 2 - 15);
      ctx.fillStyle = '#ccc'; ctx.font = '18px sans-serif'; ctx.fillText('分数：' + score, W / 2, H / 2 + 20);
    }
    if (!gameStarted) {
      ctx.fillStyle = 'rgba(0,0,0,0.3)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#7c3aed'; ctx.font = 'bold 24px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('按开始或空格键', W / 2, H / 2);
      ctx.fillStyle = '#7f8c8d'; ctx.font = '16px sans-serif'; ctx.fillText('跳过仙人掌！', W / 2, H / 2 + 30);
    }
  }

  // Keyboard via framework
  FW.input.onKey(function(key, pressed, e) {
    if (!pressed) return;
    if (key === ' ' || e.code === 'Space') {
      e.preventDefault();
      if (!gameRunning && gameOver) { init(); startGame(); }
      else if (!gameStarted) startGame();
      else jump();
    }
    if (key === 'ArrowUp') { e.preventDefault(); if (gameRunning) jump(); }
  });

  canvas.addEventListener('click', function() {
    if (!gameRunning && gameOver) { init(); startGame(); }
    else if (!gameStarted) startGame();
    else jump();
  });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!gameRunning && gameOver) { init(); startGame(); }
    else if (!gameStarted) startGame();
    else jump();
  }, { passive: false });

  startBtn.addEventListener('click', function() {
    if (!gameRunning && gameOver) { init(); startGame(); }
    else if (!gameStarted) startGame();
    else jump();
  });

  resetBtn.addEventListener('click', function() {
    if (animationId) cancelAnimationFrame(animationId);
    gameRunning = false; gameStarted = false; init();
  });

  // roundRect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w / 2) r = w / 2; if (r > h / 2) r = h / 2;
      this.moveTo(x + r, y); this.lineTo(x + w - r, y); this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y); return this;
    };
  }

  init();
  function resizeCanvas() { var c = canvas.parentElement; var w = c.clientWidth; canvas.style.width = w + 'px'; canvas.style.height = (w * 3 / 5) + 'px'; }
  resizeCanvas(); window.addEventListener('resize', resizeCanvas);
})();
</script>
</body>
</html>
