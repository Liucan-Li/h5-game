<!DOCTYPE html>
<html lang="zh-CN" data-game-id="idle-miner">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Idle Miner</title>
<link rel="stylesheet" href="framework.css">
<style>
.gold-display{font-size:1.8em;font-weight:700;color:#f1c40f;margin:8px 0}
.depth-display{font-size:0.9em;color:var(--text-muted);margin-bottom:12px}
.mine-area{background:#2c1810;border-radius:var(--radius-xl);padding:16px;position:relative;min-height:200px;overflow:hidden}
.mine-btn{width:120px;height:120px;border-radius:50%;border:4px solid #8B4513;background:radial-gradient(circle at 35% 35%,#654321,#3e2723);cursor:pointer;font-size:3em;transition:transform 0.1s;touch-action:manipulation;box-shadow:0 4px 20px rgba(0,0,0,0.5);display:block;margin:0 auto}
.mine-btn:active{transform:scale(0.9)}
.workers{margin-top:12px;text-align:left}
.workers h2{font-size:1em;margin-bottom:8px;color:var(--text-primary)}
.worker{display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:6px;cursor:pointer}
.worker.locked{opacity:0.4;cursor:not-allowed}
.worker-name{font-size:0.9em;font-weight:600}.worker-desc{font-size:0.75em;color:var(--text-muted)}
.worker-cost{font-size:0.9em;color:#f1c40f;font-weight:700}.worker-count{font-size:0.75em;color:var(--text-muted)}
@keyframes nugget{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(0.5)}}
.nugget-fly{position:absolute;font-size:1.2em;animation:nugget 0.8s ease-out forwards;pointer-events:none}
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header"><h1 class="fw-title" style="font-size:1.8em;">Idle Miner</h1></div>
  <div class="gold-display" id="goldDisp">🪙 0</div>
  <div class="depth-display" id="depthDisp">深度：0m</div>
  <div class="mine-area" id="mineArea"><button class="mine-btn" id="mineBtn">⛏️</button></div>
  <div class="workers" id="workers"></div>
  <button class="fw-btn fw-btn-ghost" id="resetBtn" style="margin-top:12px;">重新开始</button>
</div>
<script src="framework.js"></script>
<script>
(function(){const FW=window.GameFramework;var gd=document.getElementById('goldDisp'),dd=document.getElementById('depthDisp'),ws=document.getElementById('workers'),ma=document.getElementById('mineArea'),mb=document.getElementById('mineBtn'),rb=document.getElementById('resetBtn');
var WORKERS=[{id:'pick',name:'⛏️ 更好的镐',desc:'每次挖掘 +2 金币',cost:20,goldPerTap:2},{id:'lantern',name:'🏮 矿灯',desc:'每秒 +1 金币',cost:100,gps:1},{id:'cart',name:'🛒 矿车',desc:'每秒 +5 金币',cost:500,gps:5},{id:'drill',name:'🔧 钻机',desc:'每秒 +20 金币',cost:2000,gps:20},{id:'elevator',name:'🛗 矿井电梯',desc:'每秒 +100 金币',cost:10000,gps:100},{id:'dynamite',name:'💥 炸药',desc:'每次挖掘 +50 金币',cost:50000,goldPerTap:50},{id:'laser',name:'🔦 激光钻',desc:'每秒 +500 金币',cost:200000,gps:500}];
var gold=0,depth=0,goldPerTap=1,gps=0,owned={};
function load(){var d=FW.storage.load('im',null);if(d){gold=d.gold||0;depth=d.depth||0;owned=d.owned||{};}recalc();}
function save(){FW.storage.save('im',{gold:gold,depth:depth,owned:owned});}
function recalc(){goldPerTap=1;gps=0;WORKERS.forEach(function(w){var c=owned[w.id]||0;if(w.goldPerTap)goldPerTap+=c*w.goldPerTap;if(w.gps)gps+=c*w.gps;});updateUI();}
function updateUI(){gd.textContent='🪙 '+Math.floor(gold);dd.textContent='深度：'+Math.floor(depth)+'m';renderWorkers();}
function renderWorkers(){ws.innerHTML='<h2>👷 工人</h2>';WORKERS.forEach(function(w){var c=owned[w.id]||0,cost=Math.floor(w.cost*Math.pow(1.2,c));var div=document.createElement('div');div.className='worker'+(gold<cost?' locked':'');div.innerHTML='<div><div class="worker-name">'+w.name+' <span class="worker-count">('+c+')</span></div><div class="worker-desc">'+w.desc+'</div></div><div class="worker-cost">🪙 '+Math.floor(cost)+'</div>';if(gold>=cost){div.addEventListener('click',function(){gold-=cost;owned[w.id]=(owned[w.id]||0)+1;recalc();save();FW.audio.sfx('click');});}ws.appendChild(div);});}
mb.addEventListener('click',function(){gold+=goldPerTap;depth+=goldPerTap;var e=document.createElement('div');e.className='nugget-fly';e.textContent='🪙';e.style.left=(40+Math.random()*40)+'%';e.style.top='50%';ma.appendChild(e);setTimeout(function(){e.remove();},800);updateUI();save();FW.audio.sfx('click');});
setInterval(function(){gold+=gps/10;depth+=gps/100;updateUI();save();},100);
rb.addEventListener('click',function(){gold=0;depth=0;owned={};recalc();save();FW.audio.sfx('select');});
load();})();
</script>
</body>
</html>
