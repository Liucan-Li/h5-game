<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Platform Runner 跑酷</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a14;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    min-height: 100dvh;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    touch-action: manipulation;
  }
  .game-wrapper {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 10px;
    max-width: 500px;
    width: 100%;
  }
  header {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 16px;
    background: #14142a;
    border-radius: 12px;
    border: 1px solid #2a2a4a;
  }
  header h1 { font-size: 18px; font-weight: 700; color: #ff7c4c; }
  .stats { display: flex; gap: 14px; font-size: 13px; color: #aaa; }
  .stats .num { color: #fff; font-weight: 700; }
  .stats .coin-icon { color: #ffd700; }

  canvas {
    display: block;
    background: linear-gradient(180deg, #0f0f24 0%, #1a1a35 60%, #2a1a1a 100%);
    border-radius: 12px;
    border: 2px solid #2a2a4a;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 3 / 2;
    touch-action: none;
  }

  .controls {
    display: flex;
    gap: 8px;
    width: 100%;
  }
  .btn {
    flex: 1;
    padding: 12px;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    touch-action: manipulation;
    transition: transform 0.1s;
  }
  .btn:active { transform: scale(0.96); }
  .btn-start {
    background: linear-gradient(135deg, #ff7c4c, #ff5252);
    color: #fff;
  }
  .btn-start:hover { opacity: 0.9; }
  .btn-reset {
    background: #2a2a4a;
    color: #aaa;
  }

  .mobile-jump {
    display: none;
    width: 100%;
    justify-content: center;
  }
  .mobile-jump-btn {
    width: 100%;
    max-width: 480px;
    padding: 18px;
    border: 2px solid #3a3a5a;
    border-radius: 12px;
    background: #14142a;
    color: #ff7c4c;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    touch-action: manipulation;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 4px;
  }
  .mobile-jump-btn:active {
    background: #2a2a4a;
    border-color: #ff7c4c;
  }

  @media (hover: none) and (pointer: coarse) {
    .mobile-jump { display: flex; }
  }
  @media (max-width: 420px) {
    .game-wrapper { padding: 5px; }
    header h1 { font-size: 15px; }
    .stats { font-size: 11px; gap: 10px; }
  }
</style>
</head>
<body>
<div class="game-wrapper">
  <header>
    <h1>跑酷</h1>
    <div class="stats">
      <span>距离 <span class="num" id="distDisplay">0</span>m</span>
      <span><span class="coin-icon">★</span> <span class="num" id="coinDisplay">0</span></span>
      <span>分数 <span class="num" id="scoreDisplay">0</span></span>
    </div>
  </header>
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div class="controls">
    <button class="btn btn-start" id="startBtn">开始</button>
    <button class="btn btn-reset" id="resetBtn">重置</button>
  </div>
  <div class="mobile-jump">
    <div class="mobile-jump-btn" id="jumpBtn">跳</div>
  </div>
</div>
<script>
(function(){
  'use strict';

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const distDisplay = document.getElementById('distDisplay');
  const coinDisplay = document.getElementById('coinDisplay');
  const scoreDisplay = document.getElementById('scoreDisplay');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const jumpBtn = document.getElementById('jumpBtn');

  const W = 800;
  const H = 500;
  canvas.width = W;
  canvas.height = H;

  // Constants
  const GROUND_Y = H - 60;
  const GROUND_H = 60;
  const GRAVITY = 0.75;
  const JUMP_VEL = -13;
  const PLAYER_W = 32;
  const PLAYER_H = 44;
  const BASE_SPEED = 5;
  const MAX_SPEED = 12;
  const SPEED_INCREASE = 0.003;

  // Game state
  let gameRunning = false;
  let gameOver = false;
  let speed = BASE_SPEED;
  let distance = 0;
  let coins = 0;
  let score = 0;
  let frameCount = 0;

  // Player
  const player = {
    x: 120,
    y: GROUND_Y - PLAYER_H,
    w: PLAYER_W,
    h: PLAYER_H,
    vy: 0,
    grounded: false,
    runFrame: 0,
    runTimer: 0
  };

  // World objects
  let obstacles = [];
  let coinObjects = [];
  let clouds = [];
  let bgBuildings = [];

  // Ground segments (for gaps)
  let groundSegments = [];

  function initBg() {
    clouds = [];
    for (let i = 0; i < 6; i++) {
      clouds.push({
        x: Math.random() * W * 2,
        y: 30 + Math.random() * 120,
        w: 60 + Math.random() * 80,
        speed: 0.2 + Math.random() * 0.3,
        opacity: 0.2 + Math.random() * 0.3
      });
    }
    bgBuildings = [];
    for (let i = 0; i < 12; i++) {
      bgBuildings.push({
        x: i * 200 - 100,
        w: 60 + Math.random() * 100,
        h: 60 + Math.random() * 100,
        color: `hsl(${220 + Math.random() * 30}, 15%, ${12 + Math.random() * 10}%)`
      });
    }
  }

  function initGround() {
    groundSegments = [];
    let x = -200;
    while (x < W * 3) {
      const segW = 80 + Math.random() * 200;
      const gap = Math.random() < 0.15 ? 60 + Math.random() * 80 : 0;
      groundSegments.push({ x, w: segW });
      x += segW + gap;
    }
  }

  function initGame() {
    player.y = GROUND_Y - PLAYER_H;
    player.vy = 0;
    player.grounded = true;
    player.runFrame = 0;
    speed = BASE_SPEED;
    distance = 0;
    coins = 0;
    score = 0;
    frameCount = 0;
    gameOver = false;
    gameRunning = false;
    obstacles = [];
    coinObjects = [];
    initBg();
    initGround();
    distDisplay.textContent = '0';
    coinDisplay.textContent = '0';
    scoreDisplay.textContent = '0';
    startBtn.textContent = '开始';
  }

  function startGame() {
    if (gameRunning) return;
    initGame();
    gameRunning = true;
    gameOver = false;
    startBtn.textContent = '游戏中...';
    startBtn.disabled = true;
  }

  function resetGame() {
    gameRunning = false;
    gameOver = false;
    startBtn.textContent = '开始';
    startBtn.disabled = false;
    initGame();
  }

  function jump() {
    if (!gameRunning || gameOver) return;
    if (!player.grounded) return;
    player.vy = JUMP_VEL;
    player.grounded = false;
  }

  function spawnObstacle() {
    const obstacleX = W + 50;
    if (Math.random() < 0.6) {
      obstacles.push({
        x: obstacleX,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
    } else {
      obstacles.push({
        x: obstacleX,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
      obstacles.push({
        x: obstacleX + 35,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
    }
  }

  function spawnCoin() {
    coinObjects.push({
      x: W + 20,
      y: GROUND_Y - 50 - Math.random() * 120,
      r: 10,
      collected: false,
      bob: Math.random() * Math.PI * 2
    });
  }

  function getGroundAt(x) {
    for (const seg of groundSegments) {
      if (x >= seg.x && x < seg.x + seg.w) {
        return seg;
      }
    }
    return null;
  }

  function update() {
    if (!gameRunning || gameOver) return;
    frameCount++;

    if (speed < MAX_SPEED) {
      speed += SPEED_INCREASE;
    }

    distance += speed * 0.05;
    score = Math.floor(distance) + coins * 50;
    distDisplay.textContent = Math.floor(distance);
    scoreDisplay.textContent = score;

    // Player gravity
    player.vy += GRAVITY;
    player.y += player.vy;

    // Ground collision with gaps
    player.grounded = false;
    const playerFeet = player.y + player.h;
    const groundSeg = getGroundAt(player.x + player.w / 2);
    if (groundSeg && playerFeet >= GROUND_Y && player.vy >= 0) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.grounded = true;
    }

    // Running animation
    if (player.grounded) {
      player.runTimer++;
      if (player.runTimer > 6) {
        player.runTimer = 0;
        player.runFrame = (player.runFrame + 1) % 4;
      }
    }

    // Move obstacles
    for (const obs of obstacles) {
      obs.x -= speed;
    }
    obstacles = obstacles.filter(obs => obs.x > -50);

    // Move coins
    for (const coin of coinObjects) {
      if (!coin.collected) {
        coin.x -= speed;
        coin.bob += 0.05;
      }
    }
    coinObjects = coinObjects.filter(c => c.x > -30 && !c.collected);

    // Spawn obstacles and coins
    if (frameCount % 80 === 0) {
      spawnObstacle();
    }
    if (frameCount % 120 === 0) {
      spawnCoin();
    }
    if (speed > 7 && frameCount % 50 === 0) {
      spawnObstacle();
    }

    // Move ground segments
    for (const seg of groundSegments) {
      seg.x -= speed;
    }
    groundSegments = groundSegments.filter(s => s.x + s.w > -200);
    const lastSeg = groundSegments[groundSegments.length - 1];
    if (!lastSeg || lastSeg.x + lastSeg.w < W + 100) {
      const startX = lastSeg ? lastSeg.x + lastSeg.w : W + 100;
      const segW = 80 + Math.random() * 200;
      const gap = Math.random() < 0.15 ? 60 + Math.random() * 80 : 0;
      groundSegments.push({ x: startX + gap, w: segW });
    }

    // Move clouds
    for (const cloud of clouds) {
      cloud.x -= cloud.speed;
      if (cloud.x + cloud.w < -100) {
        cloud.x = W + 50 + Math.random() * 100;
        cloud.y = 30 + Math.random() * 120;
      }
    }

    // Move buildings
    for (const b of bgBuildings) {
      b.x -= speed * 0.3;
      if (b.x + b.w < -100) {
        b.x = W + 50 + Math.random() * 100;
      }
    }

    // Coin collection
    for (const coin of coinObjects) {
      if (coin.collected) continue;
      const dx = (player.x + player.w / 2) - coin.x;
      const dy = (player.y + player.h / 2) - coin.y;
      if (Math.abs(dx) < coin.r + 12 && Math.abs(dy) < coin.r + 12) {
        coin.collected = true;
        coins++;
        coinDisplay.textContent = coins;
        score += 50;
        scoreDisplay.textContent = score;
      }
    }

    // Obstacle collision
    for (const obs of obstacles) {
      if (
        player.x + player.w > obs.x &&
        player.x < obs.x + obs.w &&
        player.y + player.h > obs.y &&
        player.y < obs.y + obs.h
      ) {
        endGame();
        return;
      }
    }

    // Fall into gap
    if (player.y > H) {
      endGame();
    }
  }

  function endGame() {
    gameOver = true;
    gameRunning = false;
    startBtn.textContent = '再来一局';
    startBtn.disabled = false;
  }

  function drawBackground() {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0f0f24');
    grad.addColorStop(0.4, '#141430');
    grad.addColorStop(0.7, '#1a1a2a');
    grad.addColorStop(1, '#0a0a14');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawClouds() {
    ctx.save();
    for (const c of clouds) {
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
      ctx.arc(c.x + c.w * 0.3, c.y - 5, c.w * 0.2, 0, Math.PI * 2);
      ctx.arc(c.x + c.w * 0.6, c.y, c.w * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBuildings() {
    for (const b of bgBuildings) {
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
      ctx.fillStyle = 'rgba(255,200,100,0.05)';
      for (let wy = GROUND_Y - b.h + 10; wy < GROUND_Y - 10; wy += 20) {
        for (let wx = b.x + 8; wx < b.x + b.w - 8; wx += 18) {
          ctx.fillRect(wx, wy, 8, 12);
        }
      }
    }
  }

  function drawGround() {
    for (const seg of groundSegments) {
      const gx = seg.x;
      const gw = seg.w;
      const grad = ctx.createLinearGradient(gx, GROUND_Y, gx, H);
      grad.addColorStop(0, '#2a2a4a');
      grad.addColorStop(0.05, '#1e1e3a');
      grad.addColorStop(1, '#0f0f1e');
      ctx.fillStyle = grad;
      ctx.fillRect(gx, GROUND_Y, gw, GROUND_H);

      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y);
      ctx.lineTo(gx + gw, GROUND_Y);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (let i = 0; i < gw / 20; i++) {
        ctx.fillRect(gx + i * 20 + 5, GROUND_Y + 15 + (i % 3) * 10, 4, 4);
      }
    }
  }

  function drawPlayer() {
    const px = player.x;
    const py = player.y;

    ctx.save();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(px + PLAYER_W / 2, player.grounded ? py + PLAYER_H : py + PLAYER_H + 5, PLAYER_W / 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body suit
    const bodyColor = player.grounded ? '#ff7c4c' : '#ff5252';
    ctx.fillStyle = bodyColor;
    ctx.shadowColor = '#ff7c4c';
    ctx.shadowBlur = player.grounded ? 0 : 8;

    ctx.beginPath();
    ctx.roundRect(px + 4, py + 10, PLAYER_W - 8, PLAYER_H - 14, 6);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Head
    ctx.fillStyle = '#ffd699';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2, py + 10, 12, 0, Math.PI * 2);
    ctx.fill();

    // Hat
    ctx.fillStyle = '#2a2a4a';
    ctx.beginPath();
    ctx.roundRect(px + PLAYER_W / 2 - 14, py + 2, 28, 6, 3);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2 - 4, py + 9, 2, 0, Math.PI * 2);
    ctx.arc(px + PLAYER_W / 2 + 4, py + 9, 2, 0, Math.PI * 2);
    ctx.fill();

    // Legs animation
    if (player.grounded) {
      const legOffset = Math.sin(player.runFrame * Math.PI / 2) * 4;
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(px + 6, py + PLAYER_H - 8, 7, 8);
      ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 8, 7, 8);
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(px + 5, py + PLAYER_H - 8 + legOffset, 8, 8);
      ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 8 - legOffset, 8, 8);
    } else {
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(px + 4, py + PLAYER_H - 6, 10, 6);
      ctx.fillRect(px + PLAYER_W - 14, py + PLAYER_H - 6, 10, 6);
    }

    ctx.restore();
  }

  function drawObstacles() {
    for (const obs of obstacles) {
      ctx.save();
      const gx = obs.x;
      const gy = obs.y;
      const gw = obs.w;
      const gh = obs.h;

      ctx.shadowColor = '#44ff44';
      ctx.shadowBlur = 4;

      ctx.fillStyle = '#2d8a4e';
      ctx.beginPath();
      ctx.roundRect(gx + 2, gy, gw - 4, gh, 4);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 1;
      for (let i = 0; i < 3; i++) {
        const sy = gy + 6 + i * 9;
        ctx.beginPath();
        ctx.moveTo(gx + gw, sy);
        ctx.lineTo(gx + gw + 6, sy - 3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(gx, sy);
        ctx.lineTo(gx - 6, sy - 3);
        ctx.stroke();
      }

      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.arc(gx + gw / 2, gy + 4, 6, Math.PI, 0);
      ctx.fill();

      ctx.restore();
    }
  }

  function drawCoins() {
    for (const coin of coinObjects) {
      if (coin.collected) continue;
      ctx.save();

      const bobY = Math.sin(coin.bob) * 3;
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 8;

      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y + bobY, coin.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y + bobY, coin.r * 0.65, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffd700';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', coin.x, coin.y + bobY);

      ctx.restore();
    }
  }

  function drawOverlay() {
    if (!gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff7c4c';
    ctx.font = 'bold 48px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('游戏结束', W / 2, H / 2 - 50);

    ctx.fillStyle = '#ddd';
    ctx.font = '24px system-ui, -apple-system, sans-serif';
    ctx.fillText(`分数: ${score}`, W / 2, H / 2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px system-ui, -apple-system, sans-serif';
    ctx.fillText(`距离: ${Math.floor(distance)}m  金币: ${coins}`, W / 2, H / 2 + 50);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawBackground();
    drawClouds();
    drawBuildings();
    drawGround();
    drawCoins();
    drawObstacles();
    drawPlayer();
    drawOverlay();

    if (gameRunning) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '12px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText(`速度 ${speed.toFixed(1)}`, W - 10, 10);
    }
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Input handling
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      e.preventDefault();
      if (!gameRunning && !gameOver) {
        startGame();
        return;
      }
      jump();
    }
  });

  // Canvas click/tap
  canvas.addEventListener('click', (e) => {
    if (!gameRunning && !gameOver) {
      startGame();
      return;
    }
    jump();
  });
  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (!gameRunning && !gameOver) {
      startGame();
      return;
    }
    jump();
  });

  // Buttons
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', (e) => { e.preventDefault(); startGame(); });
  resetBtn.addEventListener('click', resetGame);
  resetBtn.addEventListener('touchstart', (e) => { e.preventDefault(); resetGame(); });
  jumpBtn.addEventListener('click', jump);
  jumpBtn.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); });

  // Init
  initGame();
  gameLoop();
})();
</script>
</body>
</html>
