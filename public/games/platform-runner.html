<!DOCTYPE html>
<html lang="zh-CN" data-game-id="platform-runner">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Platform Runner 跑酷</title>
<link rel="stylesheet" href="framework.css">
<style>
  :root { --game-bg: #0f0f24; }

  canvas {
    display: block;
    background: linear-gradient(180deg, #0f0f24 0%, #1a1a35 60%, #2a1a1a 100%);
    border-radius: var(--radius-lg);
    border: 2px solid #2a2a4a;
    width: 100%;
    max-width: 480px;
    aspect-ratio: 3 / 2;
    touch-action: none;
  }

  .controls {
    display: flex;
    gap: 8px;
    width: 100%;
  }

  .mobile-jump {
    display: none;
    width: 100%;
    justify-content: center;
  }
  .mobile-jump-btn {
    width: 100%;
    max-width: 480px;
    padding: 18px;
    border: 2px solid #3a3a5a;
    border-radius: var(--radius-lg);
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    color: var(--accent-1);
    --accent-1: #f59e0b;
    font-size: 20px;
    font-weight: 700;
    text-align: center;
    touch-action: manipulation;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    letter-spacing: 4px;
  }
  .mobile-jump-btn:active {
    background: var(--bg-card-hover);
    border-color: var(--accent-1);
    --accent-1: #f59e0b;
  }

  @media (hover: none) and (pointer: coarse) {
    .mobile-jump { display: flex; }
  }
  @media (max-width: 420px) {
    .fw-container { padding: 5px; }
    .fw-title { font-size: 1.3em; }
  }
</style>
</head>
<body>
<div class="fw-container">
  <header class="fw-header">
    <h1 class="fw-title">跑酷</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">距离</div>
        <div class="fw-score-value" id="distDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">金币</div>
        <div class="fw-score-value" id="coinDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">分数</div>
        <div class="fw-score-value" id="scoreDisplay">0</div>
      </div>
    </div>
  </header>
  <canvas id="gameCanvas" width="800" height="500"></canvas>
  <div class="controls">
    <button class="fw-btn fw-btn-primary" id="startBtn">开始</button>
    <button class="fw-btn fw-btn-ghost" id="resetBtn">重置</button>
  </div>
  <div class="mobile-jump">
    <div class="mobile-jump-btn" id="jumpBtn">跳</div>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var distDisplay = document.getElementById('distDisplay');
  var coinDisplay = document.getElementById('coinDisplay');
  var scoreDisplay = document.getElementById('scoreDisplay');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');
  var jumpBtn = document.getElementById('jumpBtn');

  var FW = window.GameFramework;

  var W = 800;
  var H = 500;
  canvas.width = W;
  canvas.height = H;

  // Constants
  var GROUND_Y = H - 60;
  var GROUND_H = 60;
  var GRAVITY = 0.75;
  var JUMP_VEL = -13;
  var PLAYER_W = 32;
  var PLAYER_H = 44;
  var BASE_SPEED = 5;
  var MAX_SPEED = 12;
  var SPEED_INCREASE = 0.003;

  // Game state
  var gameRunning = false;
  var gameOver = false;
  var speed = BASE_SPEED;
  var distance = 0;
  var coins = 0;
  var score = 0;
  var highScore = FW.storage.getHighScore();
  var frameCount = 0;
  var newHighScoreAchieved = false;

  // Player
  var player = {
    x: 120,
    y: GROUND_Y - PLAYER_H,
    w: PLAYER_W,
    h: PLAYER_H,
    vy: 0,
    grounded: false,
    runFrame: 0,
    runTimer: 0
  };

  // World objects
  var obstacles = [];
  var coinObjects = [];
  var clouds = [];
  var bgBuildings = [];

  // Ground segments (for gaps)
  var groundSegments = [];

  function initBg() {
    clouds = [];
    for (var i = 0; i < 6; i++) {
      clouds.push({
        x: Math.random() * W * 2,
        y: 30 + Math.random() * 120,
        w: 60 + Math.random() * 80,
        speed: 0.2 + Math.random() * 0.3,
        opacity: 0.2 + Math.random() * 0.3
      });
    }
    bgBuildings = [];
    for (var i = 0; i < 12; i++) {
      bgBuildings.push({
        x: i * 200 - 100,
        w: 60 + Math.random() * 100,
        h: 60 + Math.random() * 100,
        color: 'hsl(' + (220 + Math.random() * 30) + ', 15%, ' + (12 + Math.random() * 10) + '%)'
      });
    }
  }

  function initGround() {
    groundSegments = [];
    var x = -200;
    while (x < W * 3) {
      var segW = 80 + Math.random() * 200;
      var gap = Math.random() < 0.15 ? 60 + Math.random() * 80 : 0;
      groundSegments.push({ x: x, w: segW });
      x += segW + gap;
    }
  }

  function initGame() {
    player.y = GROUND_Y - PLAYER_H;
    player.vy = 0;
    player.grounded = true;
    player.runFrame = 0;
    speed = BASE_SPEED;
    distance = 0;
    coins = 0;
    score = 0;
    frameCount = 0;
    gameOver = false;
    gameRunning = false;
    newHighScoreAchieved = false;
    obstacles = [];
    coinObjects = [];
    initBg();
    initGround();
    distDisplay.textContent = '0';
    coinDisplay.textContent = '0';
    scoreDisplay.textContent = '0';
    startBtn.textContent = '开始';
  }

  function startGame() {
    if (gameRunning) return;
    FW.audio.sfx('click');
    initGame();
    gameRunning = true;
    gameOver = false;
    startBtn.textContent = '游戏中...';
    startBtn.disabled = true;
  }

  function resetGame() {
    FW.audio.sfx('click');
    gameRunning = false;
    gameOver = false;
    startBtn.textContent = '开始';
    startBtn.disabled = false;
    initGame();
  }

  function jump() {
    if (!gameRunning || gameOver) return;
    if (!player.grounded) return;
    player.vy = JUMP_VEL;
    player.grounded = false;
  }

  function spawnObstacle() {
    var obstacleX = W + 50;
    if (Math.random() < 0.6) {
      obstacles.push({
        x: obstacleX,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
    } else {
      obstacles.push({
        x: obstacleX,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
      obstacles.push({
        x: obstacleX + 35,
        y: GROUND_Y - 35,
        w: 20,
        h: 35,
        type: 'cactus'
      });
    }
  }

  function spawnCoin() {
    coinObjects.push({
      x: W + 20,
      y: GROUND_Y - 50 - Math.random() * 120,
      r: 10,
      collected: false,
      bob: Math.random() * Math.PI * 2
    });
  }

  function getGroundAt(x) {
    for (var i = 0; i < groundSegments.length; i++) {
      var seg = groundSegments[i];
      if (x >= seg.x && x < seg.x + seg.w) {
        return seg;
      }
    }
    return null;
  }

  function update() {
    if (!gameRunning || gameOver) return;
    frameCount++;

    if (speed < MAX_SPEED) {
      speed += SPEED_INCREASE;
    }

    distance += speed * 0.05;
    score = Math.floor(distance) + coins * 50;
    distDisplay.textContent = Math.floor(distance);
    scoreDisplay.textContent = score;

    // Player gravity
    player.vy += GRAVITY;
    player.y += player.vy;

    // Ground collision with gaps
    player.grounded = false;
    var playerFeet = player.y + player.h;
    var groundSeg = getGroundAt(player.x + player.w / 2);
    if (groundSeg && playerFeet >= GROUND_Y && player.vy >= 0) {
      player.y = GROUND_Y - player.h;
      player.vy = 0;
      player.grounded = true;
    }

    // Running animation
    if (player.grounded) {
      player.runTimer++;
      if (player.runTimer > 6) {
        player.runTimer = 0;
        player.runFrame = (player.runFrame + 1) % 4;
      }
    }

    // Move obstacles
    for (var i = 0; i < obstacles.length; i++) {
      obstacles[i].x -= speed;
    }
    obstacles = obstacles.filter(function(obs) { return obs.x > -50; });

    // Move coins
    for (var i = 0; i < coinObjects.length; i++) {
      var coin = coinObjects[i];
      if (!coin.collected) {
        coin.x -= speed;
        coin.bob += 0.05;
      }
    }
    coinObjects = coinObjects.filter(function(c) { return c.x > -30 && !c.collected; });

    // Spawn obstacles and coins
    if (frameCount % 80 === 0) {
      spawnObstacle();
    }
    if (frameCount % 120 === 0) {
      spawnCoin();
    }
    if (speed > 7 && frameCount % 50 === 0) {
      spawnObstacle();
    }

    // Move ground segments
    for (var i = 0; i < groundSegments.length; i++) {
      groundSegments[i].x -= speed;
    }
    groundSegments = groundSegments.filter(function(s) { return s.x + s.w > -200; });
    var lastSeg = groundSegments[groundSegments.length - 1];
    if (!lastSeg || lastSeg.x + lastSeg.w < W + 100) {
      var startX = lastSeg ? lastSeg.x + lastSeg.w : W + 100;
      var segW = 80 + Math.random() * 200;
      var gap = Math.random() < 0.15 ? 60 + Math.random() * 80 : 0;
      groundSegments.push({ x: startX + gap, w: segW });
    }

    // Move clouds
    for (var i = 0; i < clouds.length; i++) {
      var cloud = clouds[i];
      cloud.x -= cloud.speed;
      if (cloud.x + cloud.w < -100) {
        cloud.x = W + 50 + Math.random() * 100;
        cloud.y = 30 + Math.random() * 120;
      }
    }

    // Move buildings
    for (var i = 0; i < bgBuildings.length; i++) {
      var b = bgBuildings[i];
      b.x -= speed * 0.3;
      if (b.x + b.w < -100) {
        b.x = W + 50 + Math.random() * 100;
      }
    }

    // Coin collection
    for (var i = 0; i < coinObjects.length; i++) {
      var coin = coinObjects[i];
      if (coin.collected) continue;
      var dx = (player.x + player.w / 2) - coin.x;
      var dy = (player.y + player.h / 2) - coin.y;
      if (Math.abs(dx) < coin.r + 12 && Math.abs(dy) < coin.r + 12) {
        coin.collected = true;
        coins++;
        coinDisplay.textContent = coins;
        score += 50;
        scoreDisplay.textContent = score;
        FW.audio.sfx('score');
        FW.events.reportScore(score);
      }
    }

    // Obstacle collision
    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i];
      if (
        player.x + player.w > obs.x &&
        player.x < obs.x + obs.w &&
        player.y + player.h > obs.y &&
        player.y < obs.y + obs.h
      ) {
        endGame();
        return;
      }
    }

    // Fall into gap
    if (player.y > H) {
      endGame();
    }
  }

  function endGame() {
    gameOver = true;
    gameRunning = false;
    var isNewRecord = FW.storage.setHighScore(score);
    if (isNewRecord) {
      highScore = score;
      newHighScoreAchieved = true;
      FW.audio.sfx('win');
    } else {
      FW.audio.sfx('gameover');
    }
    FW.events.reportScore(score);
    FW.events.reportComplete(score, { won: false });
    startBtn.textContent = '再来一局';
    startBtn.disabled = false;
  }

  function drawBackground() {
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0f0f24');
    grad.addColorStop(0.4, '#141430');
    grad.addColorStop(0.7, '#1a1a2a');
    grad.addColorStop(1, '#0a0a14');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
  }

  function drawClouds() {
    ctx.save();
    for (var i = 0; i < clouds.length; i++) {
      var c = clouds[i];
      ctx.globalAlpha = c.opacity;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.w * 0.25, 0, Math.PI * 2);
      ctx.arc(c.x + c.w * 0.3, c.y - 5, c.w * 0.2, 0, Math.PI * 2);
      ctx.arc(c.x + c.w * 0.6, c.y, c.w * 0.22, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawBuildings() {
    for (var i = 0; i < bgBuildings.length; i++) {
      var b = bgBuildings[i];
      ctx.fillStyle = b.color;
      ctx.fillRect(b.x, GROUND_Y - b.h, b.w, b.h);
      ctx.fillStyle = 'rgba(255,200,100,0.05)';
      for (var wy = GROUND_Y - b.h + 10; wy < GROUND_Y - 10; wy += 20) {
        for (var wx = b.x + 8; wx < b.x + b.w - 8; wx += 18) {
          ctx.fillRect(wx, wy, 8, 12);
        }
      }
    }
  }

  function drawGround() {
    for (var i = 0; i < groundSegments.length; i++) {
      var seg = groundSegments[i];
      var gx = seg.x;
      var gw = seg.w;
      var grad = ctx.createLinearGradient(gx, GROUND_Y, gx, H);
      grad.addColorStop(0, '#2a2a4a');
      grad.addColorStop(0.05, '#1e1e3a');
      grad.addColorStop(1, '#0f0f1e');
      ctx.fillStyle = grad;
      ctx.fillRect(gx, GROUND_Y, gw, GROUND_H);

      ctx.strokeStyle = '#3a3a5a';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(gx, GROUND_Y);
      ctx.lineTo(gx + gw, GROUND_Y);
      ctx.stroke();

      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      for (var j = 0; j < gw / 20; j++) {
        ctx.fillRect(gx + j * 20 + 5, GROUND_Y + 15 + (j % 3) * 10, 4, 4);
      }
    }
  }

  function drawPlayer() {
    var px = player.x;
    var py = player.y;

    ctx.save();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(px + PLAYER_W / 2, player.grounded ? py + PLAYER_H : py + PLAYER_H + 5, PLAYER_W / 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body suit
    var bodyColor = player.grounded ? '#ff7c4c' : '#ff5252';
    ctx.fillStyle = bodyColor;
    ctx.shadowColor = '#ff7c4c';
    ctx.shadowBlur = player.grounded ? 0 : 8;

    ctx.beginPath();
    ctx.roundRect(px + 4, py + 10, PLAYER_W - 8, PLAYER_H - 14, 6);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Head
    ctx.fillStyle = '#ffd699';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2, py + 10, 12, 0, Math.PI * 2);
    ctx.fill();

    // Hat
    ctx.fillStyle = '#2a2a4a';
    ctx.beginPath();
    ctx.roundRect(px + PLAYER_W / 2 - 14, py + 2, 28, 6, 3);
    ctx.fill();

    // Eyes
    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2 - 4, py + 9, 2, 0, Math.PI * 2);
    ctx.arc(px + PLAYER_W / 2 + 4, py + 9, 2, 0, Math.PI * 2);
    ctx.fill();

    // Legs animation
    if (player.grounded) {
      var legOffset = Math.sin(player.runFrame * Math.PI / 2) * 4;
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(px + 6, py + PLAYER_H - 8, 7, 8);
      ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 8, 7, 8);
      ctx.fillStyle = '#2a2a4a';
      ctx.fillRect(px + 5, py + PLAYER_H - 8 + legOffset, 8, 8);
      ctx.fillRect(px + PLAYER_W - 13, py + PLAYER_H - 8 - legOffset, 8, 8);
    } else {
      ctx.fillStyle = '#1a1a3a';
      ctx.fillRect(px + 4, py + PLAYER_H - 6, 10, 6);
      ctx.fillRect(px + PLAYER_W - 14, py + PLAYER_H - 6, 10, 6);
    }

    ctx.restore();
  }

  function drawObstacles() {
    for (var i = 0; i < obstacles.length; i++) {
      var obs = obstacles[i];
      ctx.save();
      var gx = obs.x;
      var gy = obs.y;
      var gw = obs.w;
      var gh = obs.h;

      ctx.shadowColor = '#44ff44';
      ctx.shadowBlur = 4;

      ctx.fillStyle = '#2d8a4e';
      ctx.beginPath();
      ctx.roundRect(gx + 2, gy, gw - 4, gh, 4);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 1;
      for (var j = 0; j < 3; j++) {
        var sy = gy + 6 + j * 9;
        ctx.beginPath();
        ctx.moveTo(gx + gw, sy);
        ctx.lineTo(gx + gw + 6, sy - 3);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(gx, sy);
        ctx.lineTo(gx - 6, sy - 3);
        ctx.stroke();
      }

      ctx.fillStyle = '#4caf50';
      ctx.beginPath();
      ctx.arc(gx + gw / 2, gy + 4, 6, Math.PI, 0);
      ctx.fill();

      ctx.restore();
    }
  }

  function drawCoins() {
    for (var i = 0; i < coinObjects.length; i++) {
      var coin = coinObjects[i];
      if (coin.collected) continue;
      ctx.save();

      var bobY = Math.sin(coin.bob) * 3;
      ctx.shadowColor = '#ffd700';
      ctx.shadowBlur = 8;

      ctx.fillStyle = '#ffd700';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y + bobY, coin.r, 0, Math.PI * 2);
      ctx.fill();

      ctx.shadowBlur = 0;

      ctx.fillStyle = '#ffaa00';
      ctx.beginPath();
      ctx.arc(coin.x, coin.y + bobY, coin.r * 0.65, 0, Math.PI * 2);
      ctx.fill();

      ctx.fillStyle = '#ffd700';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('★', coin.x, coin.y + bobY);

      ctx.restore();
    }
  }

  function drawOverlay() {
    if (!gameOver) return;

    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff7c4c';
    ctx.font = 'bold 48px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('游戏结束', W / 2, H / 2 - 50);

    ctx.fillStyle = '#ddd';
    ctx.font = '24px system-ui, -apple-system, sans-serif';
    ctx.fillText('分数: ' + score, W / 2, H / 2 + 10);
    ctx.fillStyle = '#aaa';
    ctx.font = '16px system-ui, -apple-system, sans-serif';
    ctx.fillText('距离: ' + Math.floor(distance) + 'm  金币: ' + coins, W / 2, H / 2 + 50);
    ctx.fillStyle = '#888';
    ctx.font = '16px system-ui, -apple-system, sans-serif';
    ctx.fillText('最高分: ' + highScore, W / 2, H / 2 + 78);

    if (newHighScoreAchieved) {
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 20px system-ui, -apple-system, sans-serif';
      ctx.fillText('★ 新纪录! ★', W / 2, H / 2 + 105);
    }
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawBackground();
    drawClouds();
    drawBuildings();
    drawGround();
    drawCoins();
    drawObstacles();
    drawPlayer();
    drawOverlay();

    if (gameRunning) {
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.font = '12px system-ui, -apple-system, sans-serif';
      ctx.textAlign = 'right';
      ctx.textBaseline = 'top';
      ctx.fillText('速度 ' + speed.toFixed(1), W - 10, 10);
    }
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Input handling
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowUp' || e.key === 'w' || e.key === 'W') {
      e.preventDefault();
      if (!gameRunning && !gameOver) {
        startGame();
        return;
      }
      jump();
    }
  });

  // Canvas click/tap
  canvas.addEventListener('click', function(e) {
    if (!gameRunning && !gameOver) {
      startGame();
      return;
    }
    jump();
  });
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (!gameRunning && !gameOver) {
      startGame();
      return;
    }
    jump();
  });

  // Buttons
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startGame(); });
  resetBtn.addEventListener('click', resetGame);
  resetBtn.addEventListener('touchstart', function(e) { e.preventDefault(); resetGame(); });
  jumpBtn.addEventListener('click', jump);
  jumpBtn.addEventListener('touchstart', function(e) { e.preventDefault(); jump(); });

  // Init
  initGame();
  gameLoop();
})();
</script>
</body>
</html>
