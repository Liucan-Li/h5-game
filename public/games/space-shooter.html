<!DOCTYPE html>
<html lang="zh-CN" data-game-id="space-shooter">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>太空射击</title>
<link rel="stylesheet" href="framework.css">
<style>
  .fw-container { max-width: 440px; }

  .fw-game-area .fw-overlay {
    position: absolute;
    inset: 0;
    border-radius: var(--radius-lg);
  }

  .fw-overlay-score {
    font-size: 32px;
    font-weight: 700;
    color: #ffd93d;
    margin: 8px 0;
  }

  .fw-overlay-record {
    font-size: 14px;
    color: var(--accent-3);
    margin-top: 4px;
  }

  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    gap: 8px;
  }

  .lives-badge {
    display: inline-flex;
    align-items: center;
    background: var(--glass-bg);
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border);
    padding: 6px 12px;
    border-radius: var(--radius-md);
    font-size: 1em;
    color: #ff4466;
    white-space: nowrap;
    gap: 4px;
  }

  .lives-badge .fw-score-label {
    color: var(--text-muted);
    margin-right: 4px;
  }

  .heart { color: #ff4466; }

  .winner-text {
    color: var(--accent-1);
  }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <div class="fw-title">太空射击</div>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">分数</div>
        <div class="fw-score-value" id="scoreDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">最高</div>
        <div class="fw-score-value" id="hiDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">关卡</div>
        <div class="fw-score-value" id="levelDisplay">1</div>
      </div>
      <span class="lives-badge" id="livesDisplay">
        <span class="fw-score-label">命</span>
        <span>❤ ❤ ❤</span>
      </span>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas id="gameCanvas" class="fw-canvas" width="400" height="600"></canvas>
    <!-- Start overlay -->
    <div class="fw-overlay" id="startOverlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title">太空射击</div>
        <div class="fw-overlay-text">消灭敌人，升级火力<br>你能撑多久？</div>
        <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
      </div>
    </div>
    <!-- End overlay -->
    <div class="fw-overlay" id="endOverlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title">游戏结束</div>
        <div class="fw-overlay-score" id="finalScore">0</div>
        <div class="fw-overlay-record" id="highScoreText">最高分: 0</div>
        <div class="fw-overlay-text" id="overlayLevel" style="font-size:0.85em;margin-top:4px;">到达关卡 1</div>
        <button class="fw-btn fw-btn-primary" id="replayBtn" style="margin-top:8px;">再来一局</button>
      </div>
    </div>
  </div>
  <div class="controls-row">
    <span class="fw-status" id="statusText">点击开始</span>
    <button class="fw-btn fw-btn-ghost" id="restartBtn">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  'use strict';

  const FW = window.GameFramework;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 600;

  const scoreEl = document.getElementById('scoreDisplay');
  const livesEl = document.getElementById('livesDisplay');
  const levelEl = document.getElementById('levelDisplay');
  const statusEl = document.getElementById('statusText');
  const hiEl = document.getElementById('hiDisplay');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const finalScore = document.getElementById('finalScore');
  const highScoreText = document.getElementById('highScoreText');
  const overlayLevel = document.getElementById('overlayLevel');
  const startBtn = document.getElementById('startBtn');
  const replayBtn = document.getElementById('replayBtn');
  const restartBtn = document.getElementById('restartBtn');

  // Stars
  var STAR_COUNT = 80;

  var game = {};

  function initStars() {
    var stars = [];
    for (var i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 0.5 + Math.random() * 2,
        speed: 0.3 + Math.random() * 1.5,
        brightness: 0.3 + Math.random() * 0.7,
      });
    }
    return stars;
  }

  function initGame() {
    var ship = {
      x: W/2, y: H - 60,
      w: 30, h: 36,
      speed: 5,
      shootCooldown: 0,
      shootRate: 10,
      powerLevel: 1,
      invincible: 0,
    };

    game = {
      ship: ship,
      bullets: [],
      enemies: [],
      particles: [],
      powerups: [],
      stars: initStars(),
      score: 0,
      lives: 3,
      level: 1,
      frame: 0,
      spawnTimer: 0,
      spawnRate: 40,
      enemySpeed: 2,
      state: 'ready',
      targetX: W/2,
      targetY: H - 60,
      autoShoot: false,
    };
    updateHUD();
    hiEl.textContent = FW.storage.getHighScore();
    statusEl.textContent = '点击开始';
    statusEl.className = 'fw-status';
    startOverlay.classList.add('active');
    endOverlay.classList.remove('active');
  }

  function updateHUD() {
    scoreEl.textContent = game.score;
    levelEl.textContent = game.level;
    var hearts = '';
    for (var i = 0; i < game.lives; i++) hearts += '❤ ';
    livesEl.innerHTML = '<span class="fw-score-label">命</span><span>' + (hearts || '× 0') + '</span>';
  }

  function startGame() {
    if (game.state === 'ready') {
      FW.audio.sfx('click');
      game.state = 'playing';
      game.autoShoot = true;
      statusEl.textContent = '游戏中';
      statusEl.className = 'fw-status playing';
      startOverlay.classList.remove('active');
      endOverlay.classList.remove('active');
    }
  }

  function spawnEnemy() {
    var types = ['basic', 'fast', 'tank'];
    var type = 'basic';
    if (game.level >= 3 && Math.random() < 0.2) type = 'tank';
    else if (game.level >= 2 && Math.random() < 0.3) type = 'fast';

    var configs = {
      basic: { hp: 1, speed: game.enemySpeed, w: 28, h: 28, score: 10, color: '#ff4466' },
      fast: { hp: 1, speed: game.enemySpeed * 1.8, w: 22, h: 22, score: 20, color: '#ff8800' },
      tank: { hp: 3, speed: game.enemySpeed * 0.7, w: 34, h: 34, score: 30, color: '#aa44ff' },
    };

    var cfg = configs[type];
    game.enemies.push({
      x: cfg.w/2 + Math.random() * (W - cfg.w),
      y: -cfg.h,
      w: cfg.w, h: cfg.h,
      hp: cfg.hp,
      maxHp: cfg.hp,
      speed: cfg.speed,
      score: cfg.score,
      color: cfg.color,
      type: type,
      shootTimer: 0,
      wobble: Math.random() * Math.PI * 2,
    });
  }

  function spawnPowerup(x, y) {
    var types = ['health', 'power', 'rapid'];
    var type = types[Math.floor(Math.random() * types.length)];
    game.powerups.push({
      x: x, y: y,
      w: 18, h: 18,
      type: type,
      speed: 1.5,
      bobPhase: 0,
    });
  }

  function shootBullet() {
    var s = game.ship;
    if (s.shootCooldown > 0) return;
    if (s.powerLevel >= 3) {
      game.bullets.push({ x: s.x - 10, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x + 10, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
    } else if (s.powerLevel >= 2) {
      game.bullets.push({ x: s.x - 6, y: s.y - s.h/2, w: 4, h: 14, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x + 6, y: s.y - s.h/2, w: 4, h: 14, speed: 8, damage: 1 });
    } else {
      game.bullets.push({ x: s.x, y: s.y - s.h/2, w: 4, h: 16, speed: 8, damage: 1 });
    }
    s.shootCooldown = s.shootRate;
  }

  function spawnExplosion(x, y, color, count) {
    count = count || 15;
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 3;
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 20 + Math.random() * 20,
        maxLife: 40,
        size: 2 + Math.random() * 4,
        color: color || '#ff8800',
      });
    }
  }

  function update() {
    game.frame++;

    if (game.state === 'playing') {
      var s = game.ship;

      // Move ship toward target
      var dx = game.targetX - s.x;
      var dy = game.targetY - s.y;
      var dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        s.x += (dx / dist) * Math.min(s.speed, dist);
        s.y += (dy / dist) * Math.min(s.speed, dist);
      }
      s.x = Math.max(s.w/2, Math.min(W - s.w/2, s.x));
      s.y = Math.max(s.h/2, Math.min(H - s.h/2, s.y));

      // Invincibility
      if (s.invincible > 0) s.invincible--;

      // Auto shoot
      if (game.autoShoot) {
        if (s.shootCooldown > 0) s.shootCooldown--;
        shootBullet();
      } else {
        if (s.shootCooldown > 0) s.shootCooldown--;
      }

      // Update bullets
      for (var i = game.bullets.length - 1; i >= 0; i--) {
        var b = game.bullets[i];
        b.y -= b.speed;
        if (b.y + b.h < 0) {
          game.bullets.splice(i, 1);
        }
      }

      // Spawn enemies
      game.spawnTimer++;
      var rate = Math.max(15, game.spawnRate - game.level * 3);
      if (game.spawnTimer >= rate) {
        spawnEnemy();
        game.spawnTimer = 0;
        // Sometimes spawn extra
        if (game.level >= 4 && Math.random() < 0.3) spawnEnemy();
      }

      // Update enemies
      game.enemySpeed = 2 + game.level * 0.3;
      for (var i = game.enemies.length - 1; i >= 0; i--) {
        var e = game.enemies[i];
        e.y += e.speed;
        e.wobble += 0.03;
        e.x += Math.sin(e.wobble) * 0.5;

        // Enemy shoots back at higher levels
        if (game.level >= 3) {
          e.shootTimer++;
          if (e.shootTimer > 120 + Math.random() * 60) {
            e.shootTimer = 0;
            game.enemyBullets = game.enemyBullets || [];
            game.enemyBullets.push({
              x: e.x + e.w/2, y: e.y + e.h,
              w: 3, h: 8, speed: 3.5,
            });
          }
        }

        if (e.y > H + 20) {
          game.enemies.splice(i, 1);
          continue;
        }

        // Bullet-enemy collision
        for (var j = game.bullets.length - 1; j >= 0; j--) {
          var b = game.bullets[j];
          if (b.x + b.w > e.x && b.x < e.x + e.w &&
              b.y + b.h > e.y && b.y < e.y + e.h) {
            e.hp -= b.damage;
            spawnExplosion(b.x + b.w/2, b.y, '#ffcc00', 3);
            game.bullets.splice(j, 1);
            if (e.hp <= 0) {
              game.score += e.score;
              FW.audio.sfx('score');
              FW.events.reportScore(game.score);
              updateHUD();
              spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.color, 20);
              // Powerup drop
              if (Math.random() < 0.12) {
                spawnPowerup(e.x + e.w/2, e.y + e.h/2);
              }
              game.enemies.splice(i, 1);
              break;
            }
          }
        }
      }

      // Enemy bullets
      var enemyBullets = game.enemyBullets || [];
      for (var i = enemyBullets.length - 1; i >= 0; i--) {
        var eb = enemyBullets[i];
        eb.y += eb.speed;
        if (eb.y > H) {
          enemyBullets.splice(i, 1);
          continue;
        }
        // Hit player?
        if (s.invincible <= 0 &&
            eb.x + eb.w > s.x - s.w/2 && eb.x < s.x + s.w/2 &&
            eb.y + eb.h > s.y - s.h/2 && eb.y < s.y + s.h/2) {
          hitPlayer();
          enemyBullets.splice(i, 1);
        }
      }

      // Enemy-player collision
      if (s.invincible <= 0) {
        for (var i = game.enemies.length - 1; i >= 0; i--) {
          var e = game.enemies[i];
          if (s.x - s.w/2 < e.x + e.w && s.x + s.w/2 > e.x &&
              s.y - s.h/2 < e.y + e.h && s.y + s.h/2 > e.y) {
            spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.color, 25);
            game.enemies.splice(i, 1);
            hitPlayer();
            break;
          }
        }
      }

      // Powerups
      for (var i = game.powerups.length - 1; i >= 0; i--) {
        var p = game.powerups[i];
        p.y += p.speed;
        p.bobPhase += 0.05;
        if (p.y > H) { game.powerups.splice(i, 1); continue; }

        // Collect powerup
        if (s.x - s.w/2 < p.x + p.w && s.x + s.w/2 > p.x &&
            s.y - s.h/2 < p.y + p.h && s.y + s.h/2 > p.y) {
          if (p.type === 'health') {
            game.lives = Math.min(5, game.lives + 1);
          } else if (p.type === 'power') {
            s.powerLevel = Math.min(3, s.powerLevel + 1);
          } else if (p.type === 'rapid') {
            s.shootRate = Math.max(5, s.shootRate - 2);
          }
          spawnExplosion(p.x, p.y, '#44ff44', 10);
          game.powerups.splice(i, 1);
          updateHUD();
        }
      }

      // Level progression
      var newLevel = Math.floor(game.score / 200) + 1;
      if (newLevel > game.level) {
        game.level = newLevel;
        FW.audio.sfx('win');
        updateHUD();
      }

      // Update particles
      for (var i = game.particles.length - 1; i >= 0; i--) {
        var pt = game.particles[i];
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.life--;
        pt.vy += 0.05;
        if (pt.life <= 0) game.particles.splice(i, 1);
      }
    }

    // Always update stars
    for (var i = 0; i < game.stars.length; i++) {
      var star = game.stars[i];
      star.y += star.speed;
      if (star.y > H) { star.y = 0; star.x = Math.random() * W; star.speed = 0.3 + Math.random() * 1.5; }
    }
  }

  function hitPlayer() {
    if (game.ship.invincible > 0) return;
    game.lives--;
    spawnExplosion(game.ship.x, game.ship.y, '#00d4ff', 30);
    game.ship.invincible = 90; // ~1.5s at 60fps
    game.ship.powerLevel = Math.max(1, game.ship.powerLevel - 1);
    updateHUD();

    if (game.lives <= 0) {
      game.state = 'over';
      game.autoShoot = false;
      statusEl.textContent = '游戏结束';
      statusEl.className = 'fw-status';
      FW.audio.sfx('gameover');

      // High score
      var isNewHi = FW.storage.setHighScore(game.score);
      hiEl.textContent = FW.storage.getHighScore();

      // Events
      FW.events.reportScore(game.score);
      FW.events.reportComplete(game.score, {won: false});

      // Show end overlay
      finalScore.textContent = game.score;
      highScoreText.textContent = '最高分: ' + FW.storage.getHighScore();
      overlayLevel.textContent = '到达关卡 ' + game.level;
      endOverlay.classList.add('active');
    }
  }

  function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (var i = 0; i < game.stars.length; i++) {
      var star = game.stars[i];
      ctx.fillStyle = 'rgba(255,255,255,' + star.brightness + ')';
      ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    // Enemy bullets
    var enemyBullets = game.enemyBullets || [];
    for (var i = 0; i < enemyBullets.length; i++) {
      var eb = enemyBullets[i];
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 8;
      ctx.fillRect(eb.x - eb.w/2, eb.y, eb.w, eb.h);
      ctx.shadowBlur = 0;
    }

    // Powerups
    for (var i = 0; i < game.powerups.length; i++) {
      var p = game.powerups[i];
      var bobY = Math.sin(p.bobPhase) * 3;
      ctx.shadowBlur = 10;
      if (p.type === 'health') { ctx.fillStyle = '#44ff44'; ctx.shadowColor = '#44ff44'; }
      else if (p.type === 'power') { ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff8800'; }
      else { ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; }
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(p.x, p.y + bobY - p.h/2);
      ctx.lineTo(p.x + p.w/2, p.y + bobY);
      ctx.lineTo(p.x, p.y + bobY + p.h/2);
      ctx.lineTo(p.x - p.w/2, p.y + bobY);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Label
      ctx.fillStyle = '#fff';
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      var labels = { health: '+', power: 'P', rapid: 'R' };
      ctx.fillText(labels[p.type], p.x, p.y + bobY + 2.5);
    }

    // Enemies
    for (var i = 0; i < game.enemies.length; i++) {
      var e = game.enemies[i];
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 10;
      // Enemy ship
      ctx.fillStyle = e.color;
      var cx = e.x + e.w/2, cy = e.y + e.h/2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - e.h/2);
      ctx.lineTo(cx + e.w/2, cy + e.h/4);
      ctx.lineTo(cx + e.w/4, cy + e.h/2);
      ctx.lineTo(cx - e.w/4, cy + e.h/2);
      ctx.lineTo(cx - e.w/2, cy + e.h/4);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Cockpit
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx, cy - e.h/6, e.w/6, 0, Math.PI * 2);
      ctx.fill();
      // HP bar for tanks
      if (e.maxHp > 1) {
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x, e.y - 6, e.w, 4);
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 4);
      }
    }

    // Bullets
    for (var i = 0; i < game.bullets.length; i++) {
      var b = game.bullets[i];
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#00d4ff';
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(b.x - b.w/4, b.y + 2, b.w/2, b.h - 4);
      ctx.shadowBlur = 0;
    }

    // Ship
    var s = game.ship;
    if (s.invincible > 0 && Math.floor(s.invincible / 5) % 2 === 0) {
      // Blink when invincible - skip draw
    } else if (game.state !== 'over') {
      ctx.save();
      ctx.translate(s.x, s.y);

      // Engine glow
      ctx.shadowColor = '#0088ff';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#0066cc';
      ctx.beginPath();
      ctx.moveTo(-8, s.h/2 - 4);
      ctx.lineTo(0, s.h/2 + 6);
      ctx.lineTo(8, s.h/2 - 4);
      ctx.fill();

      // Ship body
      ctx.shadowColor = '#00aaff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#0088ee';
      ctx.beginPath();
      ctx.moveTo(0, -s.h/2);
      ctx.lineTo(-s.w/2, s.h/4);
      ctx.lineTo(-s.w/4, s.h/2);
      ctx.lineTo(s.w/4, s.h/2);
      ctx.lineTo(s.w/2, s.h/4);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      // Wings
      ctx.fillStyle = '#0066aa';
      ctx.beginPath();
      ctx.moveTo(0, -s.h/3);
      ctx.lineTo(-s.w/2 - 6, s.h/4);
      ctx.lineTo(-s.w/3, s.h/4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -s.h/3);
      ctx.lineTo(s.w/2 + 6, s.h/4);
      ctx.lineTo(s.w/3, s.h/4);
      ctx.closePath();
      ctx.fill();

      // Cockpit
      ctx.fillStyle = 'rgba(0,200,255,0.4)';
      ctx.beginPath();
      ctx.arc(0, -s.h/6, s.w/5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(2, -s.h/6 - 2, s.w/10, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Particles
    for (var i = 0; i < game.particles.length; i++) {
      var pt = game.particles[i];
      var alpha = pt.life / pt.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pt.color;
      ctx.shadowColor = pt.color;
      ctx.shadowBlur = 5;
      ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;
  }

  // Mouse control
  canvas.addEventListener('mousemove', function(e) {
    if (game.state !== 'playing') return;
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var scaleY = H / rect.height;
    game.targetX = (e.clientX - rect.left) * scaleX;
    game.targetY = (e.clientY - rect.top) * scaleY;
  });

  // Touch control
  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    if (game.state !== 'playing') return;
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var scaleY = H / rect.height;
    game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
    game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
  }, { passive: false });

  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    if (game.state === 'ready') {
      startGame();
      // Also set position
      var rect = canvas.getBoundingClientRect();
      var scaleX = W / rect.width;
      var scaleY = H / rect.height;
      game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
      game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
    } else if (game.state === 'over') {
      document.getElementById('endOverlay').classList.remove('active');
      initGame();
    } else {
      var rect = canvas.getBoundingClientRect();
      var scaleX = W / rect.width;
      var scaleY = H / rect.height;
      game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
      game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
    }
  }, { passive: false });

  canvas.addEventListener('click', function() {
    if (game.state === 'ready') startGame();
    else if (game.state === 'over') {
      document.getElementById('endOverlay').classList.remove('active');
      initGame();
    }
  });

  // Keyboard
  document.addEventListener('keydown', function(e) {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (game.state === 'ready') startGame();
      else if (game.state === 'over') {
        document.getElementById('endOverlay').classList.remove('active');
        initGame();
      }
    }
    if (game.state === 'playing') {
      var step = 8;
      if (e.key === 'ArrowLeft') game.targetX = Math.max(game.ship.w/2, game.targetX - step);
      if (e.key === 'ArrowRight') game.targetX = Math.min(W - game.ship.w/2, game.targetX + step);
      if (e.key === 'ArrowUp') game.targetY = Math.max(game.ship.h/2, game.targetY - step);
      if (e.key === 'ArrowDown') game.targetY = Math.min(H - game.ship.h/2, game.targetY + step);
    }
  });

  restartBtn.addEventListener('click', function() {
    endOverlay.classList.remove('active');
    initGame();
  });

  // Overlay buttons
  startBtn.addEventListener('click', function() { FW.audio.sfx('click'); startGame(); });
  startBtn.addEventListener('touchend', function(e) { e.preventDefault(); FW.audio.sfx('click'); startGame(); });
  replayBtn.addEventListener('click', function() { FW.audio.sfx('click'); endOverlay.classList.remove('active'); initGame(); });
  replayBtn.addEventListener('touchend', function(e) { e.preventDefault(); FW.audio.sfx('click'); endOverlay.classList.remove('active'); initGame(); });

  // Prevent scrolling
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Initial state
  initGame();
  gameLoop();
})();
</script>
</body>
</html>
