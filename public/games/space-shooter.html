<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>太空射击</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    touch-action: none;
    -webkit-user-select: none;
    user-select: none;
  }
  .game-wrapper {
    background: #0d0d1a;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 0 50px rgba(0,100,255,0.1);
    max-width: 440px;
    width: 100%;
    margin: 8px;
  }
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 12px;
    margin-bottom: 10px;
    background: #0a0a18;
    border-radius: 10px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    font-weight: bold;
  }
  .hud-score { color: #ffd700; text-shadow: 0 0 10px rgba(255,215,0,0.3); }
  .hud-lives { color: #ff4466; }
  .hud-level { color: #00d4ff; }
  .hud-power { color: #44ff44; }
  .heart { color: #ff4466; }
  canvas {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 400 / 600;
    background: #050510;
    border-radius: 8px;
    box-shadow: inset 0 0 30px rgba(0,50,255,0.05);
    cursor: none;
    touch-action: none;
  }
  .controls-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-top: 10px;
    gap: 8px;
  }
  .restart-btn {
    background: #1a1a30;
    border: 1px solid #2a2a4a;
    color: #e0e0e0;
    font-size: 12px;
    cursor: pointer;
    padding: 6px 16px;
    border-radius: 6px;
    font-family: inherit;
    transition: background 0.2s;
  }
  .restart-btn:hover { background: #2a2a40; }
  .status-text {
    font-size: 13px;
    color: #555;
    flex: 1;
    text-align: center;
  }
  .status-text.playing { color: #00d4ff; }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="hud">
    <span class="hud-score">&#x2605; <span id="scoreDisplay">0</span></span>
    <span class="hud-level">最高分 <span id="hiDisplay">0</span></span>
    <span class="hud-level">关卡 <span id="levelDisplay">1</span></span>
    <span class="hud-lives" id="livesDisplay">&#x2764; &#x2764; &#x2764;</span>
  </div>
  <canvas id="gameCanvas" width="400" height="600"></canvas>
  <div class="controls-row">
    <span class="status-text" id="statusText">点击开始</span>
    <button class="restart-btn" id="restartBtn">重新开始</button>
  </div>
</div>
<script>
(function(){
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 400, H = 600;

  const scoreEl = document.getElementById('scoreDisplay');
  const livesEl = document.getElementById('livesDisplay');
  const levelEl = document.getElementById('levelDisplay');
  const statusEl = document.getElementById('statusText');
  const hiEl = document.getElementById('hiDisplay');

  // Stars
  const STAR_COUNT = 80;

  let game = {};

  function initStars() {
    const stars = [];
    for (let i = 0; i < STAR_COUNT; i++) {
      stars.push({
        x: Math.random() * W,
        y: Math.random() * H,
        size: 0.5 + Math.random() * 2,
        speed: 0.3 + Math.random() * 1.5,
        brightness: 0.3 + Math.random() * 0.7,
      });
    }
    return stars;
  }

  function initGame() {
    const ship = {
      x: W/2, y: H - 60,
      w: 30, h: 36,
      speed: 5,
      shootCooldown: 0,
      shootRate: 10,
      powerLevel: 1,
      invincible: 0,
    };

    game = {
      ship: ship,
      bullets: [],
      enemies: [],
      particles: [],
      powerups: [],
      stars: initStars(),
      score: 0,
      lives: 3,
      level: 1,
      frame: 0,
      spawnTimer: 0,
      spawnRate: 40,
      enemySpeed: 2,
      state: 'ready',
      targetX: W/2,
      targetY: H - 60,
      autoShoot: false,
    };
    updateHUD();
    const hi = parseInt(localStorage.getItem('spaceshooter_hi')) || 0;
    hiEl.textContent = hi;
    statusEl.textContent = '点击开始';
    statusEl.className = 'status-text';
  }

  function updateHUD() {
    scoreEl.textContent = game.score;
    levelEl.textContent = game.level;
    let hearts = '';
    for (let i = 0; i < game.lives; i++) hearts += '❤ ';
    livesEl.textContent = hearts || '× 0';
  }

  function startGame() {
    if (game.state === 'ready') {
      game.state = 'playing';
      game.autoShoot = true;
      statusEl.textContent = '游戏中';
      statusEl.className = 'status-text playing';
    }
  }

  function spawnEnemy() {
    const types = ['basic', 'fast', 'tank'];
    let type = 'basic';
    if (game.level >= 3 && Math.random() < 0.2) type = 'tank';
    else if (game.level >= 2 && Math.random() < 0.3) type = 'fast';

    const configs = {
      basic: { hp: 1, speed: game.enemySpeed, w: 28, h: 28, score: 10, color: '#ff4466' },
      fast: { hp: 1, speed: game.enemySpeed * 1.8, w: 22, h: 22, score: 20, color: '#ff8800' },
      tank: { hp: 3, speed: game.enemySpeed * 0.7, w: 34, h: 34, score: 30, color: '#aa44ff' },
    };

    const cfg = configs[type];
    game.enemies.push({
      x: cfg.w/2 + Math.random() * (W - cfg.w),
      y: -cfg.h,
      w: cfg.w, h: cfg.h,
      hp: cfg.hp,
      maxHp: cfg.hp,
      speed: cfg.speed,
      score: cfg.score,
      color: cfg.color,
      type: type,
      shootTimer: 0,
      wobble: Math.random() * Math.PI * 2,
    });
  }

  function spawnPowerup(x, y) {
    const types = ['health', 'power', 'rapid'];
    const type = types[Math.floor(Math.random() * types.length)];
    game.powerups.push({
      x: x, y: y,
      w: 18, h: 18,
      type: type,
      speed: 1.5,
      bobPhase: 0,
    });
  }

  function shootBullet() {
    const s = game.ship;
    if (s.shootCooldown > 0) return;
    if (s.powerLevel >= 3) {
      game.bullets.push({ x: s.x - 10, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x + 10, y: s.y - s.h/2, w: 4, h: 12, speed: 8, damage: 1 });
    } else if (s.powerLevel >= 2) {
      game.bullets.push({ x: s.x - 6, y: s.y - s.h/2, w: 4, h: 14, speed: 8, damage: 1 });
      game.bullets.push({ x: s.x + 6, y: s.y - s.h/2, w: 4, h: 14, speed: 8, damage: 1 });
    } else {
      game.bullets.push({ x: s.x, y: s.y - s.h/2, w: 4, h: 16, speed: 8, damage: 1 });
    }
    s.shootCooldown = s.shootRate;
  }

  function spawnExplosion(x, y, color, count) {
    count = count || 15;
    for (let i = 0; i < count; i++) {
      const angle = Math.random() * Math.PI * 2;
      const speed = 1 + Math.random() * 3;
      game.particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        life: 20 + Math.random() * 20,
        maxLife: 40,
        size: 2 + Math.random() * 4,
        color: color || '#ff8800',
      });
    }
  }

  function update() {
    game.frame++;

    if (game.state === 'playing') {
      const s = game.ship;

      // Move ship toward target
      const dx = game.targetX - s.x;
      const dy = game.targetY - s.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist > 2) {
        s.x += (dx / dist) * Math.min(s.speed, dist);
        s.y += (dy / dist) * Math.min(s.speed, dist);
      }
      s.x = Math.max(s.w/2, Math.min(W - s.w/2, s.x));
      s.y = Math.max(s.h/2, Math.min(H - s.h/2, s.y));

      // Invincibility
      if (s.invincible > 0) s.invincible--;

      // Auto shoot
      if (game.autoShoot) {
        if (s.shootCooldown > 0) s.shootCooldown--;
        shootBullet();
      } else {
        if (s.shootCooldown > 0) s.shootCooldown--;
      }

      // Update bullets
      for (let i = game.bullets.length - 1; i >= 0; i--) {
        const b = game.bullets[i];
        b.y -= b.speed;
        if (b.y + b.h < 0) {
          game.bullets.splice(i, 1);
        }
      }

      // Spawn enemies
      game.spawnTimer++;
      const rate = Math.max(15, game.spawnRate - game.level * 3);
      if (game.spawnTimer >= rate) {
        spawnEnemy();
        game.spawnTimer = 0;
        // Sometimes spawn extra
        if (game.level >= 4 && Math.random() < 0.3) spawnEnemy();
      }

      // Update enemies
      game.enemySpeed = 2 + game.level * 0.3;
      for (let i = game.enemies.length - 1; i >= 0; i--) {
        const e = game.enemies[i];
        e.y += e.speed;
        e.wobble += 0.03;
        e.x += Math.sin(e.wobble) * 0.5;

        // Enemy shoots back at higher levels
        if (game.level >= 3) {
          e.shootTimer++;
          if (e.shootTimer > 120 + Math.random() * 60) {
            e.shootTimer = 0;
            game.enemyBullets = game.enemyBullets || [];
            game.enemyBullets.push({
              x: e.x + e.w/2, y: e.y + e.h,
              w: 3, h: 8, speed: 3.5,
            });
          }
        }

        if (e.y > H + 20) {
          game.enemies.splice(i, 1);
          continue;
        }

        // Bullet-enemy collision
        for (let j = game.bullets.length - 1; j >= 0; j--) {
          const b = game.bullets[j];
          if (b.x + b.w > e.x && b.x < e.x + e.w &&
              b.y + b.h > e.y && b.y < e.y + e.h) {
            e.hp -= b.damage;
            spawnExplosion(b.x + b.w/2, b.y, '#ffcc00', 3);
            game.bullets.splice(j, 1);
            if (e.hp <= 0) {
              game.score += e.score;
              updateHUD();
              spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.color, 20);
              // Powerup drop
              if (Math.random() < 0.12) {
                spawnPowerup(e.x + e.w/2, e.y + e.h/2);
              }
              game.enemies.splice(i, 1);
              break;
            }
          }
        }
      }

      // Enemy bullets
      const enemyBullets = game.enemyBullets || [];
      for (let i = enemyBullets.length - 1; i >= 0; i--) {
        const eb = enemyBullets[i];
        eb.y += eb.speed;
        if (eb.y > H) {
          enemyBullets.splice(i, 1);
          continue;
        }
        // Hit player?
        if (s.invincible <= 0 &&
            eb.x + eb.w > s.x - s.w/2 && eb.x < s.x + s.w/2 &&
            eb.y + eb.h > s.y - s.h/2 && eb.y < s.y + s.h/2) {
          hitPlayer();
          enemyBullets.splice(i, 1);
        }
      }

      // Enemy-player collision
      if (s.invincible <= 0) {
        for (let i = game.enemies.length - 1; i >= 0; i--) {
          const e = game.enemies[i];
          if (s.x - s.w/2 < e.x + e.w && s.x + s.w/2 > e.x &&
              s.y - s.h/2 < e.y + e.h && s.y + s.h/2 > e.y) {
            spawnExplosion(e.x + e.w/2, e.y + e.h/2, e.color, 25);
            game.enemies.splice(i, 1);
            hitPlayer();
            break;
          }
        }
      }

      // Powerups
      for (let i = game.powerups.length - 1; i >= 0; i--) {
        const p = game.powerups[i];
        p.y += p.speed;
        p.bobPhase += 0.05;
        if (p.y > H) { game.powerups.splice(i, 1); continue; }

        // Collect powerup
        if (s.x - s.w/2 < p.x + p.w && s.x + s.w/2 > p.x &&
            s.y - s.h/2 < p.y + p.h && s.y + s.h/2 > p.y) {
          if (p.type === 'health') {
            game.lives = Math.min(5, game.lives + 1);
          } else if (p.type === 'power') {
            s.powerLevel = Math.min(3, s.powerLevel + 1);
          } else if (p.type === 'rapid') {
            s.shootRate = Math.max(5, s.shootRate - 2);
          }
          spawnExplosion(p.x, p.y, '#44ff44', 10);
          game.powerups.splice(i, 1);
          updateHUD();
        }
      }

      // Level progression
      const newLevel = Math.floor(game.score / 200) + 1;
      if (newLevel > game.level) {
        game.level = newLevel;
        updateHUD();
      }

      // Update particles
      for (let i = game.particles.length - 1; i >= 0; i--) {
        const pt = game.particles[i];
        pt.x += pt.vx;
        pt.y += pt.vy;
        pt.life--;
        pt.vy += 0.05;
        if (pt.life <= 0) game.particles.splice(i, 1);
      }
    }

    // Always update stars
    for (const star of game.stars) {
      star.y += star.speed;
      if (star.y > H) { star.y = 0; star.x = Math.random() * W; star.speed = 0.3 + Math.random() * 1.5; }
    }
  }

  function hitPlayer() {
    if (game.ship.invincible > 0) return;
    game.lives--;
    spawnExplosion(game.ship.x, game.ship.y, '#00d4ff', 30);
    game.ship.invincible = 90; // ~1.5s at 60fps
    game.ship.powerLevel = Math.max(1, game.ship.powerLevel - 1);
    updateHUD();

    if (game.lives <= 0) {
      game.state = 'over';
      game.autoShoot = false;
      statusEl.textContent = '游戏结束';
      statusEl.className = 'status-text';
      if (game.score > (parseInt(localStorage.getItem('spaceshooter_hi')) || 0)) {
        localStorage.setItem('spaceshooter_hi', game.score);
        hiEl.textContent = game.score;
      }
    }
  }

  function draw() {
    ctx.fillStyle = '#050510';
    ctx.fillRect(0, 0, W, H);

    // Stars
    for (const star of game.stars) {
      ctx.fillStyle = `rgba(255,255,255,${star.brightness})`;
      ctx.fillRect(star.x, star.y, star.size, star.size);
    }

    // Enemy bullets
    const enemyBullets = game.enemyBullets || [];
    for (const eb of enemyBullets) {
      ctx.fillStyle = '#ff4444';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 8;
      ctx.fillRect(eb.x - eb.w/2, eb.y, eb.w, eb.h);
      ctx.shadowBlur = 0;
    }

    // Powerups
    for (const p of game.powerups) {
      const bobY = Math.sin(p.bobPhase) * 3;
      ctx.shadowBlur = 10;
      if (p.type === 'health') { ctx.fillStyle = '#44ff44'; ctx.shadowColor = '#44ff44'; }
      else if (p.type === 'power') { ctx.fillStyle = '#ff8800'; ctx.shadowColor = '#ff8800'; }
      else { ctx.fillStyle = '#00d4ff'; ctx.shadowColor = '#00d4ff'; }
      // Diamond shape
      ctx.beginPath();
      ctx.moveTo(p.x, p.y + bobY - p.h/2);
      ctx.lineTo(p.x + p.w/2, p.y + bobY);
      ctx.lineTo(p.x, p.y + bobY + p.h/2);
      ctx.lineTo(p.x - p.w/2, p.y + bobY);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Label
      ctx.fillStyle = '#fff';
      ctx.font = '7px sans-serif';
      ctx.textAlign = 'center';
      const labels = { health: '+', power: 'P', rapid: 'R' };
      ctx.fillText(labels[p.type], p.x, p.y + bobY + 2.5);
    }

    // Enemies
    for (const e of game.enemies) {
      ctx.shadowColor = e.color;
      ctx.shadowBlur = 10;
      // Enemy ship
      ctx.fillStyle = e.color;
      const cx = e.x + e.w/2, cy = e.y + e.h/2;
      ctx.beginPath();
      ctx.moveTo(cx, cy - e.h/2);
      ctx.lineTo(cx + e.w/2, cy + e.h/4);
      ctx.lineTo(cx + e.w/4, cy + e.h/2);
      ctx.lineTo(cx - e.w/4, cy + e.h/2);
      ctx.lineTo(cx - e.w/2, cy + e.h/4);
      ctx.closePath();
      ctx.fill();
      ctx.shadowBlur = 0;
      // Cockpit
      ctx.fillStyle = 'rgba(255,255,255,0.2)';
      ctx.beginPath();
      ctx.arc(cx, cy - e.h/6, e.w/6, 0, Math.PI * 2);
      ctx.fill();
      // HP bar for tanks
      if (e.maxHp > 1) {
        ctx.fillStyle = '#333';
        ctx.fillRect(e.x, e.y - 6, e.w, 4);
        ctx.fillStyle = '#44ff44';
        ctx.fillRect(e.x, e.y - 6, e.w * (e.hp / e.maxHp), 4);
      }
    }

    // Bullets
    for (const b of game.bullets) {
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 12;
      ctx.fillStyle = '#00d4ff';
      ctx.fillRect(b.x - b.w/2, b.y, b.w, b.h);
      ctx.fillStyle = '#fff';
      ctx.fillRect(b.x - b.w/4, b.y + 2, b.w/2, b.h - 4);
      ctx.shadowBlur = 0;
    }

    // Ship
    const s = game.ship;
    if (s.invincible > 0 && Math.floor(s.invincible / 5) % 2 === 0) {
      // Blink when invincible - skip draw
    } else if (game.state !== 'over') {
      ctx.save();
      ctx.translate(s.x, s.y);

      // Engine glow
      ctx.shadowColor = '#0088ff';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#0066cc';
      ctx.beginPath();
      ctx.moveTo(-8, s.h/2 - 4);
      ctx.lineTo(0, s.h/2 + 6);
      ctx.lineTo(8, s.h/2 - 4);
      ctx.fill();

      // Ship body
      ctx.shadowColor = '#00aaff';
      ctx.shadowBlur = 15;
      ctx.fillStyle = '#0088ee';
      ctx.beginPath();
      ctx.moveTo(0, -s.h/2);
      ctx.lineTo(-s.w/2, s.h/4);
      ctx.lineTo(-s.w/4, s.h/2);
      ctx.lineTo(s.w/4, s.h/2);
      ctx.lineTo(s.w/2, s.h/4);
      ctx.closePath();
      ctx.fill();

      ctx.shadowBlur = 0;
      // Wings
      ctx.fillStyle = '#0066aa';
      ctx.beginPath();
      ctx.moveTo(0, -s.h/3);
      ctx.lineTo(-s.w/2 - 6, s.h/4);
      ctx.lineTo(-s.w/3, s.h/4);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(0, -s.h/3);
      ctx.lineTo(s.w/2 + 6, s.h/4);
      ctx.lineTo(s.w/3, s.h/4);
      ctx.closePath();
      ctx.fill();

      // Cockpit
      ctx.fillStyle = 'rgba(0,200,255,0.4)';
      ctx.beginPath();
      ctx.arc(0, -s.h/6, s.w/5, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(2, -s.h/6 - 2, s.w/10, 0, Math.PI * 2);
      ctx.fill();

      ctx.restore();
    }

    // Particles
    for (const pt of game.particles) {
      const alpha = pt.life / pt.maxLife;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = pt.color;
      ctx.shadowColor = pt.color;
      ctx.shadowBlur = 5;
      ctx.fillRect(pt.x - pt.size/2, pt.y - pt.size/2, pt.size, pt.size);
    }
    ctx.globalAlpha = 1;
    ctx.shadowBlur = 0;

    // Game over
    if (game.state === 'over') {
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#ff4444';
      ctx.font = 'bold 32px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#ff4444';
      ctx.shadowBlur = 20;
      ctx.fillText('游戏结束', W/2, H/2 - 20);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#ffd700';
      ctx.font = '18px "Segoe UI", sans-serif';
      ctx.fillText('分数：' + game.score, W/2, H/2 + 25);
      ctx.fillStyle = '#888';
      ctx.font = '13px "Segoe UI", sans-serif';
      ctx.fillText('点击重新开始', W/2, H/2 + 60);
    }

    // Ready state
    if (game.state === 'ready') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#00d4ff';
      ctx.font = 'bold 28px "Segoe UI", sans-serif';
      ctx.textAlign = 'center';
      ctx.shadowColor = '#00d4ff';
      ctx.shadowBlur = 20;
      ctx.fillText('太空射击', W/2, H/2 - 20);
      ctx.shadowBlur = 0;
      ctx.fillStyle = '#888';
      ctx.font = '14px "Segoe UI", sans-serif';
      ctx.fillText('点击开始', W/2, H/2 + 20);
    }
  }

  // Mouse control
  canvas.addEventListener('mousemove', (e) => {
    if (game.state !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    game.targetX = (e.clientX - rect.left) * scaleX;
    game.targetY = (e.clientY - rect.top) * scaleY;
  });

  // Touch control
  canvas.addEventListener('touchmove', (e) => {
    e.preventDefault();
    if (game.state !== 'playing') return;
    const rect = canvas.getBoundingClientRect();
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
    game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
  }, { passive: false });

  canvas.addEventListener('touchstart', (e) => {
    e.preventDefault();
    if (game.state === 'ready') {
      startGame();
      // Also set position
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
      game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
    } else if (game.state === 'over') {
      initGame();
    } else {
      const rect = canvas.getBoundingClientRect();
      const scaleX = W / rect.width;
      const scaleY = H / rect.height;
      game.targetX = (e.touches[0].clientX - rect.left) * scaleX;
      game.targetY = (e.touches[0].clientY - rect.top) * scaleY;
    }
  }, { passive: false });

  canvas.addEventListener('click', () => {
    if (game.state === 'ready') startGame();
    else if (game.state === 'over') initGame();
  });

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === ' ' || e.key === 'Enter') {
      e.preventDefault();
      if (game.state === 'ready') startGame();
      else if (game.state === 'over') initGame();
    }
    if (game.state === 'playing') {
      const step = 8;
      if (e.key === 'ArrowLeft') game.targetX = Math.max(game.ship.w/2, game.targetX - step);
      if (e.key === 'ArrowRight') game.targetX = Math.min(W - game.ship.w/2, game.targetX + step);
      if (e.key === 'ArrowUp') game.targetY = Math.max(game.ship.h/2, game.targetY - step);
      if (e.key === 'ArrowDown') game.targetY = Math.min(H - game.ship.h/2, game.targetY + step);
    }
  });

  document.getElementById('restartBtn').addEventListener('click', initGame);

  // Prevent scrolling
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  initGame();
  gameLoop();
})();
</script>
</body>
</html>
