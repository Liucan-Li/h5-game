<!DOCTYPE html>
<html lang="zh-CN" data-game-id="memory">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>记忆翻牌</title>
<link rel="stylesheet" href="framework.css">
<style>
  .grid {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px;
    width: 100%; max-width: 420px; margin: 0 auto;
  }
  .card {
    aspect-ratio: 1; perspective: 600px; cursor: pointer;
  }
  .card-inner {
    position: relative; width: 100%; height: 100%;
    transition: transform 0.4s ease; transform-style: preserve-3d;
    border-radius: var(--radius-lg);
  }
  .card.flipped .card-inner, .card.matched .card-inner { transform: rotateY(180deg); }
  .card-face {
    position: absolute; inset: 0; backface-visibility: hidden;
    border-radius: var(--radius-lg); display: flex; align-items: center; justify-content: center;
    border: 2px solid transparent;
  }
  .card-front {
    background: linear-gradient(135deg, var(--accent-2), #6d28d9);
    border-color: var(--glass-border);
  }
  .card-front::after {
    content: '?'; font-size: 2em; font-weight: 800; color: rgba(255,255,255,0.4);
  }
  .card-back {
    background: var(--bg-secondary); border-color: var(--accent-2); transform: rotateY(180deg);
    font-size: 2.2em;
  }
  .card.matched .card-back { border-color: var(--accent-1); background: #0a2a1e; }
  .card:not(.flipped):not(.matched):active .card-inner { transform: scale(0.95); }
  .card.matched { cursor: default; animation: fw-pop 0.4s ease; }
  @media (max-width: 420px) {
    .grid { gap: 8px; }
    .card-front::after { font-size: 1.5em; }
    .card-back { font-size: 1.6em; }
  }
</style>
</head>
<body>
<div class="fw-container fw-cat-puzzle">
  <div class="fw-header">
    <h1 class="fw-title">记忆翻牌</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">步数</div><div class="fw-score-value" id="moves">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">时间</div><div class="fw-score-value" id="timer">0s</div></div>
    </div>
  </div>
  <div class="grid" id="grid"></div>
  <button class="fw-btn fw-btn-primary" id="restartBtn" style="margin-top:14px;">新游戏</button>
  <div class="fw-status" id="statusMsg" style="margin-top:8px;">翻出所有配对的卡片即可获胜！</div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const EMOJIS = ['🚀','🌟','💎','🎯','🔥','🌈','🍀','🎵'];
  let cards, flipped, matched, moves, timer, timerInterval;
  let gameStarted, lockBoard;

  const grid = document.getElementById('grid');
  const movesEl = document.getElementById('moves');
  const timerEl = document.getElementById('timer');
  const statusMsg = document.getElementById('statusMsg');

  function init() {
    grid.innerHTML = '';
    flipped = []; matched = 0; moves = 0; timer = 0;
    gameStarted = false; lockBoard = false;
    movesEl.textContent = '0'; timerEl.textContent = '0s';
    statusMsg.textContent = '翻出所有配对的卡片即可获胜！';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }

    const pairs = [...EMOJIS, ...EMOJIS];
    for (let i = pairs.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pairs[i], pairs[j]] = [pairs[j], pairs[i]];
    }

    pairs.forEach(function(emoji, index) {
      const card = document.createElement('div');
      card.className = 'card';
      card.dataset.index = index;
      card.dataset.emoji = emoji;
      card.innerHTML = '<div class="card-inner"><div class="card-face card-front"></div><div class="card-face card-back">' + emoji + '</div></div>';
      card.addEventListener('click', function() { flipCard(card); });
      grid.appendChild(card);
    });
  }

  function flipCard(card) {
    if (lockBoard) return;
    if (card.classList.contains('flipped') || card.classList.contains('matched')) return;
    if (flipped.length >= 2) return;

    if (!gameStarted) {
      gameStarted = true;
      timerInterval = setInterval(function() { timer++; timerEl.textContent = timer + 's'; }, 1000);
    }

    FW.audio.sfx('click');
    card.classList.add('flipped');
    flipped.push(card);

    if (flipped.length === 2) {
      moves++;
      movesEl.textContent = moves;
      checkMatch();
    }
  }

  function checkMatch() {
    lockBoard = true;
    var a = flipped[0], b = flipped[1];
    if (a.dataset.emoji === b.dataset.emoji) {
      a.classList.add('matched');
      b.classList.add('matched');
      matched++;
      flipped = []; lockBoard = false;
      FW.audio.sfx('score');
      if (matched === EMOJIS.length) {
        clearInterval(timerInterval);
        statusMsg.innerHTML = '🎉 你赢了！共 ' + moves + ' 步，用时 ' + timer + ' 秒！';
        FW.audio.sfx('win');
        FW.events.reportComplete(moves, { time: timer, won: true });
      }
    } else {
      setTimeout(function() {
        a.classList.remove('flipped'); b.classList.remove('flipped');
        flipped = []; lockBoard = false;
      }, 800);
    }
  }

  document.getElementById('restartBtn').addEventListener('click', init);
  init();
})();
</script>
</body>
</html>
