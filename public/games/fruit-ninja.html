<!DOCTYPE html>
<html lang="zh-CN" data-game-id="fruit-ninja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>水果忍者</title>
<link rel="stylesheet" href="framework.css">
<style>
.canvas-wrapper {
  position: relative;
  width: 100%;
  margin: 0 auto;
}
.miss-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  margin-top: 6px;
}
.miss-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--text-muted);
  transition: background 0.3s;
}
.miss-dot.active {
  background: var(--accent-4);
}
#actionBtn {
  margin-top: 14px;
}
</style>
</head>
<body>
<div class="fw-container fw-cat-arcade">
  <div class="fw-header">
    <h1 class="fw-title">水果忍者</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">分数</div>
        <div class="fw-score-value" id="scoreVal">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">最高</div>
        <div class="fw-score-value" id="hiVal">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">连击</div>
        <div class="fw-score-value" id="comboVal">0</div>
      </div>
    </div>
  </div>
  <div class="canvas-wrapper fw-game-area">
    <canvas id="c" class="fw-canvas" width="400" height="560"></canvas>
  </div>
  <div class="miss-dots" id="missDots">
    <div class="miss-dot" id="miss0"></div>
    <div class="miss-dot" id="miss1"></div>
    <div class="miss-dot" id="miss2"></div>
  </div>
  <button class="fw-btn fw-btn-primary" id="actionBtn">开始游戏</button>
</div>
<div class="fw-overlay" id="gameOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="overlayTitle">游戏结束</div>
    <div class="fw-overlay-text" id="overlayScore">得分: 0</div>
    <div class="fw-overlay-text" id="overlayNewRecord" style="display:none;color:var(--accent-3);font-weight:700;">新纪录!</div>
    <button class="fw-btn fw-btn-primary" id="restartBtn">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function () {
  'use strict';

  const FW = window.GameFramework;

  // ===== CONSTANTS =====
  var CW = 400, CH = 560;
  var GRAVITY = 0.35;
  var MAX_MISSES = 3;
  var WAVE_INITIAL = 2000;
  var WAVE_MIN = 700;
  var COMBO_WINDOW = 1000;

  var FRUIT_TYPES = [
    { name: 'watermelon', r: 30, skin: '#27ae60', flesh: '#e74c3c' },
    { name: 'apple',      r: 22, skin: '#e74c3c', flesh: '#fdfefe' },
    { name: 'orange',     r: 24, skin: '#f39c12', flesh: '#f1c40f' },
    { name: 'kiwi',       r: 18, skin: '#6b3a1f', flesh: '#2ecc71' },
    { name: 'banana',     r: 20, skin: '#f1c40f', flesh: '#fef9e7' },
  ];

  // ===== DOM =====
  var canvas = document.getElementById('c');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('scoreVal');
  var hiEl = document.getElementById('hiVal');
  var comboEl = document.getElementById('comboVal');
  var btn = document.getElementById('actionBtn');
  var restartBtn = document.getElementById('restartBtn');
  var overlay = document.getElementById('gameOverlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlayScore = document.getElementById('overlayScore');
  var overlayNewRecord = document.getElementById('overlayNewRecord');
  var missDots = [
    document.getElementById('miss0'),
    document.getElementById('miss1'),
    document.getElementById('miss2'),
  ];

  // ===== STATE =====
  var phase = 'title'; // title | play | gameover
  var score = 0;
  var highScore = FW.storage.getHighScore();
  var combo = 0;
  var misses = 0;
  var gameTime = 0; // seconds elapsed
  var waveTimer = WAVE_INITIAL;
  var fruits = [];
  var bombs = [];
  var particles = [];
  var trail = [];
  var sliceFlashes = [];
  var lastSliceTime = 0;
  var isSwipping = false;
  var prevPointer = null;
  var animId = null;
  var lastFrameTime = 0;

  // Audio context (lazy)
  var audioCtx = null;
  function getAudioCtx() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if (audioCtx.state === 'suspended') {
      audioCtx.resume();
    }
    return audioCtx;
  }

  // ===== SOUNDS =====

  function playSlice() {
    try {
      var a = getAudioCtx();
      var osc = a.createOscillator();
      var g = a.createGain();
      g.gain.setValueAtTime(0.12, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, a.currentTime + 0.18);
      osc.type = 'sawtooth';
      osc.frequency.setValueAtTime(700, a.currentTime);
      osc.frequency.exponentialRampToValueAtTime(150, a.currentTime + 0.18);
      osc.connect(g);
      g.connect(a.destination);
      osc.start();
      osc.stop(a.currentTime + 0.2);
    } catch (_) {}
  }

  function playBomb() {
    try {
      var a = getAudioCtx();
      var sr = a.sampleRate;
      var len = sr * 0.35;
      var buf = a.createBuffer(1, len, sr);
      var d = buf.getChannelData(0);
      for (var i = 0; i < len; i++) {
        d[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / len, 2);
      }
      var src = a.createBufferSource();
      src.buffer = buf;
      var g = a.createGain();
      g.gain.setValueAtTime(0.45, a.currentTime);
      g.gain.exponentialRampToValueAtTime(0.01, a.currentTime + 0.3);
      var f = a.createBiquadFilter();
      f.type = 'lowpass';
      f.frequency.setValueAtTime(400, a.currentTime);
      f.frequency.exponentialRampToValueAtTime(60, a.currentTime + 0.3);
      src.connect(f);
      f.connect(g);
      g.connect(a.destination);
      src.start();
    } catch (_) {}
  }

  // ===== FRUITS & BOMBS =====

  function spawnFruit() {
    var type = FRUIT_TYPES[Math.floor(Math.random() * FRUIT_TYPES.length)];
    var x = 40 + Math.random() * (CW - 80);
    var vx = (Math.random() - 0.5) * 6;
    var vy = -(9 + Math.random() * 5);
    return {
      x: x, y: CH + 40,
      vx: vx, vy: vy,
      r: type.r,
      type: type.name,
      skin: type.skin,
      flesh: type.flesh,
      sliced: false,
      missed: false,
      enteredScreen: false,
    };
  }

  function spawnBomb() {
    var x = 50 + Math.random() * (CW - 100);
    var vx = (Math.random() - 0.5) * 4;
    var vy = -(8 + Math.random() * 4);
    return {
      x: x, y: CH + 40,
      vx: vx, vy: vy,
      r: 24,
      type: 'bomb',
      sliced: false,
      missed: false,
      enteredScreen: false,
      exploded: false,
    };
  }

  // ===== WAVES =====

  function getFruitsPerWave() {
    return Math.min(5, 2 + Math.floor(gameTime / 12));
  }

  function spawnWave() {
    var count = Math.floor(Math.random() * 3) + getFruitsPerWave() - 1;
    var actualCount = Math.max(2, count);
    for (var i = 0; i < actualCount; i++) {
      fruits.push(spawnFruit());
    }
    // Bomb chance increases over time
    var bombChance = Math.min(0.25, 0.08 + gameTime * 0.003);
    if (gameTime > 4 && Math.random() < bombChance) {
      bombs.push(spawnBomb());
    }
  }

  // ===== PARTICLES =====

  function createParticles(x, y, color, count) {
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 1 + Math.random() * 7;
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed - 1,
        life: 1,
        decay: 0.012 + Math.random() * 0.018,
        size: 2 + Math.random() * 4,
        color: color,
      });
    }
  }

  // ===== SLICING =====

  function lineCircleHit(x1, y1, x2, y2, cx, cy, r) {
    var dx = x2 - x1;
    var dy = y2 - y1;
    var fx = x1 - cx;
    var fy = y1 - cy;

    var a = dx * dx + dy * dy;
    if (a === 0) return Math.hypot(fx, fy) < r;

    var b = 2 * (fx * dx + fy * dy);
    var c = fx * fx + fy * fy - r * r;
    var disc = b * b - 4 * a * c;
    if (disc < 0) return false;

    disc = Math.sqrt(disc);
    var t1 = (-b - disc) / (2 * a);
    var t2 = (-b + disc) / (2 * a);
    if ((t1 >= 0 && t1 <= 1) || (t2 >= 0 && t2 <= 1)) return true;

    // Endpoint inside circle
    return Math.hypot(x1 - cx, y1 - cy) < r || Math.hypot(x2 - cx, y2 - cy) < r;
  }

  function sliceFruit(fruit, px, py) {
    if (fruit.sliced) return;
    fruit.sliced = true;

    var now = Date.now();
    if (now - lastSliceTime < COMBO_WINDOW) {
      combo++;
    } else {
      combo = 1;
    }
    lastSliceTime = now;

    score += 1;
    if (score > highScore) {
      highScore = score;
      FW.storage.setHighScore(score);
    }

    FW.audio.sfx('score');
    FW.events.reportScore(score);

    // Particles
    createParticles(fruit.x, fruit.y, fruit.flesh, 18);
    createParticles(fruit.x, fruit.y, fruit.skin, 6);

    // Flash
    sliceFlashes.push({ x: fruit.x, y: fruit.y, r: 4, alpha: 1, life: 150, start: Date.now() });

    playSlice();
    updateUI();
  }

  function hitBomb(bomb) {
    if (bomb.exploded) return;
    bomb.exploded = true;

    // Lots of dark and red particles
    createParticles(bomb.x, bomb.y, '#ff4400', 20);
    createParticles(bomb.x, bomb.y, '#111', 15);
    createParticles(bomb.x, bomb.y, '#ffcc00', 10);

    // Big flash
    sliceFlashes.push({ x: bomb.x, y: bomb.y, r: 30, alpha: 1, life: 300, start: Date.now() });

    playBomb();
    endGame();
  }

  function checkSlice(px, py) {
    for (var fi = 0; fi < fruits.length; fi++) {
      var f = fruits[fi];
      if (!f.sliced && lineCircleHit(prevPointer.x, prevPointer.y, px, py, f.x, f.y, f.r)) {
        sliceFruit(f, px, py);
      }
    }
    for (var bi = 0; bi < bombs.length; bi++) {
      var b = bombs[bi];
      if (!b.exploded && lineCircleHit(prevPointer.x, prevPointer.y, px, py, b.x, b.y, b.r)) {
        hitBomb(b);
        return;
      }
    }
  }

  // ===== GAME MANAGEMENT =====

  function startGame() {
    score = 0;
    combo = 0;
    misses = 0;
    gameTime = 0;
    waveTimer = WAVE_INITIAL;
    fruits = [];
    bombs = [];
    particles = [];
    trail = [];
    sliceFlashes = [];
    lastSliceTime = 0;
    phase = 'play';
    overlay.classList.remove('active');
    updateMissDots();
    updateUI();
    hideBtn();
    if (lastFrameTime === 0) lastFrameTime = performance.now();
  }

  function endGame() {
    var isNew = false;
    if (score > highScore) {
      highScore = score;
      isNew = FW.storage.setHighScore(score);
    }

    if (isNew && score > 0) {
      FW.audio.sfx('win');
    }
    FW.audio.sfx('gameover');
    FW.events.reportComplete(score, { won: false });

    phase = 'gameover';
    updateUI();

    // Show HTML overlay
    overlayScore.textContent = '得分: ' + score;
    if (isNew && score > 0) {
      overlayNewRecord.style.display = 'block';
    } else {
      overlayNewRecord.style.display = 'none';
    }
    overlay.classList.add('active');
    showBtn();
  }

  function getWaveInterval() {
    return Math.max(WAVE_MIN, WAVE_INITIAL - gameTime * 25);
  }

  // ===== UPDATE =====

  function update(dt) {
    if (phase !== 'play') return;

    var dts = dt / 1000; // seconds
    gameTime += dts;

    // Wave timer
    waveTimer -= dt;
    if (waveTimer <= 0) {
      spawnWave();
      waveTimer = getWaveInterval();
    }

    // Update fruits
    for (var fi = 0; fi < fruits.length; fi++) {
      var f = fruits[fi];
      if (f.sliced) continue;

      f.x += f.vx;
      f.y += f.vy;
      f.vy += GRAVITY;

      if (!f.enteredScreen && f.y < CH) f.enteredScreen = true;
      if (f.enteredScreen && !f.missed && f.y > CH + 40) {
        f.missed = true;
        misses++;
        updateMissDots();
        if (misses >= MAX_MISSES) {
          endGame();
          return;
        }
      }
      if (!f.missed && f.y + f.r < -60) {
        f.missed = true;
        misses++;
        updateMissDots();
        if (misses >= MAX_MISSES) {
          endGame();
          return;
        }
      }
    }

    // Update bombs
    for (var bi = 0; bi < bombs.length; bi++) {
      var b = bombs[bi];
      if (b.exploded) continue;
      b.x += b.vx;
      b.y += b.vy;
      b.vy += GRAVITY;
      if (!b.enteredScreen && b.y < CH) b.enteredScreen = true;
    }

    // Update particles
    for (var pi = 0; pi < particles.length; pi++) {
      var p = particles[pi];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += GRAVITY * 0.6;
      p.life -= p.decay;
      p.vx *= 0.98;
      p.vy *= 0.98;
    }
    particles = particles.filter(function (p) { return p.life > 0; });

    // Update slice flashes
    for (var sfi = 0; sfi < sliceFlashes.length; sfi++) {
      var fl = sliceFlashes[sfi];
      var elapsed = Date.now() - fl.start;
      fl.alpha = Math.max(0, 1 - elapsed / fl.life);
      if (fl.life > 200) {
        fl.r += elapsed * 0.01;
      } else {
        fl.r += 0.5;
      }
    }
    sliceFlashes = sliceFlashes.filter(function (fl) { return fl.alpha > 0; });

    // Clean up off-screen fruits and bombs
    fruits = fruits.filter(function (f) { return !f.missed && !f.sliced && f.y < CH + 100 && f.y > -80; });
    bombs = bombs.filter(function (b) { return !b.exploded && b.y < CH + 100 && b.y > -80; });

    // Update trail (remove old points)
    var now = Date.now();
    trail = trail.filter(function (p) { return now - p.time < 200; });

    // Combo timeout
    if (combo > 0 && now - lastSliceTime > COMBO_WINDOW) {
      combo = 0;
      updateUI();
    }
  }

  // ===== DRAWING =====

  function drawBg() {
    var grad = ctx.createRadialGradient(CW / 2, CH * 0.4, 50, CW / 2, CH * 0.4, 400);
    grad.addColorStop(0, '#1a1a2e');
    grad.addColorStop(0.5, '#16213e');
    grad.addColorStop(1, '#0f0c29');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, CW, CH);
  }

  function drawFruit(f) {
    if (f.sliced) return;

    // Glow
    ctx.save();
    ctx.shadowColor = f.skin;
    ctx.shadowBlur = 8;

    // Main circle
    var grad = ctx.createRadialGradient(f.x - f.r * 0.25, f.y - f.r * 0.25, 2, f.x, f.y, f.r);
    grad.addColorStop(0, lighten(f.skin, 40));
    grad.addColorStop(1, f.skin);
    ctx.beginPath();
    ctx.arc(f.x, f.y, f.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();

    // Gloss highlight
    ctx.shadowBlur = 0;
    ctx.beginPath();
    ctx.arc(f.x - f.r * 0.3, f.y - f.r * 0.3, f.r * 0.3, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fill();

    ctx.restore();

    // Stem for appropriate fruits
    if (f.type === 'apple' || f.type === 'watermelon') {
      ctx.beginPath();
      ctx.moveTo(f.x + 2, f.y - f.r);
      ctx.lineTo(f.x + 6, f.y - f.r - 6);
      ctx.strokeStyle = '#5d4037';
      ctx.lineWidth = 2;
      ctx.stroke();
      // Small leaf
      ctx.beginPath();
      ctx.ellipse(f.x + 7, f.y - f.r - 5, 4, 2, 0.3, 0, Math.PI * 2);
      ctx.fillStyle = '#27ae60';
      ctx.fill();
    }
  }

  function drawBomb(b) {
    if (b.exploded) return;

    // Red glow
    ctx.save();
    ctx.shadowColor = '#ff4400';
    ctx.shadowBlur = 15;

    var grad = ctx.createRadialGradient(b.x - 4, b.y - 4, 2, b.x, b.y, b.r);
    grad.addColorStop(0, '#555');
    grad.addColorStop(0.7, '#222');
    grad.addColorStop(1, '#111');
    ctx.beginPath();
    ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
    ctx.restore();

    // Fuse stem
    ctx.beginPath();
    ctx.moveTo(b.x, b.y - b.r);
    ctx.lineTo(b.x + 6, b.y - b.r - 9);
    ctx.strokeStyle = '#5d4037';
    ctx.lineWidth = 2;
    ctx.stroke();

    // Spark
    var sparkTime = Date.now() * 0.01;
    var sparkR = 3 + Math.sin(sparkTime) * 1.5;
    ctx.beginPath();
    ctx.arc(b.x + 6, b.y - b.r - 10, sparkR, 0, Math.PI * 2);
    var sparkGrad = ctx.createRadialGradient(b.x + 6, b.y - b.r - 10, 0, b.x + 6, b.y - b.r - 10, sparkR);
    sparkGrad.addColorStop(0, '#fff');
    sparkGrad.addColorStop(0.3, '#ff6600');
    sparkGrad.addColorStop(1, 'rgba(255,100,0,0)');
    ctx.fillStyle = sparkGrad;
    ctx.fill();

    // Danger stripes
    ctx.strokeStyle = '#c0392b';
    ctx.lineWidth = 3;
    for (var i = 0; i < 3; i++) {
      var angle = (i / 3) * Math.PI * 2 + 0.3;
      var rad = b.r * 0.7;
      ctx.beginPath();
      ctx.arc(b.x, b.y, rad, angle, angle + 0.4);
      ctx.stroke();
    }
  }

  function drawParticles() {
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawTrail() {
    if (trail.length < 2) return;
    var now = Date.now();
    ctx.save();

    for (var i = 1; i < trail.length; i++) {
      var p0 = trail[i - 1];
      var p1 = trail[i];
      var age = now - p1.time;
      if (age > 200) continue;

      var alpha = Math.max(0, 1 - age / 200);
      var width = 2 + alpha * 4;

      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
      ctx.lineWidth = width;
      ctx.lineCap = 'round';
      ctx.shadowColor = 'rgba(255,255,255,' + (alpha * 0.6) + ')';
      ctx.shadowBlur = 12;
      ctx.stroke();

      // Inner bright core
      ctx.beginPath();
      ctx.moveTo(p0.x, p0.y);
      ctx.lineTo(p1.x, p1.y);
      ctx.strokeStyle = 'rgba(255,255,255,' + (alpha * 0.8) + ')';
      ctx.lineWidth = Math.max(1, width * 0.3);
      ctx.shadowBlur = 0;
      ctx.stroke();
    }

    ctx.restore();
  }

  function drawSliceFlashes() {
    for (var i = 0; i < sliceFlashes.length; i++) {
      var fl = sliceFlashes[i];
      ctx.globalAlpha = fl.alpha;
      ctx.beginPath();
      ctx.arc(fl.x, fl.y, fl.r, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
    }
    ctx.globalAlpha = 1;
  }

  function drawOverlay() {
    if (phase === 'title') {
      ctx.fillStyle = 'rgba(0,0,0,0.4)';
      ctx.fillRect(0, 0, CW, CH);

      ctx.fillStyle = '#fff';
      ctx.font = 'bold 32px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('水果忍者', CW / 2, CH / 2 - 20);

      ctx.fillStyle = 'rgba(255,255,255,0.5)';
      ctx.font = '14px sans-serif';
      ctx.fillText('滑动屏幕切开水果 小心炸弹!', CW / 2, CH / 2 + 20);
    }

    if (phase === 'gameover') {
      ctx.fillStyle = 'rgba(0,0,0,0.7)';
      ctx.fillRect(0, 0, CW, CH);

      ctx.fillStyle = '#e74c3c';
      ctx.font = 'bold 36px sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('游戏结束', CW / 2, CH / 2 - 30);

      ctx.fillStyle = '#fff';
      ctx.font = '20px sans-serif';
      ctx.fillText('得分: ' + score, CW / 2, CH / 2 + 20);

      if (score === highScore && score > 0) {
        ctx.fillStyle = '#f1c40f';
        ctx.font = '16px sans-serif';
        ctx.fillText('新纪录!', CW / 2, CH / 2 + 50);
      }
    }

    // Miss indicators on canvas
    if (phase === 'play') {
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'right';
      ctx.fillText('已失手: ' + misses + '/' + MAX_MISSES, CW - 10, 22);
    }
  }

  function lighten(hex, amt) {
    var r = parseInt(hex.slice(1, 3), 16);
    var g = parseInt(hex.slice(3, 5), 16);
    var b = parseInt(hex.slice(5, 7), 16);
    r = Math.min(255, r + amt);
    g = Math.min(255, g + amt);
    b = Math.min(255, b + amt);
    return 'rgb(' + r + ',' + g + ',' + b + ')';
  }

  // ===== UI =====

  function updateUI() {
    scoreEl.textContent = score;
    hiEl.textContent = highScore;
    comboEl.textContent = combo;
  }

  function updateMissDots() {
    for (var i = 0; i < 3; i++) {
      missDots[i].classList.toggle('active', i < misses);
    }
  }

  function showBtn() {
    btn.classList.remove('hidden');
    btn.textContent = phase === 'gameover' ? '重新开始' : '开始游戏';
  }

  function hideBtn() { btn.classList.add('hidden'); }

  // ===== EVENTS =====

  function getCanvasPos(clientX, clientY) {
    var rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (canvas.width / rect.width),
      y: (clientY - rect.top) * (canvas.height / rect.height),
    };
  }

  function handlePointerDown(x, y) {
    if (phase !== 'play') return;
    isSwipping = true;
    prevPointer = { x: x, y: y, time: Date.now() };
    trail = [{ x: x, y: y, time: Date.now() }];
  }

  function handlePointerMove(x, y) {
    if (phase !== 'play' || !isSwipping || !prevPointer) return;

    var now = Date.now();
    trail.push({ x: x, y: y, time: now });

    checkSlice(x, y);
    prevPointer = { x: x, y: y, time: now };
  }

  function handlePointerUp() {
    isSwipping = false;
    // Don't reset prevPointer so last segment can still slice
  }

  // Mouse events
  canvas.addEventListener('mousedown', function (e) {
    var p = getCanvasPos(e.clientX, e.clientY);
    handlePointerDown(p.x, p.y);
  });

  canvas.addEventListener('mousemove', function (e) {
    var p = getCanvasPos(e.clientX, e.clientY);
    handlePointerMove(p.x, p.y);
  });

  canvas.addEventListener('mouseup', function () {
    handlePointerUp();
  });

  canvas.addEventListener('mouseleave', function () {
    handlePointerUp();
  });

  // Touch events
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var t = e.touches[0];
    var p = getCanvasPos(t.clientX, t.clientY);
    handlePointerDown(p.x, p.y);
  }, { passive: false });

  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    var t = e.touches[0];
    var p = getCanvasPos(t.clientX, t.clientY);
    handlePointerMove(p.x, p.y);
  }, { passive: false });

  canvas.addEventListener('touchend', function (e) {
    e.preventDefault();
    handlePointerUp();
  }, { passive: false });

  // Button
  btn.addEventListener('click', function () {
    FW.audio.sfx('click');
    startGame();
  });

  restartBtn.addEventListener('click', function () {
    FW.audio.sfx('click');
    overlay.classList.remove('active');
    startGame();
  });

  // ===== GAME LOOP =====

  function render() {
    drawBg();

    // Draw particles behind fruits
    drawParticles();

    for (var fi = 0; fi < fruits.length; fi++) drawFruit(fruits[fi]);
    for (var bi = 0; bi < bombs.length; bi++) drawBomb(bombs[bi]);

    drawTrail();
    drawSliceFlashes();
    drawOverlay();
  }

  function loop(timestamp) {
    var dt = lastFrameTime === 0 ? 16 : Math.min(timestamp - lastFrameTime, 50);
    lastFrameTime = timestamp;

    update(dt);
    render();

    animId = requestAnimationFrame(loop);
  }

  // ===== INIT =====

  hiEl.textContent = highScore;
  updateUI();

  // Start loop
  lastFrameTime = 0;
  animId = requestAnimationFrame(loop);
})();
</script>
</body>
</html>
