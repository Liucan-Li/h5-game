<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>保龄球 - 10瓶保龄球</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #f5f6fa;
    font-family: 'Microsoft YaHei', 'PingFang SC', 'Noto Sans SC', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    touch-action: manipulation;
    user-select: none;
    -webkit-user-select: none;
  }
  .container {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px;
    max-width: 520px;
    width: 100%;
  }
  h1 {
    font-size: 26px;
    color: #2c3e50;
    letter-spacing: 4px;
  }
  .score-card {
    display: flex;
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    border: 1px solid #e0e0e0;
  }
  .frame-cell {
    flex: 1;
    border-right: 1px solid #e0e0e0;
    text-align: center;
    font-size: 11px;
  }
  .frame-cell:last-child { border-right: none; }
  .frame-header {
    background: #ecf0f1;
    padding: 2px 0;
    font-weight: bold;
    color: #666;
    font-size: 10px;
  }
  .frame-rolls {
    display: flex;
    border-bottom: 1px solid #e0e0e0;
  }
  .frame-rolls .roll {
    flex: 1;
    padding: 1px 0;
    font-size: 13px;
    font-weight: bold;
    min-height: 22px;
    line-height: 22px;
  }
  .frame-rolls .roll:first-child {
    border-right: 1px solid #e0e0e0;
  }
  .frame-rolls .roll.extra {
    border-right: none;
  }
  .frame-score {
    padding: 3px 0;
    font-size: 14px;
    font-weight: bold;
    color: #2c3e50;
    min-height: 24px;
    line-height: 24px;
  }
  canvas {
    display: block;
    width: 100%;
    max-width: 480px;
    height: auto;
    aspect-ratio: 480 / 500;
    border-radius: 12px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
    cursor: pointer;
    touch-action: none;
  }
  .info-bar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    width: 100%;
    max-width: 480px;
    background: #fff;
    border-radius: 10px;
    padding: 8px 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    flex-wrap: wrap;
    gap: 4px;
  }
  .info-item {
    font-size: 13px;
    color: #555;
    white-space: nowrap;
  }
  .info-item span {
    color: #2c3e50;
    font-weight: bold;
  }
  .info-item .hi-val { color: #e67e22; }
  .btn {
    padding: 8px 20px;
    border: none;
    border-radius: 8px;
    font-size: 14px;
    font-weight: bold;
    cursor: pointer;
    transition: all 0.2s;
    color: #fff;
    font-family: inherit;
  }
  .btn:active { transform: scale(0.95); }
  .btn-start { background: #2980b9; }
  .btn-start:hover { background: #2471a3; }
  .btn-start:disabled { background: #bdc3c7; cursor: not-allowed; transform: none; }
  .status-line {
    font-size: 14px;
    color: #555;
    font-weight: bold;
  }
  .status-line .highlight {
    color: #e74c3c;
  }
  @media (max-width: 500px) {
    .container { padding: 8px; gap: 6px; }
    h1 { font-size: 22px; }
    .frame-cell { font-size: 9px; }
    .frame-rolls .roll { font-size: 11px; min-height: 18px; line-height: 18px; }
    .frame-score { font-size: 12px; min-height: 20px; line-height: 20px; }
    .info-item { font-size: 11px; }
  }
</style>
</head>
<body>
<div class="container">
  <h1>保龄球</h1>

  <div class="score-card" id="scoreCard"></div>

  <canvas id="gameCanvas" width="480" height="500"></canvas>

  <div class="info-bar">
    <div class="info-item" id="frameInfo">第 <span>1</span> 局 第 <span>1</span> 投</div>
    <div class="info-item" id="totalScoreInfo">总分 <span>0</span></div>
    <div class="info-item">最高分 <span class="hi-val" id="hiDisplay">0</span></div>
    <button class="btn btn-start" id="startBtn">开始游戏</button>
  </div>

  <div class="info-bar" id="resultBar" style="display:none;">
    <div class="status-line" id="resultText"></div>
  </div>
</div>

<script>
(function () {
  'use strict';

  // ========== CONSTANTS ==========
  const CW = 480, CH = 500;

  // Lane
  const LANE_LEFT = 148;
  const LANE_RIGHT = 332;
  const LANE_WIDTH = LANE_RIGHT - LANE_LEFT;
  const LANE_CENTER = (LANE_LEFT + LANE_RIGHT) / 2;
  const GUTTER_W = 14;

  // Pins
  const PIN_RADIUS = 11;
  const PIN_SPACING = 36;
  const PIN_POSITIONS = [
    // [x, y] for pins 1-10 (0-indexed)
    // Row 3 (headpin, closest to player)
    { x: 0, y: 0 },    // pin 1 index 0
    // Row 2
    { x: -18, y: 36 },  // pin 2
    { x: 18, y: 36 },   // pin 3
    // Row 1
    { x: -36, y: 72 },  // pin 4
    { x: 0, y: 72 },    // pin 5
    { x: 36, y: 72 },   // pin 6
    // Row 0 (back row)
    { x: -54, y: 108 }, // pin 7
    { x: -18, y: 108 }, // pin 8
    { x: 18, y: 108 },  // pin 9
    { x: 54, y: 108 },  // pin 10
  ];

  // Ball
  const BALL_RADIUS = 10;
  const BALL_START_Y = 420;

  // Physics
  const MAX_SPEED = 12;
  const FRICTION = 0.997;
  const MIN_SPEED = 0.05;
  const MAX_ANGLE = Math.PI / 12; // 15 degrees

  // Power charge rate (% per ms)
  const CHARGE_RATE = 0.0005;

  // ========== CANVAS SETUP ==========
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');

  // ========== DOM REFS ==========
  const scoreCardEl = document.getElementById('scoreCard');
  const frameInfoEl = document.getElementById('frameInfo');
  const totalScoreInfoEl = document.getElementById('totalScoreInfo');
  const hiDisplayEl = document.getElementById('hiDisplay');
  const startBtn = document.getElementById('startBtn');
  const resultBar = document.getElementById('resultBar');
  const resultText = document.getElementById('resultText');

  // ========== GAME STATE ==========
  let pins = [];       // { x, y, standing, fallDir, fallFrame }
  let ball = { x: LANE_CENTER, y: BALL_START_Y, vx: 0, vy: 0, active: false, rotation: 0 };
  let power = 0;
  let isCharging = false;
  let chargeStart = 0;
  let aimX = LANE_CENTER;
  let aimY = CH - 40;

  // Scoring
  let allRolls = [];
  let currentFrame = 0;     // 0-indexed, 0-9
  let rollInFrame = 0;      // 0 or 1 (or 2 in 10th)
  let frameResults = null;  // array of {score, complete}
  let gameActive = false;
  let isAnimating = false;
  let animPhase = 'idle';   // idle, aiming, charging, rolling, settling, done

  let highScore = 0;
  let animFrameId = null;
  let settledCount = 0;
  let ballMoving = false;
  let standingBeforeThrow = 10;
  let frameBeforeRoll = 0;

  // ========== HIGH SCORE ==========
  try {
    const stored = localStorage.getItem('bowling_hi');
    if (stored) highScore = parseInt(stored, 10) || 0;
  } catch (e) { /* ignore */ }
  hiDisplayEl.textContent = highScore;

  function saveHighScore(sc) {
    if (sc > highScore) {
      highScore = sc;
      hiDisplayEl.textContent = highScore;
      try { localStorage.setItem('bowling_hi', String(highScore)); } catch (e) { /* ignore */ }
    }
  }

  // ========== SCOREBOARD RENDERING ==========
  function buildScoreCard() {
    scoreCardEl.innerHTML = '';
    for (let f = 0; f < 10; f++) {
      const cell = document.createElement('div');
      cell.className = 'frame-cell';
      cell.id = 'fc' + f;

      // Header
      const hdr = document.createElement('div');
      hdr.className = 'frame-header';
      hdr.textContent = f + 1;
      cell.appendChild(hdr);

      // Rolls
      const rolls = document.createElement('div');
      rolls.className = 'frame-rolls';
      const rollCount = (f === 9) ? 3 : 2;
      for (let r = 0; r < rollCount; r++) {
        const rl = document.createElement('div');
        rl.className = 'roll';
        if (r === 2) rl.classList.add('extra');
        rl.id = 'fc' + f + 'r' + r;
        rolls.appendChild(rl);
      }
      cell.appendChild(rolls);

      // Score
      const sc = document.createElement('div');
      sc.className = 'frame-score';
      sc.id = 'fc' + f + 's';
      cell.appendChild(sc);

      scoreCardEl.appendChild(cell);
    }
  }
  buildScoreCard();

  function updateScoreCard() {
    const results = getFrameScores();
    frameResults = results;

    let rollIdx = 0;
    for (let f = 0; f < 10; f++) {
      const r1El = document.getElementById('fc' + f + 'r0');
      const r2El = document.getElementById('fc' + f + 'r1');
      const r3El = (f === 9) ? document.getElementById('fc' + f + 'r2') : null;
      const sEl = document.getElementById('fc' + f + 's');

      // Clear
      r1El.textContent = '';
      r2El.textContent = '';
      if (r3El) r3El.textContent = '';

      if (rollIdx >= allRolls.length) break;

      if (f < 9) {
        const first = allRolls[rollIdx];
        if (first === 10) {
          r1El.textContent = 'X';
          rollIdx += 1;
        } else if (rollIdx + 1 < allRolls.length) {
          const second = allRolls[rollIdx + 1];
          r1El.textContent = first === 0 ? '-' : String(first);
          if (first + second === 10) {
            r2El.textContent = '/';
          } else {
            r2El.textContent = second === 0 ? '-' : String(second);
          }
          rollIdx += 2;
        } else {
          r1El.textContent = first === 0 ? '-' : String(first);
          break;
        }
      } else {
        // 10th frame
        const rollsInFrame = [];
        for (let r = rollIdx; r < allRolls.length && r < rollIdx + 3; r++) {
          rollsInFrame.push(allRolls[r]);
        }
        const rollEles = [r1El, r2El, r3El];
        for (let r = 0; r < rollsInFrame.length && r < 3; r++) {
          const val = rollsInFrame[r];
          if (r === 0 && val === 10) {
            rollEles[r].textContent = 'X';
          } else if (r === 1 && rollsInFrame[0] !== 10 && rollsInFrame[0] + val === 10) {
            rollEles[r].textContent = '/';
          } else if (r === 2 && rollsInFrame.length >= 3) {
            if (rollsInFrame[1] === 10) {
              rollEles[r].textContent = val === 10 ? 'X' : (val === 0 ? '-' : String(val));
            } else if (rollsInFrame[0] + rollsInFrame[1] === 10) {
              rollEles[r].textContent = val === 10 ? 'X' : (val === 0 ? '-' : String(val));
            } else {
              rollEles[r].textContent = val === 10 ? 'X' : (val === 0 ? '-' : String(val));
            }
          } else if (r === 1 && rollsInFrame[0] === 10) {
            rollEles[r].textContent = val === 10 ? 'X' : (val === 0 ? '-' : String(val));
          } else {
            rollEles[r].textContent = val === 0 ? '-' : String(val);
          }
        }
        rollIdx += rollsInFrame.length;
      }

      // Score
      if (results[f] && results[f].complete) {
        sEl.textContent = results[f].cumulative;
      } else if (results[f] && results[f].score !== null) {
        sEl.textContent = results[f].score;
      }
    }

    // Total score
    let total = 0;
    for (let f = 0; f < 10; f++) {
      if (results[f] && results[f].complete) {
        total = results[f].cumulative;
      } else {
        break;
      }
    }
    totalScoreInfoEl.innerHTML = '总分 <span>' + total + '</span>';
    if (total > highScore) {
      saveHighScore(total);
    }
  }

  // ========== SCORING LOGIC ==========
  function getFrameScores() {
    const frames = [];
    let rollIdx = 0;
    let cumulative = 0;

    for (let f = 0; f < 10; f++) {
      if (rollIdx >= allRolls.length) {
        frames.push({ score: null, raw: null, complete: false, cumulative: cumulative });
        continue;
      }

      const first = allRolls[rollIdx];
      let frameScore = null;
      let complete = false;

      if (f < 9) {
        if (first === 10) {
          // Strike
          if (rollIdx + 2 < allRolls.length) {
            frameScore = 10 + allRolls[rollIdx + 1] + allRolls[rollIdx + 2];
            complete = true;
            rollIdx += 1;
          }
        } else if (rollIdx + 1 < allRolls.length) {
          const second = allRolls[rollIdx + 1];
          if (first + second === 10) {
            if (rollIdx + 2 < allRolls.length) {
              frameScore = 10 + allRolls[rollIdx + 2];
              complete = true;
              rollIdx += 2;
            }
          } else {
            frameScore = first + second;
            complete = true;
            rollIdx += 2;
          }
        }
      } else {
        // 10th frame
        if (first === 10) {
          // Strike => need 2 more
          if (rollIdx + 2 < allRolls.length) {
            frameScore = 10 + allRolls[rollIdx + 1] + allRolls[rollIdx + 2];
            complete = true;
            rollIdx += 3;
          }
        } else if (rollIdx + 1 < allRolls.length) {
          const second = allRolls[rollIdx + 1];
          if (first + second === 10) {
            // Spare => need 1 more
            if (rollIdx + 2 < allRolls.length) {
              frameScore = 10 + allRolls[rollIdx + 2];
              complete = true;
              rollIdx += 3;
            }
          } else {
            frameScore = first + second;
            complete = true;
            rollIdx += 2;
          }
        }
      }

      if (frameScore !== null) {
        cumulative += frameScore;
        frames.push({
          score: frameScore,
          raw: frameScore,
          complete: complete,
          cumulative: cumulative,
        });
      } else {
        frames.push({ score: null, raw: null, complete: false, cumulative: cumulative });
      }
    }
    return frames;
  }

  function isGameOver() {
    const results = getFrameScores();
    return results[9] && results[9].complete;
  }

  function getThisFrameRollCount() {
    // How many rolls have been taken in the current frame so far
    let rollIdx = 0;
    for (let f = 0; f < currentFrame; f++) {
      if (rollIdx >= allRolls.length) break;
      const first = allRolls[rollIdx];
      if (f < 9) {
        if (first === 10) {
          rollIdx += 1;
        } else if (rollIdx + 1 < allRolls.length) {
          rollIdx += 2;
        } else {
          rollIdx += 1;
          break;
        }
      } else {
        // 10th frame
        if (first === 10) {
          if (rollIdx + 2 < allRolls.length) rollIdx += 3;
          else { rollIdx = allRolls.length; break; }
        } else if (rollIdx + 1 < allRolls.length) {
          if (first + allRolls[rollIdx + 1] === 10) {
            if (rollIdx + 2 < allRolls.length) rollIdx += 3;
            else { rollIdx = allRolls.length; break; }
          } else {
            rollIdx += 2;
          }
        } else {
          rollIdx = allRolls.length;
          break;
        }
      }
    }
    // rollIdx points to first roll of current frame
    // Count how many rolls from current frame
    let cnt = 0;
    for (let r = rollIdx; r < allRolls.length; r++) {
      cnt++;
    }
    return cnt;
  }

  function getCurrentRollInFrame() {
    let rollIdx = 0;
    for (let f = 0; f < currentFrame; f++) {
      if (rollIdx >= allRolls.length) break;
      const first = allRolls[rollIdx];
      if (f < 9) {
        if (first === 10) {
          rollIdx += 1;
        } else if (rollIdx + 1 < allRolls.length) {
          rollIdx += 2;
        } else {
          rollIdx = allRolls.length;
          break;
        }
      } else {
        if (first === 10) {
          if (rollIdx + 2 < allRolls.length) rollIdx += 3;
          else { rollIdx = allRolls.length; break; }
        } else if (rollIdx + 1 < allRolls.length) {
          if (first + allRolls[rollIdx + 1] === 10) {
            if (rollIdx + 2 < allRolls.length) rollIdx += 3;
            else { rollIdx = allRolls.length; break; }
          } else {
            rollIdx += 2;
          }
        } else {
          rollIdx = allRolls.length;
          break;
        }
      }
    }
    return allRolls.length - rollIdx;
  }

  // ========== SETUP PINS ==========
  function resetPins() {
    pins = [];
    for (let i = 0; i < 10; i++) {
      pins.push({
        x: LANE_CENTER + PIN_POSITIONS[i].x,
        y: 80 + PIN_POSITIONS[i].y,
        standing: true,
        fallDir: 0,
        fallFrame: 0,
        pinNumber: i + 1,
      });
    }
  }

  // ========== GAME FLOW ==========
  function startGame() {
    if (animFrameId) {
      cancelAnimationFrame(animFrameId);
      animFrameId = null;
    }
    animPhase = 'idle';
    gameActive = true;
    isAnimating = false;
    ballMoving = false;
    allRolls = [];
    currentFrame = 0;
    power = 0;
    isCharging = false;
    ball = { x: LANE_CENTER, y: BALL_START_Y, vx: 0, vy: 0, active: false, rotation: 0 };
    aimX = LANE_CENTER;
    resultBar.style.display = 'none';

    resetPins();
    updateScoreCard();
    updateUIInfo();
    render();

    startBtn.textContent = '重新开始';
    animPhase = 'aiming';
  }

  function nextRoll() {
    const rollsInThisFrame = getCurrentRollInFrame();
    let maxRolls = 2;
    if (currentFrame === 9) maxRolls = 3;

    const isNewFrame = (rollsInThisFrame === 0);
    if (isNewFrame && currentFrame < 9) {
      // Moving to next frame (already done by recordRoll)
    }

    updateUIInfo();
    updateScoreCard();

    if (isGameOver()) {
      endGame();
      return;
    }

    // Reset for next throw
    ball = { x: LANE_CENTER, y: BALL_START_Y, vx: 0, vy: 0, active: false, rotation: 0 };
    power = 0;
    animPhase = 'aiming';
    render();
  }

  function endGame() {
    gameActive = false;
    animPhase = 'done';
    updateScoreCard();
    render();

    // Show result
    const results = getFrameScores();
    let total = 0;
    for (let f = 0; f < 10; f++) {
      if (results[f] && results[f].complete) total = results[f].cumulative;
    }

    saveHighScore(total);

    resultBar.style.display = 'flex';
    let statusMsg = '比赛结束! 总分: ' + total;
    // Check if perfect game
    if (total === 300) {
      statusMsg = '完美! 满贯300分!';
    } else if (total >= 250) {
      statusMsg = '超棒! 得分: ' + total;
    }
    resultText.textContent = statusMsg;
    startBtn.textContent = '再来一局';
  }

  function recordRoll(pinCount) {
    allRolls.push(pinCount);

    // Determine if this advances the frame
    const rollsInThisFrame = getCurrentRollInFrame();

    // Check if strike in non-10th
    if (currentFrame < 9 && pinCount === 10 && rollsInThisFrame === 1) {
      // Strike, this frame is done, move to next
      currentFrame++;
    } else if (currentFrame < 9) {
      if (rollsInThisFrame >= 2) {
        currentFrame++;
      }
    } else {
      // 10th frame - isGameOver will determine completion
    }

    updateScoreCard();
    updateUIInfo();
  }

  function updateUIInfo() {
    const frameNum = Math.min(currentFrame + 1, 10);
    const rollNum = getCurrentRollInFrame() + 1;
    frameInfoEl.innerHTML = '第 <span>' + frameNum + '</span> 局 第 <span>' + rollNum + '</span> 投';
  }

  // ========== KNOCK DOWN PINS ==========
  function knockDownPins(hitIndex) {
    if (hitIndex < 0 || hitIndex >= 10) return;
    if (!pins[hitIndex].standing) return;

    pins[hitIndex].standing = false;
    pins[hitIndex].fallFrame = 0;

    // Domino effect: check nearby pins
    for (let i = 0; i < 10; i++) {
      if (i === hitIndex || !pins[i].standing) continue;
      const dx = pins[hitIndex].x - pins[i].x;
      const dy = pins[hitIndex].y - pins[i].y;
      const dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < PIN_SPACING * 1.3) {
        // 50% chance this nearby pin also falls
        if (Math.random() < 0.6) {
          knockDownPins(i);
        }
      }
    }
  }

  function countStandingPins() {
    let count = 0;
    for (let i = 0; i < pins.length; i++) {
      if (pins[i].standing) count++;
    }
    return count;
  }

  function findRollIdxBeforeFrame(goal) {
    let rollIdx = 0;
    for (let f = 0; f < goal; f++) {
      if (rollIdx >= allRolls.length) break;
      const first = allRolls[rollIdx];
      if (f < 9) {
        if (first === 10) {
          rollIdx += 1;
        } else if (rollIdx + 1 < allRolls.length) {
          rollIdx += 2;
        } else {
          rollIdx = allRolls.length;
          break;
        }
      } else {
        if (first === 10) {
          if (rollIdx + 2 < allRolls.length) rollIdx += 3;
          else { rollIdx = allRolls.length; break; }
        } else if (rollIdx + 1 < allRolls.length) {
          if (first + allRolls[rollIdx + 1] === 10) {
            if (rollIdx + 2 < allRolls.length) rollIdx += 3;
            else { rollIdx = allRolls.length; break; }
          } else {
            rollIdx += 2;
          }
        } else {
          rollIdx = allRolls.length;
          break;
        }
      }
    }
    return rollIdx;
  }

  function checkNeedPinReset(knocked) {
    // New frame started -> reset pins for next frame
    if (currentFrame !== frameBeforeRoll) return true;

    // Same frame but in 10th frame: check for strike or spare
    if (currentFrame === 9) {
      // Strike on any throw in the 10th -> reset for bonus
      if (knocked === 10) return true;

      // Spare check: first two 10th-frame rolls sum to 10
      const tenthStart = findRollIdxBeforeFrame(9);
      const tenthRollCount = allRolls.length - tenthStart;
      if (tenthRollCount === 2 && allRolls[tenthStart] + allRolls[tenthStart + 1] === 10) {
        return true;
      }
    }

    return false;
  }

  // ========== PHYSICS & UPDATE ==========
  function updateBall() {
    if (!ball.active) return;

    ball.x += ball.vx;
    ball.y += ball.vy;
    ball.vx *= FRICTION;
    ball.vy *= FRICTION;
    ball.rotation += ball.vx * 0.08;

    const speed = Math.sqrt(ball.vx * ball.vx + ball.vy * ball.vy);

    // Check out of bounds - in gutter
    if (ball.x < LANE_LEFT + BALL_RADIUS || ball.x > LANE_RIGHT - BALL_RADIUS) {
      // In gutter, ball continues but can't hit pins
      // If ball goes too far left/right, stop it
      if (ball.x < 80 || ball.x > 400) {
        ball.active = false;
      }
    }

    // Check if ball went past pins (too far up)
    if (ball.y < 40) {
      ball.active = false;
    }

    // Check if ball stopped
    if (speed < MIN_SPEED && ball.active) {
      ball.active = false;
    }

    // Collision with pins
    if (ball.y < 250) {
      for (let i = 0; i < pins.length; i++) {
        if (!pins[i].standing) continue;
        if (!ball.active) break;
        const dx = ball.x - pins[i].x;
        const dy = ball.y - pins[i].y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < BALL_RADIUS + PIN_RADIUS) {
          knockDownPins(i);
          // Ball continues with slight deflection
          const angle = Math.atan2(dy, dx);
          ball.vx += Math.cos(angle) * 1.5;
          ball.vy += Math.sin(angle) * 1.5;
        }
      }
    }
  }

  // ========== GAME LOOP ==========
  function gameLoop() {
    if (animPhase === 'rolling' || animPhase === 'settling') {
      if (ball.active) {
        updateBall();
      }

      // Check if ball has stopped or gone out of play area
      if (!ball.active && ballMoving) {
        ballMoving = false;
        // Count pins knocked this throw
        const standingAfter = countStandingPins();
        const knocked = standingBeforeThrow - standingAfter;
        const allDown = (standingAfter === 0);
        const rollsInFrameBefore = getCurrentRollInFrame(); // before recordRoll updates state

        // Record the roll
        recordRoll(knocked);

        animPhase = 'settling';

        // Show result
        let resultMsg;
        if (knocked === 10) {
          resultMsg = '全中! (STRIKE)';
        } else if (allDown && rollsInFrameBefore === 1) {
          resultMsg = '补中! (SPARE)';
        } else {
          resultMsg = '击倒 ' + knocked + ' 瓶';
        }
        resultBar.style.display = 'flex';
        resultText.textContent = resultMsg;

        // Determine if pins need resetting for next throw
        const needPinReset = checkNeedPinReset(knocked);

        // After settling delay, advance
        setTimeout(function () {
          resultBar.style.display = 'none';

          if (isGameOver()) {
            endGame();
            render();
            return;
          }

          // Reset pins only if needed (new frame or bonus throw in 10th)
          if (needPinReset) {
            resetPins();
          }
          // Otherwise keep pins as-is for same-frame second throw

          ball = { x: LANE_CENTER, y: BALL_START_Y, vx: 0, vy: 0, active: false, rotation: 0 };
          power = 0;
          animPhase = 'aiming';
          updateUIInfo();
          updateScoreCard();
          render();
        }, 800);
      }

      render();
      if (animPhase === 'rolling' || animPhase === 'settling') {
        animFrameId = requestAnimationFrame(gameLoop);
      }
    } else if (animPhase === 'aiming' || animPhase === 'idle' || animPhase === 'done') {
      render();
    }
  }

  // ========== RENDERING ==========
  function render() {
    ctx.clearRect(0, 0, CW, CH);

    // Lane background
    drawLane();

    // Pin deck
    drawPinDeck();

    // Pins
    drawPins();

    // Ball
    drawBall();

    // Aim line
    if (animPhase === 'aiming' && gameActive) {
      drawAimLine();
    }

    // Power bar
    if (gameActive) {
      drawPowerBar();
    }
  }

  function drawLane() {
    // Background (approach area)
    ctx.fillStyle = '#e8dcc8';
    ctx.fillRect(0, 380, CW, 120);

    // Lane surface
    const laneGrad = ctx.createLinearGradient(0, 0, 0, CH);
    laneGrad.addColorStop(0, '#d4a76a');
    laneGrad.addColorStop(0.3, '#c99b5e');
    laneGrad.addColorStop(0.6, '#d4a76a');
    laneGrad.addColorStop(1, '#c9b58a');
    ctx.fillStyle = laneGrad;
    ctx.fillRect(LANE_LEFT, 60, LANE_WIDTH, 380);

    // Gutters
    ctx.fillStyle = '#4a4a4a';
    ctx.fillRect(LANE_LEFT - GUTTER_W, 60, GUTTER_W, 380);
    ctx.fillRect(LANE_RIGHT, 60, GUTTER_W, 380);

    // Gutter inner shadow
    ctx.fillStyle = '#3a3a3a';
    ctx.fillRect(LANE_LEFT - 2, 60, 2, 380);
    ctx.fillRect(LANE_RIGHT, 60, 2, 380);

    // Lane lines (borders)
    ctx.strokeStyle = '#8B4513';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(LANE_LEFT, 60);
    ctx.lineTo(LANE_LEFT, 440);
    ctx.moveTo(LANE_RIGHT, 60);
    ctx.lineTo(LANE_RIGHT, 440);
    ctx.stroke();

    // Dots on lane (aiming guides)
    const dotY = [60, 330, 350, 370];
    ctx.fillStyle = 'rgba(139,69,19,0.25)';
    for (let y of dotY) {
      for (let xOff = -30; xOff <= 30; xOff += 15) {
        ctx.beginPath();
        ctx.arc(LANE_CENTER + xOff, y, 3, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // Arrows
    const arrowY = 290;
    ctx.fillStyle = 'rgba(139,69,19,0.2)';
    for (let xOff = -30; xOff <= 30; xOff += 15) {
      ctx.beginPath();
      ctx.moveTo(LANE_CENTER + xOff, arrowY - 8);
      ctx.lineTo(LANE_CENTER + xOff - 5, arrowY + 4);
      ctx.lineTo(LANE_CENTER + xOff + 5, arrowY + 4);
      ctx.closePath();
      ctx.fill();
    }

    // Pin deck area highlight
    ctx.fillStyle = 'rgba(255,255,255,0.08)';
    ctx.fillRect(LANE_LEFT, 60, LANE_WIDTH, 180);

    // Boards (wood grain lines)
    ctx.strokeStyle = 'rgba(139,69,19,0.06)';
    ctx.lineWidth = 1;
    for (let x = LANE_LEFT + 10; x < LANE_RIGHT; x += 10) {
      ctx.beginPath();
      ctx.moveTo(x, 60);
      ctx.lineTo(x, 440);
      ctx.stroke();
    }
  }

  function drawPinDeck() {
    // Darker area for pin deck
    ctx.fillStyle = 'rgba(139,69,19,0.1)';
    ctx.fillRect(LANE_LEFT, 60, LANE_WIDTH, 200);

    // Pin spots
    ctx.fillStyle = 'rgba(139,69,19,0.2)';
    for (let i = 0; i < 10; i++) {
      const px = LANE_CENTER + PIN_POSITIONS[i].x;
      const py = 80 + PIN_POSITIONS[i].y;
      ctx.beginPath();
      ctx.arc(px, py, 4, 0, Math.PI * 2);
      ctx.fill();
    }
  }

  function drawPins() {
    for (let i = 0; i < pins.length; i++) {
      const pin = pins[i];
      if (pin.standing) {
        drawStandingPin(pin.x, pin.y, i + 1);
      } else {
        drawFallenPin(pin.x, pin.y, pin.fallFrame);
      }
    }
  }

  function drawStandingPin(x, y, num) {
    // Pin body (rounded rectangle / circle top-down)
    const r = PIN_RADIUS;

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.15)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;

    // Outer circle (white)
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Red stripe
    ctx.beginPath();
    ctx.arc(x + 2, y, r * 0.35, 0, Math.PI * 2);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();

    // Inner white circle (stripe detail)
    ctx.beginPath();
    ctx.arc(x + 2, y, r * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#fff';
    ctx.fill();

    // Border
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, r, 0, Math.PI * 2);
    ctx.stroke();
  }

  function drawFallenPin(x, y, frame) {
    const offset = Math.min(frame * 2, 10);
    ctx.save();
    ctx.translate(x, y + offset);
    ctx.rotate(Math.PI / 6);

    ctx.beginPath();
    ctx.ellipse(0, 0, PIN_RADIUS * 0.7, PIN_RADIUS * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = '#bbb';
    ctx.fill();
    ctx.strokeStyle = '#999';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Red stripe (fallen)
    ctx.beginPath();
    ctx.arc(0, 0, PIN_RADIUS * 0.2, 0, Math.PI * 2);
    ctx.fillStyle = '#e74c3c';
    ctx.fill();

    ctx.restore();
  }

  function drawBall() {
    const r = BALL_RADIUS;

    // Ball shadow
    ctx.shadowColor = 'rgba(0,0,0,0.2)';
    ctx.shadowBlur = 5;
    ctx.shadowOffsetY = 2;

    // Ball body
    ctx.beginPath();
    ctx.arc(ball.x, ball.y, r, 0, Math.PI * 2);
    const ballGrad = ctx.createRadialGradient(
      ball.x - 3, ball.y - 3, 1,
      ball.x, ball.y, r
    );
    ballGrad.addColorStop(0, '#555');
    ballGrad.addColorStop(0.5, '#333');
    ballGrad.addColorStop(1, '#111');
    ctx.fillStyle = ballGrad;
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Finger holes
    ctx.fillStyle = '#444';
    ctx.beginPath();
    ctx.arc(ball.x - 3, ball.y - 2, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(ball.x + 3, ball.y - 2, 2, 0, Math.PI * 2);
    ctx.fill();

    // Rotation indicator (small dot for spin visualization)
    const rotX = ball.x + Math.sin(ball.rotation) * (r - 2);
    const rotY = ball.y - Math.cos(ball.rotation) * (r - 2);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(rotX, rotY, 1.5, 0, Math.PI * 2);
    ctx.fill();
  }

  function drawAimLine() {
    const dx = aimX - LANE_CENTER;
    const maxOff = (LANE_RIGHT - LANE_LEFT) / 4;
    const angle = Math.min(1, Math.max(-1, dx / maxOff)) * MAX_ANGLE;

    ctx.save();
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 6]);

    ctx.beginPath();
    ctx.moveTo(ball.x, ball.y);
    const lineLen = 200;
    const endX = ball.x + Math.sin(angle) * lineLen;
    const endY = ball.y - Math.cos(angle) * lineLen;
    ctx.lineTo(endX, endY);
    ctx.stroke();
    ctx.restore();
  }

  function drawPowerBar() {
    const barX = 370;
    const barY = 200;
    const barW = 24;
    const barH = 200;

    // Background
    ctx.fillStyle = 'rgba(0,0,0,0.08)';
    ctx.fillRect(barX, barY, barW, barH);

    // Border
    ctx.strokeStyle = '#bbb';
    ctx.lineWidth = 1;
    ctx.strokeRect(barX, barY, barW, barH);

    // Fill
    if (power > 0) {
      const fillH = barH * power;
      const fillY = barY + barH - fillH;

      const grad = ctx.createLinearGradient(barX, barY, barX, barY + barH);
      grad.addColorStop(0, '#e74c3c');
      grad.addColorStop(0.3, '#f39c12');
      grad.addColorStop(0.6, '#f1c40f');
      grad.addColorStop(1, '#27ae60');
      ctx.fillStyle = grad;
      ctx.fillRect(barX + 2, fillY, barW - 4, fillH - 2);

      // Power percentage
      ctx.fillStyle = '#555';
      ctx.font = '11px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'top';
      ctx.fillText(Math.round(power * 100) + '%', barX + barW / 2, barY + barH + 4);
    }

    // Label
    ctx.fillStyle = '#888';
    ctx.font = '11px "Microsoft YaHei","PingFang SC",sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'bottom';
    ctx.fillText('力度', barX + barW / 2, barY - 4);
  }

  // ========== EVENT HANDLING ==========
  function getCanvasCoords(clientX, clientY) {
    const rect = canvas.getBoundingClientRect();
    return {
      x: (clientX - rect.left) * (CW / rect.width),
      y: (clientY - rect.top) * (CH / rect.height),
    };
  }

  function handlePointerDown(clientX, clientY) {
    if (!gameActive || animPhase !== 'aiming') return;

    const coords = getCanvasCoords(clientX, clientY);
    aimX = coords.x;

    isCharging = true;
    power = 0;
    chargeStart = performance.now();
    animPhase = 'charging';

    // Start charge loop
    function chargeLoop() {
      if (!isCharging || !gameActive) return;
      const elapsed = performance.now() - chargeStart;
      power = Math.min(1, elapsed * CHARGE_RATE);
      render();
      if (power < 1) {
        requestAnimationFrame(chargeLoop);
      }
    }
    requestAnimationFrame(chargeLoop);
  }

  function handlePointerUp() {
    if (!gameActive || !isCharging) return;
    isCharging = false;

    if (power < 0.05) {
      // Too weak, reset
      power = 0;
      animPhase = 'aiming';
      render();
      return;
    }

    // Save pin state before throw
    standingBeforeThrow = countStandingPins();
    frameBeforeRoll = currentFrame;

    // Throw ball
    const dx = aimX - LANE_CENTER;
    const maxOff = (LANE_RIGHT - LANE_LEFT) / 4;
    const angle = Math.min(1, Math.max(-1, dx / maxOff)) * MAX_ANGLE;
    const speed = Math.sqrt(power) * MAX_SPEED;

    ball.vx = Math.sin(angle) * speed;
    ball.vy = -Math.cos(angle) * speed;
    ball.active = true;
    ballMoving = true;
    animPhase = 'rolling';

    gameLoop();
  }

  function handlePointerMove(clientX, clientY) {
    if (!gameActive) return;
    const coords = getCanvasCoords(clientX, clientY);
    aimX = coords.x;
    aimY = coords.y;

    if (animPhase === 'aiming') {
      render();
    }
  }

  // Mouse events
  canvas.addEventListener('mousedown', function (e) {
    e.preventDefault();
    handlePointerDown(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseup', function (e) {
    e.preventDefault();
    handlePointerUp();
  });
  canvas.addEventListener('mousemove', function (e) {
    handlePointerMove(e.clientX, e.clientY);
  });
  canvas.addEventListener('mouseleave', function () {
    // Don't release ball when mouse leaves canvas
  });

  // Touch events
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) handlePointerDown(touch.clientX, touch.clientY);
  }, { passive: false });
  canvas.addEventListener('touchend', function (e) {
    e.preventDefault();
    handlePointerUp();
  }, { passive: false });
  canvas.addEventListener('touchmove', function (e) {
    e.preventDefault();
    const touch = e.touches[0];
    if (touch) handlePointerMove(touch.clientX, touch.clientY);
  }, { passive: false });

  // Start button
  startBtn.addEventListener('click', startGame);

  // Window-level mouseup to catch releases outside canvas
  window.addEventListener('mouseup', function () {
    if (isCharging) {
      handlePointerUp();
    }
  });

  // ========== INITIALIZATION ==========
  function init() {
    resetPins();
    render();
    updateUIInfo();
    startBtn.textContent = '开始游戏';
  }

  init();

})();
</script>
</body>
