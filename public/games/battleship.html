<!DOCTYPE html>
<html lang="zh-CN" data-game-id="battleship">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海战棋</title>
<link rel="stylesheet" href="framework.css">
<style>
  .game-wrap {
    background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border); border-radius: var(--radius-xl);
    padding: 14px; box-shadow: var(--glass-shadow); max-width: 520px; width: 100%; margin: 8px; text-align: center;
  }
  h1 { font-size: 18px; color: #7af; letter-spacing: 3px; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #446; margin-bottom: 12px; }
  .boards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .board-wrap { flex: 1; min-width: 180px; }
  .board-label { font-size: 12px; color: #7af; margin-bottom: 4px; letter-spacing: 1px; }
  .board-wrap.ai .board-label { color: #f74; }
  canvas { display: block; width: 100%; height: auto; aspect-ratio: 1; border-radius: var(--radius-md); cursor: pointer; touch-action: none; }
  .status { margin-top: 10px; font-size: 14px; color: var(--accent-1); min-height: 22px; }
  .info { font-size: 11px; color: var(--text-muted); margin-top: 6px; }
</style>
</head>
<body>
<div class="game-wrap fw-cat-strategy">
  <h1 style="font-size:18px;color:#7af;letter-spacing:3px;">海战棋</h1>
  <div class="subtitle" style="color:var(--text-muted);">布置舰队，击沉对手全部战舰！</div>
  <div class="boards">
    <div class="board-wrap">
      <div class="board-label">你的海域</div>
      <canvas id="playerBoard" width="200" height="200"></canvas>
    </div>
    <div class="board-wrap ai">
      <div class="board-label">敌方海域</div>
      <canvas id="enemyBoard" width="200" height="200"></canvas>
    </div>
  </div>
  <div class="status" id="statusMsg">布置你的舰队...</div>
  <div class="info">点击敌方格开火 | 拖拽布置己方船舰</div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';
  const FW = window.GameFramework;
  const S = 10;
  const SHIPS = [
    { name: '航母', size: 5 }, { name: '战列舰', size: 4 },
    { name: '巡洋舰', size: 3 }, { name: '潜艇', size: 3 }, { name: '驱逐舰', size: 2 }
  ];

  var pb = document.getElementById('playerBoard');
  var eb = document.getElementById('enemyBoard');
  var pc = pb.getContext('2d'), ec = eb.getContext('2d');
  var statusEl = document.getElementById('statusMsg');

  var playerGrid = [], enemyGrid = [];
  var playerShips = [], enemyShips = [];
  var placed = [], phase = 'place', currentShip = 0;
  var dragDir = 1, myHits = [], enemyHits = [];

  var SIZE = 200, C = SIZE / S;

  function init() {
    for (var r = 0; r < S; r++) {
      playerGrid[r] = []; enemyGrid[r] = [];
      for (var c = 0; c < S; c++) { playerGrid[r][c] = 0; enemyGrid[r][c] = 0; }
    }
    playerShips = []; enemyShips = [];
    placed = SHIPS.map(function() { return false; });
    currentShip = 0; myHits = []; enemyHits = [];
    placeEnemyShips();
    drawAll(); statusEl.textContent = '布置你的 ' + SHIPS[0].name + ' (' + SHIPS[0].size + '格) - 点击放置';
    phase = 'place';
  }

  function placeEnemyShips() {
    for (var i = 0; i < SHIPS.length; i++) {
      var placed = false;
      while (!placed) {
        var r = Math.floor(Math.random() * S), c = Math.floor(Math.random() * S);
        var dir = Math.random() < 0.5 ? 1 : 0;
        var ok = true;
        if (dir === 1 && c + SHIPS[i].size > S) ok = false;
        if (dir === 0 && r + SHIPS[i].size > S) ok = false;
        if (ok) {
          for (var k = 0; k < SHIPS[i].size; k++) {
            var nr = dir === 0 ? r + k : r, nc = dir === 1 ? c + k : c;
            if (enemyGrid[nr][nc] !== 0) { ok = false; break; }
          }
        }
        if (ok) {
          for (var k = 0; k < SHIPS[i].size; k++) {
            var nr = dir === 0 ? r + k : r, nc = dir === 1 ? c + k : c;
            enemyGrid[nr][nc] = 1;
          }
          enemyShips.push({ cells: SHIPS[i].size, hits: 0 });
          placed = true;
        }
      }
    }
  }

  function canPlace(row, col, dir, size) {
    if (dir === 1 && col + size > S) return false;
    if (dir === 0 && row + size > S) return false;
    for (var k = 0; k < size; k++) {
      var nr = dir === 0 ? row + k : row, nc = dir === 1 ? col + k : col;
      if (playerGrid[nr][nc] !== 0) return false;
    }
    return true;
  }

  function placeShip(row, col, dir) {
    var ship = SHIPS[currentShip];
    if (!canPlace(row, col, dir, ship.size)) { FW.audio.sfx('bump'); return false; }
    for (var k = 0; k < ship.size; k++) {
      var nr = dir === 0 ? row + k : row, nc = dir === 1 ? col + k : col;
      playerGrid[nr][nc] = 1;
    }
    playerShips.push({ cells: ship.size, hits: 0, row: row, col: col, dir: dir });
    placed[currentShip] = true;
    FW.audio.sfx('click');
    currentShip++;
    if (currentShip >= SHIPS.length) {
      statusEl.textContent = '舰队布置完毕！点击敌方海域开火！';
      phase = 'battle';
      drawAll();
      return;
    }
    statusEl.textContent = '布置你的 ' + SHIPS[currentShip].name + ' (' + SHIPS[currentShip].size + '格) - 点击放置';
    drawAll();
    return true;
  }

  function fire(row, col, grid, hits, ships, isPlayer) {
    if (row < 0 || row >= S || col < 0 || col >= S) return false;
    if (grid[row][col] === 2 || grid[row][col] === 3) return false;
    if (grid[row][col] === 1) {
      grid[row][col] = 2;
      hits.push({ row: row, col: col, hit: true });
      FW.audio.sfx('score');
      for (var i = 0; i < ships.length; i++) {
        var s = ships[i]; var check = false;
        if (!isPlayer) {
          for (var k = 0; k < s.cells; k++) {
            var nr = s.dir === 0 ? s.row + k : s.row, nc = s.dir === 1 ? s.col + k : s.col;
            if (nr === row && nc === col) check = true;
          }
        }
        if (check || (isPlayer && s.row === row && s.col === col)) { s.hits++; break; }
      }
      if (ships.every(function(s) { return s.hits >= s.cells; })) return 'win';
      return true;
    } else {
      grid[row][col] = 3;
      hits.push({ row: row, col: col, hit: false });
      return false;
    }
  }

  function playerFire(row, col) {
    if (phase !== 'battle') return;
    if (enemyGrid[row][col] === 2 || enemyGrid[row][col] === 3) return;
    var result = fire(row, col, enemyGrid, myHits, enemyShips, false);
    if (result === 'win') { statusEl.textContent = '你赢了！'; phase = 'over'; FW.audio.sfx('win'); FW.events.reportComplete(1, { won: true }); drawAll(); return; }
    if (result) { statusEl.textContent = '命中！继续开火！'; drawAll(); aiTurn(); }
    else { statusEl.textContent = '未命中！AI 回合...'; drawAll(); setTimeout(aiTurn, 600); }
  }

  function aiTurn() {
    if (phase !== 'battle') return;
    var r, c, done = false;
    for (var tries = 0; tries < 100; tries++) {
      r = Math.floor(Math.random() * S); c = Math.floor(Math.random() * S);
      if (playerGrid[r][c] !== 2 && playerGrid[r][c] !== 3) { done = true; break; }
    }
    if (!done) return;
    var result = fire(r, c, playerGrid, enemyHits, playerShips, true);
    if (result === 'win') { statusEl.textContent = 'AI 赢了！'; phase = 'over'; FW.audio.sfx('gameover'); FW.events.reportComplete(0, { won: false }); drawAll(); return; }
    statusEl.textContent = result ? 'AI 命中你的船舰！' : 'AI 未命中，该你了！';
    drawAll();
  }

  function drawBoard(ctx, grid, hits, showShips) {
    ctx.fillStyle = '#0a0f1a'; ctx.fillRect(0, 0, SIZE, SIZE);
    for (var r = 0; r < S; r++) {
      for (var c = 0; c < S; c++) {
        var x = c * C, y = r * C;
        ctx.strokeStyle = 'rgba(255,255,255,0.05)'; ctx.lineWidth = 0.5; ctx.strokeRect(x, y, C, C);
        if (grid[r][c] === 1 && showShips) { ctx.fillStyle = '#224488'; ctx.fillRect(x+1, y+1, C-2, C-2); }
        else if (grid[r][c] === 2) { ctx.fillStyle = '#ff4444'; ctx.beginPath(); ctx.arc(x+C/2, y+C/2, C*0.3, 0, Math.PI*2); ctx.fill(); }
        else if (grid[r][c] === 3) { ctx.fillStyle = '#444'; ctx.beginPath(); ctx.arc(x+C/2, y+C/2, C*0.15, 0, Math.PI*2); ctx.fill(); }
      }
    }
  }

  function drawAll() { drawBoard(pc, playerGrid, enemyHits, true); drawBoard(ec, enemyGrid, myHits, false); }

  eb.addEventListener('click', function(e) {
    if (phase !== 'battle') return;
    var rect = eb.getBoundingClientRect();
    var col = Math.floor((e.clientX - rect.left) / rect.width * S);
    var row = Math.floor((e.clientY - rect.top) / rect.height * S);
    playerFire(row, col);
  });

  pb.addEventListener('click', function(e) {
    if (phase !== 'place') return;
    if (currentShip >= SHIPS.length) return;
    var rect = pb.getBoundingClientRect();
    var col = Math.floor((e.clientX - rect.left) / rect.width * S);
    var row = Math.floor((e.clientY - rect.top) / rect.height * S);
    var dir = dragDir;
    if (!canPlace(row, col, dir, SHIPS[currentShip].size)) dir = 1 - dir;
    placeShip(row, col, dir);
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'r' || e.key === 'R') { if (phase === 'place') { dragDir = 1 - dragDir; statusEl.textContent = '方向切换为 ' + (dragDir === 1 ? '横向' : '纵向'); } }
  });

  pb.addEventListener('contextmenu', function(e) { e.preventDefault(); if (phase === 'place') { dragDir = 1 - dragDir; statusEl.textContent = '方向切换为 ' + (dragDir === 1 ? '横向' : '纵向'); } });

  init();
})();
</script>
</body>
</html>
