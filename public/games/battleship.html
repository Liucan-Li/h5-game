<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>海战棋</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
  }
  .wrapper {
    background: #0a0d1a;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 0 60px rgba(50,100,255,0.08);
    max-width: 520px;
    width: 100%;
    margin: 8px;
    text-align: center;
  }
  h1 { font-size: 18px; color: #7af; letter-spacing: 3px; margin-bottom: 4px; }
  .subtitle { font-size: 11px; color: #446; margin-bottom: 12px; }
  .boards { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }
  .board-wrap { flex: 1; min-width: 180px; }
  .board-title {
    font-size: 11px;
    color: #446;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 6px;
  }
  .board {
    display: grid;
    grid-template-columns: repeat(10, 1fr);
    gap: 2px;
    border: 1px solid #223;
    padding: 2px;
    background: #111;
    border-radius: 6px;
  }
  .cell {
    aspect-ratio: 1;
    border-radius: 2px;
    cursor: pointer;
    background: #0a1a2a;
    transition: background 0.1s;
    font-size: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .cell:hover { background: #1a3a5a; }
  .cell.ship { background: #334; }
  .cell.hit { background: #f74; cursor: default; }
  .cell.miss { background: #0a2a3a; cursor: default; }
  .cell.miss::after { content: '·'; color: #446; font-size: 14px; }
  .cell.sunk { background: #6a1010; }
  .cell.enemy-ship { background: #0a1a2a; }
  .status-bar {
    margin: 10px 0;
    padding: 8px;
    background: #111;
    border-radius: 8px;
    font-size: 13px;
  }
  .status-phase { color: #7af; margin-bottom: 4px; }
  .status-info { color: #446; font-size: 11px; }
  .ships-left {
    display: flex;
    justify-content: space-around;
    margin: 6px 0;
    font-size: 11px;
    color: #446;
  }
  .ships-val { font-size: 16px; font-weight: bold; }
  .ships-p { color: #7af; }
  .ships-a { color: #f74; }
  .btn-row { display: flex; justify-content: center; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
  .btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1.5px solid #334;
    background: #111;
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.12s;
  }
  .btn-random { color: #7af; border-color: #7af; }
  .btn-random:hover { background: #7af3; }
  .btn-start { color: #7f7; border-color: #7f7; }
  .btn-start:hover { background: #7f73; }
  .btn-reset { color: #fa4; border-color: #fa4; }
  .btn-reset:hover { background: #fa43; }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .legend { display: flex; gap: 12px; justify-content: center; margin-top: 8px; font-size: 10px; color: #446; flex-wrap: wrap; }
  .leg-item { display: flex; align-items: center; gap: 4px; }
  .leg-box { width: 12px; height: 12px; border-radius: 2px; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>⚓ 海战棋</h1>
  <div class="subtitle">击沉对方所有战舰获胜</div>

  <div class="ships-left">
    <div>你的存活: <span class="ships-val ships-p" id="playerShips">17</span></div>
    <div>AI 存活: <span class="ships-val ships-a" id="aiShips">17</span></div>
  </div>

  <div class="boards">
    <div class="board-wrap">
      <div class="board-title">你的海域</div>
      <div class="board" id="playerBoard"></div>
    </div>
    <div class="board-wrap">
      <div class="board-title">攻击 AI（点击）</div>
      <div class="board" id="enemyBoard"></div>
    </div>
  </div>

  <div class="status-bar">
    <div class="status-phase" id="statusPhase">点击「随机布置」安排你的战舰</div>
    <div class="status-info" id="statusInfo">舰队：航母×1 战列舰×1 驱逐舰×2 潜艇×1</div>
  </div>

  <div class="btn-row">
    <button class="btn btn-random" id="randomBtn" onclick="randomPlace()">随机布置</button>
    <button class="btn btn-start" id="startBtn" onclick="startGame()" disabled>开始战斗</button>
    <button class="btn btn-reset" onclick="resetGame()">重置</button>
  </div>

  <div class="legend">
    <div class="leg-item"><div class="leg-box" style="background:#334"></div>我的战舰</div>
    <div class="leg-item"><div class="leg-box" style="background:#f74"></div>命中</div>
    <div class="leg-item"><div class="leg-box" style="background:#6a1010"></div>击沉</div>
    <div class="leg-item"><div class="leg-box" style="background:#0a2a3a"></div>未中</div>
  </div>
</div>

<script>
const SIZE = 10;
const SHIPS = [5, 4, 3, 3, 2]; // 航母, 战列舰, 驱逐舰×2, 潜艇

let playerGrid, aiGrid, playerShots, aiShots, phase, aiLocked;

function makeGrid() { return Array.from({ length: SIZE }, () => Array(SIZE).fill(0)); }

function placeShipsRandom(grid) {
  const g = makeGrid();
  for (const len of SHIPS) {
    let placed = false;
    while (!placed) {
      const dir = Math.random() < 0.5;
      const r = Math.floor(Math.random() * (dir ? SIZE : SIZE - len));
      const c = Math.floor(Math.random() * (dir ? SIZE - len : SIZE));
      let ok = true;
      for (let i = 0; i < len; i++) {
        const nr = dir ? r : r + i, nc = dir ? c + i : c;
        if (g[nr][nc]) { ok = false; break; }
      }
      if (ok) {
        for (let i = 0; i < len; i++) {
          const nr = dir ? r : r + i, nc = dir ? c + i : c;
          g[nr][nc] = len;
        }
        placed = true;
      }
    }
  }
  return g;
}

function renderBoard(gridId, grid, shots, clickable = false, showShips = true) {
  const el = document.getElementById(gridId);
  el.innerHTML = '';
  for (let r = 0; r < SIZE; r++) {
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const shot = shots[r][c];
      const hasShip = grid[r][c] > 0;
      if (shot === 'hit') cell.classList.add('hit');
      else if (shot === 'miss') cell.classList.add('miss');
      else if (showShips && hasShip) cell.classList.add('ship');
      if (clickable && !shot && phase === 'battle') {
        cell.addEventListener('click', () => attack(r, c));
      }
      el.appendChild(cell);
    }
  }
}

function countHits(shots) {
  let n = 0;
  for (const row of shots) for (const s of row) if (s === 'hit') n++;
  return n;
}

function randomPlace() {
  playerGrid = placeShipsRandom(makeGrid());
  playerShots = makeGrid().map(r => r.map(() => null));
  renderBoard('playerBoard', playerGrid, playerShots, false, true);
  document.getElementById('startBtn').disabled = false;
  document.getElementById('statusPhase').textContent = '战舰已布置！点击开始战斗';
}

function startGame() {
  aiGrid = placeShipsRandom(makeGrid());
  aiShots = makeGrid().map(r => r.map(() => null));
  phase = 'battle';
  aiLocked = false;
  renderBoard('enemyBoard', aiGrid, aiShots, true, false);
  document.getElementById('randomBtn').disabled = true;
  document.getElementById('startBtn').disabled = true;
  document.getElementById('statusPhase').textContent = '⚔️ 战斗开始！点击敌方海域攻击';
  document.getElementById('statusInfo').textContent = '轮到你进攻！';
}

function attack(r, c) {
  if (phase !== 'battle' || aiLocked || aiShots[r][c]) return;
  aiLocked = true;

  const hit = aiGrid[r][c] > 0;
  aiShots[r][c] = hit ? 'hit' : 'miss';
  renderBoard('enemyBoard', aiGrid, aiShots, true, false);

  const aiRemain = 17 - countHits(aiShots);
  document.getElementById('aiShips').textContent = aiRemain;

  if (aiRemain === 0) { endGame('player'); return; }

  document.getElementById('statusPhase').textContent = hit ? '💥 命中！AI 还剩 ' + aiRemain + ' 格' : '💦 未命中';
  document.getElementById('statusInfo').textContent = 'AI 正在进攻...';

  setTimeout(aiAttack, 800);
}

function aiAttack() {
  let r, c;
  do {
    r = Math.floor(Math.random() * SIZE);
    c = Math.floor(Math.random() * SIZE);
  } while (playerShots[r][c]);

  const hit = playerGrid[r][c] > 0;
  playerShots[r][c] = hit ? 'hit' : 'miss';
  renderBoard('playerBoard', playerGrid, playerShots, false, true);

  const pRemain = 17 - countHits(playerShots);
  document.getElementById('playerShips').textContent = pRemain;

  if (pRemain === 0) { endGame('ai'); return; }

  document.getElementById('statusPhase').textContent = hit ? '⚠️ AI 命中你的战舰！' : 'AI 未命中';
  document.getElementById('statusInfo').textContent = '轮到你进攻！';
  aiLocked = false;
}

function endGame(winner) {
  phase = 'over';
  const msg = winner === 'player' ? '🏆 你赢了！敌舰全军覆没！' : '💀 你输了！舰队全军覆没！';
  document.getElementById('statusPhase').textContent = msg;
  document.getElementById('statusInfo').textContent = '点击重置开始新游戏';
  document.getElementById('randomBtn').disabled = false;
}

function resetGame() {
  phase = 'place';
  playerGrid = makeGrid();
  aiGrid = makeGrid();
  playerShots = makeGrid().map(r => r.map(() => null));
  aiShots = makeGrid().map(r => r.map(() => null));
  renderBoard('playerBoard', playerGrid, playerShots, false, true);
  renderBoard('enemyBoard', aiGrid, aiShots, false, false);
  document.getElementById('playerShips').textContent = '17';
  document.getElementById('aiShips').textContent = '17';
  document.getElementById('statusPhase').textContent = '点击「随机布置」安排你的战舰';
  document.getElementById('statusInfo').textContent = '舰队：航母×1 战列舰×1 驱逐舰×2 潜艇×1';
  document.getElementById('randomBtn').disabled = false;
  document.getElementById('startBtn').disabled = true;
}

resetGame();
</script>
</body>
</html>
