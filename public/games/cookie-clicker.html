<!DOCTYPE html>
<html lang="zh-CN" data-game-id="cookie-clicker">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Cookie Clicker</title>
<link rel="stylesheet" href="framework.css">
<style>
  .cookie-display{font-size:2em;font-weight:700;color:#f39c12;margin:8px 0}
  .cps-display{font-size:0.85em;color:var(--text-muted);margin-bottom:12px}
  .cookie-btn{width:180px;height:180px;border-radius:50%;border:none;background:radial-gradient(circle at 35% 35%,#f39c12,#d35400);cursor:pointer;transition:transform 0.1s;font-size:4em;box-shadow:0 8px 30px rgba(243,156,18,0.3);touch-action:manipulation;margin:8px auto;display:block}
  .cookie-btn:active{transform:scale(0.92)}
  .shop{margin-top:16px;text-align:left}
  .shop h2{font-size:1em;margin-bottom:8px;color:var(--text-primary)}
  .upgrade{display:flex;justify-content:space-between;align-items:center;background:var(--bg-secondary);border-radius:var(--radius-md);padding:10px 14px;margin-bottom:6px;cursor:pointer;transition:background var(--transition-fast)}
  .upgrade:active{background:var(--bg-tertiary)}.upgrade.locked{opacity:0.4;cursor:not-allowed}
  .upgrade-name{font-size:0.9em;font-weight:600}.upgrade-desc{font-size:0.75em;color:var(--text-muted)}
  .upgrade-cost{font-size:0.9em;color:#f39c12;font-weight:700}.upgrade-count{font-size:0.75em;color:var(--text-muted);margin-left:4px}
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header"><h1 class="fw-title" style="font-size:1.8em;">Cookie Clicker</h1></div>
  <div class="cookie-display" id="cookieDisplay">🍪 0</div>
  <div class="cps-display" id="cpsDisplay">每秒：0 个饼干</div>
  <button class="cookie-btn" id="cookieBtn">🍪</button>
  <div class="shop" id="shop"></div>
  <button class="fw-btn fw-btn-ghost" id="resetBtn" style="margin-top:12px;">重新开始</button>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW=window.GameFramework;
  var cd=document.getElementById('cookieDisplay'),cpd=document.getElementById('cpsDisplay'),shop=document.getElementById('shop'),cb=document.getElementById('cookieBtn'),rb=document.getElementById('resetBtn');
  var UPGRADES=[{id:'cursor',name:'🖱️ 自动点击器',desc:'每秒自动点击 1 次',cost:15,cps:1},{id:'grandma',name:'👵 老奶奶',desc:'每秒生产 5 个饼干',cost:100,cps:5},{id:'farm',name:'🌾 饼干农场',desc:'每秒生产 20 个饼干',cost:500,cps:20},{id:'mine',name:'⛏️ 饼干矿场',desc:'每秒生产 100 个饼干',cost:2000,cps:100},{id:'factory',name:'🏭 饼干工厂',desc:'每秒生产 500 个饼干',cost:10000,cps:500},{id:'bank',name:'🏦 饼干银行',desc:'每秒生产 2000 个饼干',cost:50000,cps:2000},{id:'temple',name:'⛩️ 饼干神殿',desc:'每秒生产 10000 个饼干',cost:200000,cps:10000}];
  var cookies=0,totalCookies=0,cps=0,owned={};
  function load(){var d=FW.storage.load('cc',null);if(d){cookies=d.cookies||0;totalCookies=d.totalCookies||0;owned=d.owned||{};}recalc();}
  function save(){FW.storage.save('cc',{cookies: cookies,totalCookies: totalCookies,owned: owned});}
  function recalc(){cps=0;UPGRADES.forEach(function(u){cps+=(owned[u.id]||0)*u.cps;});updateUI();}
  function updateUI(){cd.textContent='🍪 '+Math.floor(cookies);cpd.textContent='每秒：'+cps+' 个饼干';renderShop();}
  function renderShop(){shop.innerHTML='<h2>🏪 商店</h2>';UPGRADES.forEach(function(u){var count=owned[u.id]||0,cost=Math.floor(u.cost*Math.pow(1.15,count));var div=document.createElement('div');div.className='upgrade'+(cookies<cost?' locked':'');div.innerHTML='<div><div class="upgrade-name">'+u.name+' <span class="upgrade-count">('+count+')</span></div><div class="upgrade-desc">'+u.desc+'</div></div><div class="upgrade-cost">🍪 '+Math.floor(cost)+'</div>';if(cookies>=cost){div.addEventListener('click',function(){cookies-=cost;owned[u.id]=(owned[u.id]||0)+1;recalc();save();FW.audio.sfx('click');});}shop.appendChild(div);});}
  cb.addEventListener('click',function(){cookies+=1+cps*0.1;totalCookies+=1;updateUI();save();FW.audio.sfx('click');});
  setInterval(function(){cookies+=cps/10;updateUI();save();},100);
  rb.addEventListener('click',function(){cookies=0;totalCookies=0;owned={};recalc();save();FW.audio.sfx('select');});
  load();
})();
</script>
</body>
</html>
