<!DOCTYPE html>
<html lang="zh-CN" data-game-id="mahjong-link">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>连连看 - 麻将连连看</title>
<link rel="stylesheet" href="framework.css">
<style>
  canvas {
    cursor: pointer;
    touch-action: none;
  }
  .fw-canvas {
    background: #fcf8e8;
  }
  .fw-score-box {
    min-width: 50px;
  }
  .fw-controls-row {
    margin-top: 10px;
  }
  .fw-overlay-title.win {
    background: var(--gradient-accent);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .fw-overlay-title.lose {
    background: var(--gradient-warm);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  @media (max-width: 420px) {
    .fw-score-box {
      padding: 4px 8px;
      min-width: 44px;
    }
    .fw-score-value {
      font-size: 1em;
    }
  }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <div class="fw-title">连连看</div>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">剩余</div>
        <div class="fw-score-value" id="remainCount">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">时间</div>
        <div class="fw-score-value" id="timerDisplay">600</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">分数</div>
        <div class="fw-score-value" id="scoreDisplay">0</div>
      </div>
    </div>
  </div>

  <div class="fw-game-area">
    <canvas id="gameCanvas" class="fw-canvas" width="520" height="520"></canvas>
  </div>

  <div class="fw-controls-row">
    <button class="fw-btn fw-btn-warm" id="hintBtn">提示 (-30s)</button>
    <button class="fw-btn fw-btn-ghost" id="shuffleBtn">重排</button>
    <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
  </div>
</div>

<div class="fw-overlay" id="msgOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="msgTitle">!</div>
    <div class="fw-overlay-text" id="msgSub"></div>
    <button class="fw-btn fw-btn-primary" id="msgBtn">开始游戏</button>
  </div>
</div>

<script src="framework.js"></script>
<script>
(function () {
  'use strict';

  const FW = window.GameFramework;

  // ========== CONSTANTS ==========
  const ROWS = 8;
  const COLS = 8;
  const CANVAS_SIZE = 520;
  const TILE_SIZE = 56;
  const GAP = 4;
  const PADDING_X = (CANVAS_SIZE - (COLS * TILE_SIZE + (COLS - 1) * GAP)) / 2;
  const PADDING_Y = (CANVAS_SIZE - (ROWS * TILE_SIZE + (ROWS - 1) * GAP)) / 2;
  const TOTAL_TIME = 600;
  const BASE_SCORE = 100;
  const PAIR_COUNT = 30;
  const EMPTY_CELLS = COLS * ROWS - PAIR_COUNT * 2; // 4

  const TILE_TYPES = [
    '一万','二万','三万','四万','五万','六万','七万','八万','九万',
    '一条','二条','三条','四条','五条','六条','七条','八条','九条',
    '一筒','二筒','三筒','四筒','五筒','六筒','七筒','八筒','九筒',
    '中','發','東','南','西',
  ];
  const TILE_COLORS = {
    wan: '#1a5276',
    tiao: '#1e8449',
    tong: '#c0392b',
    honor: '#8e44ad',
  };
  var getTileColor = function (idx) {
    if (idx < 9) return TILE_COLORS.wan;
    if (idx < 18) return TILE_COLORS.tiao;
    if (idx < 27) return TILE_COLORS.tong;
    return TILE_COLORS.honor;
  };
  var getSuitChar = function (idx) {
    if (idx < 9) return '万'; // 万
    if (idx < 18) return '条'; // 条
    if (idx < 27) return '筒'; // 筒
    return '';
  };

  // ========== CANVAS SETUP ==========
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');

  // ========== DOM REFS ==========
  var remainEl = document.getElementById('remainCount');
  var timerEl = document.getElementById('timerDisplay');
  var scoreEl = document.getElementById('scoreDisplay');
  var startBtn = document.getElementById('startBtn');
  var hintBtn = document.getElementById('hintBtn');
  var shuffleBtn = document.getElementById('shuffleBtn');
  var msgOverlay = document.getElementById('msgOverlay');
  var msgTitle = document.getElementById('msgTitle');
  var msgSub = document.getElementById('msgSub');
  var msgBtn = document.getElementById('msgBtn');

  // ========== GAME STATE ==========
  var grid = [];          // ROWS x COLS, tileType index or -1 for empty
  var selected = null;    // { row, col } or null
  var path = null;        // [{r, c}, ...] or null
  var score = 0;
  var timeLeft = TOTAL_TIME;
  var timerId = null;
  var gameActive = false;
  var matchedCount = 0;
  var isProcessing = false;
  var hintPairs = [];     // [{row, col}, {row, col}]
  var highScore = 0;
  var animatingTiles = []; // tiles being removed (with animation)
  var animationId = null;
  var hintFlashFrame = 0;
  var hintTimer = null;

  // ========== HIGH SCORE ==========
  highScore = FW.storage.getHighScore();

  // ========== HELPERS ==========
  function isInGrid(r, c) {
    return r >= 0 && r < ROWS && c >= 0 && c < COLS;
  }

  function tileAt(r, c) {
    if (!isInGrid(r, c)) return -1;
    return grid[r][c];
  }

  function getTileRect(r, c) {
    return {
      x: PADDING_X + c * (TILE_SIZE + GAP),
      y: PADDING_Y + r * (TILE_SIZE + GAP),
      w: TILE_SIZE,
      h: TILE_SIZE,
    };
  }

  function getTileFromPoint(px, py) {
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] === -1) continue;
        var rect = getTileRect(r, c);
        if (px >= rect.x && px <= rect.x + rect.w &&
            py >= rect.y && py <= rect.y + rect.h) {
          return { row: r, col: c };
        }
      }
    }
    return null;
  }

  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i]; arr[i] = arr[j]; arr[j] = tmp;
    }
    return arr;
  }

  // ========== GRID GENERATION ==========
  function generateGrid() {
    // Create pool of PAIR_COUNT * 2 tiles
    var pool = [];
    for (var i = 0; i < PAIR_COUNT; i++) {
      pool.push(i);
      pool.push(i);
    }
    shuffleArray(pool);

    // Fill grid
    var newGrid = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) {
        row.push(-1);
      }
      newGrid.push(row);
    }

    // Determine empty cells
    var emptyPositions = [];
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        emptyPositions.push({ r: r, c: c });
      }
    }
    shuffleArray(emptyPositions);
    var emptySet = {};
    for (var i = 0; i < EMPTY_CELLS; i++) {
      emptySet[emptyPositions[i].r + ',' + emptyPositions[i].c] = true;
    }

    // Place tiles
    var poolIdx = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (emptySet[r + ',' + c]) continue;
        newGrid[r][c] = pool[poolIdx++];
      }
    }

    return newGrid;
  }

  // ========== EXTENDED GRID FOR PATHFINDING ==========
  function makeExtGrid() {
    var result = [];
    for (var r = 0; r <= ROWS + 1; r++) {
      var row = [];
      for (var c = 0; c <= COLS + 1; c++) {
        if (r === 0 || r === ROWS + 1 || c === 0 || c === COLS + 1) {
          row.push(-1);
        } else {
          row.push(grid[r - 1][c - 1]);
        }
      }
      result.push(row);
    }
    return result;
  }

  var extGrid = [];

  function isEmptyExt(r, c) {
    if (r < 0 || r > ROWS + 1 || c < 0 || c > COLS + 1) return false;
    return extGrid[r][c] === -1;
  }

  function isHLineClear(row, c1, c2) {
    var minC = Math.min(c1, c2);
    var maxC = Math.max(c1, c2);
    if (maxC - minC <= 1) return true;
    for (var c = minC + 1; c < maxC; c++) {
      if (!isEmptyExt(row, c)) return false;
    }
    return true;
  }

  function isVLineClear(col, r1, r2) {
    var minR = Math.min(r1, r2);
    var maxR = Math.max(r1, r2);
    if (maxR - minR <= 1) return true;
    for (var r = minR + 1; r < maxR; r++) {
      if (!isEmptyExt(r, col)) return false;
    }
    return true;
  }

  // ========== PATHFINDING ==========
  function findPath(r1, c1, r2, c2) {
    if (r1 === r2 && c1 === c2) return null;
    if (grid[r1][c1] === -1 || grid[r2][c2] === -1) return null;
    if (grid[r1][c1] !== grid[r2][c2]) return null;

    var er1 = r1 + 1, ec1 = c1 + 1;
    var er2 = r2 + 1, ec2 = c2 + 1;

    // 0 turns
    if (er1 === er2 && isHLineClear(er1, ec1, ec2)) {
      return [{ r: er1, c: ec1 }, { r: er2, c: ec2 }];
    }
    if (ec1 === ec2 && isVLineClear(ec1, er1, er2)) {
      return [{ r: er1, c: ec1 }, { r: er2, c: ec2 }];
    }

    // 1 turn
    if (isEmptyExt(er1, ec2) && isHLineClear(er1, ec1, ec2) && isVLineClear(ec2, er1, er2)) {
      return [{ r: er1, c: ec1 }, { r: er1, c: ec2 }, { r: er2, c: ec2 }];
    }
    if (isEmptyExt(er2, ec1) && isVLineClear(ec1, er1, er2) && isHLineClear(er2, ec1, ec2)) {
      return [{ r: er1, c: ec1 }, { r: er2, c: ec1 }, { r: er2, c: ec2 }];
    }

    // 2 turns - via column c
    for (var c = 0; c <= COLS + 1; c++) {
      if (c === ec1 || c === ec2) continue;
      if (isEmptyExt(er1, c) && isEmptyExt(er2, c) &&
          isHLineClear(er1, ec1, c) && isVLineClear(c, er1, er2) && isHLineClear(er2, ec2, c)) {
        return [
          { r: er1, c: ec1 },
          { r: er1, c: c },
          { r: er2, c: c },
          { r: er2, c: ec2 },
        ];
      }
    }

    // 2 turns - via row r
    for (var r = 0; r <= ROWS + 1; r++) {
      if (r === er1 || r === er2) continue;
      if (isEmptyExt(r, ec1) && isEmptyExt(r, ec2) &&
          isVLineClear(ec1, er1, r) && isHLineClear(r, ec1, ec2) && isVLineClear(ec2, er2, r)) {
        return [
          { r: r, c: ec1 },
          { r: r, c: ec2 },
          { r: er2, c: ec2 },
        ];
      }
    }

    return null;
  }

  // ========== FIND HINT ==========
  function findHint() {
    var candidates = [];
    for (var r1 = 0; r1 < ROWS; r1++) {
      for (var c1 = 0; c1 < COLS; c1++) {
        if (grid[r1][c1] === -1) continue;
        for (var r2 = r1; r2 < ROWS; r2++) {
          var cStart = (r2 === r1) ? c1 + 1 : 0;
          for (var c2 = cStart; c2 < COLS; c2++) {
            if (r1 === r2 && c1 === c2) continue;
            if (grid[r2][c2] === -1) continue;
            if (grid[r1][c1] !== grid[r2][c2]) continue;
            if (findPath(r1, c1, r2, c2)) {
              candidates.push({ r1: r1, c1: c1, r2: r2, c2: c2 });
            }
          }
        }
      }
    }
    if (candidates.length === 0) return null;
    return candidates[Math.floor(Math.random() * candidates.length)];
  }

  function applyHint() {
    if (!gameActive || isProcessing) return;
    var hint = findHint();
    if (!hint) return;
    // Cost 30 seconds
    timeLeft = Math.max(0, timeLeft - 30);
    updateTimerDisplay();
    if (timeLeft <= 0) {
      endGame(false);
      return;
    }
    // Flash the hint pair
    hintPairs = [
      { row: hint.r1, col: hint.c1 },
      { row: hint.r2, col: hint.c2 },
    ];
    hintFlashFrame = 0;
    if (hintTimer) clearInterval(hintTimer);
    hintTimer = setInterval(function () {
      hintFlashFrame++;
      render();
      if (hintFlashFrame >= 10) {
        clearInterval(hintTimer);
        hintTimer = null;
        hintPairs = [];
        render();
      }
    }, 150);
  }

  // ========== SHUFFLE ==========
  function shuffleTiles() {
    if (!gameActive || isProcessing) return;
    var remaining = [];
    var positions = [];
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] !== -1) {
          remaining.push(grid[r][c]);
          positions.push({ r: r, c: c });
        }
      }
    }
    if (remaining.length < 2) return;
    shuffleArray(remaining);
    shuffleArray(positions);
    for (var i = 0; i < positions.length; i++) {
      grid[positions[i].r][positions[i].c] = remaining[i];
    }
    selected = null;
    path = null;
    hintPairs = [];
    extGrid = makeExtGrid();
    render();
  }

  // ========== SCORING ==========
  function addScore(timeRemaining) {
    var bonus = Math.floor(timeRemaining / 30);
    var pts = BASE_SCORE + bonus;
    score += pts;
    updateScoreDisplay();
    FW.events.reportScore(score);
  }

  // ========== GAME FLOW ==========
  function startGame() {
    stopTimer();
    if (animationId) {
      cancelAnimationFrame(animationId);
      animationId = null;
    }
    if (hintTimer) {
      clearInterval(hintTimer);
      hintTimer = null;
    }
    msgOverlay.classList.remove('active');
    score = 0;
    timeLeft = TOTAL_TIME;
    matchedCount = 0;
    selected = null;
    path = null;
    hintPairs = [];
    isProcessing = false;
    animatingTiles = [];
    updateScoreDisplay();
    updateTimerDisplay();

    grid = generateGrid();
    extGrid = makeExtGrid();
    gameActive = true;
    updateRemainDisplay();
    render();
    startTimer();
    setButtonsEnabled(true);
  }

  function endGame(won) {
    gameActive = false;
    stopTimer();
    if (hintTimer) {
      clearInterval(hintTimer);
      hintTimer = null;
    }

    FW.events.reportComplete(score, { won: won });

    if (won) {
      FW.audio.sfx('win');
      var finalScore = score;
      if (finalScore > highScore) {
        highScore = finalScore;
        FW.storage.setHighScore(highScore);
      }
      msgTitle.textContent = '恭喜过关!';
      msgTitle.className = 'fw-overlay-title win';
      msgSub.textContent = '最终得分: ' + finalScore + ' 分' +
        (finalScore >= highScore ? ' (新纪录!)' : ' 最高分: ' + highScore);
    } else {
      FW.audio.sfx('gameover');
      msgTitle.textContent = '时间到!';
      msgTitle.className = 'fw-overlay-title lose';
      msgSub.textContent = '剩余 ' + matchedCount + ' 对, 得分: ' + score;
    }
    msgBtn.textContent = '再来一局';
    msgOverlay.classList.add('active');
    setButtonsEnabled(false);
  }

  // ========== TIMER ==========
  function startTimer() {
    stopTimer();
    timerId = setInterval(function () {
      timeLeft--;
      updateTimerDisplay();
      if (timeLeft <= 0) {
        endGame(false);
      }
    }, 1000);
  }

  function stopTimer() {
    if (timerId) {
      clearInterval(timerId);
      timerId = null;
    }
  }

  function updateTimerDisplay() {
    timerEl.textContent = Math.max(0, timeLeft);
  }

  function updateScoreDisplay() {
    scoreEl.textContent = score;
  }

  function updateRemainDisplay() {
    var count = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] !== -1) count++;
      }
    }
    remainEl.textContent = count / 2;
  }

  function setButtonsEnabled(enabled) {
    hintBtn.disabled = !enabled;
    shuffleBtn.disabled = !enabled;
    startBtn.textContent = enabled ? '重新开始' : '开始游戏';
  }

  // ========== TILE MATCHING ==========
  function tryMatch(r1, c1, r2, c2) {
    if (r1 === r2 && c1 === c2) return false;
    if (grid[r1][c1] !== grid[r2][c2]) return false;
    if (grid[r1][c1] === -1 || grid[r2][c2] === -1) return false;

    extGrid = makeExtGrid();
    var p = findPath(r1, c1, r2, c2);
    if (!p) return false;

    // Show path and remove tiles
    path = p;
    render();

    FW.audio.sfx('score');

    // Animate removal
    animatingTiles = [
      { r: r1, c: c1, type: grid[r1][c1], frame: 0 },
      { r: r2, c: c2, type: grid[r2][c2], frame: 0 },
    ];

    grid[r1][c1] = -1;
    grid[r2][c2] = -1;
    matchedCount++;

    addScore(timeLeft);
    updateRemainDisplay();

    // Check win
    var remaining = countRemainingTiles();
    if (remaining === 0) {
      setTimeout(function () { endGame(true); }, 600);
      return true;
    }

    // Check if any moves are possible
    setTimeout(function () {
      extGrid = makeExtGrid();
      if (!findHint()) {
        // Auto shuffle
        shuffleTiles();
      }
    }, 500);

    return true;
  }

  function countRemainingTiles() {
    var cnt = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] !== -1) cnt++;
      }
    }
    return cnt;
  }

  // ========== RENDERING ==========
  function render() {
    var dpr = 1; // canvas is already sized in physical pixels
    ctx.clearRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Background
    ctx.fillStyle = '#fcf8e8';
    ctx.fillRect(0, 0, CANVAS_SIZE, CANVAS_SIZE);

    // Draw tiles
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (grid[r][c] === -1) continue;
        drawTile(r, c, grid[r][c]);
      }
    }

    // Draw selected highlight
    if (selected) {
      drawSelection(selected.row, selected.col);
    }

    // Draw hint flash
    for (var i = 0; i < hintPairs.length; i++) {
      if (hintFlashFrame % 2 === 0) {
        drawHint(hintPairs[i].row, hintPairs[i].col);
      }
    }

    // Draw path
    if (path) {
      drawPath(path);
    }
  }

  function drawTile(r, c, typeIdx) {
    var rect = getTileRect(r, c);
    var x = rect.x, y = rect.y, w = rect.w, h = rect.h;

    // Shadow
    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;

    // Tile body
    var radius = 6;
    ctx.beginPath();
    ctx.moveTo(x + radius, y);
    ctx.lineTo(x + w - radius, y);
    ctx.quadraticCurveTo(x + w, y, x + w, y + radius);
    ctx.lineTo(x + w, y + h - radius);
    ctx.quadraticCurveTo(x + w, y + h, x + w - radius, y + h);
    ctx.lineTo(x + radius, y + h);
    ctx.quadraticCurveTo(x, y + h, x, y + h - radius);
    ctx.lineTo(x, y + radius);
    ctx.quadraticCurveTo(x, y, x + radius, y);
    ctx.closePath();

    ctx.shadowColor = 'rgba(0,0,0,0.08)';
    ctx.shadowBlur = 4;
    ctx.shadowOffsetY = 2;
    ctx.fillStyle = '#fff';
    ctx.fill();
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
    ctx.shadowOffsetY = 0;

    // Border
    ctx.strokeStyle = '#ddd';
    ctx.lineWidth = 1;
    ctx.stroke();

    // Text
    var textColor = getTileColor(typeIdx);
    var chars = TILE_TYPES[typeIdx];

    if (chars.length === 1) {
      ctx.fillStyle = textColor;
      ctx.font = 'bold 28px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(chars, x + w / 2, y + h / 2);
    } else {
      // Two characters: number + suit
      ctx.fillStyle = textColor;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.font = 'bold 24px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.fillText(chars[0], x + w / 2, y + h * 0.38);
      ctx.font = '16px "Microsoft YaHei","PingFang SC",sans-serif';
      ctx.fillText(chars[1], x + w / 2, y + h * 0.72);
    }
  }

  function drawSelection(r, c) {
    var rect = getTileRect(r, c);
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 3;
    ctx.shadowColor = 'rgba(231,76,60,0.3)';
    ctx.shadowBlur = 8;
    ctx.strokeRect(rect.x, rect.y, rect.w, rect.h);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  }

  function drawHint(r, c) {
    var rect = getTileRect(r, c);
    ctx.fillStyle = 'rgba(241,196,15,0.35)';
    ctx.shadowColor = 'rgba(241,196,15,0.3)';
    ctx.shadowBlur = 10;
    ctx.fillRect(rect.x, rect.y, rect.w, rect.h);
    ctx.shadowColor = 'transparent';
    ctx.shadowBlur = 0;
  }

  function extToCanvas(er, ec) {
    var step = TILE_SIZE + GAP;
    return {
      x: PADDING_X + (ec - 1) * step + TILE_SIZE / 2,
      y: PADDING_Y + (er - 1) * step + TILE_SIZE / 2,
    };
  }

  function drawPath(points) {
    if (!points || points.length < 2) return;

    ctx.save();
    ctx.strokeStyle = '#e74c3c';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    ctx.shadowColor = 'rgba(231,76,60,0.4)';
    ctx.shadowBlur = 6;

    ctx.beginPath();
    var first = extToCanvas(points[0].r, points[0].c);
    ctx.moveTo(first.x, first.y);

    for (var i = 1; i < points.length; i++) {
      var pt = extToCanvas(points[i].r, points[i].c);
      ctx.lineTo(pt.x, pt.y);
    }
    ctx.stroke();
    ctx.restore();

    // Clear path after a delay
    if (!isProcessing) {
      isProcessing = true;
      setTimeout(function () {
        path = null;
        isProcessing = false;
        render();
      }, 400);
    }
  }

  // ========== EVENT HANDLING ==========
  function handlePointer(clientX, clientY) {
    if (!gameActive || isProcessing) return;

    var rect = canvas.getBoundingClientRect();
    var scaleX = CANVAS_SIZE / rect.width;
    var scaleY = CANVAS_SIZE / rect.height;
    var px = (clientX - rect.left) * scaleX;
    var py = (clientY - rect.top) * scaleY;

    var tile = getTileFromPoint(px, py);
    if (!tile) return;

    FW.audio.sfx('click');

    if (!selected) {
      selected = tile;
      path = null;
      render();
      return;
    }

    if (selected.row === tile.row && selected.col === tile.col) {
      // Deselect
      selected = null;
      path = null;
      render();
      return;
    }

    // Try to match
    tryMatch(selected.row, selected.col, tile.row, tile.col);
    selected = null;
    render();
  }

  // Mouse events
  canvas.addEventListener('mousedown', function (e) {
    e.preventDefault();
    handlePointer(e.clientX, e.clientY);
  });

  // Touch events
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    var touch = e.touches[0];
    if (touch) handlePointer(touch.clientX, touch.clientY);
  }, { passive: false });

  // ========== BUTTON HANDLERS ==========
  startBtn.addEventListener('click', startGame);
  hintBtn.addEventListener('click', applyHint);
  shuffleBtn.addEventListener('click', shuffleTiles);
  msgBtn.addEventListener('click', function () {
    msgOverlay.classList.remove('active');
    startGame();
  });

  // ========== INITIALIZATION ==========
  function init() {
    // Show initial empty board
    grid = [];
    for (var r = 0; r < ROWS; r++) {
      var row = [];
      for (var c = 0; c < COLS; c++) {
        row.push(-1);
      }
      grid.push(row);
    }
    extGrid = makeExtGrid();
    render();
    setButtonsEnabled(false);
  }

  init();

})();
</script>
</body>
</html>
