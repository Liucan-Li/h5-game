<!DOCTYPE html>
<html lang="zh-CN" data-game-id="match-three">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>消消乐</title>
<link rel="stylesheet" href="framework.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.fw-container{text-align:center;padding:16px;max-width:520px;width:100%}
.fw-title{font-size:1.8rem;margin-bottom:4px;}
.subtitle{color:var(--text-muted);font-size:.85rem;margin-bottom:12px}
canvas{display:block;margin:0 auto;border-radius:var(--radius-xl);background:var(--bg-secondary);box-shadow:var(--glass-shadow);width:100%;max-width:420px;touch-action:manipulation;cursor:pointer}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay-content{background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius-xl);padding:32px 40px;text-align:center;box-shadow:var(--glass-shadow);transform:scale(.9);transition:transform .3s}
.overlay.show .overlay-content{transform:scale(1)}
.overlay-content h2{font-size:1.6rem;margin-bottom:8px;color:var(--accent-1)}
.overlay-content p{color:var(--text-secondary);margin-bottom:18px}
@media(max-width:440px){canvas{max-width:95vw}.fw-title{font-size:1.4rem}}
</style>
</head>
<body>
<div class="fw-container fw-cat-puzzle">
  <h1 class="fw-title">消消乐</h1>
  <p class="subtitle">交换相邻宝石，三个即可消除</p>
  <div class="fw-scores" style="justify-content:center;margin-bottom:12px;">
    <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="scoreDisplay">0</div></div>
    <div class="fw-score-box"><div class="fw-score-label">最高分</div><div class="fw-score-value" id="highScoreDisplay">-</div></div>
  </div>
  <canvas id="gameCanvas" width="420" height="420"></canvas>
  <div style="margin-top:12px;"><button class="fw-btn fw-btn-primary" id="newGameBtn">新游戏</button></div>
</div>
<div class="overlay" id="gameOverOverlay">
  <div class="overlay-content">
    <h2>游戏结束</h2>
    <p id="gameOverMessage">得分: 0</p>
    <button class="fw-btn fw-btn-primary" id="playAgainBtn">再来一局</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';
  const FW = window.GameFramework;
  const COLS=8,ROWS=8,NUM_COLORS=6,CELL_SIZE=52,PADDING=2,GEM_RADIUS=22,ANIM_DURATION=200,CLEAR_DURATION=300;
  const COLORS=['#e74c3c','#3498db','#2ecc71','#f39c12','#9b59b6','#1abc9c'];
  var S={IDLE:'IDLE',SELECTED:'SELECTED',SWAPPING:'SWAPPING',SWAP_BACK:'SWAP_BACK',CHECKING:'CHECKING',CLEARING:'CLEARING',FALLING:'FALLING',REFILLING:'REFILLING',GAME_OVER:'GAME_OVER'};
  var canvas,ctx,state=S.IDLE,grid=[],score=0,selectedGem=null,swapGems=null,animationProgress=0;
  var scoreEl,highScoreEl,overlayEl,overlayMsg;

  function init(){
    canvas=document.getElementById('gameCanvas');ctx=canvas.getContext('2d');
    scoreEl=document.getElementById('scoreDisplay');highScoreEl=document.getElementById('highScoreDisplay');
    overlayEl=document.getElementById('gameOverOverlay');overlayMsg=document.getElementById('gameOverMessage');
    highScoreEl.textContent=FW.storage.getHighScore()||'-';
    document.getElementById('newGameBtn').addEventListener('click',newGame);
    document.getElementById('playAgainBtn').addEventListener('click',function(){overlayEl.classList.remove('show');newGame();});
    canvas.addEventListener('click',onCanvasClick);
    canvas.addEventListener('touchstart',function(e){e.preventDefault();onCanvasClick(e);},{passive:false});
    newGame();
  }

  function newGame(){
    score=0;state=S.IDLE;selectedGem=null;swapGems=null;animationProgress=0;overlayEl.classList.remove('show');
    generateBoard();removeInitialMatches();scoreEl.textContent='0';highScoreEl.textContent=FW.storage.getHighScore()||'-';draw();
  }

  function generateBoard(){grid=[];for(var r=0;r<ROWS;r++){grid[r]=[];for(var c=0;c<COLS;c++)grid[r][c]=Math.floor(Math.random()*NUM_COLORS);}}

  function removeInitialMatches(){
    var any=true;
    while(any){any=false;var matches=findAllMatches();if(matches.length){any=true;for(var i=0;i<matches.length;i++){var m=matches[i];grid[m.r][m.c]=Math.floor(Math.random()*NUM_COLORS);}}}
  }

  function findAllMatches(){
    var matched={};
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      if(c<=COLS-3&&grid[r][c]===grid[r][c+1]&&grid[r][c]===grid[r][c+2])for(var i=0;i<3;i++)matched[r+','+(c+i)]=true;
      if(r<=ROWS-3&&grid[r][c]===grid[r+1][c]&&grid[r][c]===grid[r+2][c])for(var i=0;i<3;i++)matched[(r+i)+','+c]=true;
    }
    return Object.keys(matched).map(function(k){var p=k.split(',');return{r:+p[0],c:+p[1]};});
  }

  function checkAndClear(){
    state=S.CHECKING;var matches=findAllMatches();
    if(matches.length===0){state=S.IDLE;selectedGem=null;draw();checkGameOver();return;}
    state=S.CLEARING;animationProgress=0;
    for(var i=0;i<matches.length;i++)grid[matches[i].r][matches[i].c]=-1;
    score+=matches.length*10;scoreEl.textContent=score;FW.audio.sfx('score');
    FW.storage.setHighScore(score);highScoreEl.textContent=FW.storage.getHighScore();
    setTimeout(function(){state=S.FALLING;animationProgress=0;applyGravity();setTimeout(function(){checkAndClear();},ANIM_DURATION);},CLEAR_DURATION);
  }

  function applyGravity(){
    for(var c=0;c<COLS;c++){var emptyRow=ROWS-1;for(var r=ROWS-1;r>=0;r--){if(grid[r][c]!==-1){grid[emptyRow][c]=grid[r][c];if(emptyRow!==r)grid[r][c]=-1;emptyRow--;}}
      for(var r=emptyRow;r>=0;r--)grid[r][c]=Math.floor(Math.random()*NUM_COLORS);}
  }

  function checkGameOver(){
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      if(c<COLS-1){swap(r,c,r,c+1);if(findAllMatches().length){swap(r,c,r,c+1);return;}swap(r,c,r,c+1);}
      if(r<ROWS-1){swap(r,c,r+1,c);if(findAllMatches().length){swap(r,c,r+1,c);return;}swap(r,c,r+1,c);}
    }
    state=S.GAME_OVER;FW.audio.sfx('gameover');FW.events.reportComplete(score,{won:false});
    overlayMsg.textContent='得分: '+score+' | 最高: '+FW.storage.getHighScore();overlayEl.classList.add('show');
  }

  function swap(r1,c1,r2,c2){var t=grid[r1][c1];grid[r1][c1]=grid[r2][c2];grid[r2][c2]=t;}

  function canSwap(r1,c1,r2,c2){
    swap(r1,c1,r2,c2);var has=findAllMatches().length>0;swap(r1,c1,r2,c2);return has;
  }

  function handleGemClick(row,col){
    if(state===S.GAME_OVER){overlayEl.classList.remove('show');newGame();return;}
    if(state!==S.IDLE&&state!==S.SELECTED)return;
    if(selectedGem===null){selectedGem={r:row,c:col};state=S.SELECTED;draw();return;}
    var sr=selectedGem.r,sc=selectedGem.c;
    var dr=Math.abs(sr-row),dc=Math.abs(sc-col);
    if((dr===1&&dc===0)||(dr===0&&dc===1)){
      if(canSwap(sr,sc,row,col)){swap(sr,sc,row,col);FW.audio.sfx('click');selectedGem=null;state=S.SWAPPING;animationProgress=0;setTimeout(function(){checkAndClear();},ANIM_DURATION);}
      else{FW.audio.sfx('bump');selectedGem={r:row,c:col};draw();}
    }else{if(grid[row][col]!==-1)selectedGem={r:row,c:col};else selectedGem=null;draw();}
  }

  function onCanvasClick(e){
    var rect=canvas.getBoundingClientRect();var x,y;
    if(e.touches){x=(e.touches[0].clientX-rect.left)*canvas.width/rect.width;y=(e.touches[0].clientY-rect.top)*canvas.height/rect.height;}
    else{x=(e.clientX-rect.left)*canvas.width/rect.width;y=(e.clientY-rect.top)*canvas.height/rect.height;}
    var col=Math.floor(x/CELL_SIZE),row=Math.floor(y/CELL_SIZE);
    if(row>=0&&row<ROWS&&col>=0&&col<COLS)handleGemClick(row,col);
  }

  function draw(){
    ctx.clearRect(0,0,420,420);
    ctx.fillStyle='#16213e';ctx.fillRect(0,0,420,420);
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      if(grid[r][c]===-1)continue;
      var x=c*CELL_SIZE+CELL_SIZE/2,y=r*CELL_SIZE+CELL_SIZE/2;
      var color=COLORS[grid[r][c]%COLORS.length];
      var grad=ctx.createRadialGradient(x-5,y-5,2,x,y,GEM_RADIUS);
      grad.addColorStop(0,lighten(color,40));grad.addColorStop(1,color);
      ctx.fillStyle=grad;ctx.beginPath();ctx.arc(x,y,GEM_RADIUS,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,255,255,0.15)';ctx.beginPath();ctx.arc(x-6,y-7,GEM_RADIUS*0.35,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(0,0,0,0.08)';ctx.lineWidth=1;ctx.stroke();
    }
    if(selectedGem){var s=selectedGem;ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.setLineDash([4,4]);ctx.strokeRect(s.c*CELL_SIZE+3,s.r*CELL_SIZE+3,CELL_SIZE-6,CELL_SIZE-6);ctx.setLineDash([]);}
  }

  function lighten(hex,amt){var r=Math.min(255,parseInt(hex.slice(1,3),16)+amt),g=Math.min(255,parseInt(hex.slice(3,5),16)+amt),b=Math.min(255,parseInt(hex.slice(5,7),16)+amt);return 'rgb('+r+','+g+','+b+')';}

  init();
})();
</script>
</body>
</html>
