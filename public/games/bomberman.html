<!DOCTYPE html>
<html lang="zh-CN" data-game-id="bomberman">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>炸弹人</title>
<link rel="stylesheet" href="framework.css">
<style>
  .game-wrap {
    background: var(--glass-bg); backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
    border: 1px solid var(--glass-border); border-radius: var(--radius-xl);
    padding: 14px; box-shadow: var(--glass-shadow); max-width: 480px; width: 100%; margin: 8px; text-align: center;
  }
  .hud { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 12px; color: var(--text-muted); }
  .hud-val { color: #fa4; font-size: 16px; font-weight: bold; }
  canvas { display: block; border-radius: var(--radius-md); border: 2px solid var(--glass-border); image-rendering: pixelated; max-width: 100%; }
  .controls { display: grid; grid-template-areas:". up .""left down right"" . bomb ."; grid-template-columns:1fr 1fr 1fr; gap:6px; margin-top:10px; max-width:180px; margin-left:auto; margin-right:auto; }
  .ctrl-btn { padding:10px; border-radius:var(--radius-md); border:1px solid var(--glass-border); background:var(--bg-secondary); color:#fa4; font-size:18px; cursor:pointer; transition:background var(--transition-fast); }
  .ctrl-btn:active { background: var(--bg-card-hover); }
  .status { font-size:13px; color:#fa4; margin-top:8px; min-height:20px; }
</style>
</head>
<body>
<div class="game-wrap fw-cat-arcade">
  <h1 class="fw-title" style="font-size:18px;letter-spacing:3px;">炸弹人</h1>
  <div class="hud"><div>生命: <span class="hud-val" id="lives">❤️❤️❤️</span></div><div>分数: <span class="hud-val" id="score">0</span></div><div>关卡: <span class="hud-val" id="level">1</span></div></div>
  <canvas id="c"></canvas>
  <div class="status" id="status">WASD/方向键移动，Space/J 放炸弹</div>
  <div class="controls">
    <button class="ctrl-btn" style="grid-area:up" id="btnUp">▲</button>
    <button class="ctrl-btn" style="grid-area:left" id="btnLeft">◀</button>
    <button class="ctrl-btn" style="grid-area:down" id="btnDown">▼</button>
    <button class="ctrl-btn" style="grid-area:right" id="btnRight">▶</button>
    <button class="ctrl-btn" style="grid-area:bomb" id="btnBomb">💣</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW = window.GameFramework;
  var TILE = 40, COLS = 11, ROWS = 11, W = COLS * TILE, H = ROWS * TILE;
  var canvas = document.getElementById('c'), ctx = canvas.getContext('2d');
  canvas.width = W; canvas.height = H;
  var EMPTY = 0, WALL = 1, BRICK = 2, BOMB_TILE = 3, FIRE = 4;
  var map, player, enemies, bombs, explosions, score, lives, level, gameState, frameCount;

  function initLevel(lvl) {
    map = Array.from({length: ROWS}, function(_, r) {
      return Array.from({length: COLS}, function(_, c) {
        if (r%2===1&&c%2===1) return WALL;
        if (r===0||r===ROWS-1||c===0||c===COLS-1) return WALL;
        if (r<=2&&c<=2) return EMPTY;
        return Math.random()<0.35 ? BRICK : EMPTY;
      });
    });
    player = {x:1,y:1,px:TILE,py:TILE,alive:true,bombCount:1,bombRange:2,speed:3};
    enemies = [];
    var ec = Math.min(2+lvl,5);
    var pos = [[COLS-2,ROWS-2],[COLS-2,1],[1,ROWS-2],[COLS-2,ROWS-4],[4,ROWS-2]];
    for(var i=0;i<ec;i++){var p=pos[i];enemies.push({x:p[0],y:p[1],px:p[0]*TILE,py:p[1]*TILE,alive:true,dir:0,moveTimer:0});map[p[1]][p[0]]=EMPTY;}
    bombs=[];explosions=[];frameCount=0;gameState='play';
  }

  function canMove(tx,ty){return!(tx<0||ty<0||tx>=COLS||ty>=ROWS)&&(map[ty][tx]===EMPTY||map[ty][tx]===BOMB_TILE);}
  var keys={};
  document.addEventListener('keydown',function(e){keys[e.code]=true;});
  document.addEventListener('keyup',function(e){keys[e.code]=false;});
  var touchDir=null;
  document.getElementById('btnUp').addEventListener('touchstart',function(e){e.preventDefault();touchDir='up';});
  document.getElementById('btnDown').addEventListener('touchstart',function(e){e.preventDefault();touchDir='down';});
  document.getElementById('btnLeft').addEventListener('touchstart',function(e){e.preventDefault();touchDir='left';});
  document.getElementById('btnRight').addEventListener('touchstart',function(e){e.preventDefault();touchDir='right';});
  ['btnUp','btnDown','btnLeft','btnRight'].forEach(function(id){document.getElementById(id).addEventListener('touchend',function(e){e.preventDefault();touchDir=null;});});
  document.getElementById('btnBomb').addEventListener('touchstart',function(e){e.preventDefault();placeBomb();});
  document.getElementById('btnBomb').addEventListener('click',placeBomb);

  function updatePlayer(){
    var sp=player.speed,dx=0,dy=0;
    if(keys['ArrowUp']||keys['KeyW']||touchDir==='up')dy=-sp;
    if(keys['ArrowDown']||keys['KeyS']||touchDir==='down')dy=sp;
    if(keys['ArrowLeft']||keys['KeyA']||touchDir==='left')dx=-sp;
    if(keys['ArrowRight']||keys['KeyD']||touchDir==='right')dx=sp;
    if(dx!==0)dy=0;
    if(dx!==0||dy!==0){
      var nx=player.px+dx,ny=player.py+dy;
      var tx=Math.floor(nx/TILE),ty=Math.floor(ny/TILE);
      var tx2=Math.floor((nx+TILE-2)/TILE),ty2=Math.floor((ny+TILE-2)/TILE);
      if(canMove(tx,ty)&&canMove(tx2,ty)&&canMove(tx,ty2)&&canMove(tx2,ty2)){player.px=nx;player.py=ny;}
      player.x=Math.round(player.px/TILE);player.y=Math.round(player.py/TILE);
    }
    if((keys['Space']||keys['KeyJ'])&&frameCount%10===0)placeBomb();
  }

  function placeBomb(){
    if(!player.alive||gameState!=='play')return;
    var bx=Math.round(player.px/TILE),by=Math.round(player.py/TILE);
    if(bombs.some(function(b){return b.x===bx&&b.y===by;}))return;
    if(bombs.filter(function(b){return !b.exploded;}).length>=player.bombCount)return;
    bombs.push({x:bx,y:by,timer:120,exploded:false});map[by][bx]=BOMB_TILE;FW.audio.sfx('click');
  }

  function explodeBomb(bomb){
    bomb.exploded=true;map[bomb.y][bomb.x]=EMPTY;FW.audio.sfx('powerup');
    var dirs=[[0,0],[1,0],[-1,0],[0,1],[0,-1]];
    for(var di=0;di<dirs.length;di++){var dx=dirs[di][0],dy=dirs[di][1];
      for(var i=0;i<=(dx===0&&dy===0?0:player.bombRange);i++){var ex=bomb.x+dx*i,ey=bomb.y+dy*i;
        if(ex<0||ey<0||ex>=COLS||ey>=ROWS)break;
        if(map[ey][ex]===WALL)break;
        if(map[ey][ex]===BRICK){map[ey][ex]=EMPTY;score+=10;explosions.push({x:ex,y:ey,t:30});FW.audio.sfx('score');break;}
        explosions.push({x:ex,y:ey,t:30});
        if(Math.round(player.px/TILE)===ex&&Math.round(player.py/TILE)===ey)hitPlayer();
        enemies.forEach(function(en){if(en.alive&&Math.round(en.px/TILE)===ex&&Math.round(en.py/TILE)===ey){en.alive=false;score+=100;FW.audio.sfx('win');}});
      }}
  }

  function hitPlayer(){
    if(!player.alive)return;lives--;updateLivesUI();FW.audio.sfx('bump');
    if(lives<=0){player.alive=false;gameState='lose';document.getElementById('status').textContent='游戏结束！点击重试';FW.audio.sfx('gameover');}
    else{player.px=TILE;player.py=TILE;status.textContent='被炸到了！还剩 '+lives+' 条命';setTimeout(function(){status.textContent='';},1500);}
  }

  function updateLivesUI(){document.getElementById('lives').textContent='❤️'.repeat(Math.max(0,lives));}
  var EDIRS=[[0,-1],[0,1],[-1,0],[1,0]];

  function updateEnemies(){
    for(var ei=0;ei<enemies.length;ei++){var en=enemies[ei];
      if(!en.alive)continue;en.moveTimer++;
      if(en.moveTimer>=40){en.moveTimer=0;
        var cands=EDIRS.filter(function(d){return canMove(en.x+d[0],en.y+d[1]);});
        if(cands.length){var d=cands[Math.floor(Math.random()*cands.length)];en.x+=d[0];en.y+=d[1];en.px=en.x*TILE;en.py=en.y*TILE;}}
      if(Math.abs(en.px-player.px)<TILE*0.7&&Math.abs(en.py-player.py)<TILE*0.7)hitPlayer();
    }
  }

  function update(){
    if(gameState!=='play')return;frameCount++;
    if(player.alive)updatePlayer();updateEnemies();
    for(var bi=0;bi<bombs.length;bi++){var b=bombs[bi];if(!b.exploded){b.timer--;if(b.timer<=0)explodeBomb(b);}}
    bombs=bombs.filter(function(b){return !b.exploded||b.timer>-30;});
    for(var ei=0;ei<explosions.length;ei++)explosions[ei].t--;
    explosions=explosions.filter(function(ex){return ex.t>0;});
    document.getElementById('score').textContent=score;
    var alive=enemies.filter(function(e){return e.alive;});
    if(alive.length===0){level++;document.getElementById('level').textContent=level;gameState='levelup';status.textContent='过关！准备第 '+level+' 关...';setTimeout(function(){initLevel(level);},1500);}
  }

  function draw(){
    ctx.clearRect(0,0,W,H);
    for(var r=0;r<ROWS;r++)for(var c=0;c<COLS;c++){
      var t=map[r][c];ctx.fillStyle=t===EMPTY?'#1a1a0a':t===WALL?'#333':t===BRICK?'#a05020':'#111';
      ctx.fillRect(c*TILE,r*TILE,TILE,TILE);
      if(t===WALL){ctx.fillStyle='#444';ctx.fillRect(c*TILE+2,r*TILE+2,TILE-4,TILE-4);}
      else if(t===BRICK){ctx.fillStyle='#c06030';ctx.fillRect(c*TILE+1,r*TILE+1,TILE-2,TILE-2);ctx.fillStyle='#8a3010';ctx.fillRect(c*TILE+1,r*TILE+1,TILE/2-2,TILE/2-2);ctx.fillRect(c*TILE+TILE/2+1,r*TILE+TILE/2+1,TILE/2-2,TILE/2-2);}
    }
    for(var ei=0;ei<explosions.length;ei++){var ex=explosions[ei];var a=ex.t/30;ctx.fillStyle='rgba(255,140,0,'+(a*0.8)+')';ctx.fillRect(ex.x*TILE,ex.y*TILE,TILE,TILE);ctx.fillStyle='rgba(255,220,0,'+(a*0.6)+')';ctx.fillRect(ex.x*TILE+8,ex.y*TILE+8,TILE-16,TILE-16);}
    for(var bi=0;bi<bombs.length;bi++){var b=bombs[bi];if(b.exploded)continue;var p=Math.sin(Date.now()/120)*3;ctx.fillStyle='#222';ctx.beginPath();ctx.arc(b.x*TILE+TILE/2,b.y*TILE+TILE/2,14+p,0,Math.PI*2);ctx.fill();ctx.fillStyle=b.timer<40?'#f44':'#666';ctx.beginPath();ctx.arc(b.x*TILE+TILE/2,b.y*TILE+TILE/2,10+p,0,Math.PI*2);ctx.fill();ctx.strokeStyle='#fa4';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(b.x*TILE+TILE/2,b.y*TILE+TILE/2-10);ctx.quadraticCurveTo(b.x*TILE+TILE/2+8,b.y*TILE+TILE/2-18,b.x*TILE+TILE/2+4,b.y*TILE+TILE/2-22);ctx.stroke();}
    for(var ei=0;ei<enemies.length;ei++){var en=enemies[ei];if(!en.alive)continue;ctx.fillStyle='#f44';ctx.beginPath();ctx.arc(en.px+TILE/2,en.py+TILE/2,14,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ff8';ctx.font='18px serif';ctx.textAlign='center';ctx.fillText('👾',en.px+TILE/2,en.py+TILE/2+7);}
    if(player.alive){ctx.fillStyle='#7df';ctx.beginPath();ctx.arc(player.px+TILE/2,player.py+TILE/2,14,0,Math.PI*2);ctx.fill();ctx.font='20px serif';ctx.textAlign='center';ctx.fillText('🧑',player.px+TILE/2,player.py+TILE/2+7);}
  }

  document.addEventListener('keydown',function(e){
    if(e.code==='Space'){e.preventDefault();placeBomb();}
    if((gameState==='lose')&&e.code!=='Space'){score=0;lives=3;level=1;updateLivesUI();document.getElementById('score').textContent='0';document.getElementById('level').textContent='1';status.textContent='';initLevel(1);}
  });
  canvas.addEventListener('click',function(){if(gameState==='lose'){score=0;lives=3;level=1;updateLivesUI();document.getElementById('score').textContent='0';document.getElementById('level').textContent='1';status.textContent='';initLevel(1);}});

  score=0;lives=3;level=1;initLevel(1);
  function loop(){update();draw();requestAnimationFrame(loop);}loop();
})();
</script>
</body>
</html>
