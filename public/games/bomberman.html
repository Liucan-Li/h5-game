<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>炸弹人</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Courier New', monospace;
    overflow: hidden;
  }
  .wrapper {
    background: #0d0d1a;
    border-radius: 16px;
    padding: 16px;
    box-shadow: 0 0 60px rgba(255,150,50,0.08);
    max-width: 480px;
    width: 100%;
    margin: 8px;
    text-align: center;
  }
  h1 { font-size: 18px; color: #fa4; letter-spacing: 3px; margin-bottom: 4px; }
  .hud {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
    font-size: 12px;
    color: #556;
  }
  .hud-val { color: #fa4; font-size: 16px; font-weight: bold; }
  canvas {
    display: block;
    border-radius: 8px;
    border: 2px solid #334;
    image-rendering: pixelated;
    max-width: 100%;
  }
  .controls {
    display: grid;
    grid-template-areas: ". up ." "left down right" ". bomb .";
    grid-template-columns: 1fr 1fr 1fr;
    gap: 6px;
    margin-top: 10px;
    max-width: 180px;
    margin-left: auto;
    margin-right: auto;
  }
  .ctrl-btn {
    grid-area: var(--area);
    padding: 10px;
    border-radius: 8px;
    border: 1.5px solid #334;
    background: #111;
    color: #fa4;
    font-size: 18px;
    cursor: pointer;
    -webkit-user-select: none;
    user-select: none;
    transition: background 0.1s;
  }
  .ctrl-btn:active { background: #fa42; }
  .status { font-size: 13px; color: #fa4; margin-top: 8px; min-height: 20px; }
  .keys-info { font-size: 10px; color: #334; margin-top: 4px; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>💣 炸弹人</h1>
  <div class="hud">
    <div>生命: <span class="hud-val" id="lives">❤️❤️❤️</span></div>
    <div>分数: <span class="hud-val" id="score">0</span></div>
    <div>关卡: <span class="hud-val" id="level">1</span></div>
  </div>
  <canvas id="c"></canvas>
  <div class="status" id="status">WASD/方向键移动，Space/J 放炸弹</div>
  <div class="controls">
    <button class="ctrl-btn" style="grid-area:up" id="btnUp">▲</button>
    <button class="ctrl-btn" style="grid-area:left" id="btnLeft">◀</button>
    <button class="ctrl-btn" style="grid-area:down" id="btnDown">▼</button>
    <button class="ctrl-btn" style="grid-area:right" id="btnRight">▶</button>
    <button class="ctrl-btn" style="grid-area:bomb" id="btnBomb">💣</button>
  </div>
  <div class="keys-info">PC: WASD/方向键 + Space 放炸弹</div>
</div>

<script>
const TILE = 40, COLS = 11, ROWS = 11;
const W = COLS * TILE, H = ROWS * TILE;
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = W; canvas.height = H;

const EMPTY = 0, WALL = 1, BRICK = 2, BOMB_TILE = 3, FIRE = 4;
const COLORS = {
  [EMPTY]: '#1a1a0a',
  [WALL]: '#333',
  [BRICK]: '#a05020',
  [FIRE]: '#ff8800',
};

let map, player, enemies, bombs, explosions, score, lives, level, gameState, frameCount;

function initLevel(lvl) {
  map = Array.from({length: ROWS}, (_, r) =>
    Array.from({length: COLS}, (_, c) => {
      if (r % 2 === 1 && c % 2 === 1) return WALL;
      if (r === 0 || r === ROWS-1 || c === 0 || c === COLS-1) return WALL;
      if ((r <= 2 && c <= 2)) return EMPTY; // safe start zone
      return Math.random() < 0.35 ? BRICK : EMPTY;
    })
  );

  player = { x: 1, y: 1, px: TILE, py: TILE, alive: true, bombCount: 1, bombRange: 2, speed: 3, moving: false };
  enemies = [];
  const enemyCount = Math.min(2 + lvl, 5);
  const positions = [[COLS-2, ROWS-2], [COLS-2, 1], [1, ROWS-2], [COLS-2, ROWS-4], [4, ROWS-2]];
  for (let i = 0; i < enemyCount; i++) {
    const [ex, ey] = positions[i];
    enemies.push({ x: ex, y: ey, px: ex*TILE, py: ey*TILE, alive: true, dir: 0, moveTimer: 0 });
    map[ey][ex] = EMPTY;
  }
  bombs = []; explosions = []; frameCount = 0;
  gameState = 'play';
}

function canMove(tx, ty) {
  if (tx < 0 || ty < 0 || tx >= COLS || ty >= ROWS) return false;
  return map[ty][tx] === EMPTY || map[ty][tx] === BOMB_TILE;
}

const keys = {};
document.addEventListener('keydown', e => { keys[e.code] = true; });
document.addEventListener('keyup', e => { keys[e.code] = false; });

let touchDir = null;
document.getElementById('btnUp').addEventListener('touchstart', e => { e.preventDefault(); touchDir = 'up'; });
document.getElementById('btnDown').addEventListener('touchstart', e => { e.preventDefault(); touchDir = 'down'; });
document.getElementById('btnLeft').addEventListener('touchstart', e => { e.preventDefault(); touchDir = 'left'; });
document.getElementById('btnRight').addEventListener('touchstart', e => { e.preventDefault(); touchDir = 'right'; });
['btnUp','btnDown','btnLeft','btnRight'].forEach(id => {
  document.getElementById(id).addEventListener('touchend', e => { e.preventDefault(); touchDir = null; });
});
document.getElementById('btnBomb').addEventListener('touchstart', e => { e.preventDefault(); placeBomb(); });
document.getElementById('btnBomb').addEventListener('click', placeBomb);

function updatePlayer() {
  const sp = player.speed;
  let dx = 0, dy = 0;
  if (keys['ArrowUp'] || keys['KeyW'] || touchDir === 'up') dy = -sp;
  if (keys['ArrowDown'] || keys['KeyS'] || touchDir === 'down') dy = sp;
  if (keys['ArrowLeft'] || keys['KeyA'] || touchDir === 'left') dx = -sp;
  if (keys['ArrowRight'] || keys['KeyD'] || touchDir === 'right') dx = sp;

  if (dx !== 0) dy = 0; // no diagonal

  if (dx !== 0 || dy !== 0) {
    const nx = player.px + dx, ny = player.py + dy;
    const tx = Math.floor(nx / TILE), ty = Math.floor(ny / TILE);
    const tx2 = Math.floor((nx + TILE - 2) / TILE), ty2 = Math.floor((ny + TILE - 2) / TILE);
    if (canMove(tx, ty) && canMove(tx2, ty) && canMove(tx, ty2) && canMove(tx2, ty2)) {
      player.px = nx; player.py = ny;
    }
    player.x = Math.round(player.px / TILE);
    player.y = Math.round(player.py / TILE);
  }

  if ((keys['Space'] || keys['KeyJ']) && frameCount % 10 === 0) placeBomb();
}

function placeBomb() {
  if (!player.alive || gameState !== 'play') return;
  const bx = Math.round(player.px / TILE), by = Math.round(player.py / TILE);
  if (bombs.find(b => b.x === bx && b.y === by)) return;
  if (bombs.filter(b => !b.exploded).length >= player.bombCount) return;
  bombs.push({ x: bx, y: by, timer: 120, exploded: false });
  map[by][bx] = BOMB_TILE;
}

function explodeBomb(bomb) {
  bomb.exploded = true;
  map[bomb.y][bomb.x] = EMPTY;
  const dirs = [[0,0],[1,0],[-1,0],[0,1],[0,-1]];
  for (const [dx, dy] of dirs) {
    for (let i = 0; i <= (dx===0&&dy===0?0:player.bombRange); i++) {
      const ex = bomb.x + dx*i, ey = bomb.y + dy*i;
      if (ex < 0||ey < 0||ex >= COLS||ey >= ROWS) break;
      if (map[ey][ex] === WALL) break;
      if (map[ey][ex] === BRICK) { map[ey][ex] = EMPTY; score += 10; explosions.push({x:ex,y:ey,t:30}); break; }
      explosions.push({x:ex,y:ey,t:30});
      // Hit player
      if (Math.round(player.px/TILE) === ex && Math.round(player.py/TILE) === ey) hitPlayer();
      // Hit enemies
      enemies.forEach(en => { if (en.alive && Math.round(en.px/TILE)===ex && Math.round(en.py/TILE)===ey) { en.alive=false; score+=100; } });
    }
  }
}

function hitPlayer() {
  if (!player.alive) return;
  lives--;
  updateLivesUI();
  if (lives <= 0) { player.alive = false; gameState = 'lose'; document.getElementById('status').textContent = '💀 游戏结束！点击任意键重试'; }
  else { player.px = TILE; player.py = TILE; document.getElementById('status').textContent = '⚠️ 被炸到了！还剩 ' + lives + ' 条命'; setTimeout(() => document.getElementById('status').textContent = '', 1500); }
}

function updateLivesUI() {
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0, lives));
}

const ENEMY_DIRS = [[0,-1],[0,1],[-1,0],[1,0]];
function updateEnemies() {
  for (const en of enemies) {
    if (!en.alive) continue;
    en.moveTimer++;
    if (en.moveTimer >= 40) {
      en.moveTimer = 0;
      const candidates = ENEMY_DIRS.filter(([dx,dy]) => canMove(en.x+dx, en.y+dy));
      if (candidates.length) {
        const [dx,dy] = candidates[Math.floor(Math.random()*candidates.length)];
        en.x += dx; en.y += dy;
        en.px = en.x * TILE; en.py = en.y * TILE;
      }
    }
    // Check collision with player
    if (Math.abs(en.px - player.px) < TILE*0.7 && Math.abs(en.py - player.py) < TILE*0.7) hitPlayer();
  }
}

function update() {
  if (gameState !== 'play') return;
  frameCount++;
  if (player.alive) updatePlayer();
  updateEnemies();

  // Update bombs
  for (const b of bombs) {
    if (!b.exploded) {
      b.timer--;
      if (b.timer <= 0) explodeBomb(b);
    }
  }
  bombs = bombs.filter(b => !b.exploded || b.timer > -30);

  // Update explosions
  for (const ex of explosions) ex.t--;
  explosions = explosions.filter(ex => ex.t > 0);

  document.getElementById('score').textContent = score;

  // Win check
  const aliveEnemies = enemies.filter(e => e.alive);
  if (aliveEnemies.length === 0) {
    level++;
    document.getElementById('level').textContent = level;
    gameState = 'levelup';
    document.getElementById('status').textContent = '🎉 过关！准备第 ' + level + ' 关...';
    setTimeout(() => { initLevel(level); }, 1500);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Draw tiles
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    const t = map[r][c];
    ctx.fillStyle = COLORS[t] || '#111';
    ctx.fillRect(c*TILE, r*TILE, TILE, TILE);
    if (t === WALL) {
      ctx.fillStyle = '#444';
      ctx.fillRect(c*TILE+2, r*TILE+2, TILE-4, TILE-4);
    } else if (t === BRICK) {
      ctx.fillStyle = '#c06030';
      ctx.fillRect(c*TILE+1, r*TILE+1, TILE-2, TILE-2);
      ctx.fillStyle = '#8a3010';
      ctx.fillRect(c*TILE+1, r*TILE+1, TILE/2-2, TILE/2-2);
      ctx.fillRect(c*TILE+TILE/2+1, r*TILE+TILE/2+1, TILE/2-2, TILE/2-2);
    }
  }

  // Draw explosions
  for (const ex of explosions) {
    const alpha = ex.t / 30;
    ctx.fillStyle = `rgba(255,140,0,${alpha*0.8})`;
    ctx.fillRect(ex.x*TILE, ex.y*TILE, TILE, TILE);
    ctx.fillStyle = `rgba(255,220,0,${alpha*0.6})`;
    ctx.fillRect(ex.x*TILE+8, ex.y*TILE+8, TILE-16, TILE-16);
  }

  // Draw bombs
  for (const b of bombs) {
    if (b.exploded) continue;
    const pulse = Math.sin(Date.now()/120) * 3;
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.arc(b.x*TILE+TILE/2, b.y*TILE+TILE/2, 14+pulse, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = b.timer < 40 ? '#f44' : '#666';
    ctx.beginPath();
    ctx.arc(b.x*TILE+TILE/2, b.y*TILE+TILE/2, 10+pulse, 0, Math.PI*2);
    ctx.fill();
    // Fuse
    ctx.strokeStyle = '#fa4';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(b.x*TILE+TILE/2, b.y*TILE+TILE/2-10);
    ctx.quadraticCurveTo(b.x*TILE+TILE/2+8, b.y*TILE+TILE/2-18, b.x*TILE+TILE/2+4, b.y*TILE+TILE/2-22);
    ctx.stroke();
  }

  // Draw enemies
  for (const en of enemies) {
    if (!en.alive) continue;
    ctx.fillStyle = '#f44';
    ctx.beginPath();
    ctx.arc(en.px+TILE/2, en.py+TILE/2, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#ff8';
    ctx.font = '18px serif';
    ctx.textAlign = 'center';
    ctx.fillText('👾', en.px+TILE/2, en.py+TILE/2+7);
  }

  // Draw player
  if (player.alive) {
    ctx.fillStyle = '#7df';
    ctx.beginPath();
    ctx.arc(player.px+TILE/2, player.py+TILE/2, 14, 0, Math.PI*2);
    ctx.fill();
    ctx.font = '20px serif';
    ctx.textAlign = 'center';
    ctx.fillText('🧑', player.px+TILE/2, player.py+TILE/2+7);
  }
}

document.addEventListener('keydown', e => {
  if (e.code === 'Space') { e.preventDefault(); placeBomb(); }
  if ((gameState === 'lose' || gameState === 'win') && e.code !== 'Space') {
    score = 0; lives = 3; level = 1;
    updateLivesUI();
    document.getElementById('score').textContent = '0';
    document.getElementById('level').textContent = '1';
    document.getElementById('status').textContent = 'WASD/方向键移动，Space/J 放炸弹';
    initLevel(1);
  }
});

canvas.addEventListener('click', () => {
  if (gameState === 'lose') {
    score = 0; lives = 3; level = 1;
    updateLivesUI();
    document.getElementById('score').textContent = '0';
    document.getElementById('level').textContent = '1';
    document.getElementById('status').textContent = 'WASD/方向键移动，Space/J 放炸弹';
    initLevel(1);
  }
});

score = 0; lives = 3; level = 1;
initLevel(1);

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
