<!DOCTYPE html>
<html lang="zh-CN" data-game-id="snake">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>贪吃蛇</title>
<link rel="stylesheet" href="framework.css">
<style>
  #gameCanvas {
    display: block; width: 100%; aspect-ratio: 1; max-width: 400px; margin: 0 auto;
    border-radius: var(--radius-lg); background: var(--game-bg);
  }
  .fw-controls-row { margin-top: 12px; }
  @media (max-width: 420px) {
    .fw-title { font-size: 1.5em; }
  }
</style>
</head>
<body>
<div class="fw-container fw-cat-arcade">
  <div class="fw-header">
    <h1 class="fw-title">贪吃蛇</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">最高分</div><div class="fw-score-value" id="hiScore">0</div></div>
    </div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="fw-controls-row" id="mobileControls"></div>
  <div class="fw-status">方向键控制 &middot; <button class="fw-btn fw-btn-ghost" id="restartBtn" style="padding:4px 16px;font-size:0.85em;">重新开始</button></div>
</div>
<div class="fw-overlay" id="gameOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title">游戏结束！</div>
    <div class="fw-overlay-text">分数：<span id="finalScore">0</span></div>
    <button class="fw-btn fw-btn-primary" id="restartOverlayBtn">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const finalScoreEl = document.getElementById('finalScore');
  const hiScoreEl = document.getElementById('hiScore');
  const overlay = document.getElementById('gameOverlay');
  const overlayRestart = document.getElementById('restartOverlayBtn');

  const CELLS = 20;
  let cellSize = 20;
  let snake, food, direction, nextDirection;
  let gameRunning, score;

  // Load high score
  hiScoreEl.textContent = FW.storage.getHighScore();

  function init() {
    snake = [{x: 10, y: 10}];
    direction = {x: 1, y: 0};
    nextDirection = {x: 1, y: 0};
    score = 0;
    gameRunning = true;
    FW.ui.hideOverlay(overlay);
    scoreEl.textContent = '0';
    hiScoreEl.textContent = FW.storage.getHighScore();
    spawnFood();
    draw();
    FW.loop.stop();
    FW.loop.startInterval(update, 130);
  }

  function spawnFood() {
    const occupied = new Set(snake.map(s => s.x + ',' + s.y));
    let pos;
    do {
      pos = {x: Math.floor(Math.random() * CELLS), y: Math.floor(Math.random() * CELLS)};
    } while (occupied.has(pos.x + ',' + pos.y));
    food = pos;
  }

  function update() {
    if (!gameRunning) return;
    direction = {...nextDirection};

    const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

    // Wall collision
    if (head.x < 0 || head.x >= CELLS || head.y < 0 || head.y >= CELLS) {
      gameOver();
      return;
    }

    // Self collision
    for (let i = 0; i < snake.length; i++) {
      if (snake[i].x === head.x && snake[i].y === head.y) {
        gameOver();
        return;
      }
    }

    snake.unshift(head);

    if (head.x === food.x && head.y === food.y) {
      score++;
      scoreEl.textContent = score;
      FW.audio.sfx('score');
      FW.events.reportScore(score);
      spawnFood();
    } else {
      snake.pop();
    }

    draw();
  }

  function gameOver() {
    gameRunning = false;
    FW.loop.stop();
    finalScoreEl.textContent = score;
    const isNew = FW.storage.setHighScore(score);
    if (isNew) {
      hiScoreEl.textContent = score;
      FW.audio.sfx('win');
    } else {
      FW.audio.sfx('gameover');
    }
    FW.ui.showOverlay(overlay);
    FW.events.reportComplete(score, { won: false });
  }

  function draw() {
    const w = canvas.width;
    const h = canvas.height;
    cellSize = w / CELLS;

    // Background
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(0, 0, w, h);

    // Grid lines
    ctx.strokeStyle = 'rgba(255,255,255,0.04)';
    ctx.lineWidth = 1;
    for (let i = 0; i <= CELLS; i++) {
      ctx.beginPath();
      ctx.moveTo(i * cellSize, 0);
      ctx.lineTo(i * cellSize, h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(0, i * cellSize);
      ctx.lineTo(w, i * cellSize);
      ctx.stroke();
    }

    // Snake body
    for (let i = 0; i < snake.length; i++) {
      const s = snake[i];
      const hue = 140 + (i / snake.length) * 30;
      const lightness = i === 0 ? 65 : 50;
      ctx.fillStyle = 'hsl(' + hue + ', 80%, ' + lightness + '%)';
      const pad = 1;
      const x = s.x * cellSize + pad;
      const y = s.y * cellSize + pad;
      const size = cellSize - pad * 2;
      const r = 4;
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + size - r, y);
      ctx.quadraticCurveTo(x + size, y, x + size, y + r);
      ctx.lineTo(x + size, y + size - r);
      ctx.quadraticCurveTo(x + size, y + size, x + size - r, y + size);
      ctx.lineTo(x + r, y + size);
      ctx.quadraticCurveTo(x, y + size, x, y + size - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.fill();
    }

    // Snake eyes
    if (snake.length > 0) {
      const head = snake[0];
      const cx = head.x * cellSize + cellSize / 2;
      const cy = head.y * cellSize + cellSize / 2;
      ctx.fillStyle = '#1a1a2e';
      const eyeR = cellSize * 0.08;
      let e1x, e1y, e2x, e2y;
      const off = cellSize * 0.15;
      if (direction.x === 1) { e1x = cx + off; e1y = cy - off; e2x = cx + off; e2y = cy + off; }
      else if (direction.x === -1) { e1x = cx - off; e1y = cy - off; e2x = cx - off; e2y = cy + off; }
      else if (direction.y === -1) { e1x = cx - off; e1y = cy - off; e2x = cx + off; e2y = cy - off; }
      else { e1x = cx - off; e1y = cy + off; e2x = cx + off; e2y = cy + off; }
      ctx.beginPath(); ctx.arc(e1x, e1y, eyeR, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e2x, e2y, eyeR, 0, Math.PI * 2); ctx.fill();
    }

    // Food
    ctx.fillStyle = '#ff6b6b';
    const fx = food.x * cellSize + cellSize / 2;
    const fy = food.y * cellSize + cellSize / 2;
    const fr = cellSize * 0.4;
    ctx.beginPath();
    ctx.arc(fx, fy, fr, 0, Math.PI * 2);
    ctx.fill();
    // Food shine
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.beginPath();
    ctx.arc(fx - fr * 0.25, fy - fr * 0.25, fr * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  function setDir(dx, dy) {
    if (!gameRunning) return;
    if (dx === -direction.x && dy === -direction.y) return;
    nextDirection = {x: dx, y: dy};
  }

  // Keyboard via framework
  FW.input.onKey(function(key, pressed, e) {
    if (!pressed) return;
    switch (key) {
      case 'ArrowUp': e.preventDefault(); setDir(0, -1); break;
      case 'ArrowDown': e.preventDefault(); setDir(0, 1); break;
      case 'ArrowLeft': e.preventDefault(); setDir(-1, 0); break;
      case 'ArrowRight': e.preventDefault(); setDir(1, 0); break;
    }
  });

  // Touch swipe on canvas
  FW.input.attachSwipe(canvas);
  FW.input.onSwipe(function(dir) {
    switch (dir) {
      case 'up': setDir(0, -1); break;
      case 'down': setDir(0, 1); break;
      case 'left': setDir(-1, 0); break;
      case 'right': setDir(1, 0); break;
    }
  });

  // Mobile D-pad
  const controlsContainer = document.getElementById('mobileControls');
  const dpad = FW.input.createDPad(function(dir) {
    switch (dir) {
      case 'up': setDir(0, -1); break;
      case 'down': setDir(0, 1); break;
      case 'left': setDir(-1, 0); break;
      case 'right': setDir(1, 0); break;
    }
  });
  controlsContainer.appendChild(dpad);

  // Restart
  function restart() {
    FW.loop.stop();
    FW.ui.hideOverlay(overlay);
    init();
  }
  document.getElementById('restartBtn').addEventListener('click', restart);
  overlayRestart.addEventListener('click', restart);

  init();

  // Handle canvas resize scaling
  function resizeCanvas() {
    const container = canvas.parentElement;
    const w = container.clientWidth;
    canvas.style.width = w + 'px';
    canvas.style.height = w + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
})();
</script>
</body>
</html>
