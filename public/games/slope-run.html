<!DOCTYPE html>
<html lang="zh-CN" data-game-id="slope-run">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Slope Run</title>
<link rel="stylesheet" href="framework.css">
<style>
  canvas { display: block; width: 100%; aspect-ratio: 3/4; margin: 0 auto; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">Slope Run</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">最高</div><div class="fw-score-value" id="hi">0</div></div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas id="gc" class="fw-canvas" width="300" height="400"></canvas>
    <div class="fw-overlay" id="overlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title" id="ot">游戏结束</div>
        <div class="fw-overlay-text" id="os">分数：0</div>
        <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
      </div>
    </div>
  </div>
  <div class="fw-status">按 ← → 或 A/D 键左右移动，避开障碍</div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var c=document.getElementById('gc'),ctx=c.getContext('2d');
  var s=document.getElementById('score'),hiEl=document.getElementById('hi');
  var ov=document.getElementById('overlay');
  var ot=document.getElementById('ot'),os=document.getElementById('os');
  var W=300,H=400;

  var player,obstacles,score,speed,gameOver,frame,framesSinceObs;
  var milestone=50;

  function init(){
    player={x:W/2,y:H-60,size:10};
    obstacles=[];
    score=0; speed=3; gameOver=false; frame=0; framesSinceObs=0; milestone=50;
    ov.classList.remove('active');
    FW.audio.sfx('click');
    updateScore();
    hiEl.textContent=FW.storage.getHighScore();
    requestAnimationFrame(loop);
  }

  function updateScore(){
    var val=Math.floor(score);
    s.textContent=val;
    if(val>=milestone){
      FW.audio.sfx('score');
      milestone+=50;
    }
  }

  function loop(){
    if(gameOver)return;
    frame++;
    score+=0.05*speed;
    updateScore();
    speed=3+Math.floor(score/50);

    framesSinceObs++;
    var obsInterval=Math.max(20,60-Math.floor(speed)*2);
    if(framesSinceObs>obsInterval&&Math.random()<0.4){
      var obsW=20+Math.random()*30;
      obstacles.push({
        x:Math.random()*(W-obsW),y:-30,
        w:obsW,h:15+Math.random()*15
      });
      framesSinceObs=0;
    }

    obstacles=obstacles.filter(function(o){
      o.y+=speed;
      if(o.y>H)return false;
      // Collision
      if(player.x+player.size>o.x&&player.x-player.size<o.x+o.w&&
         player.y+player.size>o.y&&player.y-player.size<o.y+o.h){
        gameOver=true;
        FW.audio.sfx('gameover');
        var finalScore=Math.floor(score);
        ot.textContent='游戏结束';os.textContent='分数：'+finalScore;
        ov.classList.add('active');
        var isNew=FW.storage.setHighScore(finalScore);
        if(isNew)hiEl.textContent=finalScore;
        FW.events.reportScore(finalScore);
        FW.events.reportComplete(finalScore,{won:false});
        if(finalScore>=200)FW.audio.sfx('win');
        return false;
      }
      return true;
    });

    render();
    requestAnimationFrame(loop);
  }

  function render(){
    ctx.fillStyle='#0f3460';ctx.fillRect(0,0,W,H);
    // Track lines
    ctx.strokeStyle='rgba(255,255,255,0.05)';ctx.lineWidth=1;
    for(var i=0;i<H;i+=30){
      ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(W,i);ctx.stroke();
    }
    // Obstacles
    obstacles.forEach(function(o){
      var grad=ctx.createLinearGradient(o.x,o.y,o.x,o.y+o.h);
      grad.addColorStop(0,'#e74c3c');grad.addColorStop(1,'#c0392b');
      ctx.fillStyle=grad;
      ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,4);ctx.fill();
    });
    // Player (ball)
    var pg=ctx.createRadialGradient(player.x-3,player.y-3,0,player.x,player.y,player.size);
    pg.addColorStop(0,'#00cec9');pg.addColorStop(1,'#00b894');
    ctx.fillStyle=pg;
    ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,Math.PI*2);ctx.fill();
    // Eyes
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(player.x-4,player.y-3,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(player.x+4,player.y-3,2.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.arc(player.x-4,player.y-3,1.2,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(player.x+4,player.y-3,1.2,0,Math.PI*2);ctx.fill();
    // Speed indicator
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='10px sans-serif';ctx.textAlign='left';
    ctx.fillText('速度 '+Math.floor(speed),8,14);
  }

  document.addEventListener('keydown',function(e){
    if(gameOver&&e.key===' '){e.preventDefault();init();return;}
    if(e.key==='ArrowLeft'||e.key==='a')player.x=Math.max(player.size,player.x-20);
    if(e.key==='ArrowRight'||e.key==='d')player.x=Math.min(W-player.size,player.x+20);
  });

  document.getElementById('rb').addEventListener('click',function(){FW.audio.sfx('click');init();});
  hiEl.textContent=FW.storage.getHighScore();
  init();
})();
</script>
</body>
</html>
