<!DOCTYPE html>
<html lang="zh-CN" data-game-id="geometry-dash">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Geometry Dash</title>
<link rel="stylesheet" href="framework.css">
<style>
  canvas { display: block; width: 100%; aspect-ratio: 2; }
  .game-wrapper { position: relative; }
  .instructions { color: var(--text-muted); font-size: 0.8em; margin-top: 12px; }
</style>
</head>
<body>
<div class="fw-container fw-cat-arcade">
  <div class="fw-header">
    <h1 class="fw-title">Geometry Dash</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">最高分</div><div class="fw-score-value" id="highScore">0</div></div>
    </div>
  </div>
  <div class="game-wrapper fw-game-area">
    <canvas id="gc" width="600" height="300" class="fw-canvas"></canvas>
  </div>
  <div class="fw-status instructions">按 空格/↑/点击屏幕 跳跃，长按跳更高</div>
</div>
<div class="fw-overlay" id="overlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="ot">游戏结束</div>
    <div class="fw-overlay-text" id="os">分数：0</div>
    <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW = window.GameFramework;
  const c=document.getElementById('gc'),ctx=c.getContext('2d');
  const s=document.getElementById('score'),ov=document.getElementById('overlay');
  const ot=document.getElementById('ot'),os=document.getElementById('os');
  const hs=document.getElementById('highScore');
  const W=600,H=300;

  const GRAVITY=0.8, JUMP=-12, GROUND=250;
  let player,obstacles,score,speed,gameOver,jumping,holdJump;
  let frame,obsTimer,particles,lastScoreFloor;

  const COLORS=['#e74c3c','#f39c12','#2ecc71','#3498db','#9b59b6','#1abc9c'];

  function init(){
    player={x:80,y:GROUND,w:20,h:20,vy:0};
    obstacles=[]; particles=[];
    score=0; speed=4; gameOver=false; jumping=false; holdJump=false;
    frame=0; obsTimer=0; lastScoreFloor=0;
    hs.textContent=FW.storage.getHighScore();
    FW.ui.hideOverlay(ov);
    requestAnimationFrame(loop);
  }

  function loop(){
    if(gameOver)return;
    frame++;
    score+=0.1;
    const floorScore=Math.floor(score);
    s.textContent=floorScore;
    speed=4+Math.floor(score/30);

    // Score sound every 10 points
    if(floorScore>0&&floorScore%10===0&&floorScore!==lastScoreFloor){
      FW.audio.sfx('score');
      lastScoreFloor=floorScore;
    }

    // Physics
    if(holdJump&&jumping)player.vy=-9;
    player.vy+=GRAVITY;
    player.y+=player.vy;
    if(player.y>=GROUND){player.y=GROUND;player.vy=0;jumping=false;}
    if(player.y<0){player.y=0;player.vy=0;}

    // Spawn obstacles
    obsTimer++;
    const interval=Math.max(30,80-speed);
    if(obsTimer>interval&&Math.random()<0.5){
      const type=Math.floor(Math.random()*3);
      const h=15+Math.random()*25;
      const w=8+Math.random()*15;
      obstacles.push({x:W+20,y:GROUND-h,w,h,type,color:COLORS[Math.floor(Math.random()*COLORS.length)]});
      obsTimer=0;
    }

    // Move obstacles
    obstacles=obstacles.filter(function(o){
      o.x-=speed;
      if(o.x+o.w<0)return false;
      // Collision
      if(player.x<o.x+o.w&&player.x+player.w>o.x&&player.y<o.y+o.h&&player.y+player.h>o.y){
        gameOver=true;
        FW.audio.sfx('gameover');
        const finalScore=Math.floor(score);
        const isNew=FW.storage.setHighScore(finalScore);
        hs.textContent=FW.storage.getHighScore();
        if(isNew&&finalScore>0)FW.audio.sfx('win');
        FW.events.reportScore(finalScore);
        FW.events.reportComplete(finalScore,{won:false});
        ot.textContent='游戏结束';os.textContent='分数：'+finalScore;
        FW.ui.showOverlay(ov);return false;
      }
      return true;
    });

    // Particles trail
    if(frame%3===0){
      particles.push({x:player.x+5,y:player.y+20,size:2+Math.random()*3,life:20,color:'rgba(255,255,255,0.5)'});
    }
    particles=particles.filter(function(p){p.life--;p.y+=0.5;p.x-=speed*0.5;return p.life>0;});

    render();
    requestAnimationFrame(loop);
  }

  function render(){
    ctx.fillStyle='#0f3460';ctx.fillRect(0,0,W,H);
    // Background pattern
    ctx.fillStyle='rgba(255,255,255,0.02)';
    for(var i=0;i<W;i+=40)for(var j=0;j<H;j+=40)ctx.fillRect(i,j,20,20);
    // Ground
    ctx.fillStyle='#16213e';ctx.fillRect(0,GROUND,600,H-GROUND);
    ctx.strokeStyle='rgba(255,255,255,0.2)';ctx.lineWidth=2;
    ctx.beginPath();ctx.moveTo(0,GROUND);ctx.lineTo(W,GROUND);ctx.stroke();
    // Particles
    particles.forEach(function(p){ctx.fillStyle=p.color;ctx.globalAlpha=p.life/20;ctx.fillRect(p.x,p.y,p.size,p.size);});
    ctx.globalAlpha=1;
    // Obstacles
    obstacles.forEach(function(o){
      if(o.type===0){ // Spike
        ctx.fillStyle=o.color;
        ctx.beginPath();ctx.moveTo(o.x,o.y+o.h);ctx.lineTo(o.x+o.w/2,o.y);ctx.lineTo(o.x+o.w,o.y+o.h);ctx.closePath();ctx.fill();
      }else if(o.type===1){ // Block
        ctx.fillStyle=o.color;ctx.beginPath();ctx.roundRect(o.x,o.y,o.w,o.h,3);ctx.fill();
      }else{ // Circle
        ctx.fillStyle=o.color;ctx.beginPath();ctx.arc(o.x+o.w/2,o.y+o.h/2,o.w/2,0,Math.PI*2);ctx.fill();
      }
    });
    // Player
    ctx.fillStyle='#00cec9';ctx.beginPath();ctx.roundRect(player.x,player.y,player.w,player.h,4);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.3)';
    ctx.beginPath();ctx.roundRect(player.x+3,player.y+3,6,4,2);ctx.fill();
    ctx.beginPath();ctx.roundRect(player.x+11,player.y+3,6,4,2);ctx.fill();
    // Score
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='11px sans-serif';ctx.textAlign='left';
    ctx.fillText('速度 '+Math.floor(speed),8,18);
  }

  function doJump(){
    if(!jumping&&!gameOver){
      player.vy=JUMP;jumping=true;holdJump=true;
      FW.audio.sfx('click');
    }
  }
  function releaseJump(){holdJump=false;}

  document.addEventListener('keydown',function(e){
    if(e.key===' '||e.key==='ArrowUp'){e.preventDefault();doJump();}
    if(gameOver)init();
  });
  document.addEventListener('keyup',function(e){
    if(e.key===' '||e.key==='ArrowUp')releaseJump();
  });

  c.addEventListener('touchstart',function(e){e.preventDefault();doJump();},{passive:false});
  c.addEventListener('touchend',function(e){releaseJump();});

  document.getElementById('rb').addEventListener('click',function(){
    FW.audio.sfx('click');
    init();
  });
  init();
})();
</script>
</body>
</html>
