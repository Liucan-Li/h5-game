<!DOCTYPE html>
<html lang="zh-CN" data-game-id="escape-room">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>密室逃脱</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  .scene {
    background: var(--bg-secondary); border-radius: var(--radius-xl); padding: 20px; min-height: 300px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px;
  }
  .scene p { font-size: 0.95em; line-height: 1.6; color: var(--text-secondary); }
  .scene-image { font-size: 4em; margin-bottom: 8px; }
  .choices { display: flex; flex-direction: column; gap: 8px; width: 100%; margin-top: 8px; }
  .choices button {
    background: var(--bg-tertiary); color: var(--text-primary); border: 2px solid transparent;
    padding: 12px; border-radius: var(--radius-md); font-size: 0.9em; cursor: pointer;
    transition: all 0.15s; text-align: left;
  }
  .choices button:hover { border-color: var(--accent-1); background: var(--bg-card-hover); }
  .choices button:active { transform: scale(0.98); }
  .inventory {
    display: flex; gap: 8px; flex-wrap: wrap; justify-content: center;
    min-height: 40px; margin-top: 8px;
  }
  .inventory .item {
    background: var(--bg-tertiary); padding: 6px 12px; border-radius: var(--radius-md); font-size: 0.8em;
    border: 1px solid var(--border-default);
  }
  .inv-label { font-size: 0.75em; color: var(--text-muted); margin-top: 8px; }
  .reset-btn { margin-top: 12px; }
  .status { font-size: 0.85em; color: var(--accent-3); min-height: 20px; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">🔒 密室逃脱</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">步数</div>
        <div class="fw-score-value" id="movesDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">最佳</div>
        <div class="fw-score-value" id="bestDisplay">--</div>
      </div>
    </div>
  </div>
  <div class="status" id="status">你被困在一个神秘的房间里...</div>
  <div class="scene" id="scene"></div>
  <div class="inv-label">🎒 道具</div>
  <div class="inventory" id="inventory"></div>
  <button class="fw-btn fw-btn-ghost reset-btn" id="resetBtn">重新开始</button>
</div>
<div class="fw-overlay" id="winOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title">🎉 恭喜通关！</div>
    <div class="fw-overlay-text" id="winOverlayText">你成功逃出了密室！</div>
    <button class="fw-btn fw-btn-primary" id="overlayRestartBtn">再来一次</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW = window.GameFramework;
  const scene=document.getElementById('scene');
  const inv=document.getElementById('inventory');
  const st=document.getElementById('status');
  const movesDisplay=document.getElementById('movesDisplay');
  const bestDisplay=document.getElementById('bestDisplay');
  const winOverlay=document.getElementById('winOverlay');
  var moves=0;

  function updateScore() {
    movesDisplay.textContent=moves;
    var best=FW.storage.getHighScore();
    bestDisplay.textContent=best||'--';
  }

  const ROOMS = {
    start: {
      image:'🚪',
      text:'你在一间昏暗的房间里。有一张桌子、一幅画、一扇锁着的门。',
      choices:[
        {text:'📖 检查桌子',next:'desk'},
        {text:'🖼️ 检查画框',next:'painting'},
        {text:'🚪 尝试开门',next:'door'},
      ]
    },
    desk: {
      image:'📖',
      text:'桌子上有一盏台灯和一个上锁的抽屉。',
      choices:[
        {text:'🔦 打开台灯',next:'lamp',action:'light'},
        {text:'🔐 尝试打开抽屉',next:'drawer'},
        {text:'↩️ 回到房间中央',next:'start'},
      ]
    },
    lamp: {
      image:'💡',
      text:'台灯亮了！你在灯座下发现了一把钥匙。',
      choices:[
        {text:'🔑 拿走钥匙',action:'key',next:'desk'},
        {text:'↩️ 回到房间中央',next:'start'},
      ]
    },
    painting: {
      image:'🖼️',
      text:'画框后面有一个保险柜，需要 3 位数字密码。',
      choices:[
        {text:'💬 输入密码',next:'vault'},
        {text:'↩️ 回到房间中央',next:'start'},
      ]
    },
    vault: {
      image:'🔢',
      text:'三位数字密码锁。（提示：看看房间里的数字线索）',
      choices:[
        {text:'输入 737',next:'vault_wrong'},
        {text:'输入 123',next:'vault_wrong'},
        {text:'输入 444',next:'vault_open',item:'vault_open'},
        {text:'↩️ 回去',next:'painting'},
      ]
    },
    vault_wrong: {
      image:'❌',
      text:'密码错误，锁发出嘟嘟声。',
      choices:[{text:'↩️ 再试一次',next:'vault'}]
    },
    vault_open: {
      image:'🎉',
      text:'保险柜打开了！里面有一把金色的门钥匙！',
      choices:[
        {text:'🔑 拿走金钥匙',action:'goldkey',next:'painting'}
      ]
    },
    drawer: {
      image:'🔐',
      text:'抽屉锁着。你需要一把小钥匙。',
      choices:[{text:'↩️ 回到房间中央',next:'start'}]
    },
    door: {
      image:'🚪',
      text:'门锁着。你需要找到钥匙...',
      choices:[],
      check:function(invItems){
        if(invItems.includes('goldkey')){
          return {image:'🎊',text:'🎉 你成功逃出了密室！恭喜通关！',choices:[{text:'🔄 再来一次',next:'_restart'}]};
        }
        if(invItems.includes('key')){
          return {image:'🔑',text:'小钥匙打不开这门...需要更大的钥匙。',choices:[{text:'↩️ 继续探索',next:'start'}]};
        }
        return this;
      }
    }
  };

  var inventory=[],currentRoom='start';

  function render(){
    var room=ROOMS[currentRoom];
    if(room.check)room=room.check(inventory)||room;
    var html=[];
    html.push('<div class="scene-image">'+(room.image||'❓')+'</div>');
    html.push('<p>'+room.text+'</p>');
    if(room.choices&&room.choices.length>0){
      html.push('<div class="choices">');
      room.choices.forEach(function(c,i){
        var disabled=(c.requires&&!inventory.includes(c.requires))?'style="opacity:0.4;cursor:not-allowed;"':'';
        html.push('<button data-idx="'+i+'" '+disabled+'>'+c.text+'</button>');
      });
      html.push('</div>');
    }
    scene.innerHTML=html.join('');

    scene.querySelectorAll('.choices button').forEach(function(btn){
      btn.addEventListener('click',function(){
        var idx=parseInt(btn.dataset.idx);
        var choice=room.choices[idx];
        if(!choice||(choice.requires&&!inventory.includes(choice.requires)))return;
        FW.audio.sfx('click');
        moves++;
        updateScore();
        if(choice.action==='key'&&!inventory.includes('key')){inventory.push('key');st.textContent='🔑 获得了小钥匙';}
        if(choice.action==='goldkey'&&!inventory.includes('goldkey')){inventory.push('goldkey');st.textContent='🔑 获得了金钥匙！';}
        if(choice.item==='vault_open'&&!inventory.includes('goldkey')){FW.audio.sfx('score');st.textContent='🔓 保险柜打开了！';}
        if(choice.next==='_restart'){FW.events.reportScore(moves);FW.events.reportComplete(moves,{won:true});FW.audio.sfx('win');FW.storage.setHighScore(1);winOverlay.classList.add('active');return;}
        currentRoom=choice.next;
        render();
      });
    });

    // Inventory
    if(inventory.length===0){
      inv.innerHTML='<span style="color:var(--text-muted);font-size:0.8em;">（空）</span>';
    }else{
      inv.innerHTML=inventory.map(function(i){return '<span class="item">'+(i==='key'?'🔑 小钥匙':'🔑 金钥匙')+'</span>';}).join('');
    }
  }

  function init(){
    inventory=[];currentRoom='start';moves=0;st.textContent='🔒 你被困在密室中...';
    winOverlay.classList.remove('active');
    updateScore();
    render();
  }

  document.getElementById('resetBtn').addEventListener('click',init);
  document.getElementById('overlayRestartBtn').addEventListener('click',init);
  init();
})();
</script>
</body>
</html>
