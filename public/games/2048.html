<!DOCTYPE html>
<html lang="zh-CN" data-game-id="2048">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048 合成数字</title>
<link rel="stylesheet" href="framework.css">
<style>
  .grid-container {
    position: relative; background: var(--game-bg); border-radius: var(--radius-lg); padding: 8px;
    aspect-ratio: 1; width: 100%; max-width: 400px; margin: 0 auto;
  }
  .grid-background {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  }
  .cell { background: rgba(255,255,255,0.08); border-radius: 6px; aspect-ratio: 1; }
  .tile-container {
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  }
  .tile {
    position: absolute; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 2em; border-radius: 6px;
    transition: top 0.12s ease, left 0.12s ease;
    animation: fw-pop 0.2s ease;
  }
  .tile-merged { animation: fw-pop 0.2s ease; }
  .tile-2 { background: #eee4da; color: #776e65; }
  .tile-4 { background: #ede0c8; color: #776e65; }
  .tile-8 { background: #f2b179; color: #f9f6f2; }
  .tile-16 { background: #f59563; color: #f9f6f2; }
  .tile-32 { background: #f67c5f; color: #f9f6f2; }
  .tile-64 { background: #f65e3b; color: #f9f6f2; }
  .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.7em; }
  .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.7em; }
  .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.7em; }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.3em; }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.3em; }
  .tile-super { background: #3c3a3e; color: #f9f6f2; font-size: 1.1em; }
  .instructions { color: var(--text-muted); font-size: 0.8em; margin-top: 12px; }
  @media (max-width: 420px) {
    .fw-container { max-width: 320px; }
    .fw-title { font-size: 1.5em; }
    .tile { font-size: 1.5em; }
    .tile-128, .tile-256, .tile-512 { font-size: 1.3em; }
    .tile-1024, .tile-2048 { font-size: 1em; }
  }
</style>
</head>
<body>
<div class="fw-container fw-cat-puzzle">
  <div class="fw-header">
    <h1 class="fw-title">2048</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">最高分</div><div class="fw-score-value" id="best">0</div></div>
    </div>
  </div>
  <div class="grid-container" id="gridContainer">
    <div class="grid-background" id="gridBg"></div>
    <div class="tile-container" id="tileContainer"></div>
  </div>
  <div class="fw-status instructions">使用方向键或滑动来移动方块</div>
</div>
<div class="fw-overlay" id="gameOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="overlayTitle">游戏结束！</div>
    <div class="fw-overlay-text" id="overlayScore">分数：0</div>
    <button class="fw-btn fw-btn-primary" id="restartBtn">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const SIZE = 4;
  let grid, score, best;
  let gameOver, won, keepPlaying;
  const tileContainer = document.getElementById('tileContainer');
  const gridBg = document.getElementById('gridBg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('gameOverlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');

  // Build background cells
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    gridBg.appendChild(cell);
  }

  // Load best score
  best = FW.storage.getHighScore();
  bestEl.textContent = best;

  function initGrid() {
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    score = 0;
    gameOver = false;
    won = false;
    keepPlaying = false;
    updateScore();
    FW.ui.hideOverlay(overlay);
    addRandomTile();
    addRandomTile();
    render();
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === null) empty.push([r, c]);
      }
    }
    if (empty.length === 0) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === null) return true;
        if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return true;
        if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return true;
      }
    }
    return false;
  }

  function doMove(dir) {
    if (gameOver) return;
    let moved = false;
    let prevScore = score;

    function slideRow(row) {
      const arr = row.filter(v => v !== null);
      const merged = [];
      let i = 0;
      while (i < arr.length) {
        if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
          merged.push(arr[i] * 2);
          score += arr[i] * 2;
          i += 2;
        } else {
          merged.push(arr[i]);
          i++;
        }
      }
      while (merged.length < SIZE) merged.push(null);
      return merged;
    }

    function transpose(g) {
      return g[0].map((_, i) => g.map(row => row[i]));
    }

    switch (dir) {
      case 'left': {
        for (let r = 0; r < SIZE; r++) {
          const original = [...grid[r]];
          grid[r] = slideRow(grid[r]);
          if (original.some((v, idx) => v !== grid[r][idx])) moved = true;
        }
        break;
      }
      case 'right': {
        for (let r = 0; r < SIZE; r++) {
          const rev = [...grid[r]].reverse();
          const result = slideRow(rev).reverse();
          const changed = grid[r].some((v, idx) => v !== result[idx]);
          if (changed) moved = true;
          grid[r] = result;
        }
        break;
      }
      case 'up': {
        grid = transpose(grid);
        for (let r = 0; r < SIZE; r++) {
          const original = [...grid[r]];
          grid[r] = slideRow(grid[r]);
          if (original.some((v, idx) => v !== grid[r][idx])) moved = true;
        }
        grid = transpose(grid);
        break;
      }
      case 'down': {
        grid = transpose(grid);
        for (let r = 0; r < SIZE; r++) {
          const rev = [...grid[r]].reverse();
          const result = slideRow(rev).reverse();
          const changed = grid[r].some((v, idx) => v !== result[idx]);
          if (changed) moved = true;
          grid[r] = result;
        }
        grid = transpose(grid);
        break;
      }
    }

    if (moved) {
      FW.audio.sfx('move');
      addRandomTile();
      updateScore();
      render();
      checkGameState();
    }
  }

  function updateScore() {
    scoreEl.textContent = score;
    const isNew = FW.storage.setHighScore(score);
    best = FW.storage.getHighScore();
    bestEl.textContent = best;
    if (isNew && score > 0) FW.audio.sfx('score');
    if (score > 0) FW.events.reportScore(score);
  }

  function checkGameState() {
    if (!won && !keepPlaying) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] >= 2048) {
            won = true;
            FW.audio.sfx('win');
            overlayTitle.textContent = '你赢了！';
            overlayScore.textContent = '分数：' + score;
            FW.ui.showOverlay(overlay);
            FW.events.reportComplete(score, { won: true });
            return;
          }
        }
      }
    }
    if (!canMove()) {
      gameOver = true;
      FW.audio.sfx('gameover');
      overlayTitle.textContent = '游戏结束！';
      overlayScore.textContent = '分数：' + score;
      FW.ui.showOverlay(overlay);
      FW.events.reportComplete(score, { won: false });
    }
  }

  function render() {
    tileContainer.innerHTML = '';
    const rect = tileContainer.getBoundingClientRect();
    const gap = 8;
    const totalGap = (SIZE + 1) * gap;
    const tileSize = (rect.width - totalGap) / SIZE;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const val = grid[r][c];
        if (val === null) continue;
        const tile = document.createElement('div');
        tile.className = 'tile';
        if (val <= 2048) tile.classList.add('tile-' + val);
        else tile.classList.add('tile-super');
        tile.textContent = val;
        tile.style.width = tileSize + 'px';
        tile.style.height = tileSize + 'px';
        tile.style.left = (gap + c * (tileSize + gap)) + 'px';
        tile.style.top = (gap + r * (tileSize + gap)) + 'px';
        tileContainer.appendChild(tile);
      }
    }
  }

  // Keyboard input via framework
  const keyMap = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
  FW.input.onKey(function(key, pressed, e) {
    if (pressed && keyMap[key]) {
      e.preventDefault();
      doMove(keyMap[key]);
    }
  });

  // Touch swipe via framework
  FW.input.attachSwipe(document.getElementById('gridContainer'));

  // Register swipe handler
  FW.input.onSwipe(function(dir) {
    doMove(dir);
  });

  // Restart
  document.getElementById('restartBtn').addEventListener('click', initGrid);

  // Init
  initGrid();

  // Re-render on resize
  let resizeTimer;
  window.addEventListener('resize', function() {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 100);
  });
})();
</script>
</body>
</html>
