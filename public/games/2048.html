<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>2048</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px;
    -webkit-user-select: none; user-select: none; touch-action: none;
  }
  .container { text-align: center; width: 100%; max-width: 400px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  h1 { font-size: 2.2em; font-weight: 800; background: linear-gradient(135deg, #f7971e, #ffd200); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .scores { display: flex; gap: 8px; }
  .score-box { background: #16213e; padding: 6px 14px; border-radius: 8px; min-width: 70px; }
  .score-label { font-size: 0.7em; text-transform: uppercase; color: #7f8c8d; letter-spacing: 1px; }
  .score-value { font-size: 1.3em; font-weight: 700; color: #fff; }
  .grid-container {
    position: relative; background: #0f3460; border-radius: 12px; padding: 8px;
    aspect-ratio: 1; width: 100%; max-width: 400px; margin: 0 auto;
  }
  .grid-background {
    display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px;
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  }
  .cell { background: rgba(255,255,255,0.08); border-radius: 6px; aspect-ratio: 1; }
  .tile-container {
    position: absolute; top: 8px; left: 8px; right: 8px; bottom: 8px;
  }
  .tile {
    position: absolute; display: flex; align-items: center; justify-content: center;
    font-weight: 800; font-size: 2em; border-radius: 6px;
    transition: top 0.12s ease, left 0.12s ease;
    animation: appear 0.2s ease;
  }
  @keyframes appear { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
  .tile-merged { animation: pop 0.2s ease; }
  .tile-2 { background: #eee4da; color: #776e65; }
  .tile-4 { background: #ede0c8; color: #776e65; }
  .tile-8 { background: #f2b179; color: #f9f6f2; }
  .tile-16 { background: #f59563; color: #f9f6f2; }
  .tile-32 { background: #f67c5f; color: #f9f6f2; }
  .tile-64 { background: #f65e3b; color: #f9f6f2; }
  .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.7em; }
  .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.7em; }
  .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.7em; }
  .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.3em; }
  .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.3em; }
  .tile-super { background: #3c3a3e; color: #f9f6f2; font-size: 1.1em; }
  .game-overlay {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.7);
    border-radius: 12px; z-index: 10;
  }
  .game-overlay.active { display: flex; }
  .game-overlay h2 { font-size: 2em; color: #fff; margin-bottom: 8px; }
  .game-overlay p { color: #ccc; margin-bottom: 16px; }
  button {
    background: linear-gradient(135deg, #f7971e, #ffd200); color: #1a1a2e;
    border: none; padding: 10px 28px; border-radius: 8px; font-size: 1em;
    font-weight: 700; cursor: pointer; transition: transform 0.1s;
  }
  button:active { transform: scale(0.95); }
  .instructions { color: #7f8c8d; font-size: 0.8em; margin-top: 12px; }
  @media (max-width: 420px) {
    .container { max-width: 320px; }
    h1 { font-size: 1.8em; }
    .tile { font-size: 1.5em; }
    .tile-128, .tile-256, .tile-512 { font-size: 1.3em; }
    .tile-1024, .tile-2048 { font-size: 1em; }
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>2048</h1>
    <div class="scores">
      <div class="score-box"><div class="score-label">Score</div><div class="score-value" id="score">0</div></div>
      <div class="score-box"><div class="score-label">Best</div><div class="score-value" id="best">0</div></div>
    </div>
  </div>
  <div class="grid-container" id="gridContainer">
    <div class="grid-background" id="gridBg"></div>
    <div class="tile-container" id="tileContainer"></div>
    <div class="game-overlay" id="gameOverlay">
      <h2 id="overlayTitle">Game Over!</h2>
      <p id="overlayScore">Score: 0</p>
      <button id="restartBtn">Play Again</button>
    </div>
  </div>
  <div class="instructions">Use arrow keys or swipe to move tiles</div>
</div>
<script>
(function() {
  const SIZE = 4;
  let grid, score, best;
  let gameOver, won, keepPlaying;
  const tileContainer = document.getElementById('tileContainer');
  const gridBg = document.getElementById('gridBg');
  const scoreEl = document.getElementById('score');
  const bestEl = document.getElementById('best');
  const overlay = document.getElementById('gameOverlay');
  const overlayTitle = document.getElementById('overlayTitle');
  const overlayScore = document.getElementById('overlayScore');

  // Build background cells
  for (let i = 0; i < SIZE * SIZE; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell';
    gridBg.appendChild(cell);
  }

  function initGrid() {
    grid = Array.from({length: SIZE}, () => Array(SIZE).fill(null));
    score = 0;
    gameOver = false;
    won = false;
    keepPlaying = false;
    updateScore();
    addRandomTile();
    addRandomTile();
    render();
  }

  function addRandomTile() {
    const empty = [];
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === null) empty.push([r, c]);
      }
    }
    if (empty.length === 0) return;
    const [r, c] = empty[Math.floor(Math.random() * empty.length)];
    grid[r][c] = Math.random() < 0.9 ? 2 : 4;
  }

  function slide(row) {
    const arr = row.filter(v => v !== null);
    const merged = [];
    let i = 0;
    while (i < arr.length) {
      if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
        merged.push(arr[i] * 2);
        score += arr[i] * 2;
        i += 2;
      } else {
        merged.push(arr[i]);
        i++;
      }
    }
    while (merged.length < SIZE) merged.push(null);
    return merged;
  }

  function transpose(g) {
    return g[0].map((_, i) => g.map(row => row[i]));
  }

  function reverse(g) {
    return g.map(row => [...row].reverse());
  }

  function moveLeft() {
    let moved = false;
    for (let r = 0; r < SIZE; r++) {
      const original = [...grid[r]];
      const slid = slide(grid[r]);
      if (original.some((v, i) => v !== slid[i])) moved = true;
      grid[r] = slid;
    }
    return moved;
  }

  function moveRight() {
    let moved = false;
    for (let r = 0; r < SIZE; r++) {
      const original = [...grid[r]];
      const reversed = slide([...grid[r]].reverse());
      const result = reversed.reverse();
      if (original.some((v, i) => v !== result[i])) moved = true;
      grid[r] = result;
    }
    return moved;
  }

  function moveUp() {
    grid = transpose(grid);
    const moved = moveLeft();
    grid = transpose(grid);
    return moved;
  }

  function moveDown() {
    grid = transpose(grid);
    const moved = moveRight();
    grid = transpose(grid);
    return moved;
  }

  function canMove() {
    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        if (grid[r][c] === null) return true;
        if (c + 1 < SIZE && grid[r][c] === grid[r][c + 1]) return true;
        if (r + 1 < SIZE && grid[r][c] === grid[r + 1][c]) return true;
      }
    }
    return false;
  }

  function handleMove(dir) {
    if (gameOver) return;
    let moved = false;
    score = score; // reset for slide scoring
    switch (dir) {
      case 'left': moved = moveLeft(); break;
      case 'right': moved = moveRight(); break;
      case 'up': moved = moveUp(); break;
      case 'down': moved = moveDown(); break;
    }
    if (moved) {
      // Recalculate score correctly: slide sets score directly
      let actualScore = 0;
      // Actually slide() already added to score. So we need a different approach.
      // Let me redo this properly.
    }
    if (moved) {
      addRandomTile();
      updateScore();
      render();
      checkGameState();
    }
  }

  // Fixed: Let's handle score differently - track delta per move
  let prevScore;

  function moveLeftFn() {
    let localScore = 0;
    for (let r = 0; r < SIZE; r++) {
      const arr = grid[r].filter(v => v !== null);
      const merged = [];
      let i = 0;
      while (i < arr.length) {
        if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
          merged.push(arr[i] * 2);
          localScore += arr[i] * 2;
          i += 2;
        } else {
          merged.push(arr[i]);
          i++;
        }
      }
      while (merged.length < SIZE) merged.push(null);
      const changed = grid[r].some((v, i) => v !== merged[i]);
      grid[r] = merged;
      if (!changed && r === SIZE - 1) return false;
      if (changed) moved = true;
    }
    score += localScore;
    return moved;
  }

  let moved;

  function doMove(dir) {
    if (gameOver) return;
    moved = false;
    prevScore = score;
    switch (dir) {
      case 'left': {
        for (let r = 0; r < SIZE; r++) {
          const arr = grid[r].filter(v => v !== null);
          const merged = [];
          let i = 0;
          while (i < arr.length) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
              merged.push(arr[i] * 2);
              score += arr[i] * 2;
              i += 2;
            } else {
              merged.push(arr[i]);
              i++;
            }
          }
          while (merged.length < SIZE) merged.push(null);
          const changed = grid[r].some((v, idx) => v !== merged[idx]);
          if (changed) moved = true;
          grid[r] = merged;
        }
        break;
      }
      case 'right': {
        for (let r = 0; r < SIZE; r++) {
          const rev = [...grid[r]].reverse();
          const arr = rev.filter(v => v !== null);
          const merged = [];
          let i = 0;
          while (i < arr.length) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
              merged.push(arr[i] * 2);
              score += arr[i] * 2;
              i += 2;
            } else {
              merged.push(arr[i]);
              i++;
            }
          }
          while (merged.length < SIZE) merged.push(null);
          const result = merged.reverse();
          const changed = grid[r].some((v, idx) => v !== result[idx]);
          if (changed) moved = true;
          grid[r] = result;
        }
        break;
      }
      case 'up': {
        grid = transpose(grid);
        for (let r = 0; r < SIZE; r++) {
          const arr = grid[r].filter(v => v !== null);
          const merged = [];
          let i = 0;
          while (i < arr.length) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
              merged.push(arr[i] * 2);
              score += arr[i] * 2;
              i += 2;
            } else {
              merged.push(arr[i]);
              i++;
            }
          }
          while (merged.length < SIZE) merged.push(null);
          const changed = grid[r].some((v, idx) => v !== merged[idx]);
          if (changed) moved = true;
          grid[r] = merged;
        }
        grid = transpose(grid);
        break;
      }
      case 'down': {
        grid = transpose(grid);
        for (let r = 0; r < SIZE; r++) {
          const rev = [...grid[r]].reverse();
          const arr = rev.filter(v => v !== null);
          const merged = [];
          let i = 0;
          while (i < arr.length) {
            if (i + 1 < arr.length && arr[i] === arr[i + 1]) {
              merged.push(arr[i] * 2);
              score += arr[i] * 2;
              i += 2;
            } else {
              merged.push(arr[i]);
              i++;
            }
          }
          while (merged.length < SIZE) merged.push(null);
          const result = merged.reverse();
          const changed = grid[r].some((v, idx) => v !== result[idx]);
          if (changed) moved = true;
          grid[r] = result;
        }
        grid = transpose(grid);
        break;
      }
    }
    if (moved) {
      addRandomTile();
      updateScore();
      render();
      checkGameState();
    }
  }

  function updateScore() {
    scoreEl.textContent = score;
    best = Math.max(best || 0, score);
    bestEl.textContent = best;
    if (typeof localStorage !== 'undefined') {
      try { localStorage.setItem('game2048best', String(best)); } catch(e) {}
    }
  }

  function checkGameState() {
    if (!won && !keepPlaying) {
      for (let r = 0; r < SIZE; r++) {
        for (let c = 0; c < SIZE; c++) {
          if (grid[r][c] >= 2048) {
            won = true;
            overlayTitle.textContent = 'You Win!';
            overlayScore.textContent = 'Score: ' + score;
            overlay.classList.add('active');
            return;
          }
        }
      }
    }
    if (!canMove()) {
      gameOver = true;
      overlayTitle.textContent = 'Game Over!';
      overlayScore.textContent = 'Score: ' + score;
      overlay.classList.add('active');
    }
  }

  function render() {
    tileContainer.innerHTML = '';
    const containerRect = tileContainer.getBoundingClientRect();
    const gap = 8;
    const totalGap = (SIZE + 1) * gap;
    const size = containerRect.width;
    const tileSize = (size - totalGap) / SIZE;

    for (let r = 0; r < SIZE; r++) {
      for (let c = 0; c < SIZE; c++) {
        const val = grid[r][c];
        if (val === null) continue;
        const tile = document.createElement('div');
        tile.className = 'tile';
        if (val <= 2048) tile.classList.add('tile-' + val);
        else tile.classList.add('tile-super');
        tile.textContent = val;
        tile.style.width = tileSize + 'px';
        tile.style.height = tileSize + 'px';
        tile.style.left = (gap + c * (tileSize + gap)) + 'px';
        tile.style.top = (gap + r * (tileSize + gap)) + 'px';
        tileContainer.appendChild(tile);
      }
    }
  }

  let touchStartX = 0, touchStartY = 0;

  document.addEventListener('keydown', (e) => {
    const map = { ArrowLeft: 'left', ArrowRight: 'right', ArrowUp: 'up', ArrowDown: 'down' };
    if (map[e.key]) {
      e.preventDefault();
      doMove(map[e.key]);
    }
  });

  const gridContainer = document.getElementById('gridContainer');
  gridContainer.addEventListener('touchstart', (e) => {
    const t = e.touches[0];
    touchStartX = t.clientX;
    touchStartY = t.clientY;
  }, { passive: true });

  gridContainer.addEventListener('touchmove', (e) => { e.preventDefault(); }, { passive: false });

  gridContainer.addEventListener('touchend', (e) => {
    const t = e.changedTouches[0];
    const dx = t.clientX - touchStartX;
    const dy = t.clientY - touchStartY;
    const absDx = Math.abs(dx), absDy = Math.abs(dy);
    if (Math.max(absDx, absDy) < 20) return;
    if (absDx > absDy) {
      doMove(dx > 0 ? 'right' : 'left');
    } else {
      doMove(dy > 0 ? 'down' : 'up');
    }
  }, { passive: true });

  document.getElementById('restartBtn').addEventListener('click', () => {
    overlay.classList.remove('active');
    initGrid();
  });

  // Load best
  try { best = parseInt(localStorage.getItem('game2048best')) || 0; bestEl.textContent = best; } catch(e) { best = 0; }

  initGrid();
  // Re-render on resize
  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(render, 100);
  });
})();
</script>
</body>
</html>
