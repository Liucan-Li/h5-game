<!DOCTYPE html>
<html lang="zh-CN" data-game-id="slide-puzzle">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>滑块拼图</title>
<link rel="stylesheet" href="framework.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
.puzzle-wrapper{position:relative;display:inline-block;background:var(--glass-bg);backdrop-filter:blur(var(--glass-blur));-webkit-backdrop-filter:blur(var(--glass-blur));border:1px solid var(--glass-border);border-radius:var(--radius-xl);padding:12px;box-shadow:var(--glass-shadow)}
.puzzle-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;width:min(70vw,360px);height:min(70vw,360px)}
.tile{display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;border-radius:var(--radius-md);cursor:pointer;transition:transform .15s ease,box-shadow .15s ease,opacity .15s ease;position:relative;aspect-ratio:1;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.2)}
.tile:active{transform:scale(.95)}
.tile.empty{opacity:0;cursor:default;pointer-events:none}
.tile.win-anim{animation:tilePop .4s ease}
@keyframes tilePop{0%{transform:scale(1)}50%{transform:scale(1.1)}100%{transform:scale(1)}}
.controls{margin-top:16px}
.high-score{font-size:.8rem;color:var(--text-muted);margin-top:8px}
@media(max-width:400px){.puzzle-grid{width:85vw;height:85vw}.tile{font-size:1.2rem}}
</style>
</head>
<body>
<div class="fw-container fw-cat-puzzle">
  <div class="fw-header">
    <h1 class="fw-title">滑块拼图</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">步数</div><div class="fw-score-value" id="moves">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">时间</div><div class="fw-score-value" id="timer">00:00</div></div>
      <div class="fw-score-box"><div class="fw-score-label">最高分</div><div class="fw-score-value" id="highScore">-</div></div>
    </div>
  </div>
  <p class="fw-status">将数字按顺序排列</p>
  <div class="puzzle-wrapper">
    <div class="puzzle-grid" id="puzzleGrid"></div>
  </div>
  <div class="controls">
    <button class="fw-btn fw-btn-primary" id="newGameBtn">新游戏</button>
  </div>
  <p class="high-score" id="highScoreMsg">最快完成: --</p>
</div>

<div class="fw-overlay" id="winOverlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title">拼图完成!</div>
    <div class="fw-overlay-text" id="winMessage">用时 00:00，共 0 步</div>
    <button class="fw-btn fw-btn-primary" id="playAgainBtn">再来一局</button>
  </div>
</div>

<script src="framework.js"></script>
<script>
(function(){
  'use strict';

  const FW = window.GameFramework;
  const SIZE = 4;
  const TOTAL = SIZE * SIZE;
  const EMPTY = TOTAL;
  const WIN_SEQUENCE = Array.from({length: TOTAL}, function(_, i) { return i + 1; });

  var state = {
    tiles: [],
    emptyIndex: 15,
    moves: 0,
    timerSeconds: 0,
    timerInterval: null,
    isRunning: false,
    isWin: false
  };

  var gridEl = document.getElementById('puzzleGrid');
  var movesEl = document.getElementById('moves');
  var timerEl = document.getElementById('timer');
  var highScoreEl = document.getElementById('highScore');
  var highScoreMsg = document.getElementById('highScoreMsg');
  var winOverlay = document.getElementById('winOverlay');
  var winMessage = document.getElementById('winMessage');

  function formatTime(sec) {
    var m = String(Math.floor(sec / 60)).padStart(2, '0');
    var s = String(sec % 60).padStart(2, '0');
    return m + ':' + s;
  }

  function tileColor(value) {
    var ratio = (value - 1) / (TOTAL - 2);
    var r = Math.round(102 + ratio * (118 - 102));
    var g = Math.round(126 + ratio * (75 - 126));
    var b = Math.round(234 + ratio * (162 - 234));
    var lightness = 55 + ratio * 15;
    return 'hsl(' + ((r+g+b)/3 * 0.6) + ', 55%, ' + lightness + '%)';
  }

  function getTileHsl(value) {
    var t = (value - 1) / (TOTAL - 2);
    var hue = 230 - t * 40;
    var sat = 50 + t * 30;
    var lig = 65 - t * 15;
    return 'hsl(' + hue + ', ' + sat + '%, ' + lig + '%)';
  }

  function render() {
    gridEl.innerHTML = '';
    for (var i = 0; i < TOTAL; i++) {
      var val = state.tiles[i];
      var tile = document.createElement('div');
      tile.className = 'tile' + (val === EMPTY ? ' empty' : '');
      tile.dataset.index = i;
      if (val !== EMPTY) {
        tile.textContent = val;
        tile.style.background = getTileHsl(val);
        tile.style.boxShadow = '0 3px 8px hsla(' + (230 - ((val-1)/(TOTAL-2))*40) + ', 50%, 40%, 0.25)';
      }
      gridEl.appendChild(tile);
    }
  }

  function highlightWin() {
    var tiles = gridEl.querySelectorAll('.tile:not(.empty)');
    tiles.forEach(function(t) { t.classList.add('win-anim'); });
  }

  function canSwap(idx) {
    var ei = state.emptyIndex;
    var r1 = Math.floor(idx / SIZE);
    var c1 = idx % SIZE;
    var r2 = Math.floor(ei / SIZE);
    var c2 = ei % SIZE;
    return (Math.abs(r1 - r2) + Math.abs(c1 - c2)) === 1;
  }

  function swap(idx) {
    if (state.isWin) return;
    if (!canSwap(idx)) return;
    var ei = state.emptyIndex;
    var newTiles = state.tiles.slice();
    newTiles[ei] = state.tiles[idx];
    newTiles[idx] = EMPTY;
    state.tiles = newTiles;
    state.emptyIndex = idx;
    if (!state.isRunning) {
      state.isRunning = true;
      startTimer();
    }
    state.moves++;
    movesEl.textContent = state.moves;
    FW.events.reportScore(state.moves);
    render();
    checkWin();
  }

  function checkWin() {
    for (var i = 0; i < TOTAL; i++) {
      if (state.tiles[i] !== WIN_SEQUENCE[i]) return;
    }
    state.isWin = true;
    state.isRunning = false;
    if (state.timerInterval) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
    }
    highlightWin();
    var timeStr = formatTime(state.timerSeconds);
    winMessage.textContent = '用时 ' + timeStr + '，共 ' + state.moves + ' 步';
    FW.ui.showOverlay(winOverlay);
    FW.audio.sfx('win');

    // Update high score
    var existing = loadHighScore();
    var scoreSeconds = state.timerSeconds;
    if (existing === null || scoreSeconds < existing) {
      saveHighScore(scoreSeconds);
      FW.audio.sfx('score');
    }
    updateHighScoreDisplay();
    FW.events.reportComplete(state.moves, {won: true});
  }

  function countInversions(arr) {
    var inv = 0;
    for (var i = 0; i < arr.length; i++) {
      for (var j = i + 1; j < arr.length; j++) {
        if (arr[i] !== EMPTY && arr[j] !== EMPTY && arr[i] > arr[j]) inv++;
      }
    }
    return inv;
  }

  function shuffleArray(arr) {
    for (var i = arr.length - 1; i > 0; i--) {
      var j = Math.floor(Math.random() * (i + 1));
      var tmp = arr[i];
      arr[i] = arr[j];
      arr[j] = tmp;
    }
    return arr;
  }

  function generateSolvablePuzzle() {
    var tiles = [];
    for (var i = 1; i <= TOTAL; i++) tiles.push(i);
    var shuffled;
    var inv;
    var emptyRow;
    var iters = 0;
    do {
      shuffled = shuffleArray(tiles.slice());
      var ei = shuffled.indexOf(EMPTY);
      emptyRow = Math.floor(ei / SIZE);
      inv = countInversions(shuffled);
      iters++;
      if (iters > 2000) break;
    } while ((inv % 2 !== 0) || (inv === 0 && emptyRow === SIZE - 1));
    return shuffled;
  }

  function generateSolvablePuzzleCorrect() {
    var tiles = [];
    for (var i = 1; i <= TOTAL; i++) tiles.push(i);
    var shuffled;
    var inv;
    var emptyRowFromBottom;
    do {
      shuffled = shuffleArray(tiles.slice());
      var ei = shuffled.indexOf(EMPTY);
      var emptyRow = Math.floor(ei / SIZE);
      emptyRowFromBottom = SIZE - 1 - emptyRow;
      inv = countInversions(shuffled);
    } while ((inv + emptyRowFromBottom) % 2 !== 0);
    return shuffled;
  }

  function newGame() {
    FW.ui.hideOverlay(winOverlay);
    if (state.timerInterval) {
      clearInterval(state.timerInterval);
      state.timerInterval = null;
    }
    var tiles = generateSolvablePuzzleCorrect();
    state.tiles = tiles;
    state.emptyIndex = tiles.indexOf(EMPTY);
    state.moves = 0;
    state.timerSeconds = 0;
    state.isRunning = false;
    state.isWin = false;
    movesEl.textContent = '0';
    timerEl.textContent = '00:00';
    render();
  }

  function startTimer() {
    state.timerInterval = setInterval(function() {
      state.timerSeconds++;
      timerEl.textContent = formatTime(state.timerSeconds);
    }, 1000);
  }

  function loadHighScore() {
    var val = FW.storage.load('hi', null);
    return val !== null ? parseInt(val, 10) : null;
  }

  function saveHighScore(seconds) {
    FW.storage.save('hi', seconds);
  }

  function updateHighScoreDisplay() {
    var hs = loadHighScore();
    if (hs !== null) {
      highScoreEl.textContent = formatTime(hs);
      highScoreMsg.textContent = '最快完成: ' + formatTime(hs);
    } else {
      highScoreEl.textContent = '-';
      highScoreMsg.textContent = '最快完成: --';
    }
  }

  // Events
  gridEl.addEventListener('click', function(e) {
    var tile = e.target.closest('.tile');
    if (!tile || tile.classList.contains('empty')) return;
    var idx = parseInt(tile.dataset.index, 10);
    FW.audio.sfx('click');
    swap(idx);
  });

  gridEl.addEventListener('touchstart', function(e) {
    // Allow default but we handle click
  }, {passive: true});

  document.getElementById('newGameBtn').addEventListener('click', function() {
    newGame();
  });
  document.getElementById('playAgainBtn').addEventListener('click', function() {
    newGame();
  });

  // Keyboard support
  document.addEventListener('keydown', function(e) {
    if (state.isWin) return;
    var ei = state.emptyIndex;
    var row = Math.floor(ei / SIZE);
    var col = ei % SIZE;
    var targetIdx = -1;
    switch (e.key) {
      case 'ArrowUp':    targetIdx = ei + SIZE; break;
      case 'ArrowDown':  targetIdx = ei - SIZE; break;
      case 'ArrowLeft':  targetIdx = ei + 1; break;
      case 'ArrowRight': targetIdx = ei - 1; break;
      default: return;
    }
    e.preventDefault();
    if (targetIdx >= 0 && targetIdx < TOTAL) {
      FW.audio.sfx('click');
      swap(targetIdx);
    }
  });

  // Init
  updateHighScoreDisplay();
  newGame();
})();
</script>
</body>
</html>
