<!DOCTYPE html>
<html lang="zh-CN" data-game-id="minesweeper">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫雷</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg-primary, #0a0a0a);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: var(--font-family, 'Segoe UI', system-ui, sans-serif);
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .game-wrapper {
    background: var(--bg-secondary, #1a1a2e);
    border-radius: var(--radius-xl, 16px);
    padding: 20px;
    box-shadow: var(--glass-shadow, 0 0 40px rgba(255,200,0,0.1));
    max-width: 420px;
    width: 100%;
    margin: 8px;
  }
  .fw-title {
    font-size: 1.4em;
    white-space: nowrap;
  }
  .face-btn {
    background: var(--bg-tertiary, #2a2a4a);
    color: var(--accent-3, #ffd700);
    border: none;
    font-size: 28px;
    cursor: pointer;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background var(--transition-fast, 0.2s), transform 0.1s;
    line-height: 1;
    -webkit-tap-highlight-color: transparent;
  }
  .face-btn:hover { background: var(--bg-card-hover, #3a3a5a); }
  .face-btn:active { transform: scale(0.9); }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 2px;
    background: var(--bg-primary, #0a0a1a);
    padding: 2px;
    border-radius: var(--radius-md, 8px);
  }
  .cell {
    aspect-ratio: 1;
    background: var(--bg-tertiary, #2a2a4e);
    border: none;
    border-radius: var(--radius-sm, 3px);
    font-size: min(4vw, 18px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text-primary, #e0e0e0);
    transition: background var(--transition-fast, 0.15s);
    font-family: var(--font-family, 'Segoe UI', system-ui, sans-serif);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cell:hover:not(.revealed) { background: var(--bg-card-hover, #3a3a5e); }
  .cell:active:not(.revealed) { background: var(--bg-card, #4a4a6e); }
  .cell.revealed { background: var(--bg-secondary, #1a1a30); cursor: default; }
  .cell.flagged { background: var(--glass-bg, #2a2a3e); color: var(--accent-4, #ff4444); }
  .cell.mine { background: rgba(58, 26, 26, 1); color: var(--accent-4, #ff4444); }
  .cell.mine-hit { background: rgba(106, 26, 26, 1); color: #ff6666; }
  .cell.n1 { color: #4a9eff; }
  .cell.n2 { color: #44cc44; }
  .cell.n3 { color: #ff6666; }
  .cell.n4 { color: #4444cc; }
  .cell.n5 { color: #cc4444; }
  .cell.n6 { color: #44cccc; }
  .cell.n7 { color: #222222; }
  .cell.n8 { color: #888888; }
  .message {
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
    font-weight: bold;
    min-height: 20px;
    color: var(--text-muted, #888);
  }
  .message.win { color: var(--accent-1, #44ff44); text-shadow: 0 0 12px rgba(68,255,68,0.4); }
  .message.lose { color: var(--accent-4, #ff4444); text-shadow: 0 0 12px rgba(255,68,68,0.4); }
  .high-score-box { margin-bottom: 12px; display: flex; justify-content: center; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="game-wrapper">
    <div class="fw-header">
      <h1 class="fw-title">扫雷</h1>
    </div>
    <div class="high-score-box">
      <div class="fw-score-box">
        <div class="fw-score-label">最高分</div>
        <div class="fw-score-value" id="highScore">0</div>
      </div>
    </div>
    <div class="fw-header">
      <div class="fw-score-box">
        <div class="fw-score-label">地雷</div>
        <div class="fw-score-value" id="mineCount">10</div>
      </div>
      <button class="face-btn" id="faceBtn">&#x1F642;</button>
      <div class="fw-score-box">
        <div class="fw-score-label">时间</div>
        <div class="fw-score-value" id="timer">000</div>
      </div>
    </div>
    <div class="grid-container" id="grid"></div>
    <div class="message" id="message">&nbsp;</div>
    <div class="fw-overlay" id="overlay"></div>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var FW = window.GameFramework;
  var ROWS = 9, COLS = 9, MINES = 10;
  var gridEl = document.getElementById('grid');
  var mineCountEl = document.getElementById('mineCount');
  var timerEl = document.getElementById('timer');
  var faceBtn = document.getElementById('faceBtn');
  var msgEl = document.getElementById('message');
  var highScoreEl = document.getElementById('highScore');

  var board = [];
  var cells = [];
  var revealed = [];
  var flagged = [];
  var gameState = 'idle'; // 'idle', 'playing', 'won', 'lost'
  var flagCount = 0;
  var timer = 0;
  var timerInterval = null;
  var firstClick = true;

  function initBoard() {
    board = Array.from({length: ROWS}, function() { return Array(COLS).fill(0); });
    revealed = Array.from({length: ROWS}, function() { return Array(COLS).fill(false); });
    flagged = Array.from({length: ROWS}, function() { return Array(COLS).fill(false); });
    flagCount = 0;
    gameState = 'idle';
    firstClick = true;
    timer = 0;
    clearInterval(timerInterval);
    timerInterval = null;
    timerEl.textContent = '000';
    mineCountEl.textContent = MINES;
    msgEl.textContent = ' ';
    msgEl.className = 'message';
    faceBtn.innerHTML = '&#x1F642;';
    render();
  }

  function placeMines(safeR, safeC) {
    var placed = 0;
    while (placed < MINES) {
      var r = Math.floor(Math.random() * ROWS);
      var c = Math.floor(Math.random() * COLS);
      if (board[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      board[r][c] = -1;
      placed++;
    }
    // Calculate numbers
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (board[r][c] === -1) continue;
        var count = 0;
        for (var dr = -1; dr <= 1; dr++) {
          for (var dc = -1; dc <= 1; dc++) {
            var nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
          }
        }
        board[r][c] = count;
      }
    }
  }

  function reveal(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;

    revealed[r][c] = true;

    if (board[r][c] === -1) {
      // Hit mine
      gameOver(r, c);
      return;
    }

    if (board[r][c] === 0) {
      // Flood fill
      for (var dr = -1; dr <= 1; dr++) {
        for (var dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          reveal(r + dr, c + dc);
        }
      }
    }
    render();
    checkWin();
  }

  function toggleFlag(r, c) {
    if (revealed[r][c]) return;
    if (gameState === 'won' || gameState === 'lost') return;

    flagged[r][c] = !flagged[r][c];
    flagCount += flagged[r][c] ? 1 : -1;
    mineCountEl.textContent = MINES - flagCount;
    render();
  }

  function checkWin() {
    var totalRevealed = 0;
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (revealed[r][c]) totalRevealed++;
      }
    }
    if (totalRevealed === ROWS * COLS - MINES) {
      gameState = 'won';
      clearInterval(timerInterval);
      faceBtn.innerHTML = '&#x1F60E;';
      msgEl.textContent = '你赢了！';
      msgEl.className = 'message win';

      // Score: faster is better
      var score = Math.max(0, 1000 - timer * 10);
      FW.storage.setHighScore(score);
      highScoreEl.textContent = FW.storage.getHighScore();
      FW.audio.sfx('win');
      FW.events.reportScore(score);
      FW.events.reportComplete(score, {won: true});

      render();
    }
  }

  function gameOver(hitR, hitC) {
    gameState = 'lost';
    clearInterval(timerInterval);
    faceBtn.innerHTML = '&#x1F635;';
    msgEl.textContent = '游戏结束！';
    msgEl.className = 'message lose';

    FW.audio.sfx('gameover');
    FW.events.reportScore(0);
    FW.events.reportComplete(0, {won: false});

    // Reveal all mines
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        if (board[r][c] === -1) {
          revealed[r][c] = true;
        }
      }
    }
    render();
    // Highlight hit mine
    var idx = hitR * COLS + hitC;
    if (cells[idx]) {
      cells[idx].classList.add('mine-hit');
    }
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(function() {
      timer++;
      if (timer > 999) timer = 999;
      timerEl.textContent = String(timer).padStart(3, '0');
    }, 1000);
  }

  function handleClick(r, c) {
    if (gameState === 'won' || gameState === 'lost') return;
    if (flagged[r][c]) return;

    FW.audio.sfx('click');

    if (firstClick) {
      placeMines(r, c);
      firstClick = false;
      gameState = 'playing';
      startTimer();
    }

    reveal(r, c);
  }

  function handleRightClick(r, c, e) {
    if (e) e.preventDefault();
    FW.audio.sfx('click');
    toggleFlag(r, c);
  }

  // Long press for flag on mobile
  var longPressTimer = null;
  var longPressTriggered = false;
  var pressR, pressC;

  function render() {
    gridEl.innerHTML = '';
    cells = [];
    for (var r = 0; r < ROWS; r++) {
      for (var c = 0; c < COLS; c++) {
        var cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;

        if (revealed[r][c]) {
          cell.classList.add('revealed');
          if (board[r][c] === -1) {
            cell.textContent = '💣';
            cell.classList.add('mine');
          } else if (board[r][c] > 0) {
            cell.textContent = board[r][c];
            cell.classList.add('n' + board[r][c]);
          }
        } else if (flagged[r][c]) {
          cell.textContent = '⚑';
          cell.classList.add('flagged');
        }

        // Left click
        cell.addEventListener('click', function(r2, c2) {
          return function(e) {
            e.preventDefault();
            handleClick(r2, c2);
          };
        }(r, c));

        // Right click
        cell.addEventListener('contextmenu', function(r2, c2) {
          return function(e) { handleRightClick(r2, c2, e); };
        }(r, c));

        // Long press for mobile
        cell.addEventListener('touchstart', function(r2, c2) {
          return function(e) {
            longPressTriggered = false;
            pressR = r2; pressC = c2;
            longPressTimer = setTimeout(function() {
              longPressTriggered = true;
              handleRightClick(pressR, pressC, e);
              // Vibrate on long press
              if (navigator.vibrate) navigator.vibrate(15);
            }, 400);
          };
        }(r, c), { passive: true });

        cell.addEventListener('touchend', function() {
          clearTimeout(longPressTimer);
        }, { passive: true });

        cell.addEventListener('touchmove', function() {
          clearTimeout(longPressTimer);
        }, { passive: true });

        cells.push(cell);
        gridEl.appendChild(cell);
      }
    }
  }

  // Face button reset
  faceBtn.addEventListener('click', function() {
    FW.audio.sfx('click');
    initBoard();
  });

  // Keyboard shortcut
  document.addEventListener('keydown', function(e) {
    if (e.key === 'r' || e.key === 'R') {
      FW.audio.sfx('click');
      initBoard();
    }
  });

  // Prevent scrolling on touch
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, { passive: false });

  // Load high score
  try {
    highScoreEl.textContent = FW.storage.getHighScore() || 0;
  } catch (e) {
    highScoreEl.textContent = '0';
  }

  initBoard();
})();
</script>
</body>
</html>
