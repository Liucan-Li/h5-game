<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>扫雷</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0a0a0a;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100dvh;
    font-family: 'Segoe UI', system-ui, sans-serif;
    overflow: hidden;
    touch-action: manipulation;
    -webkit-user-select: none;
    user-select: none;
  }
  .game-wrapper {
    background: #1a1a2e;
    border-radius: 16px;
    padding: 20px;
    box-shadow: 0 0 40px rgba(255,200,0,0.1);
    max-width: 420px;
    width: 100%;
    margin: 8px;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
    background: #12122a;
    padding: 10px 16px;
    border-radius: 10px;
  }
  .mine-count, .timer {
    font-size: 20px;
    font-weight: bold;
    font-family: 'Courier New', monospace;
    color: #ff4444;
    text-shadow: 0 0 8px rgba(255,68,68,0.4);
  }
  .timer { color: #00d4ff; text-shadow: 0 0 8px rgba(0,212,255,0.4); }
  .face-btn {
    background: #2a2a4a;
    color: #ffd700;
    border: none;
    font-size: 28px;
    cursor: pointer;
    width: 46px;
    height: 46px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s, transform 0.1s;
    line-height: 1;
  }
  .face-btn:hover { background: #3a3a5a; }
  .face-btn:active { transform: scale(0.9); }
  .grid-container {
    display: grid;
    grid-template-columns: repeat(9, 1fr);
    gap: 2px;
    background: #0a0a1a;
    padding: 2px;
    border-radius: 8px;
  }
  .cell {
    aspect-ratio: 1;
    background: #2a2a4e;
    border: none;
    border-radius: 3px;
    font-size: min(4vw, 18px);
    font-weight: bold;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: #e0e0e0;
    transition: background 0.15s;
    font-family: 'Segoe UI', system-ui, sans-serif;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .cell:hover:not(.revealed) { background: #3a3a5e; }
  .cell:active:not(.revealed) { background: #4a4a6e; }
  .cell.revealed { background: #1a1a30; cursor: default; }
  .cell.flagged { background: #2a2a3e; color: #ff4444; }
  .cell.mine { background: #3a1a1a; color: #ff4444; }
  .cell.mine-hit { background: #6a1a1a; color: #ff6666; }
  .cell.n1 { color: #4a9eff; }
  .cell.n2 { color: #44cc44; }
  .cell.n3 { color: #ff6666; }
  .cell.n4 { color: #4444cc; }
  .cell.n5 { color: #cc4444; }
  .cell.n6 { color: #44cccc; }
  .cell.n7 { color: #222222; }
  .cell.n8 { color: #888888; }

  .message {
    text-align: center;
    margin-top: 12px;
    font-size: 14px;
    font-weight: bold;
    min-height: 20px;
    color: #888;
  }
  .message.win { color: #44ff44; text-shadow: 0 0 12px rgba(68,255,68,0.4); }
  .message.lose { color: #ff4444; text-shadow: 0 0 12px rgba(255,68,68,0.4); }
</style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <span class="mine-count" id="mineCount">10</span>
    <button class="face-btn" id="faceBtn">&#x1F642;</button>
    <span class="timer" id="timer">000</span>
  </div>
  <div class="grid-container" id="grid"></div>
  <div class="message" id="message">&nbsp;</div>
</div>
<script>
(function(){
  const ROWS = 9, COLS = 9, MINES = 10;
  const gridEl = document.getElementById('grid');
  const mineCountEl = document.getElementById('mineCount');
  const timerEl = document.getElementById('timer');
  const faceBtn = document.getElementById('faceBtn');
  const msgEl = document.getElementById('message');

  let board = [];
  let cells = [];
  let revealed = [];
  let flagged = [];
  let gameState = 'idle'; // 'idle', 'playing', 'won', 'lost'
  let flagCount = 0;
  let timer = 0;
  let timerInterval = null;
  let firstClick = true;

  function initBoard() {
    board = Array.from({length: ROWS}, () => Array(COLS).fill(0));
    revealed = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    flagged = Array.from({length: ROWS}, () => Array(COLS).fill(false));
    flagCount = 0;
    gameState = 'idle';
    firstClick = true;
    timer = 0;
    clearInterval(timerInterval);
    timerInterval = null;
    timerEl.textContent = '000';
    mineCountEl.textContent = MINES;
    msgEl.textContent = ' ';
    msgEl.className = 'message';
    faceBtn.innerHTML = '&#x1F642;';
    render();
  }

  function placeMines(safeR, safeC) {
    let placed = 0;
    while (placed < MINES) {
      const r = Math.floor(Math.random() * ROWS);
      const c = Math.floor(Math.random() * COLS);
      if (board[r][c] === -1) continue;
      if (Math.abs(r - safeR) <= 1 && Math.abs(c - safeC) <= 1) continue;
      board[r][c] = -1;
      placed++;
    }
    // Calculate numbers
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] === -1) continue;
        let count = 0;
        for (let dr = -1; dr <= 1; dr++) {
          for (let dc = -1; dc <= 1; dc++) {
            const nr = r + dr, nc = c + dc;
            if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === -1) count++;
          }
        }
        board[r][c] = count;
      }
    }
  }

  function reveal(r, c) {
    if (r < 0 || r >= ROWS || c < 0 || c >= COLS) return;
    if (revealed[r][c] || flagged[r][c]) return;

    revealed[r][c] = true;

    if (board[r][c] === -1) {
      // Hit mine
      gameOver(r, c);
      return;
    }

    if (board[r][c] === 0) {
      // Flood fill
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (dr === 0 && dc === 0) continue;
          reveal(r + dr, c + dc);
        }
      }
    }
    render();
    checkWin();
  }

  function toggleFlag(r, c) {
    if (revealed[r][c]) return;
    if (gameState === 'won' || gameState === 'lost') return;

    flagged[r][c] = !flagged[r][c];
    flagCount += flagged[r][c] ? 1 : -1;
    mineCountEl.textContent = MINES - flagCount;
    render();
  }

  function checkWin() {
    let totalRevealed = 0;
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (revealed[r][c]) totalRevealed++;
      }
    }
    if (totalRevealed === ROWS * COLS - MINES) {
      gameState = 'won';
      clearInterval(timerInterval);
      faceBtn.innerHTML = '&#x1F60E;';
      msgEl.textContent = '你赢了！';
      msgEl.className = 'message win';
      render();
    }
  }

  function gameOver(hitR, hitC) {
    gameState = 'lost';
    clearInterval(timerInterval);
    faceBtn.innerHTML = '&#x1F635;';
    msgEl.textContent = '游戏结束！';
    msgEl.className = 'message lose';
    // Reveal all mines
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        if (board[r][c] === -1) {
          revealed[r][c] = true;
        }
      }
    }
    render();
    // Highlight hit mine
    const idx = hitR * COLS + hitC;
    if (cells[idx]) {
      cells[idx].classList.add('mine-hit');
    }
  }

  function startTimer() {
    if (timerInterval) return;
    timerInterval = setInterval(() => {
      timer++;
      if (timer > 999) timer = 999;
      timerEl.textContent = String(timer).padStart(3, '0');
    }, 1000);
  }

  function handleClick(r, c) {
    if (gameState === 'won' || gameState === 'lost') return;
    if (flagged[r][c]) return;

    if (firstClick) {
      placeMines(r, c);
      firstClick = false;
      gameState = 'playing';
      startTimer();
    }

    reveal(r, c);
  }

  function handleRightClick(r, c, e) {
    if (e) e.preventDefault();
    toggleFlag(r, c);
  }

  // Long press for flag on mobile
  let longPressTimer = null;
  let longPressTriggered = false;
  let pressR, pressC;

  function render() {
    gridEl.innerHTML = '';
    cells = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        const cell = document.createElement('button');
        cell.className = 'cell';
        cell.dataset.r = r;
        cell.dataset.c = c;

        if (revealed[r][c]) {
          cell.classList.add('revealed');
          if (board[r][c] === -1) {
            cell.textContent = '💣';
            cell.classList.add('mine');
          } else if (board[r][c] > 0) {
            cell.textContent = board[r][c];
            cell.classList.add('n' + board[r][c]);
          }
        } else if (flagged[r][c]) {
          cell.textContent = '⚑';
          cell.classList.add('flagged');
        }

        // Left click
        cell.addEventListener('click', (e) => {
          e.preventDefault();
          handleClick(r, c);
        });

        // Right click
        cell.addEventListener('contextmenu', (e) => handleRightClick(r, c, e));

        // Long press for mobile
        cell.addEventListener('touchstart', (e) => {
          longPressTriggered = false;
          pressR = r; pressC = c;
          longPressTimer = setTimeout(() => {
            longPressTriggered = true;
            handleRightClick(pressR, pressC, e);
            // Vibrate on long press
            if (navigator.vibrate) navigator.vibrate(15);
          }, 400);
        }, { passive: true });

        cell.addEventListener('touchend', () => {
          clearTimeout(longPressTimer);
        }, { passive: true });

        cell.addEventListener('touchmove', () => {
          clearTimeout(longPressTimer);
        }, { passive: true });

        cells.push(cell);
        gridEl.appendChild(cell);
      }
    }
  }

  // Face button reset
  faceBtn.addEventListener('click', initBoard);

  // Keyboard shortcut
  document.addEventListener('keydown', (e) => {
    if (e.key === 'r' || e.key === 'R') initBoard();
  });

  // Prevent scrolling on touch
  document.addEventListener('touchmove', (e) => e.preventDefault(), { passive: false });

  initBoard();
})();
</script>
</body>
</html>
