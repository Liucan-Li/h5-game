<!DOCTYPE html>
<html lang="zh-CN" data-game-id="soccer-stars">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Soccer Stars</title>
<link rel="stylesheet" href="framework.css">
<style>
  #gc { display: block; width: 100%; aspect-ratio: 1.5; border-radius: var(--radius-lg); }
  .fw-status { margin-top: 8px; }
</style>
</head>
<body>
<div class="fw-container fw-cat-sports">
  <div class="fw-header">
    <h1 class="fw-title">Soccer Stars</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">你</div><div class="fw-score-value" id="myScore">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">AI</div><div class="fw-score-value" id="aiScore">0</div></div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas id="gc" class="fw-canvas" width="600" height="400"></canvas>
  </div>
  <div class="fw-status">WASD / 方向键控制球员移动</div>
</div>
<div class="fw-overlay" id="overlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="ot">比赛结束</div>
    <div class="fw-overlay-text" id="os">你 0 - 0 AI</div>
    <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  const FW = window.GameFramework;
  const c=document.getElementById('gc'),ctx=c.getContext('2d');
  const ms=document.getElementById('myScore'),as=document.getElementById('aiScore');
  const ov=document.getElementById('overlay'),ot=document.getElementById('ot'),os=document.getElementById('os');

  const W=600,H=400,GOAL_W=80,GOAL_H=20;
  let player,ai,ball,myScore,aiScore,gameOver,keys,frame;

  function init(){
    player={x:150,y:200,r:15,speed:3};
    ai={x:450,y:200,r:15,speed:2.2};
    ball={x:300,y:200,r:8,vx:0,vy:0};
    myScore=0;aiScore=0;gameOver=false;keys={};frame=0;
    ov.classList.remove('active');
    updateScore();
    requestAnimationFrame(loop);
  }

  function updateScore(){ms.textContent=myScore;as.textContent=aiScore;}

  function loop(){
    if(gameOver)return;
    frame++;

    // Player movement
    let px=0,py=0;
    if(keys['w']||keys['ArrowUp'])py=-1;
    if(keys['s']||keys['ArrowDown'])py=1;
    if(keys['a']||keys['ArrowLeft'])px=-1;
    if(keys['d']||keys['ArrowRight'])px=1;
    if(px&&py){px*=0.707;py*=0.707;}
    player.x+=px*player.speed;
    player.y+=py*player.speed;
    player.x=Math.max(player.r,Math.min(W/2-10,player.x));
    player.y=Math.max(40+player.r,Math.min(H-40-player.r,player.y));

    // AI movement
    const dx=ball.x-ai.x,dy=ball.y-ai.y;
    const dist=Math.hypot(dx,dy);
    if(dist>0){
      const targetX=ball.x+(ball.x>W/2?0:50),targetY=ball.y;
      const adx=targetX-ai.x,ady=targetY-ai.y;
      const adist=Math.hypot(adx,ady);
      if(adist>0){
        ai.x+=adx/adist*ai.speed;
        ai.y+=ady/adist*ai.speed;
      }
      // Return to position if ball is in player's half
      if(ball.x<W/2){
        ai.x+=(W-100-ai.x)*0.02;
        ai.y+=(200-ai.y)*0.02;
      }
    }
    ai.x=Math.max(W/2+10,Math.min(W-ai.r,ai.x));
    ai.y=Math.max(40+ai.r,Math.min(H-40-ai.r,ai.y));

    // Ball physics
    ball.x+=ball.vx;ball.y+=ball.vy;
    ball.vx*=0.98;ball.vy*=0.98;
    if(Math.abs(ball.vx)<0.01)ball.vx=0;
    if(Math.abs(ball.vy)<0.01)ball.vy=0;

    // Ball boundaries
    if(ball.y<40+ball.r){ball.y=40+ball.r;ball.vy*=-0.8;}
    if(ball.y>H-40-ball.r){ball.y=H-40-ball.r;ball.vy*=-0.8;}

    // Goal detection
    if(ball.x<ball.r){
      if(ball.y>H/2-GOAL_W/2&&ball.y<H/2+GOAL_W/2){
        aiScore++;updateScore();
        FW.audio.sfx('score');
        FW.events.reportScore(aiScore);
        if(aiScore>=5){
          gameOver=true;ot.textContent='😵 你输了！';os.textContent=myScore+' - '+aiScore;ov.classList.add('active');
          FW.audio.sfx('gameover');
          FW.events.reportComplete(myScore, {won: false});
        }else resetBall(1);
      }else{ball.x=ball.r;ball.vx*=-0.5;}
    }
    if(ball.x>W-ball.r){
      if(ball.y>H/2-GOAL_W/2&&ball.y<H/2+GOAL_W/2){
        myScore++;updateScore();
        FW.audio.sfx('score');
        FW.events.reportScore(myScore);
        if(myScore>=5){
          gameOver=true;ot.textContent='🎉 你赢了！';os.textContent=myScore+' - '+aiScore;ov.classList.add('active');
          FW.audio.sfx('win');
          FW.events.reportComplete(myScore, {won: true});
        }else resetBall(-1);
      }else{ball.x=W-ball.r;ball.vx*=-0.5;}
    }

    // Player-ball collision
    if(Math.hypot(player.x-ball.x,player.y-ball.y)<player.r+ball.r){
      const dx=ball.x-player.x,dy=ball.y-player.y;
      const d=Math.hypot(dx,dy);
      if(d>0){ball.vx=dx/d*6;ball.vy=dy/d*6;}
    }

    // AI-ball collision
    if(Math.hypot(ai.x-ball.x,ai.y-ball.y)<ai.r+ball.r){
      const dx=ball.x-ai.x,dy=ball.y-ai.y;
      const d=Math.hypot(dx,dy);
      const targetX=player.x, targetY=player.y;
      const kx=targetX-ai.x,ky=targetY-ai.y;
      const kd=Math.hypot(kx,ky);
      if(kd>0){ball.vx=kx/kd*5;ball.vy=ky/kd*5;}
    }

    render();
    requestAnimationFrame(loop);
  }

  function resetBall(dir){
    ball.x=300;ball.y=200;
    ball.vx=dir*3;ball.vy=(Math.random()-0.5)*2;
  }

  function render(){
    // Field
    ctx.fillStyle='#2d7d46';ctx.fillRect(0,0,W,H);
    // Border
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=2;
    ctx.strokeRect(5,40,W-10,H-80);
    // Center line
    ctx.setLineDash([8,8]);
    ctx.beginPath();ctx.moveTo(W/2,45);ctx.lineTo(W/2,H-45);ctx.stroke();
    ctx.setLineDash([]);
    // Center circle
    ctx.beginPath();ctx.arc(W/2,H/2,40,0,Math.PI*2);ctx.stroke();
    // Goals
    ctx.fillStyle='rgba(255,255,255,0.1)';
    ctx.fillRect(-5,H/2-GOAL_W/2,10,GOAL_W);
    ctx.fillRect(W-5,H/2-GOAL_W/2,10,GOAL_W);
    // Goal posts
    ctx.strokeStyle='#fff';ctx.lineWidth=3;
    ctx.beginPath();ctx.moveTo(0,H/2-GOAL_W/2);ctx.lineTo(0,H/2+GOAL_W/2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(W,H/2-GOAL_W/2);ctx.lineTo(W,H/2+GOAL_W/2);ctx.stroke();
    // Ball
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#333';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(ball.x,ball.y,ball.r,0,Math.PI*2);ctx.stroke();
    // Ball pattern
    ctx.strokeStyle='rgba(0,0,0,0.1)';
    ctx.beginPath();ctx.moveTo(ball.x,ball.y-ball.r);ctx.lineTo(ball.x,ball.y+ball.r);ctx.stroke();
    ctx.beginPath();ctx.moveTo(ball.x-ball.r,ball.y);ctx.lineTo(ball.x+ball.r,ball.y);ctx.stroke();
    // Player
    ctx.fillStyle='#3498db';
    ctx.beginPath();ctx.arc(player.x,player.y,player.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='12px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('⚽',player.x,player.y);
    // AI
    ctx.fillStyle='#e74c3c';
    ctx.beginPath();ctx.arc(ai.x,ai.y,ai.r,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.fillText('🤖',ai.x,ai.y);
  }

  document.addEventListener('keydown', function(e){keys[e.key]=true;});
  document.addEventListener('keyup', function(e){keys[e.key]=false;});

  document.getElementById('rb').addEventListener('click', function(){
    FW.audio.sfx('click');
    init();
  });
  init();
})();
</script>
</body>
</html>
