<!DOCTYPE html>
<html lang="zh-CN" data-game-id="whack-a-mole">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Whack-a-Mole 打地鼠</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  .fw-game-area {
    aspect-ratio: 1;
    background: #2d251a;
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-default);
    overflow: hidden;
    position: relative;
  }
  .fw-game-area::before {
    content: '';
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 30%;
    background: linear-gradient(to top, #3d2b1a, transparent);
    pointer-events: none;
    z-index: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    width: 100%;
    height: 100%;
    padding: 10px;
    gap: 10px;
    position: relative;
    z-index: 1;
  }
  .hole {
    position: relative;
    display: flex;
    align-items: flex-end;
    justify-content: center;
    cursor: pointer;
    touch-action: manipulation;
  }
  .hole-bg {
    width: 85%;
    height: 30%;
    background: radial-gradient(ellipse at center, #1a1008 0%, #2d1a0a 60%, transparent 100%);
    border-radius: 50%;
    position: absolute;
    bottom: 5%;
    z-index: 2;
    border: 2px solid #4a3020;
    box-shadow: inset 0 -4px 8px rgba(0,0,0,0.6);
  }
  .mole {
    position: absolute;
    bottom: 10%;
    left: 50%;
    transform: translateX(-50%) translateY(100%);
    width: 70%;
    aspect-ratio: 1;
    transition: transform 0.15s ease-out;
    z-index: 1;
    cursor: pointer;
    touch-action: manipulation;
    pointer-events: none;
  }
  .mole.active {
    transform: translateX(-50%) translateY(0);
    pointer-events: auto;
  }
  .mole.whacked {
    transform: translateX(-50%) translateY(120%);
    transition: transform 0.08s ease-in;
  }
  .mole-body {
    width: 100%;
    height: 100%;
    position: relative;
  }
  .mole-body svg { width: 100%; height: 100%; display: block; }
  .mole-body .body-outer {
    fill: #8B5E3C;
    stroke: #5C3A1E;
    stroke-width: 2;
  }
  .mole-body .body-inner {
    fill: #A0704F;
  }
  .mole-body .eye {
    fill: #1a1a1a;
  }
  .mole-body .eye-white {
    fill: #fff;
  }
  .mole-body .nose {
    fill: #D4756B;
  }
  .mole-body .whisker {
    stroke: #5C3A1E;
    stroke-width: 1.5;
    stroke-linecap: round;
  }

  @media (max-width: 420px) {
    .fw-container { padding: 10px; }
  }
  @media (max-height: 650px) {
    .fw-game-area { max-height: 300px; }
  }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">打地鼠</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">得分</div>
        <div class="fw-score-value" id="score">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">时间</div>
        <div class="fw-score-value" id="timer">30</div>
      </div>
    </div>
  </div>
  <div class="fw-game-area" id="field">
    <div class="grid" id="grid"></div>
  </div>
  <div class="fw-overlay" id="overlay">
    <div class="fw-overlay-box">
      <div class="fw-overlay-title">游戏结束</div>
      <div class="fw-overlay-text">最终得分: <span id="finalScore">0</span></div>
      <div style="font-size:0.85em;color:var(--text-muted);margin-bottom:20px">
        最高分: <span id="highScoreDisplay">0</span>
      </div>
      <button class="fw-btn fw-btn-primary" id="restartOverlayBtn">再来一局</button>
    </div>
  </div>
  <div class="fw-controls-row">
    <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
    <button class="fw-btn fw-btn-warm" id="resetBtn">重置</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';

  var FW = window.GameFramework;

  var GRID_SIZE = 3;
  var HOLE_COUNT = GRID_SIZE * GRID_SIZE;
  var GAME_DURATION = 30;
  var MOLE_MIN_INTERVAL = 600;
  var MOLE_MAX_INTERVAL = 1500;
  var MOLE_VISIBLE_TIME = 900;

  var score = 0;
  var highScore = FW.storage.getHighScore();
  var timeLeft = GAME_DURATION;
  var gameRunning = false;
  var timerInterval = null;
  var moleTimeouts = [];
  var activeMoles = new Set();
  var whackedMoles = new Set();

  var gridEl = document.getElementById('grid');
  var scoreEl = document.getElementById('score');
  var timerEl = document.getElementById('timer');
  var overlay = document.getElementById('overlay');
  var finalScoreEl = document.getElementById('finalScore');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');
  var restartOverlayBtn = document.getElementById('restartOverlayBtn');
  var highScoreDisplayEl = document.getElementById('highScoreDisplay');
  highScoreDisplayEl.textContent = highScore;

  function createMoleSVG() {
    return [
      '<svg viewBox="0 0 80 80" xmlns="http://www.w3.org/2000/svg">',
        '<ellipse class="body-outer" cx="40" cy="50" rx="28" ry="30"/>',
        '<ellipse class="body-inner" cx="40" cy="52" rx="20" ry="22"/>',
        '<ellipse class="eye-white" cx="30" cy="40" rx="7" ry="8"/>',
        '<ellipse class="eye-white" cx="50" cy="40" rx="7" ry="8"/>',
        '<ellipse class="eye" cx="31" cy="41" rx="4" ry="5"/>',
        '<ellipse class="eye" cx="49" cy="41" rx="4" ry="5"/>',
        '<ellipse class="nose" cx="40" cy="50" rx="5" ry="3"/>',
        '<line class="whisker" x1="18" y1="48" x2="33" y2="50"/>',
        '<line class="whisker" x1="18" y1="54" x2="33" y2="52"/>',
        '<line class="whisker" x1="62" y1="48" x2="47" y2="50"/>',
        '<line class="whisker" x1="62" y1="54" x2="47" y2="52"/>',
      '</svg>'
    ].join('');
  }

  function buildGrid() {
    gridEl.innerHTML = '';
    for (var i = 0; i < HOLE_COUNT; i++) {
      (function(idx) {
        var hole = document.createElement('div');
        hole.className = 'hole';
        hole.dataset.index = idx;

        var mole = document.createElement('div');
        mole.className = 'mole';
        mole.dataset.index = idx;
        var body = document.createElement('div');
        body.className = 'mole-body';
        body.innerHTML = createMoleSVG();
        mole.appendChild(body);

        var holeBg = document.createElement('div');
        holeBg.className = 'hole-bg';

        hole.appendChild(mole);
        hole.appendChild(holeBg);

        hole.addEventListener('click', function() { whackMole(idx); });
        hole.addEventListener('touchstart', function(e) { e.preventDefault(); whackMole(idx); });

        gridEl.appendChild(hole);
      })(i);
    }
  }

  function whackMole(index) {
    if (!gameRunning) return;
    if (!activeMoles.has(index)) return;
    if (whackedMoles.has(index)) return;

    whackedMoles.add(index);
    activeMoles.delete(index);
    score++;
    scoreEl.textContent = score;
    FW.events.reportScore(score);
    FW.audio.sfx('score');

    var hole = gridEl.children[index];
    var mole = hole.querySelector('.mole');
    mole.classList.remove('active');
    mole.classList.add('whacked');

    setTimeout(function() {
      mole.classList.remove('whacked');
    }, 150);
  }

  function showMole(index) {
    if (!gameRunning) return;
    if (activeMoles.has(index)) return;

    var hole = gridEl.children[index];
    var mole = hole.querySelector('.mole');
    mole.classList.add('active');
    mole.classList.remove('whacked');
    activeMoles.add(index);

    setTimeout(function() {
      if (activeMoles.has(index)) {
        var moleEl = gridEl.children[index].querySelector('.mole');
        moleEl.classList.remove('active');
        activeMoles.delete(index);
        whackedMoles.delete(index);
      }
    }, MOLE_VISIBLE_TIME);
  }

  function scheduleMole() {
    if (!gameRunning) return;

    var available = [];
    for (var i = 0; i < HOLE_COUNT; i++) {
      if (!activeMoles.has(i)) available.push(i);
    }
    if (available.length > 0) {
      var idx = available[Math.floor(Math.random() * available.length)];
      showMole(idx);
      if (Math.random() < 0.3 && available.length > 1) {
        var remaining = [];
        for (var j = 0; j < available.length; j++) {
          if (available[j] !== idx) remaining.push(available[j]);
        }
        var idx2 = remaining[Math.floor(Math.random() * remaining.length)];
        showMole(idx2);
      }
    }

    var delay = MOLE_MIN_INTERVAL + Math.random() * (MOLE_MAX_INTERVAL - MOLE_MIN_INTERVAL);
    var tid = setTimeout(function() {
      scheduleMole();
      moleTimeouts = moleTimeouts.filter(function(t) { return t !== tid; });
    }, delay);
    moleTimeouts.push(tid);
  }

  function clearMoleTimeouts() {
    moleTimeouts.forEach(function(t) { clearTimeout(t); });
    moleTimeouts = [];
  }

  function hideAllMoles() {
    for (var i = 0; i < HOLE_COUNT; i++) {
      var hole = gridEl.children[i];
      var mole = hole.querySelector('.mole');
      mole.classList.remove('active', 'whacked');
    }
    activeMoles.clear();
    whackedMoles.clear();
  }

  function updateTimer() {
    timerEl.textContent = timeLeft;
    if (timeLeft <= 0) {
      endGame();
    }
  }

  function startGame() {
    if (gameRunning) return;
    FW.audio.sfx('click');

    score = 0;
    timeLeft = GAME_DURATION;
    gameRunning = true;
    scoreEl.textContent = '0';
    timerEl.textContent = GAME_DURATION;
    overlay.classList.remove('active');
    startBtn.disabled = true;
    hideAllMoles();
    activeMoles.clear();
    whackedMoles.clear();

    timerInterval = setInterval(function() {
      timeLeft--;
      timerEl.textContent = timeLeft;
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);

    scheduleMole();
  }

  function endGame() {
    gameRunning = false;
    clearMoleTimeouts();
    clearInterval(timerInterval);
    hideAllMoles();
    startBtn.disabled = false;
    finalScoreEl.textContent = score;

    var isNewHigh = false;
    if (score > highScore) {
      highScore = score;
      FW.storage.setHighScore(score);
      isNewHigh = true;
    }
    highScoreDisplayEl.textContent = highScore;
    overlay.classList.add('active');

    FW.audio.sfx('gameover');
    if (isNewHigh) {
      FW.audio.sfx('win');
    }
    FW.events.reportComplete(score, { won: isNewHigh });
  }

  function resetGame() {
    gameRunning = false;
    clearMoleTimeouts();
    clearInterval(timerInterval);
    score = 0;
    timeLeft = GAME_DURATION;
    scoreEl.textContent = '0';
    timerEl.textContent = GAME_DURATION;
    startBtn.disabled = false;
    overlay.classList.remove('active');
    hideAllMoles();
  }

  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', function(e) { e.preventDefault(); if (!gameRunning) startGame(); });
  resetBtn.addEventListener('click', resetGame);
  resetBtn.addEventListener('touchstart', function(e) { e.preventDefault(); resetGame(); });
  restartOverlayBtn.addEventListener('click', startGame);
  restartOverlayBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startGame(); });

  buildGrid();
})();
</script>
</body>
</html>
