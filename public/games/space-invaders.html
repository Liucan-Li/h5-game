<!DOCTYPE html>
<html lang="zh-CN" data-game-id="space-invaders">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Space Invaders</title>
<link rel="stylesheet" href="framework.css">
<style>
  canvas { display: block; width: 100%; aspect-ratio: 1; border-radius: var(--radius-lg); }
  .controls-info { color: var(--text-muted); font-size: 0.75em; margin-top: 8px; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <div class="fw-title">Space Invaders</div>
    <div class="fw-scores" id="hud-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">HIGH</div>
        <div class="fw-score-value" id="high-score">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">得分</div>
        <div class="fw-score-value" id="score">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">LIVES</div>
        <div class="fw-score-value" id="lives">3</div>
      </div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas class="fw-canvas" id="gc" width="400" height="400"></canvas>
    <div class="fw-overlay" id="overlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title" id="ot">游戏结束</div>
        <div class="fw-overlay-text" id="os">得分：0</div>
        <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
      </div>
    </div>
  </div>
  <div class="controls-info">← → 移动，空格/↑ 射击</div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  var FW = GameFramework;
  var c = document.getElementById('gc'), ctx = c.getContext('2d');
  var sd = document.getElementById('score'), ld = document.getElementById('lives'), hd = document.getElementById('high-score');
  var ov = document.getElementById('overlay'), ot = document.getElementById('ot'), os = document.getElementById('os');

  var W = 400;
  var player, bullets, enemies, enemyBullets, score, lives, gameOver, dir, lastShot;
  var keys = {}, frame;

  function init() {
    player = { x: 200, y: 370, w: 40, h: 20, speed: 3 };
    bullets = []; enemies = []; enemyBullets = [];
    score = 0; lives = 3; gameOver = false; dir = 1; lastShot = 0; frame = 0;
    keys = {};
    // Spawn enemies
    for (var r = 0; r < 4; r++) for (var c2 = 0; c2 < 8; c2++) {
      enemies.push({ x: 60 + c2 * 40, y: 40 + r * 35, w: 30, h: 25, hp: 1 });
    }
    ov.classList.remove('active');
    hd.textContent = FW.storage.getHighScore();
    updateHUD();
    requestAnimationFrame(loop);
  }

  function updateHUD() { sd.textContent = score; ld.textContent = lives; }

  function loop() {
    if (gameOver) return;
    frame++;

    // Player movement
    if (keys['ArrowLeft'] || keys['a']) player.x -= player.speed;
    if (keys['ArrowRight'] || keys['d']) player.x += player.speed;
    player.x = Math.max(20, Math.min(W - 20, player.x));

    // Shoot
    if ((keys[' '] || keys['ArrowUp']) && frame - lastShot > 15) {
      bullets.push({ x: player.x, y: player.y - 10, speed: 6 });
      lastShot = frame;
    }

    // Move bullets
    bullets = bullets.filter(function(b) { b.y -= b.speed; return b.y > 0; });

    // Move enemies
    var hitEdge = false;
    enemies.forEach(function(e) {
      e.x += dir * 0.5;
      if (e.x < 10 || e.x > W - 40) hitEdge = true;
    });
    if (hitEdge) { dir *= -1; enemies.forEach(function(e) { e.y += 8; }); }

    // Enemy bullets
    if (frame % 30 === 0 && enemies.length > 0) {
      var shooter = enemies[Math.floor(Math.random() * enemies.length)];
      enemyBullets.push({ x: shooter.x + 15, y: shooter.y + 12, speed: 2 });
    }
    enemyBullets = enemyBullets.filter(function(b) { b.y += b.speed; return b.y < W; });

    // Collisions: bullets vs enemies
    bullets.forEach(function(b) {
      enemies = enemies.filter(function(e) {
        if (b.x > e.x && b.x < e.x + e.w && b.y > e.y && b.y < e.y + e.h) {
          score += 10;
          FW.audio.sfx('score');
          FW.events.reportScore(score);
          return false;
        }
        return true;
      });
    });

    // Collisions: enemy bullets vs player
    enemyBullets.forEach(function(b) {
      if (b.x > player.x - 20 && b.x < player.x + 20 && b.y > player.y - 10 && b.y < player.y + 10) {
        lives--;
        if (lives <= 0) {
          gameOver = true;
          FW.audio.sfx('gameover');
          FW.storage.setHighScore(score);
          FW.events.reportScore(score);
          FW.events.reportComplete(score, { won: false });
          ot.textContent = '游戏结束';
          os.textContent = '得分：' + score;
          ov.classList.add('active');
        }
        updateHUD();
      }
    });

    // Enemies reached player
    enemies.forEach(function(e) {
      if (e.y + e.h > player.y) {
        gameOver = true;
        FW.audio.sfx('gameover');
        FW.storage.setHighScore(score);
        FW.events.reportScore(score);
        FW.events.reportComplete(score, { won: false });
        ot.textContent = '外星人入侵！';
        os.textContent = '得分：' + score;
        ov.classList.add('active');
      }
    });

    // Win check
    if (enemies.length === 0 && !gameOver) {
      gameOver = true;
      FW.audio.sfx('win');
      FW.storage.setHighScore(score);
      FW.events.reportScore(score);
      FW.events.reportComplete(score, { won: true });
      ot.textContent = '胜利！';
      os.textContent = '得分：' + score;
      ov.classList.add('active');
    }

    render();
    requestAnimationFrame(loop);
  }

  function render() {
    ctx.fillStyle = '#0f3460'; ctx.fillRect(0, 0, W, W);
    // Stars
    for (var i = 0; i < 50; i++) {
      ctx.fillStyle = 'rgba(255,255,255,' + (0.1 + Math.sin(frame * 0.02 + i) * 0.05) + ')';
      ctx.fillRect((i * 27 + frame) % W, (i * 13) % W, 1.5, 1.5);
    }
    // Player
    ctx.fillStyle = '#00cec9';
    ctx.beginPath(); ctx.moveTo(player.x, player.y - 10);
    ctx.lineTo(player.x - 20, player.y + 5); ctx.lineTo(player.x + 20, player.y + 5); ctx.closePath(); ctx.fill();
    ctx.fillStyle = 'rgba(0,206,201,0.3)';
    ctx.beginPath(); ctx.moveTo(player.x, player.y - 15);
    ctx.lineTo(player.x - 14, player.y); ctx.lineTo(player.x + 14, player.y); ctx.closePath(); ctx.fill();
    // Bullets
    ctx.fillStyle = '#f1c40f'; bullets.forEach(function(b) { ctx.fillRect(b.x - 2, b.y - 6, 4, 10); });
    // Enemies
    enemies.forEach(function(e) {
      ctx.fillStyle = '#e74c3c';
      ctx.beginPath(); ctx.arc(e.x + e.w / 2, e.y + e.h / 2, 12, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#c0392b';
      ctx.beginPath(); ctx.arc(e.x + e.w / 2 - 5, e.y + e.h / 2 - 3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.beginPath(); ctx.arc(e.x + e.w / 2 + 5, e.y + e.h / 2 - 3, 4, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(e.x + 10, e.y + 18, 10, 3);
    });
    // Enemy bullets
    ctx.fillStyle = '#ff6b6b'; enemyBullets.forEach(function(b) { ctx.beginPath(); ctx.arc(b.x, b.y, 3, 0, Math.PI * 2); ctx.fill(); });
  }

  document.addEventListener('keydown', function(e) { keys[e.key] = true; if (e.key === ' ' || e.key === 'ArrowUp' || e.key === 'ArrowDown') e.preventDefault(); });
  document.addEventListener('keyup', function(e) { keys[e.key] = false; });

  document.getElementById('rb').addEventListener('click', function() { FW.audio.sfx('click'); init(); });
  init();
})();
</script>
</body>
</html>
