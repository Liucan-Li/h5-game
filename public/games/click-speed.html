<!DOCTYPE html>
<html lang="zh-CN" data-game-id="click-speed">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>点击速度测试</title>
<link rel="stylesheet" href="framework.css">
<style>
  .fw-container { max-width: 400px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
  .timer-ring {
    width: 120px; height: 120px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.5em; font-weight: 800; position: relative;
    background: conic-gradient(var(--accent-3) 0deg, var(--bg-secondary) 0deg);
  }
  .timer-ring::before {
    content: ''; position: absolute; inset: 6px; border-radius: 50%; background: var(--bg-primary);
  }
  .timer-text { position: relative; z-index: 1; color: var(--text-primary); }
  .timer-ring.ready { background: conic-gradient(var(--accent-1) 0deg, var(--bg-secondary) 360deg); }
  .timer-ring.playing { background: conic-gradient(var(--accent-3) var(--progress), var(--bg-secondary) var(--progress)); }
  .timer-ring.done { background: conic-gradient(#ef4444 0deg, var(--bg-secondary) 360deg); }
  .stats { display: flex; gap: 24px; }
  .click-area {
    width: 100%; padding: 40px 20px; border-radius: var(--radius-xl); cursor: pointer;
    font-size: 1.4em; font-weight: 700; border: 2px solid var(--glass-border);
    transition: all 0.15s; min-height: 120px;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px;
  }
  .click-area.ready { background: var(--bg-secondary); border-color: var(--accent-1); color: var(--accent-1); }
  .click-area.playing { background: var(--bg-tertiary); border-color: var(--accent-3); color: var(--text-primary); }
  .click-area.playing:active { transform: scale(0.98); }
  .click-area.done { background: var(--bg-primary); border-color: #ef4444; color: #ef4444; }
  .click-count { font-size: 2.5em; font-weight: 800; }
  .result { display: none; flex-direction: column; align-items: center; gap: 10px; }
  .result.active { display: flex; }
  .result h2 { color: var(--accent-3); }
  .result .big { font-size: 3em; font-weight: 800; color: var(--text-primary); }
  .history { margin-top: 10px; color: var(--text-muted); font-size: 0.85em; }
  .history span { color: var(--text-primary); }
</style>
</head>
<body>
<div class="fw-container fw-cat-casual">
  <h1 class="fw-title">点击速度测试</h1>
  <div class="timer-ring ready" id="timerRing">
    <span class="timer-text" id="timerText">10</span>
  </div>
  <div class="stats">
    <div class="fw-score-box"><div class="fw-score-label">点击</div><div class="fw-score-value" id="clickCount">0</div></div>
    <div class="fw-score-box"><div class="fw-score-label">CPS</div><div class="fw-score-value" id="cpsDisplay">0.0</div></div>
  </div>
  <div class="click-area ready" id="clickArea">
    <span id="clickAreaText">点击开始！</span>
  </div>
  <div class="result" id="resultBox">
    <h2>结果</h2>
    <div class="big"><span id="resultCps">0.0</span> CPS</div>
    <div style="color:var(--text-secondary)"><span id="resultClicks">0</span> 次点击 / 10秒</div>
  </div>
  <button class="fw-btn fw-btn-primary" id="restartBtn">再试一次</button>
  <div class="history">最高: <span id="bestCps">0.0</span> CPS</div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const DURATION = 10;
  var state = 'idle', clicks = 0, timeLeft = DURATION, timerInterval = null;
  var bestCps = FW.storage.load('bestCps', 0);

  var timerRing = document.getElementById('timerRing');
  var timerText = document.getElementById('timerText');
  var clickCount = document.getElementById('clickCount');
  var cpsDisplay = document.getElementById('cpsDisplay');
  var clickArea = document.getElementById('clickArea');
  var clickAreaText = document.getElementById('clickAreaText');
  var resultBox = document.getElementById('resultBox');
  var resultCps = document.getElementById('resultCps');
  var resultClicks = document.getElementById('resultClicks');
  var bestCpsEl = document.getElementById('bestCps');
  bestCpsEl.textContent = bestCps.toFixed(1);

  function updateUI() {
    clickCount.textContent = clicks;
    var cps = clicks > 0 && timeLeft < DURATION ? (clicks / (DURATION - timeLeft)).toFixed(1) : '0.0';
    cpsDisplay.textContent = cps;
    timerRing.style.setProperty('--progress', ((DURATION - timeLeft) / DURATION * 360) + 'deg');
    timerText.textContent = timeLeft;
  }

  function startGame() {
    state = 'playing'; clicks = 0; timeLeft = DURATION;
    resultBox.classList.remove('active');
    clickArea.className = 'click-area playing';
    clickAreaText.textContent = '尽可能快地点击！';
    timerRing.className = 'timer-ring playing';
    updateUI();
    timerInterval = setInterval(function() { timeLeft--; updateUI(); if (timeLeft <= 0) endGame(); }, 1000);
  }

  function endGame() {
    state = 'done'; clearInterval(timerInterval); timerInterval = null;
    clickArea.className = 'click-area done'; clickAreaText.textContent = '时间到！';
    timerRing.className = 'timer-ring done';
    var finalCps = clicks / DURATION;
    resultCps.textContent = finalCps.toFixed(1); resultClicks.textContent = clicks;
    resultBox.classList.add('active'); cpsDisplay.textContent = finalCps.toFixed(1);
    if (finalCps > bestCps) { bestCps = finalCps; bestCpsEl.textContent = bestCps.toFixed(1); FW.storage.save('bestCps', bestCps); FW.audio.sfx('win'); }
    else { FW.audio.sfx('gameover'); }
    FW.events.reportComplete(clicks, { cps: finalCps });
  }

  function handleClick() {
    if (state === 'idle') { FW.audio.sfx('select'); startGame(); clicks++; updateUI(); }
    else if (state === 'playing') { clicks++; updateUI(); FW.audio.sfx('click'); }
  }

  clickArea.addEventListener('click', handleClick);
  clickArea.addEventListener('touchstart', function(e) { e.preventDefault(); handleClick(); }, { passive: false });
  document.getElementById('restartBtn').addEventListener('click', function() {
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    state = 'idle'; clicks = 0; timeLeft = DURATION; resultBox.classList.remove('active');
    clickArea.className = 'click-area ready'; clickAreaText.textContent = '点击开始！';
    timerRing.className = 'timer-ring ready'; updateUI();
  });
  clickArea.addEventListener('contextmenu', function(e) { e.preventDefault(); });
})();
</script>
</body>
</html>
