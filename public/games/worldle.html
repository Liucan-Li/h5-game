<!DOCTYPE html>
<html lang="zh-CN" data-game-id="worldle">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Worldle</title>
<link rel="stylesheet" href="framework.css">
<style>
  .fw-container { max-width: 450px; }
  .fw-canvas { aspect-ratio: 2/1; margin-bottom: 16px; background: var(--game-bg); }
  .input-row { display: flex; gap: 8px; margin-bottom: 12px; }
  .input-row input {
    flex: 1; background: var(--bg-secondary); border: 2px solid var(--bg-tertiary);
    color: var(--text-primary); padding: 10px 14px; border-radius: var(--radius-md);
    font-size: 1em; font-family: var(--font-family); outline: none;
  }
  .input-row input:focus { border-color: var(--accent-1); }
  .input-row button {
    background: var(--gradient-accent); color: var(--bg-primary); border: none;
    padding: 10px 20px; border-radius: var(--radius-md); font-size: 1em;
    font-weight: 700; cursor: pointer; transition: transform var(--transition-fast);
  }
  .input-row button:active { transform: scale(0.95); }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .guesses { text-align: left; margin-bottom: 8px; }
  .guess-row { display: flex; gap: 6px; margin-bottom: 5px; align-items: center; animation: fw-slide-up 0.2s ease; }
  .guess-row .dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
  .guess-row .dot.green { background: var(--accent-1); }
  .guess-row .dot.yellow { background: var(--accent-3); }
  .guess-row .dot.gray { background: var(--text-muted); }
  .guess-row .name { font-size: 0.85em; color: var(--text-primary); }
  .hint { font-size: 0.8em; color: var(--text-muted); margin-top: 8px; }
</style>
</head>
<body>
<div class="fw-container fw-cat-puzzle">
  <div class="fw-header">
    <h1 class="fw-title">Worldle</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">剩余</div>
        <div class="fw-score-value" id="attempts">5</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">最高</div>
        <div class="fw-score-value" id="highScore">0%</div>
      </div>
    </div>
  </div>
  <div class="fw-status" id="hint" style="margin-bottom:8px">根据轮廓猜国家</div>
  <div class="fw-game-area">
    <canvas id="gc" class="fw-canvas" width="400" height="200"></canvas>
  </div>
  <div class="input-row">
    <input type="text" id="guessInput" placeholder="输入国家名称..." autocomplete="off">
    <button id="guessBtn">猜</button>
  </div>
  <div class="guesses" id="guesses"></div>
  <div class="hint">提示：距离越近，圆点越绿</div>
</div>
<div class="fw-overlay" id="overlay">
  <div class="fw-overlay-box">
    <div class="fw-overlay-title" id="ot">...</div>
    <div class="fw-overlay-text" id="os">...</div>
    <button class="fw-btn fw-btn-primary" id="rb">下一轮</button>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var FW = window.GameFramework;
  var gc=document.getElementById('gc'),ctx=gc.getContext('2d');
  var gi=document.getElementById('guessInput'),gb=document.getElementById('guessBtn');
  var gd=document.getElementById('guesses'),ga=document.getElementById('attempts');
  var hi=document.getElementById('hint'),ov=document.getElementById('overlay');
  var ot=document.getElementById('ot'),os=document.getElementById('os'),rb=document.getElementById('rb');
  var hs=document.getElementById('highScore');

  var COUNTRIES = [
    {name:'中国',cx:0.55,cy:0.48},
    {name:'美国',cx:0.2,cy:0.4},
    {name:'日本',cx:0.75,cy:0.42},
    {name:'韩国',cx:0.72,cy:0.43},
    {name:'英国',cx:0.48,cy:0.32},
    {name:'法国',cx:0.47,cy:0.37},
    {name:'德国',cx:0.5,cy:0.33},
    {name:'澳大利亚',cx:0.78,cy:0.75},
    {name:'印度',cx:0.62,cy:0.48},
    {name:'巴西',cx:0.35,cy:0.7},
    {name:'加拿大',cx:0.22,cy:0.28},
    {name:'俄罗斯',cx:0.55,cy:0.25},
    {name:'意大利',cx:0.5,cy:0.4},
    {name:'西班牙',cx:0.46,cy:0.4},
    {name:'墨西哥',cx:0.28,cy:0.5},
    {name:'泰国',cx:0.68,cy:0.5},
    {name:'越南',cx:0.7,cy:0.48},
    {name:'菲律宾',cx:0.73,cy:0.5},
    {name:'马来西亚',cx:0.69,cy:0.54},
    {name:'新加坡',cx:0.7,cy:0.56},
  ];

  var target,guesses,attemptsLeft;
  var bestScore = FW.storage.load('hi', 0);

  function init(){
    target=COUNTRIES[Math.floor(Math.random()*COUNTRIES.length)];
    guesses=[]; attemptsLeft=5;
    gd.innerHTML=''; gi.value=''; gi.disabled=false; gb.disabled=false;
    ov.classList.remove('active');
    ga.textContent=attemptsLeft;
    hs.textContent=bestScore+'%';
    hi.textContent='根据轮廓猜国家';
    renderMap();
  }

  function renderMap(){
    ctx.fillStyle='#0f3460';ctx.fillRect(0,0,400,200);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=0.5;
    for(var i=0;i<=400;i+=20){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,200);ctx.stroke();}
    for(var i=0;i<=200;i+=20){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(400,i);ctx.stroke();}
    var cx=target.cx*400,cy=target.cy*200;
    ctx.strokeStyle='rgba(46,204,113,0.8)';ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    var points=8+Math.floor(Math.random()*4);
    for(var i=0;i<points;i++){
      var angle=(i/points)*Math.PI*2;
      var r=30+Math.sin(i*2.7)*12+Math.cos(i*1.3)*8;
      var px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();
    ctx.setLineDash([]);
    ctx.fillStyle='rgba(46,204,113,0.1)';
    ctx.beginPath();
    for(var i=0;i<points;i++){
      var angle=(i/points)*Math.PI*2;
      var r=30+Math.sin(i*2.7)*12+Math.cos(i*1.3)*8;
      var px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.fill();
    ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText('?',cx,cy-18);
  }

  function calcDist(gx,gy){
    return Math.sqrt(Math.pow(gx-target.cx,2)+Math.pow(gy-target.cy,2));
  }

  function submitGuess(){
    FW.audio.sfx('click');
    var val=gi.value.trim();
    if(!val)return;
    var match=COUNTRIES.find(function(c){return c.name===val});
    if(!match){hi.textContent='未找到该国家，请重试';return;}

    if(guesses.some(function(g){return g===val})){hi.textContent='已经猜过了';return;}

    guesses.push(val);
    attemptsLeft--;
    ga.textContent=attemptsLeft;

    var dist=calcDist(match.cx,match.cy);
    var pct=Math.max(0,Math.min(100,Math.round((1-dist/0.5)*100)));

    FW.events.reportScore(pct);

    var guessDiv=document.createElement('div');
    guessDiv.className='guess-row';
    var dotClass='gray';
    if(pct>80)dotClass='green';
    else if(pct>40)dotClass='yellow';
    guessDiv.innerHTML='<span class="dot '+dotClass+'"></span><span class="name">'+val+' ('+pct+'%)</span>';
    gd.appendChild(guessDiv);

    hi.textContent='距离：'+pct+'%';

    if(val===target.name){
      gi.disabled=true;gb.disabled=true;
      ot.textContent='猜对了！';os.textContent='国家：'+target.name+' 用了 '+(5-attemptsLeft)+' 次';
      if(pct>bestScore){bestScore=pct;FW.storage.save('hi',bestScore);hs.textContent=bestScore+'%';}
      FW.audio.sfx('win');
      FW.events.reportComplete(pct,{won:true});
      ov.classList.add('active');
      return;
    }

    if(attemptsLeft<=0){
      gi.disabled=true;gb.disabled=true;
      ot.textContent='机会用完';os.textContent='答案是：'+target.name;
      FW.audio.sfx('gameover');
      FW.events.reportComplete(0,{won:false});
      ov.classList.add('active');
      return;
    }

    gi.value='';gi.focus();
  }

  gb.addEventListener('click',submitGuess);
  gi.addEventListener('keydown',function(e){if(e.key==='Enter')submitGuess();});
  rb.addEventListener('click',init);
  init();
})();
</script>
</body>
</html>
