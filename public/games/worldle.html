<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Worldle</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #1a1a2e; color: #e0e0e0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px;
    -webkit-user-select: none; user-select: none;
  }
  .container { text-align: center; width: 100%; max-width: 450px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  h1 { font-size: 1.8em; font-weight: 800; background: linear-gradient(135deg, #2ecc71, #27ae60); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  canvas { display: block; width: 100%; aspect-ratio: 2/1; background: #0f3460; border-radius: 12px; margin-bottom: 12px; }
  .input-row { display: flex; gap: 8px; }
  .input-row input {
    flex:1; background: #16213e; border: 2px solid #0f3460; color: #e0e0e0;
    padding: 10px 14px; border-radius: 10px; font-size: 1em; outline: none;
  }
  .input-row input:focus { border-color: #2ecc71; }
  .input-row button {
    background: #2ecc71; color: #1a1a2e; border: none; padding: 10px 20px;
    border-radius: 10px; font-size: 1em; font-weight: 700; cursor: pointer;
  }
  .input-row button:disabled { opacity: 0.4; cursor: not-allowed; }
  .guesses { margin-top: 12px; text-align: left; }
  .guess-row { display: flex; gap: 4px; margin-bottom: 4px; align-items: center; }
  .guess-row .dot { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; }
  .guess-row .dot.green { background: #2ecc71; }
  .guess-row .dot.yellow { background: #f1c40f; }
  .guess-row .dot.gray { background: #636e72; }
  .guess-row .name { font-size: 0.85em; margin-left: 6px; }
  .info { font-size: 0.85em; color: #f1c40f; margin: 8px 0; }
  .overlay { position: fixed; inset:0; display:none; align-items:center; justify-content:center; background:rgba(0,0,0,0.7); z-index:100; }
  .overlay.active { display:flex; }
  .overlay .box { background:#1a1a2e; border-radius:16px; padding:24px; text-align:center; max-width:320px; }
  .overlay h2 { font-size:1.5em; margin-bottom:8px; }
  .overlay p { color:#ccc; margin-bottom:16px; }
  .overlay button { background:#2ecc71; color:#1a1a2e; border:none; padding:10px 28px; border-radius:8px; font-size:1em; font-weight:700; cursor:pointer; }
  .hint { margin-top: 8px; font-size: 0.8em; color: #7f8c8d; }
  .attempts { font-size: 0.8em; color: #7f8c8d; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <div class="header"><h1>Worldle</h1><div id="attempts" class="attempts">剩余 5 次</div></div>
  <div class="info" id="hint">根据轮廓猜国家</div>
  <canvas id="gc" width="400" height="200"></canvas>
  <div class="input-row">
    <input type="text" id="guessInput" placeholder="输入国家名称..." autocomplete="off">
    <button id="guessBtn">猜</button>
  </div>
  <div class="guesses" id="guesses"></div>
  <div class="hint">提示：距离越近，圆点越绿 🟢</div>
</div>
<div class="overlay" id="overlay"><div class="box"><h2 id="ot">...</h2><p id="os">...</p><button id="rb">下一轮</button></div></div>
<script>
(function(){
  const gc=document.getElementById('gc'),ctx=gc.getContext('2d');
  const gi=document.getElementById('guessInput'),gb=document.getElementById('guessBtn');
  const gd=document.getElementById('guesses'),ga=document.getElementById('attempts');
  const hi=document.getElementById('hint'),ov=document.getElementById('overlay');
  const ot=document.getElementById('ot'),os=document.getElementById('os'),rb=document.getElementById('rb');

  const COUNTRIES = [
    {name:'中国',cx:0.55,cy:0.48},
    {name:'美国',cx:0.2,cy:0.4},
    {name:'日本',cx:0.75,cy:0.42},
    {name:'韩国',cx:0.72,cy:0.43},
    {name:'英国',cx:0.48,cy:0.32},
    {name:'法国',cx:0.47,cy:0.37},
    {name:'德国',cx:0.5,cy:0.33},
    {name:'澳大利亚',cx:0.78,cy:0.75},
    {name:'印度',cx:0.62,cy:0.48},
    {name:'巴西',cx:0.35,cy:0.7},
    {name:'加拿大',cx:0.22,cy:0.28},
    {name:'俄罗斯',cx:0.55,cy:0.25},
    {name:'意大利',cx:0.5,cy:0.4},
    {name:'西班牙',cx:0.46,cy:0.4},
    {name:'墨西哥',cx:0.28,cy:0.5},
    {name:'泰国',cx:0.68,cy:0.5},
    {name:'越南',cx:0.7,cy:0.48},
    {name:'菲律宾',cx:0.73,cy:0.5},
    {name:'马来西亚',cx:0.69,cy:0.54},
    {name:'新加坡',cx:0.7,cy:0.56},
  ];

  let target,guesses,attemptsLeft;

  function init(){
    target=COUNTRIES[Math.floor(Math.random()*COUNTRIES.length)];
    guesses=[]; attemptsLeft=5;
    gd.innerHTML=''; gi.value=''; gi.disabled=false; gb.disabled=false;
    ov.classList.remove('active');
    ga.textContent='剩余 '+attemptsLeft+' 次';
    hi.textContent='根据轮廓猜国家';
    renderMap();
  }

  function renderMap(){
    ctx.fillStyle='#0f3460';ctx.fillRect(0,0,400,200);
    ctx.strokeStyle='rgba(255,255,255,0.1)';
    ctx.lineWidth=0.5;
    // Grid
    for(let i=0;i<=400;i+=20){ctx.beginPath();ctx.moveTo(i,0);ctx.lineTo(i,200);ctx.stroke();}
    for(let i=0;i<=200;i+=20){ctx.beginPath();ctx.moveTo(0,i);ctx.lineTo(400,i);ctx.stroke();}
    // Draw shape approximation
    const cx=target.cx*400,cy=target.cy*200;
    // Draw a blob shape that looks like a country outline
    ctx.strokeStyle='rgba(46,204,113,0.8)';ctx.lineWidth=2;
    ctx.setLineDash([4,4]);
    ctx.beginPath();
    const points=8+Math.floor(Math.random()*4);
    for(let i=0;i<points;i++){
      const angle=(i/points)*Math.PI*2;
      const r=30+Math.sin(i*2.7)*12+Math.cos(i*1.3)*8;
      const px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.stroke();
    ctx.setLineDash([]);
    // Fill
    ctx.fillStyle='rgba(46,204,113,0.1)';
    ctx.beginPath();
    for(let i=0;i<points;i++){
      const angle=(i/points)*Math.PI*2;
      const r=30+Math.sin(i*2.7)*12+Math.cos(i*1.3)*8;
      const px=cx+Math.cos(angle)*r,py=cy+Math.sin(angle)*r;
      i===0?ctx.moveTo(px,py):ctx.lineTo(px,py);
    }
    ctx.closePath();ctx.fill();

    // Marker
    ctx.fillStyle='#e74c3c';ctx.beginPath();ctx.arc(cx,cy,4,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';ctx.font='9px sans-serif';ctx.textAlign='center';
    ctx.fillText('?',cx,cy-18);
  }

  function calcDist(gx,gy){
    return Math.sqrt(Math.pow(gx-target.cx,2)+Math.pow(gy-target.cy,2));
  }

  function submitGuess(){
    const val=gi.value.trim();
    if(!val)return;
    const match=COUNTRIES.find(c=>c.name===val);
    if(!match){hi.textContent='❌ 未找到该国家，请重试';return;}

    if(guesses.some(g=>g===val)){hi.textContent='⏳ 已经猜过了';return;}

    guesses.push(val);
    attemptsLeft--;
    ga.textContent='剩余 '+attemptsLeft+' 次';

    const dist=calcDist(match.cx,match.cy);
    const pct=Math.max(0,Math.min(100,(1-dist/0.5)*100));

    const guessDiv=document.createElement('div');
    guessDiv.className='guess-row';
    let dotClass='gray';
    if(pct>80)dotClass='green';
    else if(pct>40)dotClass='yellow';
    guessDiv.innerHTML=`<span class="dot ${dotClass}"></span><span class="name">${val} ${pct>=0?'('+Math.round(pct)+'%)':''}</span>`;
    gd.appendChild(guessDiv);

    hi.textContent='距离：'+Math.round(pct)+'%';

    if(val===target.name){
      gi.disabled=true;gb.disabled=true;
      ot.textContent='🎉 猜对了！';os.textContent='国家：'+target.name+' 用了 '+(5-attemptsLeft)+' 次';
      ov.classList.add('active');
      return;
    }

    if(attemptsLeft<=0){
      gi.disabled=true;gb.disabled=true;
      ot.textContent='😢 机会用完';os.textContent='答案是：'+target.name;
      ov.classList.add('active');
      return;
    }

    gi.value='';gi.focus();
  }

  gb.addEventListener('click',submitGuess);
  gi.addEventListener('keydown',e=>{if(e.key==='Enter')submitGuess();});
  rb.addEventListener('click',init);
  init();
})();
</script>
</body>
</html>
