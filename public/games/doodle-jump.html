<!DOCTYPE html>
<html lang="zh-CN" data-game-id="doodle-jump">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Doodle Jump 跳跳乐</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  canvas {
    display: block;
    background: linear-gradient(180deg, #0f0f2a 0%, #1a1a3a 40%, #2a1a1a 100%);
    border-radius: var(--radius-lg);
    border: 2px solid var(--border-default);
    width: 100%;
    max-width: 400px;
    aspect-ratio: 3 / 5;
    touch-action: none;
  }

  .controls {
    display: flex;
    gap: 10px;
    width: 100%;
  }

  .mobile-controls {
    display: none;
    width: 100%;
    max-width: 400px;
    justify-content: space-between;
    gap: 10px;
  }
  .mobile-btn {
    flex: 1;
    padding: 14px;
    border: 2px solid var(--glass-border);
    border-radius: var(--radius-lg);
    background: var(--glass-bg);
    color: var(--accent-1);
    font-size: 28px;
    text-align: center;
    touch-action: manipulation;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    backdrop-filter: blur(var(--glass-blur));
    -webkit-backdrop-filter: blur(var(--glass-blur));
  }
  .mobile-btn:active {
    background: var(--bg-card-hover);
    border-color: var(--accent-1);
  }

  @media (hover: none) and (pointer: coarse) {
    .mobile-controls { display: flex; }
  }
  @media (max-width: 420px) {
    .fw-title { font-size: 1.5em; }
  }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">跳跳乐</h1>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">分数</div>
        <div class="fw-score-value" id="score">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">高度</div>
        <div class="fw-score-value" id="height">0</div>
      </div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas id="gameCanvas" class="fw-canvas" width="360" height="600"></canvas>
  </div>
  <div class="controls">
    <button class="fw-btn fw-btn-primary" id="startBtn">开始</button>
    <button class="fw-btn fw-btn-warm" id="resetBtn">重置</button>
  </div>
  <div class="mobile-controls" id="mobileControls">
    <div class="mobile-btn" id="leftBtn">&#9664;</div>
    <div class="mobile-btn" id="rightBtn">&#9654;</div>
  </div>
</div>
<div class="fw-overlay" id="gameOverlay"></div>
<script src="framework.js"></script>
<script>
(function(){
  'use strict';

  window.FW = window.GameFramework;
  var FW = window.FW;

  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var heightEl = document.getElementById('height');
  var startBtn = document.getElementById('startBtn');
  var resetBtn = document.getElementById('resetBtn');

  var W = 360;
  var H = 600;
  canvas.width = W;
  canvas.height = H;

  // Game state
  var PLAYER_W = 24;
  var PLAYER_H = 28;
  var GRAVITY = 0.5;
  var JUMP_VEL = -11;
  var MOVE_SPEED = 4.5;
  var PLATFORM_W = 60;
  var PLATFORM_H = 10;
  var INITIAL_PLATFORMS = 12;
  var CAMERA_SMOOTH = 0.15;

  var gameRunning = false;
  var gameOver = false;
  var score = 0;
  var highScore = FW.storage.getHighScore();
  var maxHeight = 0;

  // Player
  var player = {
    x: W / 2 - PLAYER_W / 2,
    y: 0,
    w: PLAYER_W,
    h: PLAYER_H,
    vx: 0,
    vy: 0,
    onGround: false,
    facing: 1 // 1 right, -1 left
  };

  var platforms = [];
  var cameraY = 0;
  var targetCameraY = 0;
  var moveLeft = false;
  var moveRight = false;

  // Stars background
  var stars = [];
  for (var i = 0; i < 80; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 3,
      r: Math.random() * 1.5 + 0.5,
      a: Math.random() * 0.7 + 0.3
    });
  }

  function randomPlatformY(exclude) {
    var y;
    do {
      y = Math.random() * H * 2;
    } while (exclude.some(function(e) { return Math.abs(y - e) < 80; }));
    return y;
  }

  function generatePlatforms(count) {
    var startY = count > INITIAL_PLATFORMS ? -200 : H - 40;
    var newPlatforms = [];
    for (var i = 0; i < count; i++) {
      var y = i === 0 ? startY : startY - i * (H / count) - Math.random() * 30;
      var x = Math.random() * (W - PLATFORM_W - 20) + 10;
      var moving = count > INITIAL_PLATFORMS && Math.random() < 0.15;
      newPlatforms.push({
        x: x, y: y,
        w: PLATFORM_W,
        h: PLATFORM_H,
        moving: moving,
        moveDir: 1,
        moveSpeed: 1 + Math.random(),
        moveRange: 40 + Math.random() * 40
      });
    }
    return newPlatforms;
  }

  function initGame() {
    player.x = W / 2 - PLAYER_W / 2;
    player.y = 0;
    player.vx = 0;
    player.vy = 0;
    player.onGround = false;
    score = 0;
    maxHeight = 0;
    cameraY = 0;
    targetCameraY = 0;
    gameOver = false;
    gameRunning = false;
    moveLeft = false;
    moveRight = false;
    platforms = generatePlatforms(INITIAL_PLATFORMS);
    // Place player on first platform
    if (platforms.length > 0) {
      player.x = platforms[0].x + platforms[0].w / 2 - PLAYER_W / 2;
      player.y = platforms[0].y - PLAYER_H;
      player.vy = 0;
    }
    scoreEl.textContent = '0';
    heightEl.textContent = '0';
  }

  function startGame() {
    if (gameRunning) return;
    FW.audio.sfx('click');
    initGame();
    gameRunning = true;
    startBtn.textContent = '游戏中...';
    startBtn.disabled = true;
  }

  function resetGame() {
    FW.audio.sfx('click');
    gameRunning = false;
    startBtn.textContent = '开始';
    startBtn.disabled = false;
    initGame();
  }

  function platformCollision(px, py) {
    for (var j = 0; j < platforms.length; j++) {
      var p = platforms[j];
      if (
        px + PLAYER_W > p.x &&
        px < p.x + p.w &&
        py + PLAYER_H >= p.y &&
        py + PLAYER_H <= p.y + p.h + player.vy + 2
      ) {
        return p;
      }
    }
    return null;
  }

  function update() {
    if (!gameRunning || gameOver) return;

    // Horizontal movement
    if (moveLeft) player.vx = -MOVE_SPEED;
    else if (moveRight) player.vx = MOVE_SPEED;
    else player.vx *= 0.8;

    // Gravity
    player.vy += GRAVITY;
    if (player.vy > 15) player.vy = 15;

    // Move horizontally
    player.x += player.vx;
    if (player.x < 0) player.x = 0;
    if (player.x > W - PLAYER_W) player.x = W - PLAYER_W;

    // Face direction
    if (player.vx > 0.5) player.facing = 1;
    else if (player.vx < -0.5) player.facing = -1;

    // Move vertically
    player.y += player.vy;

    // Platform collision
    player.onGround = false;
    var plat = platformCollision(player.x, player.y);
    if (plat) {
      player.y = plat.y - PLAYER_H;
      player.vy = JUMP_VEL;
      player.onGround = true;
    }

    // Update moving platforms
    for (var k = 0; k < platforms.length; k++) {
      var p = platforms[k];
      if (p.moving) {
        p.x += p.moveDir * p.moveSpeed;
        if (p.x > W - p.w || p.x < 0) {
          p.moveDir *= -1;
        }
      }
    }

    // Track height
    if (player.y < maxHeight) {
      maxHeight = player.y;
      var prevScore = score;
      score = Math.floor(Math.abs(maxHeight) / 5);
      scoreEl.textContent = score;
      heightEl.textContent = Math.floor(Math.abs(maxHeight) / 10);
      if (score > prevScore) {
        FW.audio.sfx('score');
        FW.events.reportScore(score);
      }
    }

    // Camera follows player
    targetCameraY = player.y - H * 0.4;
    cameraY += (targetCameraY - cameraY) * CAMERA_SMOOTH;

    // Generate new platforms ahead
    var highestPlatY = Math.min.apply(Math, platforms.map(function(p) { return p.y; }));
    if (highestPlatY > player.y - H) {
      var newPlats = generatePlatforms(3).map(function(p) {
        return {
          x: p.x, y: p.y - H * 0.5 + Math.random() * -50,
          w: p.w, h: p.h,
          moving: p.moving,
          moveDir: p.moveDir,
          moveSpeed: p.moveSpeed,
          moveRange: p.moveRange
        };
      });
      platforms.push.apply(platforms, newPlats);
    }

    // Remove off-screen platforms
    platforms = platforms.filter(function(p) { return p.y < cameraY + H + 50 && p.y > cameraY - 100; });

    // Create platforms above when player goes up
    var topPlat = Math.min.apply(Math, platforms.map(function(p) { return p.y; }));
    if (topPlat > cameraY - 50) {
      for (var m = 0; m < 2; m++) {
        platforms.push({
          x: Math.random() * (W - PLATFORM_W - 20) + 10,
          y: cameraY - 50 - m * 80 - Math.random() * 30,
          w: PLATFORM_W,
          h: PLATFORM_H,
          moving: Math.random() < 0.15,
          moveDir: 1,
          moveSpeed: 1 + Math.random(),
          moveRange: 40 + Math.random() * 40
        });
      }
    }

    // Falling off screen
    if (player.y > cameraY + H + 50) {
      gameOver = true;
      gameRunning = false;
      if (score > highScore) {
        highScore = score;
        FW.storage.setHighScore(score);
      }
      FW.audio.sfx('gameover');
      FW.events.reportComplete(score, {won: false});
      startBtn.textContent = '再来一局';
      startBtn.disabled = false;
    }
  }

  function drawBackground() {
    // Background gradient
    var grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#0f0f2a');
    grad.addColorStop(0.5, '#1a1a3a');
    grad.addColorStop(1, '#2a1a1a');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);

    // Stars
    ctx.save();
    for (var s = 0; s < stars.length; s++) {
      var star = stars[s];
      var sy = ((star.y - cameraY * 0.1) % (H * 3));
      ctx.globalAlpha = star.a;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.arc(star.x, sy, star.r, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  function drawPlatforms() {
    for (var i = 0; i < platforms.length; i++) {
      var p = platforms[i];
      var px = p.x;
      var py = p.y - cameraY;
      if (py < -20 || py > H + 20) continue;

      // Platform glow
      ctx.shadowColor = p.moving ? '#7c7cff' : '#4a4a6a';
      ctx.shadowBlur = 8;

      // Platform body
      var gradient = ctx.createLinearGradient(px, py, px, py + p.h);
      if (p.moving) {
        gradient.addColorStop(0, '#7c7cff');
        gradient.addColorStop(1, '#4a4aff');
      } else {
        gradient.addColorStop(0, '#4a4a6a');
        gradient.addColorStop(1, '#2a2a4a');
      }
      ctx.fillStyle = gradient;
      ctx.beginPath();
      ctx.roundRect(px, py, p.w, p.h, 4);
      ctx.fill();

      ctx.shadowBlur = 0;

      // Platform highlight
      ctx.fillStyle = 'rgba(255,255,255,0.1)';
      ctx.beginPath();
      ctx.roundRect(px + 4, py + 2, p.w - 8, 3, 2);
      ctx.fill();
    }
  }

  function drawPlayer() {
    var px = player.x;
    var py = player.y - cameraY;

    ctx.save();

    // Shadow
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(px + PLAYER_W / 2, py + PLAYER_H, PLAYER_W / 2 + 2, 4, 0, 0, Math.PI * 2);
    ctx.fill();

    // Body
    ctx.shadowColor = '#7cff7c';
    ctx.shadowBlur = 12;

    var bodyGrad = ctx.createLinearGradient(px, py, px, py + PLAYER_H);
    bodyGrad.addColorStop(0, '#7cff7c');
    bodyGrad.addColorStop(1, '#4caf50');
    ctx.fillStyle = bodyGrad;
    ctx.beginPath();
    ctx.roundRect(px + 2, py + 6, PLAYER_W - 4, PLAYER_H - 6, 6);
    ctx.fill();

    ctx.shadowBlur = 0;

    // Head
    ctx.fillStyle = '#7cff7c';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2, py + 7, 10, 0, Math.PI * 2);
    ctx.fill();

    // Eyes
    var eyeOff = player.facing > 0 ? 2 : -2;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2 - 4 + eyeOff, py + 5, 3, 0, Math.PI * 2);
    ctx.arc(px + PLAYER_W / 2 + 4 + eyeOff, py + 5, 3, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#111';
    ctx.beginPath();
    ctx.arc(px + PLAYER_W / 2 - 4 + eyeOff, py + 5, 1.5, 0, Math.PI * 2);
    ctx.arc(px + PLAYER_W / 2 + 4 + eyeOff, py + 5, 1.5, 0, Math.PI * 2);
    ctx.fill();

    // Hat
    ctx.fillStyle = '#ff7c7c';
    ctx.beginPath();
    ctx.roundRect(px + PLAYER_W / 2 - 9, py - 2, 18, 6, 3);
    ctx.fill();
    ctx.fillStyle = '#ff5252';
    ctx.fillRect(px + PLAYER_W / 2 - 11, py + 4, 22, 3);

    ctx.restore();
  }

  function drawGameOver() {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, W, H);

    ctx.fillStyle = '#ff7c7c';
    ctx.font = 'bold 36px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', W / 2, H / 2 - 30);

    ctx.fillStyle = '#ddd';
    ctx.font = '20px system-ui, -apple-system, sans-serif';
    ctx.fillText('最终分数: ' + score, W / 2, H / 2 + 20);
    ctx.fillStyle = '#888';
    ctx.font = '16px system-ui, -apple-system, sans-serif';
    ctx.fillText('最高分: ' + highScore, W / 2, H / 2 + 48);
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    drawBackground();
    drawPlatforms();
    drawPlayer();

    if (gameOver) {
      drawGameOver();
    }

    // UI height indicator
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '12px system-ui, -apple-system, sans-serif';
    ctx.textAlign = 'left';
    ctx.fillText('高度 ' + Math.floor(Math.abs(maxHeight) / 10), 10, 20);
  }

  function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
  }

  // Input handlers
  document.addEventListener('keydown', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft = true;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight = true;
    if (e.key === ' ' || e.key === 'Space') {
      e.preventDefault();
      if (!gameRunning && !gameOver) startGame();
    }
  });

  document.addEventListener('keyup', function(e) {
    if (e.key === 'ArrowLeft' || e.key === 'a' || e.key === 'A') moveLeft = false;
    if (e.key === 'ArrowRight' || e.key === 'd' || e.key === 'D') moveRight = false;
  });

  // Mobile controls
  var leftBtn = document.getElementById('leftBtn');
  var rightBtn = document.getElementById('rightBtn');

  function setupTouchButton(el, key) {
    function start(e) {
      e.preventDefault();
      if (key === 'left') moveLeft = true;
      if (key === 'right') moveRight = true;
    }
    function end(e) {
      e.preventDefault();
      if (key === 'left') moveLeft = false;
      if (key === 'right') moveRight = false;
    }

    el.addEventListener('touchstart', start);
    el.addEventListener('touchend', end);
    el.addEventListener('touchcancel', end);
    el.addEventListener('mousedown', start);
    el.addEventListener('mouseup', end);
    el.addEventListener('mouseleave', end);
  }

  setupTouchButton(leftBtn, 'left');
  setupTouchButton(rightBtn, 'right');

  // Canvas touch for mobile (tap = start)
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var touch = e.touches[0];
    var rect = canvas.getBoundingClientRect();
    var x = touch.clientX - rect.left;
    if (x < rect.width / 2) moveLeft = true;
    else moveRight = true;
  });
  canvas.addEventListener('touchend', function(e) {
    e.preventDefault();
    moveLeft = false;
    moveRight = false;
  });
  canvas.addEventListener('touchcancel', function(e) {
    moveLeft = false;
    moveRight = false;
  });

  // Buttons
  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchstart', function(e) { e.preventDefault(); startGame(); });
  resetBtn.addEventListener('click', resetGame);
  resetBtn.addEventListener('touchstart', function(e) { e.preventDefault(); resetGame(); });

  // Init
  initGame();
  gameLoop();
})();
</script>
</body>
</html>
