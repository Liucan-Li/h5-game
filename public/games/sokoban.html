<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>推箱子</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"PingFang SC",sans-serif;background:#f5f6fa;color:#2d2d44;min-height:100vh;display:flex;justify-content:center;align-items:center;overflow:hidden;touch-action:manipulation;-webkit-user-select:none;user-select:none}
.game-container{text-align:center;padding:12px;max-width:520px;width:100%}
h1{font-size:1.7rem;margin-bottom:2px;background:linear-gradient(135deg,#4facfe,#00f2fe);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.subtitle{color:#888;font-size:.82rem;margin-bottom:10px}
.stats{display:flex;justify-content:center;gap:16px;margin-bottom:10px}
.stat{background:#fff;border-radius:12px;padding:6px 16px;box-shadow:0 2px 8px rgba(0,0,0,.06);font-size:.85rem}
.stat-label{color:#888;margin-right:4px}
.stat-value{font-weight:700;color:#2d2d44}
canvas{display:block;margin:0 auto;border-radius:12px;background:#f8f6f0;box-shadow:0 4px 20px rgba(0,0,0,.08);touch-action:none;width:100%;max-width:400px}
.level-bar{display:flex;justify-content:center;gap:6px;margin:10px 0;flex-wrap:wrap}
.level-btn{background:#fff;border:none;border-radius:8px;padding:6px 14px;font-size:.82rem;color:#2d2d44;cursor:pointer;box-shadow:0 2px 6px rgba(0,0,0,.06);transition:all .15s;font-weight:500}
.level-btn.active{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;box-shadow:0 3px 10px rgba(79,172,254,.35)}
.level-btn:hover{box-shadow:0 3px 10px rgba(0,0,0,.1);transform:translateY(-1px)}
.controls{display:flex;justify-content:center;gap:8px;margin-top:10px;flex-wrap:wrap}
.btn{background:#fff;border:none;border-radius:10px;padding:8px 18px;font-size:.85rem;color:#2d2d44;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .15s;font-weight:500}
.btn:hover{box-shadow:0 4px 14px rgba(0,0,0,.1);transform:translateY(-1px)}
.btn:active{transform:translateY(0)}
.btn-primary{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff;box-shadow:0 3px 10px rgba(79,172,254,.35)}
.btn-primary:hover{box-shadow:0 5px 16px rgba(79,172,254,.45)}
.btn-warning{background:linear-gradient(135deg,#f093fb,#f5576c);color:#fff;box-shadow:0 3px 10px rgba(245,87,108,.3)}
.dpad{display:grid;grid-template-columns:56px 56px 56px;grid-template-rows:56px 56px 56px;gap:4px;justify-content:center;margin:8px auto 0}
.dpad-btn{background:#fff;border:none;border-radius:12px;font-size:1.4rem;color:#2d2d44;cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.06);transition:all .1s;display:flex;align-items:center;justify-content:center}
.dpad-btn:active{background:#eef0f5;transform:scale(.93)}
.dpad-up{grid-column:2;grid-row:1}
.dpad-left{grid-column:1;grid-row:2}
.dpad-right{grid-column:3;grid-row:2}
.dpad-down{grid-column:2;grid-row:3}
.dpad-center{grid-column:2;grid-row:2;background:transparent;box-shadow:none;cursor:default}
.overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .3s}
.overlay.show{opacity:1;pointer-events:auto}
.overlay-content{background:#fff;border-radius:20px;padding:28px 36px;text-align:center;box-shadow:0 10px 40px rgba(0,0,0,.15);transform:scale(.9);transition:transform .3s}
.overlay.show .overlay-content{transform:scale(1)}
.overlay-content h2{font-size:1.5rem;margin-bottom:6px}
.overlay-content p{color:#888;margin-bottom:16px}
@media(max-width:440px){canvas{max-width:95vw}h1{font-size:1.4rem}.stats{gap:10px}.stat{padding:5px 12px;font-size:.78rem}}
</style>
</head>
<body>
<div class="game-container">
  <h1>推箱子</h1>
  <p class="subtitle">将箱子推到所有目标点上</p>
  <div class="stats">
    <div class="stat"><span class="stat-label">关卡</span><span class="stat-value" id="levelDisplay">1/5</span></div>
    <div class="stat"><span class="stat-label">步数</span><span class="stat-value" id="movesDisplay">0</span></div>
  </div>
  <canvas id="gameCanvas" width="400" height="400"></canvas>
  <div class="level-bar" id="levelBar"></div>
  <div class="controls">
    <button class="btn" id="undoBtn">&#8630; 撤销</button>
    <button class="btn btn-warning" id="resetBtn">&#8635; 重置</button>
  </div>
  <div class="dpad" id="dpad">
    <button class="dpad-btn dpad-up" data-dir="up">&#9650;</button>
    <button class="dpad-btn dpad-left" data-dir="left">&#9664;</button>
    <button class="dpad-btn dpad-center"></button>
    <button class="dpad-btn dpad-right" data-dir="right">&#9654;</button>
    <button class="dpad-btn dpad-down" data-dir="down">&#9660;</button>
  </div>
</div>

<div class="overlay" id="winOverlay">
  <div class="overlay-content">
    <h2>&#127881; 过关!</h2>
    <p id="winMessage">共 0 步</p>
    <div>
      <button class="btn btn-primary" id="nextLevelBtn">下一关</button>
    </div>
  </div>
</div>

<script>
(function(){
  'use strict';

  // ── Level definitions ──
  // Symbols: #=wall  ' '=floor  $=box  .=target  @=player  *=box-on-target  +=player-on-target
  var LEVELS = [
    // Level 1 (1 box, trivial)
    [
      '#####',
      '# . #',
      '#   #',
      '# $ #',
      '# @ #',
      '#####'
    ],
    // Level 2 (2 boxes)
    [
      '######',
      '#  . #',
      '# .$ #',
      '#  $ #',
      '#  @ #',
      '######'
    ],
    // Level 3 (2 boxes, same column)
    [
      '#######',
      '#  .  #',
      '#  $  #',
      '#  .  #',
      '#  $  #',
      '#  @  #',
      '#######'
    ],
    // Level 4 (3 boxes)
    [
      '########',
      '#  .   #',
      '#  $   #',
      '# .$   #',
      '#  $   #',
      '#  .   #',
      '#  @   #',
      '########'
    ],
    // Level 5 (3 boxes, harder)
    [
      '#########',
      '#   .   #',
      '#  .$   #',
      '# $     #',
      '#   $   #',
      '#  .    #',
      '#   @   #',
      '#########'
    ]
  ];

  var CELL, canvas, ctx;
  var currentLevel = 0;
  var grid = [];       // 2D: ' ', '#', '.'
  var rows = 0;
  var cols = 0;
  var playerRow = 0;
  var playerCol = 0;
  var boxes = [];       // [{r, c}]
  var targets = [];     // [{r, c}]
  var moveCount = 0;
  var undoStack = [];   // [{type, boxIdx, fromR, fromC, toR, toC, prevRow, prevCol}]
  var gameWon = false;

  // DOM refs
  var canvasEl = document.getElementById('gameCanvas');
  ctx = canvasEl.getContext('2d');
  var movesDisplay = document.getElementById('movesDisplay');
  var levelDisplay = document.getElementById('levelDisplay');
  var levelBar = document.getElementById('levelBar');
  var winOverlay = document.getElementById('winOverlay');
  var winMessage = document.getElementById('winMessage');

  // ── Parse level ──
  function parseLevel(levelData) {
    grid = [];
    for (var r = 0; r < levelData.length; r++) {
      grid.push(levelData[r].split(''));
    }
    rows = grid.length;
    cols = 0;
    for (var r = 0; r < rows; r++) {
      if (grid[r].length > cols) cols = grid[r].length;
    }
    // Pad rows to uniform width
    for (var r = 0; r < rows; r++) {
      while (grid[r].length < cols) grid[r].push(' ');
    }

    boxes = [];
    targets = [];
    playerRow = 0;
    playerCol = 0;

    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var ch = grid[r][c];
        if (ch === '$' || ch === '*') {
          boxes.push({r: r, c: c});
        }
        if (ch === '.' || ch === '*' || ch === '+') {
          targets.push({r: r, c: c});
        }
        if (ch === '@' || ch === '+') {
          playerRow = r;
          playerCol = c;
        }
        // Normalize: remove dynamic symbols, keep only '.' and ' ' and '#'
        if (ch === '*') grid[r][c] = '.';
        else if (ch === '+' || ch === '$' || ch === '@') grid[r][c] = ' ';
      }
    }

    moveCount = 0;
    undoStack = [];
    gameWon = false;
    updateUI();
  }

  // ── Canvas sizing ──
  function computeCellSize() {
    var maxDim = Math.max(rows, cols);
    var maxPx = 400;
    CELL = Math.floor(maxPx / maxDim);
    if (CELL < 20) CELL = 20;
    canvasEl.width = cols * CELL;
    canvasEl.height = rows * CELL;
  }

  // ── Drawing ──
  function draw() {
    var cs = CELL;
    ctx.clearRect(0, 0, canvasEl.width, canvasEl.height);

    // Background
    ctx.fillStyle = '#f8f6f0';
    ctx.fillRect(0, 0, canvasEl.width, canvasEl.height);

    // Build set of box positions for quick lookup
    var boxSet = {};
    for (var i = 0; i < boxes.length; i++) {
      boxSet[boxes[i].r + ',' + boxes[i].c] = true;
    }
    var targetSet = {};
    for (var i = 0; i < targets.length; i++) {
      targetSet[targets[i].r + ',' + targets[i].c] = true;
    }

    // Draw tiles
    for (var r = 0; r < rows; r++) {
      for (var c = 0; c < cols; c++) {
        var x = c * cs;
        var y = r * cs;
        var ch = grid[r][c];
        var isTarget = targetSet[r + ',' + c];
        var isBox = boxSet[r + ',' + c];

        // Wall or floor
        if (ch === '#') {
          // Wall - brick pattern
          ctx.fillStyle = '#8b7d6b';
          ctx.fillRect(x, y, cs, cs);
          ctx.fillStyle = '#6b5d4b';
          ctx.fillRect(x + 2, y + 2, cs - 4, cs - 4);
          // Brick lines
          ctx.strokeStyle = '#7a6c5a';
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          ctx.moveTo(x + 2, y + cs/2);
          ctx.lineTo(x + cs - 2, y + cs/2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + cs/2, y + 2);
          ctx.lineTo(x + cs/2, y + cs/2 - 1);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + cs/4, y + cs/2 + 1);
          ctx.lineTo(x + cs/4, y + cs - 2);
          ctx.stroke();
          ctx.beginPath();
          ctx.moveTo(x + 3*cs/4, y + cs/2 + 1);
          ctx.lineTo(x + 3*cs/4, y + cs - 2);
          ctx.stroke();
        } else {
          // Floor tile
          ctx.fillStyle = (isTarget && !isBox) ? '#f0ede4' : '#f0ede4';
          ctx.fillRect(x, y, cs, cs);

          // Subtle grid
          ctx.strokeStyle = 'rgba(0,0,0,0.04)';
          ctx.lineWidth = 0.5;
          ctx.strokeRect(x, y, cs, cs);

          // Target marker
          if (isTarget && !isBox) {
            ctx.beginPath();
            ctx.arc(x + cs/2, y + cs/2, cs * 0.13, 0, Math.PI * 2);
            ctx.fillStyle = '#e74c3c';
            ctx.fill();
            ctx.beginPath();
            ctx.arc(x + cs/2, y + cs/2, cs * 0.22, 0, Math.PI * 2);
            ctx.strokeStyle = 'rgba(231,76,60,0.3)';
            ctx.lineWidth = 1.5;
            ctx.stroke();
          }
        }
      }
    }

    // Draw boxes
    for (var i = 0; i < boxes.length; i++) {
      var bx = boxes[i].c * cs;
      var by = boxes[i].r * cs;
      var isOnTarget = targetSet[boxes[i].r + ',' + boxes[i].c];
      var pad = 4;
      var bw = cs - pad * 2;

      // Shadow
      ctx.fillStyle = 'rgba(0,0,0,0.1)';
      ctx.fillRect(bx + pad + 2, by + pad + 3, bw, bw);

      // Box gradient
      var grad = ctx.createLinearGradient(bx + pad, by + pad, bx + pad, by + pad + bw);
      if (isOnTarget) {
        grad.addColorStop(0, '#2ecc71');
        grad.addColorStop(1, '#27ae60');
      } else {
        grad.addColorStop(0, '#d4a056');
        grad.addColorStop(1, '#b8863a');
      }
      ctx.fillStyle = grad;
      ctx.fillRect(bx + pad, by + pad, bw, bw);

      // Border
      ctx.strokeStyle = isOnTarget ? '#1a8a44' : '#8b6914';
      ctx.lineWidth = 1.5;
      ctx.strokeRect(bx + pad, by + pad, bw, bw);

      // Wood grain lines
      ctx.strokeStyle = isOnTarget ? 'rgba(255,255,255,0.2)' : 'rgba(0,0,0,0.08)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      ctx.moveTo(bx + pad, by + cs/2);
      ctx.lineTo(bx + cs - pad, by + cs/2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(bx + cs/2, by + pad);
      ctx.lineTo(bx + cs/2, by + cs - pad);
      ctx.stroke();
    }

    // Draw player
    var px = playerCol * cs + cs / 2;
    var py = playerRow * cs + cs / 2;
    var pr = cs * 0.30;

    // Shadow
    ctx.beginPath();
    ctx.ellipse(px + 1, py + 2, pr, pr * 0.35, 0, 0, Math.PI * 2);
    ctx.fillStyle = 'rgba(0,0,0,0.1)';
    ctx.fill();

    // Body circle
    ctx.beginPath();
    ctx.arc(px, py, pr, 0, Math.PI * 2);
    var pg = ctx.createRadialGradient(px - pr*0.2, py - pr*0.2, 0, px, py, pr);
    pg.addColorStop(0, '#4facfe');
    pg.addColorStop(1, '#2196f3');
    ctx.fillStyle = pg;
    ctx.fill();
    ctx.strokeStyle = '#1976d2';
    ctx.lineWidth = 1.5;
    ctx.stroke();

    // Eyes
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px - pr*0.28, py - pr*0.15, pr*0.16, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + pr*0.28, py - pr*0.15, pr*0.16, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#2d2d44';
    ctx.beginPath();
    ctx.arc(px - pr*0.23, py - pr*0.12, pr*0.09, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(px + pr*0.33, py - pr*0.12, pr*0.09, 0, Math.PI * 2);
    ctx.fill();

    // Smile
    ctx.beginPath();
    ctx.arc(px, py + pr*0.1, pr*0.22, 0.1, Math.PI - 0.1);
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.3;
    ctx.stroke();
  }

  // ── Game logic ──
  function isBoxAt(r, c) {
    for (var i = 0; i < boxes.length; i++) {
      if (boxes[i].r === r && boxes[i].c === c) return i;
    }
    return -1;
  }

  function isWalkable(r, c) {
    if (r < 0 || r >= rows || c < 0 || c >= cols) return false;
    if (grid[r][c] === '#') return false;
    if (isBoxAt(r, c) !== -1) return false;
    return true;
  }

  function move(dr, dc) {
    if (gameWon) return;

    var nr = playerRow + dr;
    var nc = playerCol + dc;

    if (nr < 0 || nr >= rows || nc < 0 || nc >= cols) return;
    if (grid[nr][nc] === '#') return;

    var bi = isBoxAt(nr, nc);
    if (bi !== -1) {
      // Push box
      var br = nr + dr;
      var bc = nc + dc;
      if (br < 0 || br >= rows || bc < 0 || bc >= cols) return;
      if (grid[br][bc] === '#') return;
      if (isBoxAt(br, bc) !== -1) return;

      // Record undo
      undoStack.push({
        type: 'push',
        boxIdx: bi,
        fromR: nr,
        fromC: nc,
        toR: br,
        toC: bc,
        prevRow: playerRow,
        prevCol: playerCol
      });

      boxes[bi] = {r: br, c: bc};
      playerRow = nr;
      playerCol = nc;
      moveCount++;
    } else if (isWalkable(nr, nc)) {
      undoStack.push({
        type: 'move',
        prevRow: playerRow,
        prevCol: playerCol
      });
      playerRow = nr;
      playerCol = nc;
      moveCount++;
    } else {
      return;
    }

    updateUI();
    draw();
    checkWin();
  }

  function undo() {
    if (undoStack.length === 0 || gameWon) return;
    var action = undoStack.pop();

    if (action.type === 'push') {
      boxes[action.boxIdx] = {r: action.fromR, c: action.fromC};
    }
    playerRow = action.prevRow;
    playerCol = action.prevCol;
    moveCount = Math.max(0, moveCount - 1);
    updateUI();
    draw();
  }

  function checkWin() {
    for (var i = 0; i < boxes.length; i++) {
      var onTarget = false;
      for (var j = 0; j < targets.length; j++) {
        if (boxes[i].r === targets[j].r && boxes[i].c === targets[j].c) {
          onTarget = true;
          break;
        }
      }
      if (!onTarget) return;
    }
    gameWon = true;
    winMessage.textContent = '第 ' + (currentLevel + 1) + ' 关完成！共 ' + moveCount + ' 步';
    winOverlay.classList.add('show');
  }

  // ── Level management ──
  function loadLevel(idx) {
    if (idx < 0 || idx >= LEVELS.length) return;
    currentLevel = idx;
    parseLevel(LEVELS[idx]);
    computeCellSize();
    updateLevelBar();
    draw();
  }

  function nextLevel() {
    winOverlay.classList.remove('show');
    if (currentLevel + 1 < LEVELS.length) {
      loadLevel(currentLevel + 1);
    } else {
      loadLevel(0);
    }
  }

  function resetLevel() {
    winOverlay.classList.remove('show');
    loadLevel(currentLevel);
  }

  // ── UI ──
  function updateUI() {
    movesDisplay.textContent = moveCount;
    levelDisplay.textContent = (currentLevel + 1) + '/' + LEVELS.length;
  }

  function updateLevelBar() {
    levelBar.innerHTML = '';
    for (var i = 0; i < LEVELS.length; i++) {
      var btn = document.createElement('button');
      btn.className = 'level-btn' + (i === currentLevel ? ' active' : '');
      btn.textContent = i + 1;
      btn.dataset.index = i;
      (function(idx) {
        btn.addEventListener('click', function() {
          loadLevel(idx);
        });
      })(i);
      levelBar.appendChild(btn);
    }
  }

  // ── Keyboard ──
  document.addEventListener('keydown', function(e) {
    switch (e.key) {
      case 'ArrowUp': case 'w': case 'W': e.preventDefault(); move(-1, 0); break;
      case 'ArrowDown': case 's': case 'S': e.preventDefault(); move(1, 0); break;
      case 'ArrowLeft': case 'a': case 'A': e.preventDefault(); move(0, -1); break;
      case 'ArrowRight': case 'd': case 'D': e.preventDefault(); move(0, 1); break;
      case 'z': case 'Z':
        if (e.ctrlKey || e.metaKey) { e.preventDefault(); undo(); }
        break;
    }
  });

  // ── D-Pad ──
  document.getElementById('dpad').addEventListener('click', function(e) {
    var btn = e.target.closest('[data-dir]');
    if (!btn) return;
    switch (btn.dataset.dir) {
      case 'up': move(-1, 0); break;
      case 'down': move(1, 0); break;
      case 'left': move(0, -1); break;
      case 'right': move(0, 1); break;
    }
  });

  // ── Swipe on canvas ──
  var touchStart = null;
  canvasEl.addEventListener('touchstart', function(e) {
    var t = e.touches[0];
    touchStart = {x: t.clientX, y: t.clientY};
  }, {passive: true});

  canvasEl.addEventListener('touchend', function(e) {
    if (!touchStart) return;
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStart.x;
    var dy = t.clientY - touchStart.y;
    var adx = dx < 0 ? -dx : dx;
    var ady = dy < 0 ? -dy : dy;
    if (adx < 15 && ady < 15) {
      touchStart = null;
      return;
    }
    if (adx > ady) {
      move(0, dx > 0 ? 1 : -1);
    } else {
      move(dy > 0 ? 1 : -1, 0);
    }
    touchStart = null;
  }, {passive: true});

  // ── Button events ──
  document.getElementById('undoBtn').addEventListener('click', undo);
  document.getElementById('resetBtn').addEventListener('click', resetLevel);
  document.getElementById('nextLevelBtn').addEventListener('click', nextLevel);

  // ── Init ──
  loadLevel(0);
})();
</script>
</body>
</html>
