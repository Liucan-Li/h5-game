<!DOCTYPE html>
<html lang="zh-CN" data-game-id="snake-io">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Snake.io</title>
<link rel="stylesheet" href="framework.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--fw-bg, #1a1a2e); color: var(--fw-text, #e0e0e0); font-family: var(--fw-font, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif);
    display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 16px;
    -webkit-user-select: none; user-select: none; touch-action: none;
  }
  .fw-container { text-align: center; width: 100%; max-width: 450px; }
  .fw-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
  .fw-title { font-size: 1.8em; font-weight: 800; background: linear-gradient(135deg, #00b894, #00cec9); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .fw-score-box { background: var(--fw-surface, #16213e); padding: 6px 14px; border-radius: 8px; min-width: 70px; }
  .score-label { font-size: 0.7em; color: #7f8c8d; }
  .score-value { font-size: 1.3em; font-weight: 700; color: #fff; }
  canvas {
    display: block; width: 100%; aspect-ratio: 1; background: #0f3460;
    border-radius: 12px; touch-action: none;
  }
  .controls { display: flex; gap: 8px; justify-content: center; margin-top: 12px; }
  .controls button {
    width: 60px; height: 60px; border-radius: 12px; border: none;
    background: var(--fw-surface, #16213e); color: var(--fw-text, #e0e0e0); font-size: 1.5em; cursor: pointer;
    transition: background 0.15s; touch-action: manipulation;
  }
  .controls button:active { background: #0f3460; }
  .fw-overlay {
    position: absolute; inset: 0; display: none; flex-direction: column;
    align-items: center; justify-content: center; background: rgba(0,0,0,0.7);
    border-radius: 12px; z-index: 10;
  }
  .fw-overlay.active { display: flex; }
  .fw-overlay h2 { font-size: 1.8em; color: #fff; margin-bottom: 8px; }
  .fw-overlay p { color: #ccc; margin-bottom: 16px; }
  .fw-overlay button {
    background: linear-gradient(135deg, #00b894, #00cec9); color: #1a1a2e;
    border: none; padding: 10px 28px; border-radius: 8px; font-size: 1em;
    font-weight: 700; cursor: pointer;
  }
  .game-wrapper { position: relative; }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <h1 class="fw-title">Snake.io</h1>
    <div class="fw-score-box"><div class="score-label">长度</div><div class="score-value" id="score">3</div></div>
  </div>
  <div class="game-wrapper">
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <div class="fw-overlay" id="overlay">
      <h2 id="overlayTitle">游戏结束</h2>
      <p id="overlayScore">长度：3</p>
      <button id="restartBtn">重新开始</button>
    </div>
  </div>
  <div class="controls">
    <button data-dir="up">↑</button>
    <button data-dir="left">←</button>
    <button data-dir="down">↓</button>
    <button data-dir="right">→</button>
  </div>
  <div style="color:var(--fw-muted, #7f8c8d);font-size:0.8em;margin-top:12px;">使用方向键或点击按钮控制蛇移动</div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var canvas = document.getElementById('gameCanvas');
  var ctx = canvas.getContext('2d');
  var scoreEl = document.getElementById('score');
  var overlay = document.getElementById('overlay');
  var overlayTitle = document.getElementById('overlayTitle');
  var overlayScore = document.getElementById('overlayScore');

  var GRID_SIZE = 20;
  var CELL_SIZE = canvas.width / GRID_SIZE;
  var snake, food, direction, nextDirection, score, gameOver, gameLoop;

  function init() {
    snake = [{x:10,y:10},{x:9,y:10},{x:8,y:10}];
    direction = 'right'; nextDirection = 'right';
    score = 3; gameOver = false;
    overlay.classList.remove('active');
    spawnFood();
    updateScore();
    if (gameLoop) clearInterval(gameLoop);
    gameLoop = setInterval(tick, 150);
    if (typeof FW !== 'undefined') {
      FW.audio.sfx('select');
    }
  }

  function spawnFood() {
    while (true) {
      food = {x: Math.floor(Math.random()*GRID_SIZE), y: Math.floor(Math.random()*GRID_SIZE)};
      if (!snake.some(function(s) { return s.x===food.x && s.y===food.y; })) break;
    }
  }

  function tick() {
    if (gameOver) return;
    direction = nextDirection;
    var head = {x: snake[0].x, y: snake[0].y};
    switch (direction) {
      case 'up': head.y--; break;
      case 'down': head.y++; break;
      case 'left': head.x--; break;
      case 'right': head.x++; break;
    }
    if (head.x < 0 || head.x >= GRID_SIZE || head.y < 0 || head.y >= GRID_SIZE ||
        snake.some(function(s) { return s.x===head.x && s.y===head.y; })) {
      gameOver = true;
      overlayTitle.textContent = '游戏结束';
      overlayScore.textContent = '长度：' + score;
      overlay.classList.add('active');
      clearInterval(gameLoop);
      render();
      if (typeof FW !== 'undefined') {
        FW.audio.sfx('gameover');
        FW.storage.setHighScore(score);
        FW.events.reportScore(score);
        FW.events.reportComplete(score, {won: false});
      }
      return;
    }
    snake.unshift(head);
    if (head.x === food.x && head.y === food.y) {
      score++;
      updateScore();
      spawnFood();
      if (typeof FW !== 'undefined') {
        FW.audio.sfx('score');
      }
    } else {
      snake.pop();
    }
    render();
  }

  function updateScore() { scoreEl.textContent = score; }

  function render() {
    ctx.fillStyle = '#0f3460';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    // Grid
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (var i=0; i<=GRID_SIZE; i++) {
      ctx.beginPath(); ctx.moveTo(i*CELL_SIZE,0); ctx.lineTo(i*CELL_SIZE,canvas.height); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(0,i*CELL_SIZE); ctx.lineTo(canvas.width,i*CELL_SIZE); ctx.stroke();
    }
    // Snake
    snake.forEach(function(s, i) {
      var ratio = 1 - i / snake.length * 0.5;
      var g = Math.floor(200 * ratio);
      ctx.fillStyle = 'rgb(0, ' + g + ', ' + (140 + Math.floor(55 * ratio)) + ')';
      ctx.beginPath();
      ctx.roundRect(s.x*CELL_SIZE+2, s.y*CELL_SIZE+2, CELL_SIZE-4, CELL_SIZE-4, 4);
      ctx.fill();
    });
    // Eyes on head
    var head = snake[0];
    ctx.fillStyle = '#fff';
    var ex = head.x*CELL_SIZE, ey = head.y*CELL_SIZE;
    ctx.beginPath(); ctx.arc(ex+12, ey+8, 3, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+28, ey+8, 3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#1a1a2e';
    ctx.beginPath(); ctx.arc(ex+12, ey+8, 1.5, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(ex+28, ey+8, 1.5, 0, Math.PI*2); ctx.fill();
    // Food
    ctx.fillStyle = '#e74c3c';
    ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2, food.y*CELL_SIZE+CELL_SIZE/2, CELL_SIZE/2-3, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#c0392b';
    ctx.beginPath(); ctx.arc(food.x*CELL_SIZE+CELL_SIZE/2-2, food.y*CELL_SIZE+CELL_SIZE/2-2, 3, 0, Math.PI*2); ctx.fill();
  }

  document.addEventListener('keydown', function(e) {
    var map = {ArrowUp:'up',ArrowDown:'down',ArrowLeft:'left',ArrowRight:'right'};
    var dir = map[e.key];
    if (dir) { e.preventDefault(); setDirection(dir); }
  });

  document.querySelectorAll('.controls button').forEach(function(btn) {
    btn.addEventListener('click', function() {
      if (typeof FW !== 'undefined') FW.audio.sfx('click');
      setDirection(btn.dataset.dir);
    });
  });

  function setDirection(dir) {
    if (gameOver) return;
    var opposites = {up:'down',down:'up',left:'right',right:'left'};
    if (opposites[dir] !== direction) nextDirection = dir;
  }

  var touchStartX, touchStartY;
  canvas.addEventListener('touchstart', function(e) {
    var t = e.touches[0]; touchStartX = t.clientX; touchStartY = t.clientY;
  }, {passive: true});
  canvas.addEventListener('touchend', function(e) {
    var t = e.changedTouches[0];
    var dx = t.clientX - touchStartX, dy = t.clientY - touchStartY;
    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
    if (Math.abs(dx) > Math.abs(dy)) setDirection(dx > 0 ? 'right' : 'left');
    else setDirection(dy > 0 ? 'down' : 'up');
  }, {passive: true});

  document.getElementById('restartBtn').addEventListener('click', function() {
    if (typeof FW !== 'undefined') FW.audio.sfx('click');
    init();
  });
  init();
})();
</script>
</body>
</html>
