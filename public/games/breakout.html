<!DOCTYPE html>
<html lang="zh-CN" data-game-id="breakout">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Breakout</title>
<link rel="stylesheet" href="framework.css">
<style>
  #gameCanvas {
    display: block; width: 100%; aspect-ratio: 3/4; max-height: 80vh;
    margin: 0 auto; border-radius: var(--radius-lg); background: var(--game-bg);
  }
  .lives { display: flex; gap: 4px; justify-content: center; margin-bottom: 8px; }
  .heart { color: #e86a6a; font-size: 1.2em; }
  .fw-score-box { min-width: 85px; }
</style>
</head>
<body>
<div class="fw-container fw-cat-arcade">
  <div class="fw-header">
    <h1 class="fw-title">打砖块</h1>
    <div class="fw-score-box"><div class="fw-score-label">分数</div><div class="fw-score-value" id="score">0</div><div style="margin-top:2px;font-size:0.65em;color:var(--text-muted)">最高 <span id="hiScore">0</span></div></div>
  </div>
  <div class="lives" id="livesDisplay"></div>
  <canvas id="gameCanvas" width="360" height="480"></canvas>
  <div style="margin-top:10px;display:flex;gap:8px;justify-content:center;">
    <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
    <button class="fw-btn fw-btn-ghost" id="resetBtn">重置</button>
  </div>
  <div class="fw-status">← → 方向键 / 拖动控制挡板</div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  const FW = window.GameFramework;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const scoreEl = document.getElementById('score');
  const hiEl = document.getElementById('hiScore');
  const startBtn = document.getElementById('startBtn');
  const resetBtn = document.getElementById('resetBtn');
  const livesDisplay = document.getElementById('livesDisplay');

  const COLS = 8, ROWS = 5;
  let W, H;
  let ball, paddle, bricks;
  let score, lives;
  let gameRunning, gameOver, gameWon;
  let animationId, keys = {};

  const PADDLE_W = 80, PADDLE_H = 12, BALL_R = 6;
  const BRICK_W = 40, BRICK_H = 16, BRICK_PAD = 4, BRICK_TOP = 40;
  const BRICK_LEFT = (360 - (COLS * (BRICK_W + BRICK_PAD) - BRICK_PAD)) / 2;
  const PADDLE_Y_OFFSET = 40;
  const BRICK_COLORS = ['#e86a6a','#f39c12','#f1c40f','#4ecca3','#60a5fa','#a78bfa','#ff6b9d','#00d2ff'];

  hiEl.textContent = FW.storage.getHighScore();

  function init() {
    W = canvas.width; H = canvas.height;
    paddle = { x: W / 2 - PADDLE_W / 2, y: H - PADDLE_Y_OFFSET, w: PADDLE_W, h: PADDLE_H };
    ball = { x: W / 2, y: H - PADDLE_Y_OFFSET - BALL_R - 2, r: BALL_R, dx: 3 * (Math.random() > 0.5 ? 1 : -1), dy: -3, speed: 3 };
    bricks = [];
    for (let r = 0; r < ROWS; r++) {
      for (let c = 0; c < COLS; c++) {
        bricks.push({ x: BRICK_LEFT + c * (BRICK_W + BRICK_PAD), y: BRICK_TOP + r * (BRICK_H + BRICK_PAD), w: BRICK_W, h: BRICK_H, alive: true, color: BRICK_COLORS[c % BRICK_COLORS.length], row: r });
      }
    }
    score = 0; lives = 3;
    gameRunning = false; gameOver = false; gameWon = false;
    scoreEl.textContent = '0';
    updateLives(); draw();
  }

  function updateLives() {
    livesDisplay.innerHTML = '';
    for (let i = 0; i < lives; i++) {
      var s = document.createElement('span'); s.className = 'heart'; s.textContent = '♥'; livesDisplay.appendChild(s);
    }
  }

  function startGame() {
    if (gameRunning) return;
    if (gameOver || gameWon) { init(); }
    gameRunning = true; gameOver = false; gameWon = false;
    startBtn.textContent = '游戏中...';
    if (animationId) cancelAnimationFrame(animationId);
    animate();
  }

  function animate() {
    if (!gameRunning) return;
    if (keys['ArrowLeft']) paddle.x = Math.max(0, paddle.x - 6);
    if (keys['ArrowRight']) paddle.x = Math.min(W - paddle.w, paddle.x + 6);
    update(); draw();
    if (!gameOver && !gameWon) { animationId = requestAnimationFrame(animate); }
  }

  function update() {
    ball.x += ball.dx; ball.y += ball.dy;
    if (ball.x - ball.r < 0) { ball.x = ball.r; ball.dx = -ball.dx; }
    if (ball.x + ball.r > W) { ball.x = W - ball.r; ball.dx = -ball.dx; }
    if (ball.y - ball.r < 0) { ball.y = ball.r; ball.dy = -ball.dy; }
    if (ball.y + ball.r > H) {
      lives--; updateLives(); FW.audio.sfx('bump');
      if (lives <= 0) {
        gameRunning = false; gameOver = true; startBtn.textContent = '游戏结束';
        endGame(); draw(); return;
      }
      ball.x = W / 2; ball.y = H - PADDLE_Y_OFFSET - BALL_R - 2;
      ball.dx = 3 * (Math.random() > 0.5 ? 1 : -1); ball.dy = -3;
      return;
    }
    if (ball.dy > 0 && ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 4 && ball.x >= paddle.x - ball.r && ball.x <= paddle.x + paddle.w + ball.r) {
      ball.dy = -ball.dy;
      const hit = (ball.x - (paddle.x + paddle.w / 2)) / (paddle.w / 2);
      ball.dx = hit * ball.speed * 1.2;
      if (Math.abs(ball.dx) < 0.5) ball.dx = 0.5 * (ball.dx >= 0 ? 1 : -1);
      ball.y = paddle.y - ball.r;
      FW.audio.sfx('click');
    }
    for (const brick of bricks) {
      if (!brick.alive) continue;
      if (ball.x + ball.r > brick.x && ball.x - ball.r < brick.x + brick.w && ball.y + ball.r > brick.y && ball.y - ball.r < brick.y + brick.h) {
        brick.alive = false;
        score += 10 * (ROWS - brick.row);
        scoreEl.textContent = score;
        FW.audio.sfx('score');
        FW.events.reportScore(score);
        const overlapLeft = (ball.x + ball.r) - brick.x;
        const overlapRight = (brick.x + brick.w) - (ball.x - ball.r);
        const overlapTop = (ball.y + ball.r) - brick.y;
        const overlapBottom = (brick.y + brick.h) - (ball.y - ball.r);
        if (Math.min(overlapLeft, overlapRight) < Math.min(overlapTop, overlapBottom)) { ball.dx = -ball.dx; }
        else { ball.dy = -ball.dy; }
        if (bricks.every(function(b) { return !b.alive; })) {
          gameRunning = false; gameWon = true; startBtn.textContent = '你赢了！';
          endGame();
        }
        break;
      }
    }
  }

  function endGame() {
    var isNew = FW.storage.setHighScore(score);
    hiEl.textContent = FW.storage.getHighScore();
    if (gameWon) FW.audio.sfx('win');
    else FW.audio.sfx('gameover');
    FW.events.reportComplete(score, { won: gameWon });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);
    ctx.fillStyle = '#0f3460'; ctx.fillRect(0, 0, W, H);
    for (const brick of bricks) {
      if (!brick.alive) continue;
      ctx.fillStyle = brick.color;
      ctx.beginPath(); ctx.roundRect(brick.x, brick.y, brick.w, brick.h, 3); ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.fillRect(brick.x + 2, brick.y + 2, brick.w - 4, brick.h * 0.3);
    }
    const grad = ctx.createLinearGradient(paddle.x, paddle.y, paddle.x, paddle.y + paddle.h);
    grad.addColorStop(0, '#e86a6a'); grad.addColorStop(1, '#d63031');
    ctx.fillStyle = grad;
    ctx.beginPath(); ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 6); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2); ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.beginPath(); ctx.arc(ball.x - ball.r * 0.3, ball.y - ball.r * 0.3, ball.r * 0.35, 0, Math.PI * 2); ctx.fill();
    if (gameOver) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#e86a6a'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('游戏结束', W / 2, H / 2 - 10);
      ctx.fillStyle = '#ccc'; ctx.font = '18px sans-serif'; ctx.fillText('分数: ' + score, W / 2, H / 2 + 30);
    } else if (gameWon) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 0, W, H);
      ctx.fillStyle = '#4ecca3'; ctx.font = 'bold 36px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('你赢了！', W / 2, H / 2 - 10);
      ctx.fillStyle = '#ccc'; ctx.font = '18px sans-serif'; ctx.fillText('分数: ' + score, W / 2, H / 2 + 30);
    }
  }

  // Keyboard via framework
  FW.input.onKey(function(key, pressed, e) {
    if (key === 'ArrowLeft') { e.preventDefault(); keys['ArrowLeft'] = pressed; }
    if (key === 'ArrowRight') { e.preventDefault(); keys['ArrowRight'] = pressed; }
  });

  // Mouse control
  var mouseX = 0;
  canvas.addEventListener('mousemove', function(e) {
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.clientX - rect.left) * (canvas.width / rect.width);
    if (gameRunning) paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
  });

  // Touch control
  canvas.addEventListener('touchstart', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    if (gameRunning) paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
  }, { passive: false });

  canvas.addEventListener('touchmove', function(e) {
    e.preventDefault();
    var rect = canvas.getBoundingClientRect();
    mouseX = (e.touches[0].clientX - rect.left) * (canvas.width / rect.width);
    if (gameRunning) paddle.x = Math.max(0, Math.min(W - paddle.w, mouseX - paddle.w / 2));
  }, { passive: false });

  startBtn.addEventListener('click', startGame);
  resetBtn.addEventListener('click', function() {
    if (animationId) cancelAnimationFrame(animationId);
    gameRunning = false; startBtn.textContent = '开始游戏'; init();
  });

  // roundRect
  if (!CanvasRenderingContext2D.prototype.roundRect) {
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (r > w / 2) r = w / 2; if (r > h / 2) r = h / 2;
      this.moveTo(x + r, y); this.lineTo(x + w - r, y); this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r); this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h); this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r); this.quadraticCurveTo(x, y, x + r, y); return this;
    };
  }

  init();
  function resizeCanvas() {
    var container = canvas.parentElement;
    var w = container.clientWidth;
    canvas.style.width = w + 'px'; canvas.style.height = (w * 4 / 3) + 'px';
  }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
})();
</script>
</body>
</html>
