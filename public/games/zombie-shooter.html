<!DOCTYPE html>
<html lang="zh-CN" data-game-id="zombie-shooter">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Zombie Shooter</title>
<link rel="stylesheet" href="framework.css">
<style>canvas{cursor:crosshair}</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header"><h1 class="fw-title">🧟 Zombie Shooter</h1>
    <div class="fw-scores">
      <div class="fw-score-box"><div class="fw-score-label">击杀</div><div class="fw-score-value" id="score">0</div></div>
      <div class="fw-score-box"><div class="fw-score-label">❤️</div><div class="fw-score-value" id="lives">5</div></div>
      <div class="fw-score-box"><div class="fw-score-label">🌊</div><div class="fw-score-value" id="wave">1</div></div>
    </div>
  </div>
  <div class="fw-game-area">
    <canvas class="fw-canvas" id="gc" width="400" height="400" style="cursor:crosshair"></canvas>
    <div class="fw-overlay" id="overlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title" id="ot">游戏结束</div>
        <div class="fw-overlay-text" id="os">击杀：0</div>
        <button class="fw-btn fw-btn-primary" id="rb">重新开始</button>
      </div>
    </div>
  </div>
  <div class="fw-status">点击/触摸射击僵尸，WASD 移动</div>
</div>
<script src="framework.js"></script>
<script>
(function(){
  var FW = window.GameFramework;
  var c=document.getElementById('gc'),ctx=c.getContext('2d');
  var sd=document.getElementById('score'),ld=document.getElementById('lives');
  var wd=document.getElementById('wave'),ov=document.getElementById('overlay');
  var ot=document.getElementById('ot'),os=document.getElementById('os');

  var W=400;
  var player,zombies,bullets,score,lives,wave,gameOver,frame,spawnTimer,zombiesInWave,zombiesSpawned,waveActive;
  var keys={},mx,my;

  function init(){
    player={x:200,y:200,size:12,speed:2};
    zombies=[];bullets=[];
    score=0;lives=5;wave=0;gameOver=false;frame=0;
    spawnTimer=0;zombiesSpawned=0;waveActive=true;
    wave=1;zombiesInWave=5;zombiesSpawned=0;
    ov.classList.remove('active');
    updateHUD();
    requestAnimationFrame(loop);
  }

  function updateHUD(){sd.textContent=score;ld.textContent=lives;wd.textContent=wave;}

  function shoot(tx,ty){
    if(gameOver)return;
    FW.audio.sfx('click');
    var dx=tx-player.x,dy=ty-player.y;
    var dist=Math.hypot(dx,dy);
    if(dist===0)return;
    bullets.push({x:player.x,y:player.y,dx:dx/dist,dy:dy/dist,speed:6,life:0});
  }

  function loop(){
    if(gameOver)return;
    frame++;
    var speedBoost=1+wave*0.1;

    // Player movement
    var px=0,py=0;
    if(keys['w']||keys['ArrowUp'])py=-1;
    if(keys['s']||keys['ArrowDown'])py=1;
    if(keys['a']||keys['ArrowLeft'])px=-1;
    if(keys['d']||keys['ArrowRight'])px=1;
    if(px&&py){px*=0.707;py*=0.707;}
    player.x+=px*player.speed*speedBoost;
    player.y+=py*player.speed*speedBoost;
    player.x=Math.max(player.size,Math.min(W-player.size,player.x));
    player.y=Math.max(player.size,Math.min(W-player.size,player.y));

    // Spawn zombies
    if(waveActive){
      spawnTimer++;
      var rate=Math.max(10,50-wave*2);
      if(spawnTimer>rate&&zombiesSpawned<zombiesInWave){
        var side=Math.floor(Math.random()*4);
        var x,y;
        if(side===0){x=Math.random()*W;y=-20;}
        else if(side===1){x=W+20;y=Math.random()*W;}
        else if(side===2){x=Math.random()*W;y=W+20;}
        else{x=-20;y=Math.random()*W;}
        zombies.push({x:x,y:y,size:14,hp:20+wave*5,speed:0.5+wave*0.08,damage:1});
        zombiesSpawned++;spawnTimer=0;
      }
    }

    // Move zombies toward player
    zombies.forEach(function(z){
      var dx=player.x-z.x,dy=player.y-z.y;
      var dist=Math.hypot(dx,dy);
      if(dist>0){z.x+=dx/dist*z.speed;z.y+=dy/dist*z.speed;}
    });

    // Zombie-player collision
    zombies.forEach(function(z){
      if(Math.hypot(z.x-player.x,z.y-player.y)<player.size+z.size){
        lives-=z.damage;
        if(lives<=0){
          gameOver=true;
          FW.audio.sfx('gameover');
          FW.storage.setHighScore(score);
          FW.events.reportComplete(score,{won:false});
          ot.textContent='💀 你被感染了！';os.textContent='击杀：'+score+' 第 '+wave+' 波  最高分：'+FW.storage.getHighScore();
          ov.classList.add('active');
        }
        updateHUD();
      }
    });

    // Move bullets
    bullets=bullets.filter(function(b){
      b.x+=b.dx*b.speed;b.y+=b.dy*b.speed;b.life++;
      if(b.life>60||b.x<0||b.x>W||b.y<0||b.y>W)return false;
      var hit=false;
      zombies=zombies.filter(function(z){
        if(Math.hypot(b.x-z.x,b.y-z.y)<z.size){
          z.hp-=15;
          if(z.hp<=0){score++;FW.audio.sfx('score');FW.events.reportScore(score);hit=true;return false;}
          return true;
        }
        return true;
      });
      return !hit;
    });

    // Wave check
    if(waveActive&&zombiesSpawned>=zombiesInWave&&zombies.length===0){
      waveActive=false;
      wave++;zombiesInWave=5+wave*3;
      setTimeout(function(){if(!gameOver){FW.audio.sfx('win');waveActive=true;zombiesSpawned=0;spawnTimer=0;}},2000);
    }

    updateHUD();
    render();
    requestAnimationFrame(loop);
  }

  function render(){
    ctx.fillStyle='#1a1a2e';ctx.fillRect(0,0,W,W);
    // Ground texture
    for(var i=0;i<20;i++)for(var j=0;j<20;j++){
      ctx.fillStyle=(i+j)%2===0?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.02)';
      ctx.fillRect(i*20,j*20,20,20);
    }
    // Zombies
    zombies.forEach(function(z){
      ctx.fillStyle='#4a7c59';
      ctx.beginPath();ctx.arc(z.x,z.y,z.size,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#3d6b4b';
      ctx.beginPath();ctx.arc(z.x-4,z.y-4,4,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#e74c3c';
      ctx.beginPath();ctx.arc(z.x-5,z.y-5,2,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(z.x+5,z.y-5,2,0,Math.PI*2);ctx.fill();
      // HP bar
      if(z.hp<20+wave*5){
        var bw=30,bh=3;
        ctx.fillStyle='#333';ctx.fillRect(z.x-bw/2,z.y-22,bw,bh);
        ctx.fillStyle='#e74c3c';ctx.fillRect(z.x-bw/2,z.y-22,bw*(z.hp/(20+wave*5)),bh);
      }
    });
    // Player
    ctx.fillStyle='#00cec9';
    ctx.beginPath();ctx.arc(player.x,player.y,player.size,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff';
    ctx.beginPath();ctx.arc(player.x-4,player.y-3,3,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(player.x+4,player.y-3,3,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#1a1a2e';
    ctx.beginPath();ctx.arc(player.x-4,player.y-3,1.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(player.x+4,player.y-3,1.5,0,Math.PI*2);ctx.fill();
    // Bullets
    ctx.fillStyle='#f1c40f';bullets.forEach(function(b){ctx.beginPath();ctx.arc(b.x,b.y,3,0,Math.PI*2);ctx.fill();});
    // Crosshair
    ctx.strokeStyle='rgba(255,255,255,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(mx,my,8,0,Math.PI*2);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx-12,my);ctx.lineTo(mx-5,my);ctx.moveTo(mx+5,my);ctx.lineTo(mx+12,my);ctx.stroke();
    ctx.beginPath();ctx.moveTo(mx,my-12);ctx.lineTo(mx,my-5);ctx.moveTo(mx,my+5);ctx.lineTo(mx,my+12);ctx.stroke();
  }

  c.addEventListener('click',function(e){
    var r=c.getBoundingClientRect();
    shoot((e.clientX-r.left)/r.width*W,(e.clientY-r.top)/r.height*W);
  });
  c.addEventListener('touchstart',function(e){
    e.preventDefault();
    var r=c.getBoundingClientRect(),t=e.touches[0];
    shoot((t.clientX-r.left)/r.width*W,(t.clientY-r.top)/r.height*W);
  },{passive:false});
  c.addEventListener('mousemove',function(e){
    var r=c.getBoundingClientRect();
    mx=(e.clientX-r.left)/r.width*W;my=(e.clientY-r.top)/r.height*W;
  });

  document.addEventListener('keydown',function(e){keys[e.key]=true;if(e.key===' ')e.preventDefault();});
  document.addEventListener('keyup',function(e){keys[e.key]=false;});

  document.getElementById('rb').addEventListener('click',init);
  init();
})();
</script>
</body>
</html>
