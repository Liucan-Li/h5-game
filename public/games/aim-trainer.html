<!DOCTYPE html>
<html lang="zh-CN" data-game-id="aim-trainer">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>瞄准射击</title>
<link rel="stylesheet" href="framework.css">
<style>
/* Keep overlays inside game area (override fw-overlay fixed positioning) */
.fw-game-area > .fw-overlay {
  position: absolute;
  border-radius: var(--radius-lg);
}
/* Result stats text styling */
.fw-overlay-text .label { color: var(--text-muted); }
.fw-overlay-text .value { font-weight: 700; color: var(--text-primary); }
</style>
</head>
<body>
<div class="fw-container">
  <div class="fw-header">
    <div class="fw-title">瞄准射击</div>
    <div class="fw-scores">
      <div class="fw-score-box">
        <div class="fw-score-label">得分</div>
        <div class="fw-score-value" id="scoreDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">命中</div>
        <div class="fw-score-value" id="hitDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">未中</div>
        <div class="fw-score-value" id="missDisplay">0</div>
      </div>
      <div class="fw-score-box">
        <div class="fw-score-label">时间</div>
        <div class="fw-score-value" id="timeDisplay">30</div>
      </div>
    </div>
  </div>
  <div class="fw-game-area" id="canvasWrap">
    <canvas id="gameCanvas" class="fw-canvas" width="480" height="480"></canvas>
    <div class="fw-overlay active" id="startOverlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title">瞄准射击</div>
        <div class="fw-overlay-text">
          <p>点击靶心得分，环数越高分数越高</p>
          <p style="font-size:0.85em;color:var(--text-muted);margin-top:4px;">30秒限时挑战</p>
        </div>
        <button class="fw-btn fw-btn-primary" id="startBtn">开始游戏</button>
      </div>
    </div>
    <div class="fw-overlay" id="endOverlay">
      <div class="fw-overlay-box">
        <div class="fw-overlay-title">时间到！</div>
        <div class="fw-overlay-text" id="resultStats"></div>
        <button class="fw-btn fw-btn-primary" id="replayBtn">再来一局</button>
      </div>
    </div>
  </div>
</div>
<script src="framework.js"></script>
<script>
(function() {
  'use strict';

  const FW = window.GameFramework;
  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  const W = 480, H = 480;

  const scoreDisplay = document.getElementById('scoreDisplay');
  const hitDisplay = document.getElementById('hitDisplay');
  const missDisplay = document.getElementById('missDisplay');
  const timeDisplay = document.getElementById('timeDisplay');
  const startOverlay = document.getElementById('startOverlay');
  const endOverlay = document.getElementById('endOverlay');
  const resultStats = document.getElementById('resultStats');
  const startBtn = document.getElementById('startBtn');
  const replayBtn = document.getElementById('replayBtn');

  const ROUND_TIME = 30;
  const BASE_TARGET_RADIUS = 32;
  const BASE_TARGET_DURATION = 1800;
  const MAX_TARGETS = 6;

  let state = 'menu'; // menu | playing | ended
  let score = 0;
  let hits = 0;
  let misses = 0;
  let timeLeft = ROUND_TIME;
  let targets = [];
  let particles = [];
  let missIndicators = [];
  let spawnTimer = 0;
  let spawnInterval = 700;
  let highScore = FW.storage.getHighScore();
  let animFrameId = null;
  let timerInterval = null;

  // --- Utility ---
  function rand(min, max) { return Math.random() * (max - min) + min; }
  function randInt(min, max) { return Math.floor(rand(min, max + 1)); }
  function dist(x1, y1, x2, y2) { return Math.hypot(x2 - x1, y2 - y1); }

  // --- Target ---
  function createTarget() {
    var difficulty = score / 50;
    var radius = Math.max(10, BASE_TARGET_RADIUS - difficulty * 3);
    var duration = Math.max(600, BASE_TARGET_DURATION - difficulty * 60);
    var padding = radius + 10;
    var x = rand(padding, W - padding);
    var y = rand(padding, H - padding);
    return {
      x: x, y: y,
      radius: radius,
      maxRadius: radius,
      duration: duration,
      elapsed: 0,
      alive: true,
      opacity: 1,
      ring1: radius * 0.85,
      ring2: radius * 0.55,
      bullseye: radius * 0.3
    };
  }

  function spawnTargets() {
    targets = targets.filter(function(t) { return t.alive; });
    var maxNow = Math.min(MAX_TARGETS, 3 + Math.floor(score / 30));
    if (targets.length < maxNow) {
      targets.push(createTarget());
    }
  }

  // --- Particles ---
  function spawnBurst(x, y, color, count) {
    count = count || 18;
    for (var i = 0; i < count; i++) {
      var angle = rand(0, Math.PI * 2);
      var speed = rand(1.5, 5);
      particles.push({
        x: x, y: y,
        vx: Math.cos(angle) * speed,
        vy: Math.sin(angle) * speed,
        radius: rand(2, 6),
        life: 1,
        decay: rand(0.015, 0.04),
        color: color || '#4361ee'
      });
    }
  }

  function spawnMiss(x, y) {
    missIndicators.push({ x: x, y: y, life: 1, decay: 0.035 });
  }

  // --- Hit detection ---
  function handleShot(px, py) {
    if (state !== 'playing') return;
    var hit = false;
    for (var i = targets.length - 1; i >= 0; i--) {
      var t = targets[i];
      if (!t.alive) continue;
      var d = dist(px, py, t.x, t.y);
      if (d <= t.radius) {
        // Hit! Determine ring
        var points = 10;
        var color = '#ff6b6b';
        if (d <= t.bullseye) { points = 50; color = '#ff2d2d'; }
        else if (d <= t.ring2) { points = 30; color = '#ff6b6b'; }
        else if (d <= t.ring1) { points = 20; color = '#ffa94d'; }
        score += points;
        hits++;
        t.alive = false;
        spawnBurst(t.x, t.y, color, 22);
        hit = true;
        FW.audio.sfx('score');
        break;
      }
    }
    if (!hit) {
      misses++;
      spawnMiss(px, py);
      FW.audio.sfx('click');
    }
  }

  // --- Game loop ---
  function update(dt) {
    // Update targets
    for (var i = 0; i < targets.length; i++) {
      var t = targets[i];
      if (!t.alive) continue;
      t.elapsed += dt;
      if (t.elapsed >= t.duration) {
        t.alive = false;
        misses++;
      }
    }
    targets = targets.filter(function(t) { return t.alive; });

    // Spawn
    spawnTimer += dt;
    if (spawnTimer >= spawnInterval) {
      spawnTimer = 0;
      spawnTargets();
    }
    var diff = score / 50;
    spawnInterval = Math.max(300, 700 - diff * 30);

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.06;
      p.life -= p.decay;
    }
    particles = particles.filter(function(p) { return p.life > 0; });

    // Miss indicators
    for (var i = 0; i < missIndicators.length; i++) {
      missIndicators[i].life -= missIndicators[i].decay;
    }
    missIndicators = missIndicators.filter(function(m) { return m.life > 0; });
  }

  function draw() {
    ctx.clearRect(0, 0, W, H);

    // Grid background
    ctx.fillStyle = '#f0f1f5';
    ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = '#e2e4ec';
    ctx.lineWidth = 1;
    for (var x = 0; x <= W; x += 40) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (var y = 0; y <= H; y += 40) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Targets
    for (var i = 0; i < targets.length; i++) {
      var t = targets[i];
      if (!t.alive) continue;
      var shrink = 1 - (t.elapsed / t.duration) * 0.15;
      var r = t.radius * shrink;
      var fade = Math.min(1, (t.duration - t.elapsed) / 200);
      if (r < 3) continue;

      ctx.globalAlpha = fade;
      // Outer ring
      ctx.beginPath();
      ctx.arc(t.x, t.y, r, 0, Math.PI * 2);
      ctx.fillStyle = '#e74c3c';
      ctx.fill();
      ctx.strokeStyle = '#c0392b';
      ctx.lineWidth = 2;
      ctx.stroke();

      // Ring 1
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 0.8, 0, Math.PI * 2);
      ctx.fillStyle = '#ecf0f1';
      ctx.fill();
      ctx.strokeStyle = '#bdc3c7';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // Ring 2
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 0.5, 0, Math.PI * 2);
      ctx.fillStyle = '#e74c3c';
      ctx.fill();

      // Bullseye
      ctx.beginPath();
      ctx.arc(t.x, t.y, r * 0.25, 0, Math.PI * 2);
      ctx.fillStyle = '#c0392b';
      ctx.fill();

      ctx.globalAlpha = 1;
    }

    // Particles
    for (var i = 0; i < particles.length; i++) {
      var p = particles[i];
      ctx.globalAlpha = Math.max(0, p.life);
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.radius * p.life, 0, Math.PI * 2);
      ctx.fillStyle = p.color;
      ctx.fill();
    }
    ctx.globalAlpha = 1;

    // Miss indicators
    for (var i = 0; i < missIndicators.length; i++) {
      var m = missIndicators[i];
      ctx.globalAlpha = Math.max(0, m.life);
      ctx.strokeStyle = '#e74c3c';
      ctx.lineWidth = 3;
      var s = 12 * (1 - m.life * 0.5);
      ctx.beginPath();
      ctx.moveTo(m.x - s, m.y - s); ctx.lineTo(m.x + s, m.y + s);
      ctx.moveTo(m.x + s, m.y - s); ctx.lineTo(m.x - s, m.y + s);
      ctx.stroke();
    }
    ctx.globalAlpha = 1;

    // Difficulty indicator
    if (state === 'playing' && score > 0) {
      ctx.fillStyle = 'rgba(45,45,68,0.5)';
      ctx.font = '12px sans-serif';
      ctx.textAlign = 'left';
      ctx.fillText('难度 Lv.' + Math.floor(score / 50 + 1), 10, H - 10);
    }
  }

  function gameLoop(timestamp) {
    if (state !== 'playing') return;
    if (!gameLoop.lastTime) gameLoop.lastTime = timestamp;
    var dt = Math.min(timestamp - gameLoop.lastTime, 50);
    gameLoop.lastTime = timestamp;

    update(dt);
    draw();
    updateUI();

    if (state === 'playing') {
      animFrameId = requestAnimationFrame(gameLoop);
    }
  }
  gameLoop.lastTime = 0;

  function updateUI() {
    scoreDisplay.textContent = score;
    hitDisplay.textContent = hits;
    missDisplay.textContent = misses;
    timeDisplay.textContent = timeLeft;
  }

  // --- Timer ---
  function startTimer() {
    timeLeft = ROUND_TIME;
    updateUI();
    if (timerInterval) clearInterval(timerInterval);
    timerInterval = setInterval(function() {
      timeLeft--;
      updateUI();
      if (timeLeft <= 0) {
        endGame();
      }
    }, 1000);
  }

  // --- End ---
  function endGame() {
    state = 'ended';
    if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
    if (animFrameId) { cancelAnimationFrame(animFrameId); animFrameId = null; }

    var accuracy = (hits + misses) > 0 ? (hits / (hits + misses) * 100) : 0;
    if (score > highScore) {
      highScore = score;
      FW.storage.setHighScore(score);
      FW.audio.sfx('win');
    }

    resultStats.innerHTML =
      '<div><span class="label">得分 </span><span class="value">' + score + '</span></div>' +
      '<div><span class="label">命中 </span><span class="value">' + hits + '</span></div>' +
      '<div><span class="label">未中 </span><span class="value">' + misses + '</span></div>' +
      '<div><span class="label">命中率 </span><span class="value">' + accuracy.toFixed(1) + '%</span></div>' +
      '<div style="margin-top:6px;"><span class="label">最高纪录 </span><span class="value">' + highScore + '</span></div>';

    endOverlay.classList.add('active');
    draw();

    FW.audio.sfx('gameover');
    FW.events.reportScore(score);
    FW.events.reportComplete(score, { won: score > 0 });
  }

  // --- Start ---
  function startGame() {
    score = 0; hits = 0; misses = 0;
    targets = []; particles = []; missIndicators = [];
    spawnTimer = 0; spawnInterval = 700;
    state = 'playing';
    startOverlay.classList.remove('active');
    endOverlay.classList.remove('active');
    updateUI();
    gameLoop.lastTime = 0;

    // Initial targets
    for (var i = 0; i < 3; i++) targets.push(createTarget());

    if (animFrameId) cancelAnimationFrame(animFrameId);
    animFrameId = requestAnimationFrame(gameLoop);
    startTimer();
  }

  // --- Input ---
  function getCanvasPos(e) {
    var rect = canvas.getBoundingClientRect();
    var scaleX = W / rect.width;
    var scaleY = H / rect.height;
    var clientX, clientY;
    if (e.touches) {
      clientX = e.touches[0].clientX;
      clientY = e.touches[0].clientY;
      e.preventDefault();
    } else {
      clientX = e.clientX;
      clientY = e.clientY;
    }
    return {
      x: (clientX - rect.left) * scaleX,
      y: (clientY - rect.top) * scaleY
    };
  }

  function onPointerDown(e) {
    var pos = getCanvasPos(e);
    handleShot(pos.x, pos.y);
  }

  canvas.addEventListener('mousedown', onPointerDown);
  canvas.addEventListener('touchstart', onPointerDown, { passive: false });

  startBtn.addEventListener('click', startGame);
  startBtn.addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });
  replayBtn.addEventListener('click', startGame);
  replayBtn.addEventListener('touchend', function(e) { e.preventDefault(); startGame(); });

  // Keyboard shortcut
  document.addEventListener('keydown', function(e) {
    if (e.code === 'Space' || e.key === 'Enter') {
      if (state === 'menu') startGame();
      else if (state === 'ended') startGame();
    }
  });

  // Initial draw
  draw();
})();
</script>
</body>
</html>
